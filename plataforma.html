    /* ====================================================================
       MODAL: Exportar p/ Auditoria — decisão 29/06/2026
       Permite selecionar várias análises e gerar um super-ZIP com:
         - Sumário PDF executivo (lista das análises selecionadas)
         - Subpasta por análise contendo o pacote ZIP de cada uma
       Limite: 50 análises por exportação (pra não estourar memória).
       ==================================================================== */
    function ExportarAuditoriaModal({ open, onClose, analisesDisponiveis }) {
      const toast = useToast();
      const [selecionadas, setSelecionadas] = useState(new Set());
      const [gerando, setGerando] = useState(false);
      const [progress, setProgress] = useState({ feito: 0, total: 0, msg: '' });

      useEffect(() => { if (open) setSelecionadas(new Set()); }, [open]);

      const MAX_BATCH = 50;
      const todasComPacote = (analisesDisponiveis || []).filter((a) => !!a.pacote_zip_path);
      const semPacote = (analisesDisponiveis || []).filter((a) => !a.pacote_zip_path).length;

      const toggle = (id) => setSelecionadas((p) => {
        const n = new Set(p);
        if (n.has(id)) n.delete(id); else if (n.size < MAX_BATCH) n.add(id);
        return n;
      });
      const selecionarTudo = () => {
        const ids = todasComPacote.slice(0, MAX_BATCH).map((a) => a.id);
        setSelecionadas(new Set(ids));
      };
      const limpar = () => setSelecionadas(new Set());

      const handleGerar = async () => {
        if (selecionadas.size === 0) { toast.error('Selecione pelo menos 1 análise.'); return; }
        setGerando(true);
        setProgress({ feito: 0, total: selecionadas.size, msg: 'Inicializando…' });
        try {
          const listaSel = todasComPacote.filter((a) => selecionadas.has(a.id));
          const superZip = new JSZip();
          // Sumário
          const sumarioLinhas = [
            'CONFIANCE MEDICAL — Pacote para Auditoria',
            `Gerado em: ${new Date().toLocaleString('pt-BR')}`,
            `Total de análises: ${listaSel.length}`,
            '',
            'Lista de análises incluídas:',
            '',
          ];
          let feito = 0;
          for (const a of listaSel) {
            setProgress({ feito, total: listaSel.length, msg: `Baixando pacote da OP ${a.numero_op}…` });
            const pasta = `OP_${a.numero_op || 'semOP'}_${(a.numero_serie || 'semSerie').replace(/[^\w\d-]+/g, '_')}`;
            sumarioLinhas.push(
              `• ${formatDate(a.created_at)} | OP ${a.numero_op || '—'} | Série ${a.numero_serie || '—'} | ` +
              `${a.modelo || '—'} | Status: ${(a.status || '').toUpperCase()} | ` +
              `Origem: ${a.origem_analise === 'manual' ? 'Manual' : 'Agente'}`
            );
            // Baixa o ZIP individual
            try {
              const { data, error } = await supabase.storage.from('pacotes-analise').download(a.pacote_zip_path);
              if (!error && data) {
                const arrBuf = await data.arrayBuffer();
                superZip.file(`${pasta}/${a.pacote_zip_filename || 'pacote.zip'}`, arrBuf);
              } else {
                superZip.file(`${pasta}/_FALTANTE.txt`, 'Pacote indisponível no Storage: ' + (error?.message || 'sem dados'));
              }
            } catch (e) {
              superZip.file(`${pasta}/_FALTANTE.txt`, 'Erro ao baixar pacote: ' + (e?.message || e));
            }
            feito++;
            setProgress({ feito, total: listaSel.length, msg: `Empacotando ${feito}/${listaSel.length}` });
          }
          // Sumário texto
          superZip.file('SUMARIO_AUDITORIA.txt', sumarioLinhas.join('\n'));

          setProgress({ feito: listaSel.length, total: listaSel.length, msg: 'Gerando ZIP final…' });
          const blob = await superZip.generateAsync({ type: 'blob' });
          const ts = new Date().toISOString().slice(0, 10);
          const filename = `Auditoria_Confiance_${ts}_${listaSel.length}_analises.zip`;
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = filename;
          document.body.appendChild(a); a.click();
          setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
          toast.success(`Pacote de auditoria gerado: ${listaSel.length} análise(s).`);
          onClose();
        } catch (e) {
          toast.error('Erro ao gerar pacote de auditoria: ' + (e?.message || e));
        }
        setGerando(false);
      };

      if (!open) return null;
      return (
        <Modal open={open} onClose={onClose} title="Exportar para Auditoria"
          description={`Selecione até ${MAX_BATCH} análises com pacote ZIP salvo no banco. O resultado é um ZIP único com sumário e os pacotes de cada análise organizados por OP.`}
          size="lg">
          <div className="space-y-3">
            <div className="flex items-center gap-2 text-sm">
              <strong>{selecionadas.size}</strong> selecionada(s) de até <strong>{MAX_BATCH}</strong> · <strong>{todasComPacote.length}</strong> com pacote disponível
              {semPacote > 0 && <span className="text-orange-600">· {semPacote} sem pacote (não listadas)</span>}
              <div className="ml-auto flex gap-2">
                <Button variant="outline" size="sm" onClick={selecionarTudo} disabled={gerando}>Selecionar até {Math.min(MAX_BATCH, todasComPacote.length)}</Button>
                <Button variant="ghost" size="sm" onClick={limpar} disabled={gerando}>Limpar</Button>
              </div>
            </div>
            <div className="max-h-72 overflow-auto border rounded-lg">
              <table className="w-full text-sm">
                <thead className="bg-muted sticky top-0">
                  <tr className="text-left">
                    <th className="px-2 py-1.5 w-8"></th>
                    <th className="px-2 py-1.5">Data</th>
                    <th className="px-2 py-1.5">OP</th>
                    <th className="px-2 py-1.5">Série</th>
                    <th className="px-2 py-1.5">Modelo</th>
                    <th className="px-2 py-1.5">Status</th>
                  </tr>
                </thead>
                <tbody>
                  {todasComPacote.map((a) => (
                    <tr key={a.id} className={cn('border-t cursor-pointer', selecionadas.has(a.id) && 'bg-accent/10')} onClick={() => !gerando && toggle(a.id)}>
                      <td className="px-2 py-1.5">
                        <input type="checkbox" checked={selecionadas.has(a.id)} onChange={() => toggle(a.id)} disabled={gerando} />
                      </td>
                      <td className="px-2 py-1.5">{formatDate(a.created_at)}</td>
                      <td className="px-2 py-1.5 font-mono">{a.numero_op || '—'}</td>
                      <td className="px-2 py-1.5 font-mono">{a.numero_serie || '—'}</td>
                      <td className="px-2 py-1.5">{a.modelo || '—'}</td>
                      <td className="px-2 py-1.5">{a.status}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
            {gerando && (
              <div className="text-sm bg-accent/10 rounded p-2">
                <Icon name="loader" className="h-4 w-4 animate-spin inline mr-2" />
                {progress.msg} ({progress.feito}/{progress.total})
              </div>
            )}
            <div className="flex justify-end gap-2 pt-2 border-t">
              <Button variant="outline" onClick={onClose} disabled={gerando}>Cancelar</Button>
              <Button onClick={handleGerar} disabled={gerando || selecionadas.size === 0}>
                <Icon name="download" className="h-4 w-4 mr-2" />
                {gerando ? 'Gerando…' : `Gerar pacote de auditoria (${selecionadas.size})`}
              </Button>
            </div>
          </div>
        </Modal>
      );
    }

    function HistoricoPage() {
      const toast = useToast();
      const { perfil, can } = usePerm();
      const { pedirOuExecutar } = useSolic();
      const [analises, setAnalises] = useState([]);
      const [loading, setLoading] = useState(true);
      const [filter, setFilter] = useState('');
      const [viewing, setViewing] = useState(null);
      const [reloadKey, setReloadKey] = useState(0);
      // Atualização em tempo real do histórico quando alguém cria/edita/exclui análise
      useRealtime('analises', () => setReloadKey((k) => k + 1));
      const [importOpen, setImportOpen] = useState(false);
      const [novaManualOpen, setNovaManualOpen] = useState(false);
      const [auditOpen, setAuditOpen] = useState(false);
      const [editandoManual, setEditandoManual] = useState(null);
      const [corrigindo, setCorrigindo] = useState(null);
      // Filtros temporais (decisão 26/06/2026) — espelha o Dashboard
      const _hoje = new Date();
      const [filtroPeriodo, setFiltroPeriodo] = useState('tudo'); // 'tudo' | 'ano' | 'mes'
      const [filtroAno, setFiltroAno] = useState(_hoje.getFullYear());
      const [filtroMes, setFiltroMes] = useState(_hoje.getMonth() + 1); // 1..12
      const [filtroPendentes, setFiltroPendentes] = useState(false);
      const [filtroEquipamento, setFiltroEquipamento] = useState('todos');
      const [filtroModelo, setFiltroModelo] = useState('todos');
      const [filtroOrigem, setFiltroOrigem] = useState('todos');     // 'todos' | 'agente' | 'manual'
      const [filtroStatus, setFiltroStatus] = useState('todos'); // 'todos' | 'conforme' | 'corrigido' | 'nao_conforme'
      // Ordenação clicável nas colunas — decisão 29/06/2026
      const [sort, setSort] = useState({ campo: 'data', dir: 'desc' });
      const toggleSort = (campo) => setSort((s) => s.campo === campo
        ? { campo, dir: s.dir === 'asc' ? 'desc' : 'asc' }
        : { campo, dir: campo === 'data' ? 'desc' : 'asc' });

      useEffect(() => {
        const load = async () => {
          setLoading(true);
          const { data } = await supabase.from('analises').select('*').order('created_at', { ascending: false });
          setAnalises(data || []);
          setLoading(false);
        };
        load();
      }, [reloadKey]);

      // Filtro do histórico: apenas a análise MAIS RECENTE por OP/série.
      // Análises originais que foram corrigidas (têm re-análises filhas) são
      // ocultadas — só fica a re-análise que substituiu. Decisão 18/06/2026.
      // Listas distintas de Equipamentos (famílias) e Modelos para os selects
      const equipamentosDisponiveis = useMemo(() => {
        const set = new Set();
        for (const a of analises) {
          const fam = (a.parecer_completo?.produto?.familia
                    || a.parecer_completo?.produto?.equipamento
                    || a.nome_produto || '').trim();
          if (fam) set.add(fam);
        }
        return [...set].sort((a, b) => a.localeCompare(b));
      }, [analises]);

      // Modelos disponíveis: filtra pelo Equipamento selecionado, pra Maria
      // só ver os modelos que pertencem àquela família.
      const modelosDisponiveis = useMemo(() => {
        const set = new Set();
        const eqAlvo = (filtroEquipamento && filtroEquipamento !== 'todos') ? filtroEquipamento.toLowerCase() : null;
        for (const a of analises) {
          const fam = (a.parecer_completo?.produto?.familia
                    || a.parecer_completo?.produto?.equipamento
                    || a.nome_produto || '').toLowerCase();
          if (eqAlvo && fam !== eqAlvo) continue;
          const mod = (a.modelo || a.parecer_completo?.produto?.modelo || '').trim();
          if (mod) set.add(mod);
        }
        return [...set].sort((a, b) => a.localeCompare(b));
      }, [analises, filtroEquipamento]);

      // Quando muda o equipamento, reseta o modelo se ele não pertence mais
      useEffect(() => {
        if (filtroModelo === 'todos') return;
        if (!modelosDisponiveis.includes(filtroModelo)) setFiltroModelo('todos');
      }, [filtroEquipamento, modelosDisponiveis]);

      // Lista de anos com análises cadastradas (pro select)
      const anosDisponiveis = useMemo(() => {
        const set = new Set();
        for (const a of analises) {
          if (a.created_at) set.add(new Date(a.created_at).getFullYear());
        }
        set.add(_hoje.getFullYear());
        return [...set].sort((a, b) => b - a);
      }, [analises]);

      const filtered = useMemo(() => {
        // 1) Filtra por período (mês/ano/tudo)
        const dentroPeriodo = (a) => {
          if (filtroPeriodo === 'tudo') return true;
          if (!a.created_at) return false;
          const d = new Date(a.created_at);
          if (d.getFullYear() !== filtroAno) return false;
          if (filtroPeriodo === 'mes' && d.getMonth() + 1 !== filtroMes) return false;
          return true;
        };
        const dentroFiltro = analises.filter(dentroPeriodo);
        // 2) Conjunto de IDs de análises ORIGINAIS que foram re-analisadas
        const idsCorrigidas = new Set(
          dentroFiltro.filter((a) => a.analise_origem_id).map((a) => a.analise_origem_id)
        );
        // 3) Agrupa por chave (numero_op + numero_serie), pega a mais recente
        const porLote = new Map();
        for (const a of dentroFiltro) {
          if (idsCorrigidas.has(a.id)) continue;
          const chave = `${a.numero_op || '?'}|${a.numero_serie || '?'}`;
          const atual = porLote.get(chave);
          if (!atual || new Date(a.created_at) > new Date(atual.created_at)) {
            porLote.set(chave, a);
          }
        }
        // Ordenação dinâmica (clique no cabeçalho)
        const STATUS_ORDER = { conforme: 0, ressalva: 1, nao_conforme: 2 };
        const getVal = (a) => {
          switch (sort.campo) {
            case 'data':         return new Date(a.created_at || 0).getTime();
            case 'op':           return parseInt((a.numero_op || '').replace(/\D/g, ''), 10) || 0;
            case 'equipamento':  return (a.parecer_completo?.produto?.familia
                                       || a.parecer_completo?.produto?.equipamento
                                       || a.nome_produto || '').toLowerCase();
            case 'serie':        return (a.numero_serie || '').toLowerCase();
            case 'status':       return STATUS_ORDER[a.status] ?? 99;
            default:             return 0;
          }
        };
        let unicas = [...porLote.values()].sort((a, b) => {
          const va = getVal(a), vb = getVal(b);
          if (va < vb) return sort.dir === 'asc' ? -1 : 1;
          if (va > vb) return sort.dir === 'asc' ? 1 : -1;
          return 0;
        });
        if (filtroPendentes) {
          unicas = unicas.filter((a) => a.origem_analise !== 'manual' && !a.pacote_zip_path);
        }
        if (filtroEquipamento && filtroEquipamento !== 'todos') {
          const alvo = filtroEquipamento.toLowerCase();
          unicas = unicas.filter((a) => {
            const fam = (a.parecer_completo?.produto?.familia
                      || a.parecer_completo?.produto?.equipamento
                      || a.nome_produto || '').toLowerCase();
            return fam === alvo;
          });
        }
        if (filtroModelo && filtroModelo !== 'todos') {
          const alvo = filtroModelo.toLowerCase();
          unicas = unicas.filter((a) => {
            const mod = (a.modelo || a.parecer_completo?.produto?.modelo || '').toLowerCase();
            return mod === alvo;
          });
        }
        if (filtroOrigem === 'agente') {
          unicas = unicas.filter((a) => a.origem_analise !== 'manual');
        } else if (filtroOrigem === 'manual') {
          unicas = unicas.filter((a) => a.origem_analise === 'manual');
        }
        if (filtroStatus === 'conforme') {
          unicas = unicas.filter((a) => a.status === 'conforme' && getCorrecaoInfo(a, analises).iteracoes <= 1);
        } else if (filtroStatus === 'corrigido') {
          unicas = unicas.filter((a) => a.status === 'conforme_corrigido' || getCorrecaoInfo(a, analises).iteracoes > 1);
        } else if (filtroStatus === 'nao_conforme') {
          unicas = unicas.filter((a) => a.status === 'nao_conforme');
        }
        if (!filter) return unicas;
        const q = filter.toLowerCase();
        return unicas.filter((a) =>
          (a.numero_op || '').toLowerCase().includes(q) ||
          (a.numero_serie || '').toLowerCase().includes(q) ||
          (a.modelo || '').toLowerCase().includes(q)
        );
      }, [analises, filter, filtroPeriodo, filtroAno, filtroMes, filtroPendentes, filtroEquipamento, filtroModelo, filtroOrigem, filtroStatus, sort]);

      // Contador de pacotes pendentes (apenas análises do agente, com período aplicado)
      const totalPendentes = useMemo(() => {
        const dentroPeriodo = (a) => {
          if (filtroPeriodo === 'tudo') return true;
          if (!a.created_at) return false;
          const d = new Date(a.created_at);
          if (d.getFullYear() !== filtroAno) return false;
          if (filtroPeriodo === 'mes' && d.getMonth() + 1 !== filtroMes) return false;
          return true;
        };
        // MESMA deduplicação da lista: exclui substituídas e mantém a mais recente por
        // (OP|série). Assim o contador do "Só pendentes" bate com o que a lista mostra.
        const dentroFiltro = analises.filter(dentroPeriodo);
        const idsCorrigidas = new Set(dentroFiltro.filter((a) => a.analise_origem_id).map((a) => a.analise_origem_id));
        const porLote = new Map();
        for (const a of dentroFiltro) {
          if (idsCorrigidas.has(a.id)) continue;
          const chave = `${a.numero_op || '?'}|${a.numero_serie || '?'}`;
          const atual = porLote.get(chave);
          if (!atual || new Date(a.created_at) > new Date(atual.created_at)) porLote.set(chave, a);
        }
        return [...porLote.values()].filter((a) => a.origem_analise !== 'manual' && !a.pacote_zip_path).length;
      }, [analises, filtroPeriodo, filtroAno, filtroMes]);

      const handleDelete = async (id, op, serie) => {
        const ref = `OP ${op || '?'}${serie ? ' / ' + serie : ''}`;
        // Sem permissão → abre solicitação. Com permissão → exclui direto e registra no log.
        pedirOuExecutar({ acao: 'excluir_analise', entidade: 'analise', entidadeRef: ref, payload: { analise_id: id } }, async (autorizadoPor) => {
          if (!confirm(`Excluir análise da ${ref}? Esta ação não pode ser desfeita.`)) return;
          try {
            await excluirAnalise(id);
            // Update OTIMISTA — remove da lista local imediatamente, sem esperar refetch
            setAnalises((prev) => prev.filter((a) => a.id !== id));
            await registrarLog(perfil, 'excluir_analise', 'analise', ref, `${perfil?.nome_completo || perfil?.email} excluiu a análise da ${ref}${autorizadoPor ? ' com permissão de ' + autorizadoPor : ''}`);
            toast.success('Análise excluída.');
          } catch (err) {
            toast.error('Erro ao excluir: ' + err.message);
            // Em caso de erro, refaz o fetch pra garantir que UI bate com o banco
            setReloadKey((k) => k + 1);
          }
        });
      };

      // Baixa o pacote ZIP FINAL (com PDFs convertidos, FORM preenchido, etc.)
      // que foi armazenado no Storage quando o usuário gerou o pacote pela
      // primeira vez na página da análise. (decisão 18/06/2026)
      const handleDownloadPacote = async (analise) => {
        if (!analise.pacote_zip_path) {
          toast.error('Pacote ainda não foi salvo. Abra o parecer e clique em "Baixar pacote" pelo menos uma vez — depois o histórico permite re-baixar sem precisar reconverter.');
          return;
        }
        try {
          const { data, error } = await supabase.storage.from('pacotes-analise').download(analise.pacote_zip_path);
          if (error) throw error;
          const filename = analise.pacote_zip_filename || analise.pacote_zip_path.split('/').pop() || 'pacote.zip';
          const url = URL.createObjectURL(data);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
          toast.success(`Pacote "${filename}" baixado.`);
        } catch (e) {
          toast.error('Erro ao baixar pacote: ' + (e?.message || e));
        }
      };

      // Exporta o histórico filtrado para XLSX (quick win UX — decisão 29/06/2026)
      const exportarHistoricoXlsx = async () => {
        if (!filtered || filtered.length === 0) { toast.error('Nada para exportar.'); return; }
        if (!window.ExcelJS) { toast.error('ExcelJS não carregou. Recarregue a página.'); return; }
        try {
          const wb = new window.ExcelJS.Workbook();
          const ws = wb.addWorksheet('Histórico');
          ws.columns = [
            { header: 'Data', key: 'data', width: 14 },
            { header: 'Nº OP', key: 'op', width: 10 },
            { header: 'Nº Série', key: 'serie', width: 22 },
            { header: 'Modelo', key: 'modelo', width: 20 },
            { header: 'Status', key: 'status', width: 14 },
            { header: 'Origem', key: 'origem', width: 12 },
            { header: 'Correções', key: 'correcoes', width: 10 },
            { header: 'Pacote', key: 'pacote', width: 12 },
            { header: 'Parecer (resumo)', key: 'parecer', width: 60 },
          ];
          const h = ws.getRow(1);
          h.font = { bold: true, color: { argb: 'FFFFFFFF' } };
          h.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1F3A5C' } };
          ws.views = [{ state: 'frozen', ySplit: 1 }];
          for (const a of filtered) {
            const cInfo = getCorrecaoInfo(a, analises);
            ws.addRow({
              data: formatDate(a.created_at),
              op: a.numero_op || '',
              serie: a.numero_serie || '',
              modelo: a.modelo || '',
              status: (a.status || '').replace('_', ' ').toUpperCase(),
              origem: a.origem_analise === 'manual' ? 'Manual' : 'Agente',
              correcoes: cInfo.iteracoes > 1 ? `${cInfo.iteracoes - 1}x` : '',
              pacote: a.pacote_zip_path ? 'Salvo' : (a.origem_analise === 'manual' ? '—' : 'Pendente'),
              parecer: (a.parecer_completo?.parecer_resumo || '').slice(0, 800),
            });
          }
          const buf = await wb.xlsx.writeBuffer();
          const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = `Historico_Confiance_${new Date().toISOString().slice(0,10)}.xlsx`;
          document.body.appendChild(a); a.click();
          setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
          toast.success(`${filtered.length} linha(s) exportada(s).`);
        } catch (e) {
          toast.error('Erro ao exportar: ' + (e?.message || e));
        }
      };

      // Backup completo do histórico em XLSX — decisão 01/07/2026 (Maria Luiza):
      // substitui o antigo "Limpar histórico" que era arriscado demais.
      // Uso: QG deve rodar todo dia 1 do mês e enviar por e-mail para
      // qualidade@confiancemedical.com.br. Backup automático via cron ficará
      // para depois da migração pro padrão da empresa (MySQL + backend REST).
      const handleBackupHistorico = async () => {
        try {
          // Busca TUDO do banco (não filtrado por filtros da tela) — backup é o histórico inteiro
          const { data, error } = await supabase.from('analises').select('*').order('created_at', { ascending: false });
          if (error) throw error;
          const linhas = (data || []).map((a) => ({
            'Data análise':      a.created_at ? new Date(a.created_at).toLocaleString('pt-BR') : '',
            'Data finalização':  a.finalizada_em ? new Date(a.finalizada_em).toLocaleString('pt-BR') : '',
            'OP':                a.numero_op || '',
            'Nº Série':          a.numero_serie || '',
            'Equipamento':       a.nome_produto || '',
            'Modelo':            a.modelo || '',
            'Registro Anvisa':   a.registro_anvisa || '',
            'Status':            a.status || '',
            'Parecer resumo':    a.parecer_resumo || '',
            'Origem':            a.origem || 'agente',
            'Análise origem ID': a.analise_origem_id || '',
            'Criado por (id)':   a.created_by || '',
            'ID':                a.id,
          }));
          const wb = XLSX.utils.book_new();
          const ws = XLSX.utils.json_to_sheet(linhas);
          // Larguras razoáveis
          ws['!cols'] = [
            { wch: 20 }, { wch: 20 }, { wch: 10 }, { wch: 16 }, { wch: 30 },
            { wch: 20 }, { wch: 16 }, { wch: 20 }, { wch: 60 }, { wch: 10 },
            { wch: 36 }, { wch: 36 }, { wch: 36 },
          ];
          XLSX.utils.book_append_sheet(wb, ws, 'Histórico');
          const hoje = new Date();
          const yyyy = hoje.getFullYear();
          const mm = String(hoje.getMonth() + 1).padStart(2, '0');
          const dd = String(hoje.getDate()).padStart(2, '0');
          const filename = `backup_historico_${yyyy}-${mm}-${dd}.xlsx`;
          XLSX.writeFile(wb, filename);
          toast.success(`Backup gerado: ${linhas.length} análise(s) em ${filename}. Envie o arquivo para qualidade@confiancemedical.com.br.`);
        } catch (err) {
          toast.error('Erro ao gerar backup: ' + err.message);
        }
      };

      if (viewing) {
        return (
          <ParecerView
            parecer={viewing.parecer_completo}
            analiseId={viewing.id}
            onBack={() => { setViewing(null); setReloadKey((k) => k + 1); }}
            backLabel="Voltar ao Histórico"
            backIcon="arrowLeft"
            allowDelete
            onDelete={async () => {
              const alvo = viewing;
              const refOP = alvo.numero_op || '?';
              const refSerie = alvo.numero_serie || '';
              const ref = `OP ${refOP}${refSerie ? ' / ' + refSerie : ''}`;
              // Sem permissão → abre solicitação. Com permissão → exclui direto.
              pedirOuExecutar({ acao: 'excluir_analise', entidade: 'analise', entidadeRef: ref, payload: { analise_id: alvo.id } }, async () => {
                if (!confirm(`Excluir análise da OP ${refOP}?`)) return;
                try {
                  await excluirAnalise(alvo.id);
                  setAnalises((prev) => prev.filter((a) => a.id !== alvo.id));
                  await registrarLog(perfil, 'excluir_analise', 'analise', ref, `${perfil?.nome_completo || perfil?.email} excluiu a análise da ${ref}`);
                  toast.success('Análise excluída.');
                  setViewing(null);
                } catch (err) { toast.error('Erro: ' + err.message); }
              });
            }}
          />
        );
      }

      return (
        <div>
          <PageHeader
            title="Histórico de análises"
            description="Consulta de todas as conciliações já executadas pelo agente."
            actions={
              <div className="flex items-center gap-2 flex-wrap">
                {can('historico_correcao') && (
                <Button variant="default" onClick={() => setNovaManualOpen(true)} title="Adicionar uma análise manual (sem planilha)">
                  <Icon name="plus" />
                  Nova análise manual
                </Button>
                )}
                {can('historico_importar') && (
                <Button variant="outline" onClick={() => setImportOpen(true)} title="Importar várias análises manuais por planilha XLSX">
                  <Icon name="upload" />
                  Importar planilha
                </Button>
                )}
                <Button variant="outline" onClick={() => setAuditOpen(true)} title="Selecionar várias análises e gerar pacote consolidado para auditoria">
                  <Icon name="download" />
                  Exportar p/ auditoria
                </Button>
                <Button variant="outline" onClick={() => exportarHistoricoXlsx()} title="Exportar tabela atual do histórico para Excel">
                  <Icon name="download" />
                  Exportar XLSX
                </Button>
                <Button variant="outline" onClick={handleBackupHistorico} title="Gerar backup completo do histórico em XLSX (rotina mensal QG)">
                  <Icon name="download" />
                  Backup mensal
                </Button>
              </div>
            }
          />
          <ExportarAuditoriaModal
            open={auditOpen}
            onClose={() => setAuditOpen(false)}
            analisesDisponiveis={filtered}
          />
          <ImportarAnalisesManuaisModal
            open={importOpen}
            onClose={() => setImportOpen(false)}
            onImported={() => { registrarLog(perfil, 'importar_analises', 'analise', 'planilha', `${perfil?.nome_completo || perfil?.email || 'Usuário'} importou análises manuais por planilha`); setReloadKey((k) => k + 1); }}
          />
          <NovaAnaliseManualModal
            open={novaManualOpen}
            onClose={() => setNovaManualOpen(false)}
            onSaved={() => { registrarLog(perfil, 'analise_manual', 'analise', 'manual', `${perfil?.nome_completo || perfil?.email || 'Usuário'} registrou uma nova análise manual`); setReloadKey((k) => k + 1); }}
          />
          <NovaAnaliseManualModal
            open={!!editandoManual}
            editing={editandoManual}
            onClose={() => setEditandoManual(null)}
            onSaved={() => { registrarLog(perfil, 'editar_analise_manual', 'analise', editandoManual?.numero_op ? `OP ${editandoManual.numero_op}` : 'manual', `${perfil?.nome_completo || perfil?.email || 'Usuário'} editou uma análise manual${editandoManual?.numero_op ? ' (OP ' + editandoManual.numero_op + ')' : ''}`); setReloadKey((k) => k + 1); }}
          />
          <CorrigirManualModal
            analise={corrigindo}
            open={!!corrigindo}
            onClose={() => setCorrigindo(null)}
            onSaved={() => { registrarLog(perfil, 'correcao_manual', 'analise', corrigindo?.numero_op ? `OP ${corrigindo.numero_op}` : 'manual', `${perfil?.nome_completo || perfil?.email || 'Usuário'} registrou correção manual${corrigindo?.numero_op ? ' da OP ' + corrigindo.numero_op : ''}`); setReloadKey((k) => k + 1); }}
          />
          <Card>
            <CardHeader>
              <div className="flex flex-col gap-3">
                <div className="flex items-center justify-between gap-4 flex-wrap">
                  <div>
                    <CardTitle>Análises registradas</CardTitle>
                    <CardDescription>Clique na linha para abrir o parecer completo. Filtre por período, OP, série ou modelo.</CardDescription>
                  </div>
                  <Input placeholder="Buscar…" value={filter} onChange={(e) => setFilter(e.target.value)} className="max-w-xs" />
                </div>
                <div className="flex items-center gap-2 flex-wrap text-xs">
                  <Label className="text-xs uppercase tracking-wider text-muted-foreground">Período:</Label>
                  <select
                    value={filtroPeriodo}
                    onChange={(e) => setFiltroPeriodo(e.target.value)}
                    className="h-8 rounded-md border border-input bg-background px-2 text-sm"
                  >
                    <option value="tudo">Tudo</option>
                    <option value="ano">Ano</option>
                    <option value="mes">Mês</option>
                  </select>
                  {filtroPeriodo !== 'tudo' && (
                    <select
                      value={filtroAno}
                      onChange={(e) => setFiltroAno(parseInt(e.target.value, 10))}
                      className="h-8 rounded-md border border-input bg-background px-2 text-sm"
                    >
                      {anosDisponiveis.map((a) => <option key={a} value={a}>{a}</option>)}
                    </select>
                  )}
                  {filtroPeriodo === 'mes' && (
                    <select
                      value={filtroMes}
                      onChange={(e) => setFiltroMes(parseInt(e.target.value, 10))}
                      className="h-8 rounded-md border border-input bg-background px-2 text-sm"
                    >
                      {['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'].map((m, i) => (
                        <option key={i+1} value={i+1}>{m}</option>
                      ))}
                    </select>
                  )}
                  <Label className="text-xs uppercase tracking-wider text-muted-foreground">Equipamento:</Label>
                  <select
                    value={filtroEquipamento}
                    onChange={(e) => setFiltroEquipamento(e.target.value)}
                    className="h-8 rounded-md border border-input bg-background px-2 text-sm max-w-[260px]"
                    title="Filtrar análises pela família/equipamento"
                  >
                    <option value="todos">Todos</option>
                    {equipamentosDisponiveis.map((p) => <option key={p} value={p}>{p}</option>)}
                  </select>
                  <Label className="text-xs uppercase tracking-wider text-muted-foreground">Modelo:</Label>
                  <select
                    value={filtroModelo}
                    onChange={(e) => setFiltroModelo(e.target.value)}
                    className="h-8 rounded-md border border-input bg-background px-2 text-sm max-w-[200px]"
                    title="Filtrar análises pelo modelo específico"
                  >
                    <option value="todos">Todos</option>
                    {modelosDisponiveis.map((p) => <option key={p} value={p}>{p}</option>)}
                  </select>
                  <Label className="text-xs uppercase tracking-wider text-muted-foreground">Origem:</Label>
                  <select
                    value={filtroOrigem}
                    onChange={(e) => setFiltroOrigem(e.target.value)}
                    className="h-8 rounded-md border border-input bg-background px-2 text-sm"
                    title="Filtrar análises feitas pelo agente IA ou importadas manualmente"
                  >
                    <option value="todos">Todas</option>
                    <option value="agente">Agente IA</option>
                    <option value="manual">Manual</option>
                  </select>
                  <Label className="text-xs uppercase tracking-wider text-muted-foreground">Status:</Label>
                  <select
                    value={filtroStatus}
                    onChange={(e) => setFiltroStatus(e.target.value)}
                    className="h-8 rounded-md border border-input bg-background px-2 text-sm"
                    title="Filtrar por status da análise"
                  >
                    <option value="todos">Todos</option>
                    <option value="conforme">Conforme</option>
                    <option value="corrigido">Conforme corrigido</option>
                    <option value="nao_conforme">Não conforme</option>
                  </select>
                  <button
                    onClick={() => setFiltroPendentes((v) => !v)}
                    className={cn(
                      'inline-flex items-center gap-1 h-8 px-2 rounded-md border text-sm transition-colors',
                      filtroPendentes ? 'border-transparent text-white' : 'border-input bg-background hover:bg-muted/40'
                    )}
                    style={filtroPendentes ? { backgroundColor: 'hsl(28 80% 45%)' } : undefined}
                    title="Mostrar apenas análises do agente cujo pacote ZIP ainda não foi baixado/salvo"
                  >
                    <Icon name="download" className="h-3 w-3" />
                    Só pendentes
                    {totalPendentes > 0 && (
                      <span className={cn('ml-1 px-1.5 rounded-full text-[10px] font-bold', filtroPendentes ? 'bg-white/25' : 'bg-orange-100 text-orange-800')}>{totalPendentes}</span>
                    )}
                  </button>
                  <span className="text-muted-foreground ml-auto">{filtered.length} análise(s) no filtro</span>
                </div>
              </div>
            </CardHeader>
            <CardContent>
              {loading ? (
                <div className="text-sm text-muted-foreground">Carregando…</div>
              ) : filtered.length === 0 ? (
                <div className="rounded-lg border border-dashed p-12 text-center">
                  <p className="text-sm text-muted-foreground">Nenhuma análise registrada ainda.</p>
                  <p className="text-xs text-muted-foreground mt-1">Suas conciliações aparecerão aqui após a primeira análise.</p>
                </div>
              ) : (
                <div className="overflow-auto max-h-[calc(100vh-280px)] -mx-6 px-6">
                  <table className="w-full text-sm">
                    <thead className="sticky top-0 z-10 bg-card shadow-[0_1px_0_0_hsl(var(--border))]">
                      <tr className="text-left text-xs uppercase text-muted-foreground">
                        {[
                          { campo: 'data',         label: 'Data' },
                          { campo: 'op',           label: 'OP' },
                          { campo: 'equipamento',  label: 'Equipamento' },
                          { campo: 'serie',        label: 'Nº de Série' },
                          { campo: 'status',       label: 'Status' },
                        ].map((col) => {
                          const ativo = sort.campo === col.campo;
                          const seta = ativo ? (sort.dir === 'asc' ? '▲' : '▼') : '';
                          return (
                            <th
                              key={col.campo}
                              className={cn(
                                'px-3 py-2 font-semibold bg-card cursor-pointer select-none hover:bg-muted/40 transition-colors',
                                ativo && 'text-foreground'
                              )}
                              onClick={() => toggleSort(col.campo)}
                              title={`Ordenar por ${col.label} (${ativo && sort.dir === 'asc' ? 'desc' : 'asc'})`}
                            >
                              <span className="inline-flex items-center gap-1">
                                {col.label}
                                <span className={cn('text-[9px]', ativo ? 'text-accent' : 'text-muted-foreground/40')}>
                                  {seta || '⇅'}
                                </span>
                              </span>
                            </th>
                          );
                        })}
                        <th className="px-3 py-2 font-semibold w-32 bg-card">Ações</th>
                      </tr>
                    </thead>
                    <tbody>
                      {filtered.map((a) => {
                        const cInfo = getCorrecaoInfo(a, analises);
                        return (
                        <tr
                          key={a.id}
                          className="border-b hover:bg-muted/50 transition-colors cursor-pointer"
                          onClick={() => a.parecer_completo && setViewing(a)}
                        >
                          <td className="px-3 py-3">{formatDate(a.created_at)}</td>
                          <td className="px-3 py-3 font-mono text-xs">{a.numero_op || '—'}</td>
                          <td className="px-3 py-3">{a.nome_produto || a.modelo || '—'}</td>
                          <td className="px-3 py-3 font-mono text-xs">{a.numero_serie || '—'}</td>
                          <td className="px-3 py-3">
                            <div className="inline-flex items-center">
                              <StatusBadge status={a.status} />
                              <CorrecaoChip info={cInfo} />
                              {a.origem_analise === 'manual' && (
                                <span
                                  className="inline-flex items-center justify-center w-5 h-5 ml-1.5 rounded-full text-[10px] font-bold cursor-help"
                                  style={{ backgroundColor: 'hsl(var(--muted))', color: 'hsl(var(--foreground))' }}
                                  title="Análise importada manualmente — feita antes da plataforma"
                                >M</span>
                              )}
                              {a.origem_analise !== 'manual' && !a.pacote_zip_path && (
                                <span
                                  className="inline-flex items-center gap-1 ml-1.5 px-1.5 py-0.5 rounded-full text-[10px] font-semibold cursor-help"
                                  style={{ backgroundColor: 'hsl(35 92% 90%)', color: 'hsl(28 80% 35%)' }}
                                  title="Pacote ZIP ainda não foi baixado nem salvo no banco. Abra esta análise e clique em 'Baixar pacote' para gerar o cache."
                                >
                                  <Icon name="download" className="h-2.5 w-2.5" />pendente
                                </span>
                              )}
                            </div>
                          </td>
                          <td className="px-3 py-3" onClick={(e) => e.stopPropagation()}>
                            <div className="flex items-center gap-1">
                              <Button variant="ghost" size="icon" onClick={() => a.parecer_completo && setViewing(a)} title="Abrir parecer">
                                <Icon name="eye" className="h-3.5 w-3.5" />
                              </Button>
                              {a.pacote_zip_path && (
                                <Button variant="ghost" size="icon" onClick={() => handleDownloadPacote(a)} title={`Baixar pacote ZIP (${a.pacote_zip_filename || 'arquivo.zip'})`}>
                                  <Icon name="download" className="h-3.5 w-3.5" />
                                </Button>
                              )}
                              {a.origem_analise === 'manual' && (
                                <Button variant="ghost" size="icon" onClick={() => setEditandoManual(a)} title="Editar esta análise manual">
                                  <Icon name="edit" className="h-3.5 w-3.5" />
                                </Button>
                              )}
                              {a.origem_analise === 'manual' && a.status === 'nao_conforme' && (
                                <Button variant="ghost" size="icon" onClick={() => setCorrigindo(a)} title="Marcar como corrigida (cria re-análise manual conforme)">
                                  <Icon name="check" className="h-3.5 w-3.5" />
                                </Button>
                              )}
                              <Button variant="ghost" size="icon" onClick={() => handleDelete(a.id, a.numero_op, a.numero_serie)} title="Excluir">
                                <Icon name="trash" className="h-3.5 w-3.5" />
                              </Button>
                            </div>
                          </td>
                        </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              )}
            </CardContent>
          </Card>
        </div>
      );
    }

    /* ====================================================================
       CADASTRO — Catálogo de Produtos (CRUD) + Lista de Fichas Mestres

        <div>
          <PageHeader title="Cadastro" description="Catálogo de produtos (FORM-GQ-0085), Fichas Mestres usadas pelo agente, e template do FORM-GQ-0047." />
          <div className="flex items-center gap-1 border-b mb-6">
            <TabButton active={tab === 'catalogo'} onClick={() => setTab('catalogo')} icon="package">Catálogo de Produtos</TabButton>
            <TabButton active={tab === 'fichas'} onClick={() => setTab('fichas')} icon="book">Fichas Mestres</TabButton>
            <TabButton active={tab === 'template'} onClick={() => setTab('template')} icon="edit">Template FORM-GQ-0047</TabButton>
          </div>
          {tab === 'catalogo' && <CatalogoTab />}
          {tab === 'fichas' && <FichasTab />}
          {tab === 'template' && <TemplateFormTab />}
