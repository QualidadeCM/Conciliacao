          String(a.produto?.modelo || a.produto?.codigo_sapiens || '').localeCompare(String(b.produto?.modelo || b.produto?.codigo_sapiens || ''))
        );
      }, [fichas]);
      const toggle = (k) => setAberto((s) => ({ ...s, [k]: !s[k] }));
      return (
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="border-b text-left text-[10px] uppercase text-muted-foreground">
                <th className="py-2 px-2 w-8 font-semibold"></th>
                <th className="py-2 px-2 font-semibold">Equipamento</th>
                <th className="py-2 px-2 font-semibold">Modelo</th>
                <th className="py-2 px-2 font-semibold">Código Sapiens</th>
                <th className="py-2 px-2 font-semibold text-center">Fichas</th>
                <th className="py-2 px-2 font-semibold text-right">Ações</th>
              </tr>
            </thead>
            <tbody>
              {grupos.map(({ produto, fichas: fGrupo }) => {
                const key = produto?.id || fGrupo[0]?.id;
                const open = !!aberto[key];
                return (
                  <Fragment key={key}>
                    <tr className="border-b cursor-pointer hover:bg-muted/40 transition-colors" onClick={() => toggle(key)}>
                      <td className="py-2 px-2">
                        <Icon name="chevronLeft" className={cn("h-3.5 w-3.5 text-muted-foreground transition-transform", open ? "-rotate-90" : "rotate-180")} />
                      </td>
                      <td className="py-2 px-2 font-medium">{produto?.equipamento || '—'}</td>
                      <td className="py-2 px-2">{produto?.modelo || '—'}</td>
                      <td className="py-2 px-2 font-mono text-xs">{produto?.codigo_sapiens || '—'}</td>
                      <td className="py-2 px-2 text-center">
                        <span className="inline-flex items-center justify-center min-w-[1.5rem] h-5 px-2 rounded-full text-xs font-semibold" style={{ backgroundColor: 'hsl(var(--accent) / 0.15)', color: 'hsl(var(--accent))' }}>
                          {fGrupo.length}
                        </span>
                      </td>
                      <td className="py-2 px-2 text-right text-xs text-muted-foreground">
                        {open ? 'recolher' : 'expandir'}
                      </td>
                    </tr>
                    {open && fGrupo
                      .sort((a, b) => String(a.derivacao || '').localeCompare(String(b.derivacao || '')))
                      .map((ficha) => (
                        <tr key={ficha.id} className="border-b bg-muted/20">
                          <td className="py-2 px-2"></td>
                          <td className="py-2 px-2 pl-8 text-sm" colSpan={3}>
                            <span className="font-mono text-xs mr-2 px-1.5 py-0.5 rounded bg-background border">{ficha.derivacao || '000'}</span>
                            <span className="text-muted-foreground">{ficha.derivacao_descricao || 'Padrão'}</span>
                            {ficha.apta_analise
                              ? (<span className="ml-2 text-[10px] font-semibold px-1.5 py-0.5 rounded-full" style={{ backgroundColor: 'hsl(var(--status-conforme) / 0.15)', color: 'hsl(var(--status-conforme))' }}>✓ apta</span>)
                              : (<span className="ml-2 text-[10px] font-semibold px-1.5 py-0.5 rounded-full" style={{ backgroundColor: 'hsl(var(--status-ressalva) / 0.18)', color: 'hsl(var(--status-ressalva))' }} title="Ficha pendente de revisão — a análise de OPs desse equipamento está barrada até marcar como apta.">⚠ pendente de revisão</span>)}
                            {!ficha.ativa && (<span className="ml-2 text-[10px] uppercase tracking-wider text-destructive">inativa</span>)}
                          </td>
                          <td className="py-2 px-2 text-center text-xs text-muted-foreground">v{ficha.versao || 1}</td>
                          <td className="py-2 px-2 text-right" onClick={(e) => e.stopPropagation()}>
                            <div className="inline-flex items-center gap-1">
                              <Button variant="ghost" size="icon" onClick={() => onEdit(ficha)} title="Editar"><Icon name="edit" className="h-3.5 w-3.5" /></Button>
                              <Button variant="ghost" size="icon" onClick={() => onDelete(ficha)} title="Excluir"><Icon name="trash" className="h-3.5 w-3.5" /></Button>
                            </div>
                          </td>
                        </tr>
                      ))}
                  </Fragment>
                );
              })}
            </tbody>
          </table>
        </div>
      );
    }

    /* ====================================================================
       CONFIGURAÇÕES — pasta de destino do pacote e preferências
       ==================================================================== */
    function ConfiguracoesPage() {
      const toast = useToast();
      const { perfil, isAdmin, can } = usePerm();
      const podeEditar = isAdmin || can('config_editar');
      const podeGerenciarUsuarios = isAdmin || can('config_usuarios');
      const [pastaDestino, setPastaDestino] = useState(() => localStorage.getItem('confiance_pasta_destino') || '');
      const [porMes, setPorMes] = useState(() => localStorage.getItem('confiance_pasta_por_mes') === 'true');
      const [salvando, setSalvando] = useState(false);
      const [testando, setTestando] = useState(false);
      // Limiares de reincidência (janela de 30 dias). Defaults calibrados p/ 100–300 OPs/mês.
      const [reincPiso, setReincPiso] = useState('3');
      const [reincPct, setReincPct] = useState('3');
      const [reincFator, setReincFator] = useState('3');
      const [salvandoReinc, setSalvandoReinc] = useState(false);
      const MESES_PT = ['JANEIRO', 'FEVEREIRO', 'MARÇO', 'ABRIL', 'MAIO', 'JUNHO', 'JULHO', 'AGOSTO', 'SETEMBRO', 'OUTUBRO', 'NOVEMBRO', 'DEZEMBRO'];

      // Carrega a configuração COMPARTILHADA do banco (vale para todos os usuários).
      // Cai para o localStorage só como cache/legado.
      useEffect(() => {
        (async () => {
          try {
            const { data } = await supabase.from('config_app').select('chave, valor').in('chave', ['pasta_destino', 'pasta_por_mes', 'reinc_piso', 'reinc_incidencia_pct', 'reinc_fator_salto']);
            if (data && data.length) {
              const map = Object.fromEntries(data.map((r) => [r.chave, r.valor]));
              if (map.pasta_destino != null) { setPastaDestino(map.pasta_destino); localStorage.setItem('confiance_pasta_destino', map.pasta_destino); }
              if (map.pasta_por_mes != null) { const b = map.pasta_por_mes === 'true'; setPorMes(b); localStorage.setItem('confiance_pasta_por_mes', b ? 'true' : 'false'); }
              if (map.reinc_piso != null && map.reinc_piso !== '') setReincPiso(String(map.reinc_piso));
              if (map.reinc_incidencia_pct != null && map.reinc_incidencia_pct !== '') setReincPct(String(map.reinc_incidencia_pct));
              if (map.reinc_fator_salto != null && map.reinc_fator_salto !== '') setReincFator(String(map.reinc_fator_salto));
            }
          } catch (e) { /* segue com o cache local */ }
        })();
      }, []);

      const salvar = async () => {
        setSalvando(true);
        try {
          const valor = (pastaDestino || '').trim();
          // localStorage como cache
          localStorage.setItem('confiance_pasta_destino', valor);
          localStorage.setItem('confiance_pasta_por_mes', porMes ? 'true' : 'false');
          // Config COMPARTILHADA no banco — todos os usuários passam a usar essa pasta
          const autor = perfil?.nome_completo || perfil?.email || null;
          const agora = new Date().toISOString();
          const { error } = await supabase.from('config_app').upsert([
            { chave: 'pasta_destino', valor, updated_at: agora, updated_by: autor },
            { chave: 'pasta_por_mes', valor: porMes ? 'true' : 'false', updated_at: agora, updated_by: autor },
          ], { onConflict: 'chave' });
          if (error) throw error;
          registrarLog(perfil, 'editar_config', 'config', 'pasta_destino', `${autor || 'Usuário'} alterou as configurações (pasta de destino)`);
          toast.success('Configuração salva para todos os usuários. O próximo pacote será gravado nessa pasta pelo serviço.');
        } catch (e) {
          toast.error('Erro ao salvar a configuração: ' + (e?.message || e));
        } finally { setSalvando(false); }
      };

      const testarServico = async () => {
        if (!CONVERSAO_PDF_LOCAL) { toast.error('Serviço não configurado (CONVERSAO_PDF_LOCAL vazio no plataforma.html).'); return; }
        setTestando(true);
        try {
          const base = CONVERSAO_PDF_LOCAL.replace(/\/converter-pdf$/, '');
          const resp = await fetch(base + '/health');
          if (resp.ok) { const j = await resp.json().catch(() => ({})); toast.success(`Serviço online (v${j.versao || '?'}).`); }
          else toast.error('Serviço respondeu com erro: HTTP ' + resp.status);
        } catch (e) {
          toast.error('Não foi possível falar com o serviço em ' + CONVERSAO_PDF_LOCAL + '. Verifique se está no ar.');
        } finally { setTestando(false); }
      };

      const salvarReinc = async () => {
        setSalvandoReinc(true);
        try {
          const autor = perfil?.nome_completo || perfil?.email || null;
          const agora = new Date().toISOString();
          const piso = String(Math.max(1, parseInt(reincPiso, 10) || 3));
          const pct = String(Math.max(0, parseFloat(reincPct) || 3));
          const fator = String(Math.max(1, parseFloat(reincFator) || 3));
          const { error } = await supabase.from('config_app').upsert([
            { chave: 'reinc_piso', valor: piso, updated_at: agora, updated_by: autor },
            { chave: 'reinc_incidencia_pct', valor: pct, updated_at: agora, updated_by: autor },
            { chave: 'reinc_fator_salto', valor: fator, updated_at: agora, updated_by: autor },
          ], { onConflict: 'chave' });
          if (error) throw error;
          setReincPiso(piso); setReincPct(pct); setReincFator(fator);
          registrarLog(perfil, 'editar_config', 'config', 'reincidencia', `${autor || 'Usuário'} alterou os limiares de reincidência (piso ${piso}, incidência ${pct}%, fator ${fator}x)`);
          toast.success('Limiares de reincidência salvos.');
        } catch (e) {
          toast.error('Erro ao salvar limiares: ' + (e?.message || e));
        } finally { setSalvandoReinc(false); }
      };

      return (
        <div>
          <PageHeader title="Configurações" description="Preferências do sistema de conciliação da produção." />
          <div className="grid grid-cols-1 gap-4">
            <Card>
              <CardHeader>
                <CardTitle className="flex items-center gap-2"><Icon name="package" className="h-5 w-5 text-accent" />Pasta de destino do pacote</CardTitle>
                <CardDescription>Onde o serviço local grava o ZIP do pacote ao baixar. Use o caminho completo no servidor.</CardDescription>
              </CardHeader>
              <CardContent className="space-y-3">
                <div>
                  <Label>Caminho da pasta</Label>
                  <Input value={pastaDestino} onChange={(e) => setPastaDestino(e.target.value)} placeholder="Ex.: \\servidor\...\Origem 070\Pendente de Assinatura" />
                  <p className="text-xs text-muted-foreground mt-1">
                    O caminho UNC (<code>\\servidor\...\Pendente de Assinatura</code>) é o mais confiável; um caminho com letra de rede (<code>H:\...</code>) só funciona se a conta que roda o serviço enxergar essa letra. Deixe vazio para baixar pelo navegador (Downloads).
                  </p>
                </div>
                <label className="flex items-center gap-2 text-sm">
                  <input type="checkbox" checked={porMes} onChange={(e) => setPorMes(e.target.checked)} className="h-4 w-4" />
                  Salvar dentro da subpasta do <strong>mês corrente</strong> (ex.: …\Pendente de Assinatura\{MESES_PT[new Date().getMonth()]})
                </label>
                <div className="flex items-center gap-2">
                  <Button onClick={salvar} disabled={salvando || !podeEditar} title={podeEditar ? '' : 'Sem permissão para editar configurações'}><Icon name="check" className="h-4 w-4" />Salvar</Button>
                  <Button variant="outline" onClick={testarServico} disabled={testando}>
                    {testando ? (<><Icon name="loader" className="h-4 w-4 animate-spin" />Testando…</>) : (<><Icon name="search" className="h-4 w-4" />Testar serviço</>)}
                  </Button>
                </div>
                <p className="text-xs text-muted-foreground">Serviço de conversão/salvamento: <code>{CONVERSAO_PDF_LOCAL || '(não configurado)'}</code></p>
              </CardContent>
            </Card>

            <Card>
              <CardHeader>
                <CardTitle className="flex items-center gap-2"><Icon name="alertTriangle" className="h-5 w-5 text-accent" />Reincidência (janela de 30 dias)</CardTitle>
                <CardDescription>Como o alerta classifica um erro como reincidente ou tendência emergente. A chave é categoria do erro + equipamento + alvo (ex.: "Nº de série · câmera"). Incidência = ocorrências ÷ lotes analisados no período; a base histórica cobre ~12 meses anteriores.</CardDescription>
              </CardHeader>
              <CardContent className="space-y-3">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-3">
                  <div>
                    <Label>Piso de ocorrências (30d)</Label>
                    <Input type="number" min="1" value={reincPiso} onChange={(e) => setReincPiso(e.target.value)} disabled={!podeEditar} />
                    <p className="text-xs text-muted-foreground mt-1">Mínimo de ocorrências para virar "reincidente".</p>
                  </div>
                  <div>
                    <Label>Incidência mínima (%)</Label>
                    <Input type="number" min="0" step="0.5" value={reincPct} onChange={(e) => setReincPct(e.target.value)} disabled={!podeEditar} />
                    <p className="text-xs text-muted-foreground mt-1">% sobre os lotes analisados nos 30 dias.</p>
                  </div>
                  <div>
                    <Label>Fator de salto vs. histórico</Label>
                    <Input type="number" min="1" step="0.5" value={reincFator} onChange={(e) => setReincFator(e.target.value)} disabled={!podeEditar} />
                    <p className="text-xs text-muted-foreground mt-1">Quantas vezes acima da base para "tendência emergente".</p>
                  </div>
                </div>
                <Button onClick={salvarReinc} disabled={salvandoReinc || !podeEditar} title={podeEditar ? '' : 'Sem permissão para editar configurações'}><Icon name="check" className="h-4 w-4" />Salvar limiares</Button>
                <p className="text-xs text-muted-foreground">Regra: <strong>reincidente</strong> = ≥ piso de ocorrências <em>e</em> incidência ≥ mínimo. <strong>Tendência emergente</strong> = incidência ≥ fator × base histórica (ou base quase zero e incidência ≥ mínimo), com ao menos 2 ocorrências. Abaixo disso, é pontual (só correção imediata).</p>
              </CardContent>
            </Card>

            <GestaoOperadores perfil={perfil} podeEditar={podeEditar} />

            {podeGerenciarUsuarios && <GestaoUsuarios perfil={perfil} />}
          </div>
        </div>
      );
    }

    /* ====================================================================
       CADASTRO DE OPERADORES (admin) — colaboradores × estágios autorizados
       Lista global (vale para todos os produtos). Demissão = inativar (mantém
       os vínculos de estágio para não invalidar OPs antigas na re-análise).
       ==================================================================== */
    function GestaoOperadores({ perfil, podeEditar }) {
      const toast = useToast();
      const [lista, setLista] = useState([]);
      const [carregando, setCarregando] = useState(true);
      const [reload, setReload] = useState(0);
      const [abertos, setAbertos] = useState(() => new Set()); // estágios expandidos
      const [forms, setForms] = useState({}); // { [num]: {nome, codigo, apelidos} }
      // Gestão de colaboradores (ativar/inativar, editar código/apelidos)
      const [gerirAberto, setGerirAberto] = useState(false);
      const [mostrarInativos, setMostrarInativos] = useState(false);
      const [editId, setEditId] = useState(null);
      const [editApelidos, setEditApelidos] = useState('');
      const [editCodigo, setEditCodigo] = useState('');

      useRealtime('operadores', () => setReload((r) => r + 1));
      useEffect(() => {
        (async () => {
          setCarregando(true);
          const { data } = await supabase.from('operadores').select('*').order('nome', { ascending: true });
          setLista(data || []);
          setCarregando(false);
        })();
      }, [reload]);

      const autor = () => perfil?.nome_completo || perfil?.email || 'Usuário';
      const parseApelidos = (s) => String(s || '').split(/[;,]/).map((x) => x.trim()).filter(Boolean);
      const normalize = (s) => String(s || '').normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase().replace(/\s+/g, ' ').trim();
      // Papéis: 'op' (executa o estágio N) e 'insp' (faz a inspeção Ni).
      const colDe = (role) => role === 'insp' ? 'estagios_inspecao' : 'estagios';
      const listaDe = (op, role) => (op[colDe(role)] || []).map(Number);
      const estagiosDe = (op) => listaDe(op, 'op');
      const noEstagio = (role, num) => lista.filter((op) => listaDe(op, role).includes(num));
      const tagDe = (role, num) => role === 'insp' ? `${num}i` : `${num}`;
      const getForm = (n) => forms[n] || { nome: '', codigo: '', apelidos: '' };
      const setForm = (n, patch) => setForms((f) => ({ ...f, [n]: { ...getForm(n), ...patch } }));
      const toggleAberto = (n) => setAbertos((prev) => { const s = new Set(prev); s.has(n) ? s.delete(n) : s.add(n); return s; });

      // Casa por código (se informado) e, na ausência, por nome normalizado.
      const acharExistente = ({ codigo, nome }) => {
        const c = (codigo || '').trim();
        if (c) { const m = lista.find((o) => (o.codigo || '').trim() === c); if (m) return m; }
        const nn = normalize(nome);
        return nn ? (lista.find((o) => normalize(o.nome) === nn) || null) : null;
      };

      const alterar = async (op, campos, descricao) => {
        try {
          const { error } = await supabase.from('operadores').update({ ...campos, updated_at: new Date().toISOString(), updated_by: autor() }).eq('id', op.id);
          if (error) throw error;
          await registrarLog(perfil, 'editar_operador', 'operador', op.nome, descricao);
          setReload((r) => r + 1);
        } catch (e) { toast.error('Erro ao alterar operador: ' + (e?.message || e)); }
      };

      // Adiciona (ou vincula) um colaborador a UM estágio no papel indicado.
      const addAo = async (role, num) => {
        const key = `${num}|${role}`; const f = getForm(key); const nm = (f.nome || '').trim();
        if (!nm) { toast.error('Informe o nome do colaborador.'); return; }
        const existente = acharExistente({ codigo: f.codigo, nome: nm });
        const col = colDe(role); const tag = tagDe(role, num);
        try {
          if (existente) {
            const est = [...new Set([...listaDe(existente, role), num])].sort((a, b) => a - b);
            const apel = [...new Set([...(existente.apelidos || []), ...parseApelidos(f.apelidos)])];
            const { error } = await supabase.from('operadores').update({
              [col]: est, apelidos: apel,
              codigo: (f.codigo || '').trim() || existente.codigo || null,
              ativo: true, updated_at: new Date().toISOString(), updated_by: autor(),
            }).eq('id', existente.id);
            if (error) throw error;
            await registrarLog(perfil, 'editar_operador', 'operador', existente.nome, `${autor()} vinculou ${existente.nome} a ${tag}`);
            toast.success(`${existente.nome} vinculado a ${tag}.`);
          } else {
            const { error } = await supabase.from('operadores').insert({
              nome: nm, codigo: (f.codigo || '').trim() || null, apelidos: parseApelidos(f.apelidos),
              estagios: role === 'op' ? [num] : [], estagios_inspecao: role === 'insp' ? [num] : [],
              ativo: true, updated_by: autor(),
            });
            if (error) throw error;
            await registrarLog(perfil, 'cadastrar_operador', 'operador', nm, `${autor()} cadastrou ${nm} em ${tag}`);
            toast.success(`${nm} adicionado a ${tag}.`);
          }
          setForm(key, { nome: '', codigo: '', apelidos: '' });
          setReload((r) => r + 1);
        } catch (e) { toast.error('Erro: ' + (e?.message || e)); }
      };

      const vincular = async (op, role, num) => {
        const est = [...new Set([...listaDe(op, role), num])].sort((a, b) => a - b);
        await alterar(op, { [colDe(role)]: est, ativo: true }, `${autor()} vinculou ${op.nome} a ${tagDe(role, num)}`);
      };
      const removerDe = async (op, role, num) => {
        const tag = tagDe(role, num);
        if (!confirm(`Remover ${op.nome} de ${tag}?`)) return;
        const est = listaDe(op, role).filter((n) => n !== num);
        await alterar(op, { [colDe(role)]: est }, `${autor()} removeu ${op.nome} de ${tag}`);
      };

      // Renderiza um bloco de papel (operação/inspeção) dentro do card do estágio.
      // É função (não componente) para os inputs não perderem o foco a cada tecla.
      const renderRole = (e, role, titulo) => {
        const num = e.num; const tag = tagDe(role, num);
        const ativos = noEstagio(role, num).filter((op) => op.ativo);
        const disponiveis = lista.filter((op) => op.ativo && !listaDe(op, role).includes(num));
        const key = `${num}|${role}`; const f = getForm(key);
        return (
          <div className="space-y-2">
            <div className="text-xs font-bold uppercase tracking-wide text-muted-foreground">{titulo} <span className="font-mono">({tag})</span> · {ativos.length}</div>
            {ativos.length === 0 ? (
              <div className="text-xs text-muted-foreground">Ninguém autorizado em {tag} ainda.</div>
            ) : (
              <div className="rounded-md border divide-y">
                {ativos.map((op) => (
                  <div key={op.id} className="flex items-center justify-between gap-3 p-2.5">
                    <div className="min-w-0 text-sm">
                      <span className="font-medium">{op.nome}</span>
                      {op.codigo && <span className="text-xs font-mono text-muted-foreground ml-2">#{op.codigo}</span>}
                      {(op.apelidos || []).length > 0 && <span className="text-xs text-muted-foreground ml-2">({(op.apelidos || []).join(', ')})</span>}
                    </div>
                    {podeEditar && (
                      <Button variant="ghost" size="sm" onClick={() => removerDe(op, role, num)} title={`Remover de ${tag}`}><Icon name="x" className="h-3.5 w-3.5" /></Button>
                    )}
                  </div>
                ))}
              </div>
            )}
            {podeEditar && (
              <div className="rounded-md border border-dashed p-3 space-y-2">
                <div className="grid grid-cols-1 md:grid-cols-3 gap-2">
                  <Input value={f.nome} onChange={(ev) => setForm(key, { nome: ev.target.value })} placeholder="Nome do colaborador *" />
                  <Input value={f.codigo} onChange={(ev) => setForm(key, { codigo: ev.target.value })} placeholder="Código / matrícula" />
                  <Input value={f.apelidos} onChange={(ev) => setForm(key, { apelidos: ev.target.value })} placeholder="Apelidos (ex.: J. Silva; Joao)" />
                </div>
                <div className="flex flex-wrap items-center gap-2">
                  <Button size="sm" onClick={() => addAo(role, num)}><Icon name="plus" className="h-3.5 w-3.5" />Adicionar a {tag}</Button>
                  {disponiveis.length > 0 && (
                    <select
                      className="text-sm border rounded-md px-2 py-1 bg-background"
                      value=""
                      onChange={(ev) => { const op = lista.find((o) => o.id === ev.target.value); if (op) vincular(op, role, num); ev.target.value = ''; }}
                      title={`Vincular um colaborador já cadastrado a ${tag}`}
                    >
                      <option value="">Vincular já cadastrado…</option>
                      {disponiveis.map((op) => (<option key={op.id} value={op.id}>{op.nome}{op.codigo ? ` (#${op.codigo})` : ''}</option>))}
                    </select>
                  )}
                </div>
              </div>
            )}
          </div>
        );
      };

      const abrirEdicao = (op) => {
        if (editId === op.id) { setEditId(null); return; }
        setEditId(op.id); setEditApelidos((op.apelidos || []).join(', ')); setEditCodigo(op.codigo || '');
      };
      const salvarEdicao = async (op) => {
        await alterar(op, { apelidos: parseApelidos(editApelidos), codigo: (editCodigo || '').trim() || null }, `${autor()} editou dados de ${op.nome}`);
        setEditId(null); toast.success(`${op.nome} atualizado.`);
      };

      const gerenciaveis = lista.filter((op) => mostrarInativos || op.ativo);

      return (
        <Card>
          <CardHeader>
            <CardTitle className="flex items-center gap-2"><Icon name="database" className="h-5 w-5 text-accent" />Operadores por estágio</CardTitle>
            <CardDescription>Abra um estágio e cadastre, separadamente, quem <strong>executa</strong> o estágio (N) e quem faz a <strong>inspeção</strong> dele (Ni). Lista global. O código é a matrícula do Sapiens (casa as operações); apelidos ajudam a casar o nome do inspetor. Admissão = adicionar; demissão = inativar (na seção "Todos os colaboradores"), mantendo o histórico das OPs já produzidas.</CardDescription>
          </CardHeader>
          <CardContent className="space-y-2">
            {carregando && <div className="text-sm text-muted-foreground">Carregando…</div>}

            {ESTAGIOS_OPERADOR.map((e) => {
              const comInsp = temInspecao(e.num);
              const nOp = noEstagio('op', e.num).filter((op) => op.ativo).length;
              const nInsp = comInsp ? noEstagio('insp', e.num).filter((op) => op.ativo).length : 0;
              return (
                <CollapsibleSection
                  key={e.num}
                  title={`Estágio ${e.num} — ${e.nome}`}
                  badge={comInsp ? `${nOp} op · ${nInsp} insp` : `${nOp} op · sem inspeção`}
                  open={abertos.has(e.num)}
                  onToggle={() => toggleAberto(e.num)}
                >
                  <div className={cn('grid grid-cols-1 gap-4', comInsp && 'lg:grid-cols-2')}>
                    {renderRole(e, 'op', 'Operação')}
                    {comInsp && renderRole(e, 'insp', 'Inspeção')}
                  </div>
                  {podeEditar && <div className="text-[11px] text-muted-foreground mt-2">Se o colaborador já existir (mesmo código ou nome), ele é apenas vinculado — sem duplicar.{comInsp ? ' Executar o estágio (N) e inspecioná-lo (Ni) são autorizações independentes.' : ' Este estágio não possui inspeção.'}</div>}
                </CollapsibleSection>
              );
            })}

            {/* Gestão de todos os colaboradores (ativar/inativar, editar dados) */}
            <CollapsibleSection
              title="Todos os colaboradores"
              badge={`${lista.filter((o) => o.ativo).length} ativo(s)`}
              open={gerirAberto}
              onToggle={() => setGerirAberto((v) => !v)}
            >
              <div className="space-y-2">
                <label className="flex items-center gap-2 text-xs cursor-pointer select-none">
                  <input type="checkbox" checked={mostrarInativos} onChange={(ev) => setMostrarInativos(ev.target.checked)} className="h-3.5 w-3.5" />
                  Mostrar inativos
                </label>
                <div className="rounded-md border divide-y">
                  {gerenciaveis.length === 0 && <div className="p-3 text-sm text-muted-foreground text-center">Nenhum colaborador cadastrado.</div>}
                  {gerenciaveis.map((op) => (
                    <div key={op.id} className="p-2.5">
                      <div className="flex items-start justify-between gap-3 flex-wrap">
                        <div className="min-w-0">
                          <div className="text-sm font-semibold flex items-center gap-2">
                            {op.nome}
                            {op.codigo && <span className="text-xs font-mono text-muted-foreground">#{op.codigo}</span>}
                            {!op.ativo && <span className="text-[10px] font-semibold px-2 py-0.5 rounded-full" style={{ backgroundColor: 'hsl(var(--muted))', color: 'hsl(var(--muted-foreground))' }}>inativo</span>}
                          </div>
                          <div className="flex flex-wrap gap-1 mt-1 items-center">
                            {listaDe(op, 'op').sort((a, b) => a - b).map((n) => (
                              <span key={'o' + n} className="text-[10px] px-2 py-0.5 rounded-full" style={{ backgroundColor: 'hsl(var(--accent) / 0.12)', color: 'hsl(var(--accent))' }} title={`Executa o estágio ${n}`}>{n}</span>
                            ))}
                            {listaDe(op, 'insp').sort((a, b) => a - b).map((n) => (
                              <span key={'i' + n} className="text-[10px] px-2 py-0.5 rounded-full" style={{ backgroundColor: 'hsl(var(--status-ressalva) / 0.18)', color: 'hsl(var(--status-ressalva))' }} title={`Inspeciona o estágio ${n}`}>{n}i</span>
                            ))}
                            {listaDe(op, 'op').length === 0 && listaDe(op, 'insp').length === 0 && <span className="text-xs text-muted-foreground">sem estágios</span>}
                          </div>
                        </div>
                        {podeEditar && (
                          <div className="flex items-center gap-1">
                            <Button variant="outline" size="sm" onClick={() => abrirEdicao(op)}><Icon name="edit" className="h-3.5 w-3.5" />{editId === op.id ? 'Fechar' : 'Editar'}</Button>
                            <Button variant="ghost" size="sm" onClick={() => alterar(op, { ativo: !op.ativo }, `${autor()} ${op.ativo ? 'inativou' : 'reativou'} o operador ${op.nome}`)} title={op.ativo ? 'Inativar (demissão)' : 'Reativar'}>
                              {op.ativo ? 'Inativar' : 'Reativar'}
                            </Button>
                          </div>
                        )}
                      </div>
                      {editId === op.id && podeEditar && (
                        <div className="mt-2 pt-2 border-t grid grid-cols-1 md:grid-cols-3 gap-2 items-end">
                          <div><Label className="text-xs">Código / matrícula</Label><Input value={editCodigo} onChange={(ev) => setEditCodigo(ev.target.value)} placeholder="matrícula Sapiens" /></div>
                          <div><Label className="text-xs">Apelidos</Label><Input value={editApelidos} onChange={(ev) => setEditApelidos(ev.target.value)} placeholder="separe por vírgula" /></div>
                          <div><Button size="sm" onClick={() => salvarEdicao(op)}><Icon name="check" className="h-3.5 w-3.5" />Salvar</Button></div>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
                <div className="text-[11px] text-muted-foreground">Os estágios de cada colaborador são gerenciados abrindo os cards de estágio acima.</div>
              </div>
            </CollapsibleSection>
          </CardContent>
        </Card>
      );
    }

    /* ====================================================================
       OPERAÇÕES LIVRES (exceções da conferência de aptidão) — por equipamento
       ==================================================================== */
    function GestaoOperacoesLivres({ perfil, podeEditar }) {
      const toast = useToast();
      const [lista, setLista] = useState([]);
      const [equipamentos, setEquipamentos] = useState([]);
      const [carregando, setCarregando] = useState(true);
      const [reload, setReload] = useState(0);
      const [aberto, setAberto] = useState(false);
      const [f, setF] = useState({ equipamento: '', estagio: '', operacao_numero: '', operacao_desc: '' });
      const [salvando, setSalvando] = useState(false);

      useRealtime('operacoes_livres', () => setReload((r) => r + 1));
      useEffect(() => {
        (async () => {
          setCarregando(true);
          const [a, b] = await Promise.all([
            supabase.from('operacoes_livres').select('*').order('equipamento', { ascending: true }).order('estagio', { ascending: true }),
            supabase.from('produtos').select('equipamento'),
          ]);
          setLista(a.data || []);
          setEquipamentos([...new Set((b.data || []).map((p) => p.equipamento).filter(Boolean))].sort());
          setCarregando(false);
        })();
      }, [reload]);

      const autor = () => perfil?.nome_completo || perfil?.email || 'Usuário';
      const adicionar = async () => {
        const equip = (f.equipamento || '').trim();
        const est = parseInt(f.estagio, 10);
        const num = (f.operacao_numero || '').trim();
        if (!equip) { toast.error('Informe o equipamento.'); return; }
        if (isNaN(est)) { toast.error('Informe o número do estágio.'); return; }
        if (!num) { toast.error('Informe o número da operação.'); return; }
        setSalvando(true);
        try {
          const { data: existe } = await supabase.from('operacoes_livres').select('id').eq('equipamento', equip).eq('estagio', est).eq('operacao_numero', num).limit(1);
          if (existe && existe.length) { toast.error('Essa operação já está marcada como livre para este equipamento.'); setSalvando(false); return; }
          const { error } = await supabase.from('operacoes_livres').insert({ equipamento: equip, estagio: est, operacao_numero: num, operacao_desc: (f.operacao_desc || '').trim() || null, ativo: true, updated_by: autor() });
          if (error) throw error;
          await registrarLog(perfil, 'marcar_operacao_livre', 'operacao_livre', `${equip} · Est.${est}/Op ${num}`, `${autor()} marcou a operação ${num} (Estágio ${est}) como livre para ${equip}`);
          toast.success('Operação livre cadastrada.');
          setF({ equipamento: equip, estagio: '', operacao_numero: '', operacao_desc: '' });
          setReload((r) => r + 1);
        } catch (e) { toast.error('Erro: ' + (e?.message || e)); } finally { setSalvando(false); }
      };
      const remover = async (row) => {
        if (!confirm(`Remover a exceção "Op ${row.operacao_numero} (Estágio ${row.estagio})" de ${row.equipamento}?`)) return;
        try {
          await supabase.from('operacoes_livres').delete().eq('id', row.id);
          await registrarLog(perfil, 'remover_operacao_livre', 'operacao_livre', `${row.equipamento} · Est.${row.estagio}/Op ${row.operacao_numero}`, `${autor()} removeu a operação livre ${row.operacao_numero} (Estágio ${row.estagio}) de ${row.equipamento}`);
          setReload((r) => r + 1);
        } catch (e) { toast.error('Erro ao remover: ' + (e?.message || e)); }
      };

      const porEquip = {};
      for (const r of lista) { (porEquip[r.equipamento] = porEquip[r.equipamento] || []).push(r); }

      return (
        <CollapsibleSection
          title="Operações livres (exceções de aptidão)"
          description="Operações que podem ser executadas por colaboradores fora da aptidão do estágio, por equipamento."
          badge={`${lista.length}`}
          open={aberto}
          onToggle={() => setAberto((v) => !v)}
        >
          <div className="space-y-3">
            {podeEditar && (
              <div className="rounded-md border border-dashed p-3 space-y-2">
                <div className="text-xs font-semibold text-muted-foreground">Adicionar operação livre</div>
                <div className="grid grid-cols-1 md:grid-cols-4 gap-2">
                  <div>
                    <Input value={f.equipamento} onChange={(e) => setF((p) => ({ ...p, equipamento: e.target.value }))} placeholder="Equipamento *" list="lst-equip" />
                    <datalist id="lst-equip">{equipamentos.map((eq) => <option key={eq} value={eq} />)}</datalist>
                  </div>
                  <Input value={f.estagio} onChange={(e) => setF((p) => ({ ...p, estagio: e.target.value }))} placeholder="Estágio (nº) *" />
                  <Input value={f.operacao_numero} onChange={(e) => setF((p) => ({ ...p, operacao_numero: e.target.value }))} placeholder="Operação (nº) *" />
                  <Input value={f.operacao_desc} onChange={(e) => setF((p) => ({ ...p, operacao_desc: e.target.value }))} placeholder="Descrição (opcional)" />
                </div>
                <Button size="sm" onClick={adicionar} disabled={salvando}><Icon name="plus" className="h-3.5 w-3.5" />Adicionar</Button>
              </div>
            )}
            {carregando ? <div className="text-sm text-muted-foreground">Carregando…</div> : lista.length === 0 ? (
              <div className="text-sm text-muted-foreground">Nenhuma operação livre cadastrada. O jeito mais fácil de cadastrar é pelo botão "Marcar como operação livre" que aparece na própria análise.</div>
            ) : (
              Object.keys(porEquip).sort().map((eq) => (
                <div key={eq}>
                  <div className="text-sm font-semibold mb-1">{eq}</div>
                  <div className="rounded-md border divide-y">
                    {porEquip[eq].map((r) => (
                      <div key={r.id} className="flex items-center justify-between gap-3 p-2.5 text-sm">
                        <span><strong>Estágio {r.estagio} · Op {r.operacao_numero}</strong>{r.operacao_desc ? ` — ${r.operacao_desc}` : ''}</span>
                        {podeEditar && <Button variant="ghost" size="sm" onClick={() => remover(r)} title="Remover exceção"><Icon name="trash" className="h-3.5 w-3.5" /></Button>}
                      </div>
                    ))}
                  </div>
                </div>
              ))
            )}
          </div>
        </CollapsibleSection>
      );
    }

    /* ====================================================================
       GESTÃO DE USUÁRIOS (admin) — convite por e-mail + lista + cargo/ativo
       ==================================================================== */
    function GestaoUsuarios({ perfil }) {
      const toast = useToast();
      const [email, setEmail] = useState('');
      const [cargo, setCargo] = useState('estagiario_gq');
      const [perms, setPerms] = useState(() => permsPadraoDoCargo('estagiario_gq'));
      const [enviando, setEnviando] = useState(false);
      const [lista, setLista] = useState([]);
      const [carregando, setCarregando] = useState(true);
      const [reload, setReload] = useState(0);
      // Tempo real: reflete cadastro/alteração de usuários feita por outro admin
      useRealtime('perfis', () => setReload((r) => r + 1));

      useEffect(() => {
        (async () => {
          setCarregando(true);
          const { data } = await supabase.from('perfis').select('*').order('created_at', { ascending: true });
          setLista(data || []);
          setCarregando(false);
        })();
      }, [reload]);

      // Ao trocar de cargo, aplica o conjunto padrão de permissões (ainda editável)
      const trocarCargo = (novo) => { setCargo(novo); setPerms(permsPadraoDoCargo(novo)); };
      const togglePerm = (k) => setPerms((p) => ({ ...p, [k]: !p[k] }));

      const convidar = async () => {
        const em = (email || '').trim().toLowerCase();
        if (!em || !/^[^@\s]+@[^@\s]+\.[^@\s]+$/.test(em)) { toast.error('Informe um e-mail válido.'); return; }
        if (!CONVERSAO_PDF_LOCAL) { toast.error('Serviço local não configurado — não é possível enviar o convite.'); return; }
        setEnviando(true);
        try {
          const base = CONVERSAO_PDF_LOCAL.replace(/\/converter-pdf$/, '');
          const resp = await fetch(base + '/convidar-usuario', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email: em, cargo, permissoes: perms, convidado_por: perfil?.email || 'admin', redirectTo: window.location.href.split('#')[0] }),
          });
          const j = await resp.json().catch(() => ({}));
          if (!resp.ok) throw new Error(j.error || ('HTTP ' + resp.status));
          toast.success(`Convite enviado para ${em} (${CARGO_LABEL[cargo]}).`, { duration: 8000 });
          await registrarLog(perfil, 'convidar_usuario', 'usuario', em, `${perfil?.nome_completo || perfil?.email} convidou ${em} como ${CARGO_LABEL[cargo]}`);
          setEmail('');
          setReload((r) => r + 1);
        } catch (e) {
          toast.error('Falha ao enviar convite: ' + (e?.message || e), { duration: 12000 });
        } finally { setEnviando(false); }
      };

      const alterarUsuario = async (u, campos, descricao) => {
        try {
          const { error } = await supabase.from('perfis').update({ ...campos, updated_at: new Date().toISOString() }).eq('id', u.id);
          if (error) throw error;
          await registrarLog(perfil, 'editar_usuario', 'usuario', u.email, descricao);
          setReload((r) => r + 1);
        } catch (e) { toast.error('Erro ao alterar usuário: ' + (e?.message || e)); }
      };

      // Edição de permissões de um usuário já cadastrado (expande os checkboxes)
      const [permsUserId, setPermsUserId] = useState(null);
      const [permsUserVal, setPermsUserVal] = useState({});
      const abrirPermsUser = (u) => {
        if (permsUserId === u.id) { setPermsUserId(null); return; }
        setPermsUserId(u.id);
        setPermsUserVal({ ...(u.permissoes || {}) });
      };
      const togglePermUser = (k) => setPermsUserVal((p) => ({ ...p, [k]: !p[k] }));
      const salvarPermsUser = async (u) => {
        await alterarUsuario(u, { permissoes: permsUserVal }, `${perfil?.nome_completo || perfil?.email} alterou as permissões de ${u.email}`);
        setPermsUserId(null);
        toast.success(`Permissões de ${u.nome_completo || u.email} atualizadas.`);
      };

      return (
        <Card>
          <CardHeader>
            <CardTitle className="flex items-center gap-2"><Icon name="database" className="h-5 w-5 text-accent" />Usuários e permissões</CardTitle>
            <CardDescription>Convide por e-mail, defina o cargo e as permissões. (Interino — migrará para o SCM.)</CardDescription>
          </CardHeader>
          <CardContent className="space-y-5">
            {/* Convite */}
            <div className="rounded-lg border p-3 space-y-3">
              <div className="font-semibold text-sm">Convidar novo usuário</div>
              <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div><Label>E-mail</Label><Input value={email} onChange={(e) => setEmail(e.target.value)} placeholder="pessoa@confiancemedical.com.br" /></div>
                <div>
                  <Label>Cargo</Label>
                  <select value={cargo} onChange={(e) => trocarCargo(e.target.value)} className="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm">
                    {CARGOS.map((c) => <option key={c.id} value={c.id}>{c.label}</option>)}
                  </select>
                </div>
              </div>
              <div>
                <Label>Permissões</Label>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-1 mt-1">
                  {PERMISSOES_DEF.map((g) => (
                    <div key={g.grupo} className="mb-1">
                      <div className="text-xs font-semibold text-muted-foreground uppercase tracking-wide mt-1">{g.grupo}</div>
                      {g.itens.map((it) => (
                        <label key={it.key} className="flex items-center gap-2 text-sm py-0.5">
                          <input type="checkbox" checked={!!perms[it.key]} onChange={() => togglePerm(it.key)} className="h-4 w-4" />
                          {it.label}
                        </label>
                      ))}
                    </div>
                  ))}
                </div>
              </div>
              <Button onClick={convidar} disabled={enviando}>
                {enviando ? (<><Icon name="loader" className="h-4 w-4 animate-spin" />Enviando…</>) : (<><Icon name="upload" className="h-4 w-4" />Enviar convite</>)}
              </Button>
            </div>

            {/* Lista de usuários */}
            <div>
              <div className="font-semibold text-sm mb-2">Usuários cadastrados</div>
              {carregando ? (
                <div className="text-sm text-muted-foreground">Carregando…</div>
              ) : lista.length === 0 ? (
                <div className="text-sm text-muted-foreground">Nenhum usuário ainda.</div>
              ) : (
                <div className="rounded-md border divide-y">
                  {lista.map((u) => (
                    <div key={u.id} className="p-3">
                      <div className="flex items-center justify-between gap-3 flex-wrap">
                        <div className="text-sm min-w-0">
                          <div className="font-medium">{u.nome_completo || '(sem nome ainda)'} <span className="text-muted-foreground">· {u.email}</span></div>
                          <div className="text-xs text-muted-foreground">{CARGO_LABEL[u.cargo] || u.cargo || '—'}{u.ativo ? '' : ' · INATIVO'}</div>
                        </div>
                        <div className="flex items-center gap-2">
                          <select
                            value={u.cargo || ''}
                            onChange={(e) => alterarUsuario(u, { cargo: e.target.value, permissoes: permsPadraoDoCargo(e.target.value) }, `${perfil?.nome_completo || perfil?.email} alterou o cargo de ${u.email} para ${CARGO_LABEL[e.target.value]}`)}
                            className="h-9 rounded-md border border-input bg-background px-2 text-xs"
                          >
                            <option value="">— cargo —</option>
                            {CARGOS.map((c) => <option key={c.id} value={c.id}>{c.label}</option>)}
                          </select>
                          <Button variant="outline" size="sm" onClick={() => abrirPermsUser(u)}>
                            <Icon name="edit" className="h-3.5 w-3.5" />{permsUserId === u.id ? 'Fechar' : 'Permissões'}
                          </Button>
                          <Button variant={u.ativo ? 'outline' : 'default'} size="sm" onClick={() => alterarUsuario(u, { ativo: !u.ativo }, `${perfil?.nome_completo || perfil?.email} ${u.ativo ? 'desativou' : 'reativou'} o usuário ${u.email}`)}>
                            {u.ativo ? 'Desativar' : 'Reativar'}
                          </Button>
                        </div>
                      </div>
                      {permsUserId === u.id && (
                        <div className="mt-3 rounded-md border bg-muted/30 p-3">
                          <div className="text-xs text-muted-foreground mb-2">Marque as permissões deste usuário. Ajustar o cargo acima redefine para o padrão do cargo; aqui você personaliza.</div>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-1">
                            {PERMISSOES_DEF.map((g) => (
                              <div key={g.grupo} className="mb-1">
                                <div className="text-xs font-semibold text-muted-foreground uppercase tracking-wide mt-1">{g.grupo}</div>
                                {g.itens.map((it) => (
                                  <label key={it.key} className="flex items-center gap-2 text-sm py-0.5">
                                    <input type="checkbox" checked={!!permsUserVal[it.key]} onChange={() => togglePermUser(it.key)} className="h-4 w-4" />
                                    {it.label}
                                  </label>
                                ))}
                              </div>
                            ))}
                          </div>
                          <div className="flex items-center gap-2 mt-3">
                            <Button size="sm" onClick={() => salvarPermsUser(u)}><Icon name="check" className="h-3.5 w-3.5" />Salvar permissões</Button>
                            <Button size="sm" variant="outline" onClick={() => setPermsUserId(null)}>Cancelar</Button>
                          </div>
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              )}
            </div>
          </CardContent>
        </Card>
      );
    }

    /* ====================================================================
       LOGS — histórico de alterações/atividades por usuário
       ==================================================================== */
    function LogsPage() {
      const toast = useToast();
      const { perfil } = usePerm();
      const [logs, setLogs] = useState([]);
      const [carregando, setCarregando] = useState(true);
      const [filtroUser, setFiltroUser] = useState('');
      const [filtroAcao, setFiltroAcao] = useState('');
      const [tick, setTick] = useState(0);
      // Tempo real: novas atividades aparecem sozinhas
      useRealtime('logs_atividade', () => setTick((t) => t + 1));

      useEffect(() => {
        (async () => {
          setCarregando(true);
          const { data } = await supabase.from('logs_atividade').select('*').order('created_at', { ascending: false }).limit(1000);
          setLogs(data || []);
          setCarregando(false);
        })();
      }, [tick]);

      const acoes = useMemo(() => Array.from(new Set(logs.map((l) => l.acao).filter(Boolean))).sort(), [logs]);
      const filtrados = logs.filter((l) => {
        if (filtroUser && !((l.user_nome || '') + ' ' + (l.user_email || '')).toLowerCase().includes(filtroUser.toLowerCase())) return false;
        if (filtroAcao && l.acao !== filtroAcao) return false;
        return true;
      });

      // Exporta o histórico em XLSX (backup). Busca TODOS os registros do banco (não só os
      // 1000 carregados na tela) e aplica os filtros atuais. Útil como retenção antes da
      // migração para o SCM, quando o histórico pode ser reestruturado.
      const [exportando, setExportando] = useState(false);
      const exportarLogsXlsx = async () => {
        setExportando(true);
        try {
          const todos = [];
          const PAG = 1000;
          for (let de = 0; ; de += PAG) {
            const { data, error } = await supabase.from('logs_atividade')
              .select('*').order('created_at', { ascending: false }).range(de, de + PAG - 1);
            if (error) throw error;
            todos.push(...(data || []));
            if (!data || data.length < PAG) break;
          }
          const linhasFiltradas = todos.filter((l) => {
            if (filtroUser && !((l.user_nome || '') + ' ' + (l.user_email || '')).toLowerCase().includes(filtroUser.toLowerCase())) return false;
            if (filtroAcao && l.acao !== filtroAcao) return false;
            return true;
          });
          if (!linhasFiltradas.length) { toast.error('Nenhum registro para exportar.'); return; }
          const linhas = linhasFiltradas.map((l) => ({
            'Data/Hora': l.created_at ? new Date(l.created_at).toLocaleString('pt-BR') : '',
            'Usuário': l.user_nome || '',
            'E-mail': l.user_email || '',
            'Ação': l.acao || '',
            'Entidade': l.entidade || '',
            'Referência': l.entidade_ref || '',
            'Descrição': l.descricao || '',
          }));
          const wb = XLSX.utils.book_new();
          const ws = XLSX.utils.json_to_sheet(linhas);
          ws['!cols'] = [{ wch: 20 }, { wch: 22 }, { wch: 30 }, { wch: 20 }, { wch: 14 }, { wch: 28 }, { wch: 70 }];
          XLSX.utils.book_append_sheet(wb, ws, 'Histórico');
          XLSX.writeFile(wb, `historico_alteracoes_${new Date().toISOString().slice(0, 10)}.xlsx`);
          registrarLog(perfil, 'exportar_logs', 'log', 'histórico', `${perfil?.nome_completo || perfil?.email || 'Usuário'} exportou o histórico de alterações (${linhas.length} registro(s)) em XLSX`);
          toast.success(`Histórico exportado: ${linhas.length} registro(s).`);
        } catch (e) {
          toast.error('Erro ao exportar histórico: ' + (e?.message || e));
        } finally { setExportando(false); }
      };

      return (
        <div>
          <PageHeader title="Histórico de alterações" description="Atividades registradas por usuário no sistema." />
          <Card>
            <CardHeader>
              <div className="flex items-center gap-2 flex-wrap">
                <Input value={filtroUser} onChange={(e) => setFiltroUser(e.target.value)} placeholder="Filtrar por usuário…" className="max-w-xs" />
                <select value={filtroAcao} onChange={(e) => setFiltroAcao(e.target.value)} className="h-10 rounded-md border border-input bg-background px-3 text-sm">
                  <option value="">Todas as ações</option>
                  {acoes.map((a) => <option key={a} value={a}>{a}</option>)}
                </select>
                <Button variant="outline" size="sm" onClick={exportarLogsXlsx} disabled={exportando} title="Baixar todo o histórico (aplicando os filtros atuais) em Excel — útil como backup antes da migração">
                  {exportando ? (<><Icon name="loader" className="h-4 w-4 animate-spin" />Exportando…</>) : (<><Icon name="download" className="h-4 w-4" />Baixar histórico (XLSX)</>)}
                </Button>
                <span className="text-xs text-muted-foreground ml-auto">{filtrados.length} registro(s)</span>
              </div>
            </CardHeader>
            <CardContent>
              {carregando ? (
                <div className="text-sm text-muted-foreground">Carregando…</div>
              ) : filtrados.length === 0 ? (
                <div className="text-sm text-muted-foreground">Nenhuma atividade registrada.</div>
              ) : (
                <div className="rounded-md border divide-y max-h-[70vh] overflow-y-auto">
                  {filtrados.map((l) => (
                    <div key={l.id} className="p-3 text-sm flex items-start gap-3">
                      <Icon name="clock" className="h-4 w-4 mt-0.5 shrink-0 text-muted-foreground" />
                      <div className="min-w-0">
                        <div>{l.descricao}</div>
                        <div className="text-xs text-muted-foreground mt-0.5">
                          {l.user_nome || l.user_email || '—'} · {l.created_at ? new Date(l.created_at).toLocaleString('pt-BR') : '—'}{l.acao ? ` · ${l.acao}` : ''}
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </CardContent>
          </Card>
        </div>
      );
    }

    /* ====================================================================
       SOLICITAÇÕES — aprovar/recusar pedidos + minhas solicitações
       ==================================================================== */
    function SolicitacoesPage() {
      const toast = useToast();
      const { perfil, can } = usePerm();
      const [lista, setLista] = useState([]);
      const [carregando, setCarregando] = useState(true);
      const [reload, setReload] = useState(0);
      const [aba, setAba] = useState('aprovar'); // 'aprovar' | 'minhas'
      // Tempo real: pedidos e aprovações aparecem sozinhos para quem está na tela
      useRealtime('solicitacoes', () => setReload((r) => r + 1));

      useEffect(() => {
        (async () => {
          setCarregando(true);
          const { data } = await supabase.from('solicitacoes').select('*').order('created_at', { ascending: false }).limit(500);
          setLista(data || []);
          setCarregando(false);
        })();
      }, [reload]);

      const paraAprovar = lista.filter((s) => s.status === 'pendente' && can(s.perm_key) && s.solicitante_id !== perfil?.id);
      const minhas = lista.filter((s) => s.solicitante_id === perfil?.id);

      const verboPassado = (acao) => ({ excluir_analise: 'excluiu a análise', excluir_ficha: 'excluiu a ficha mestre' }[acao] || (ACOES_SOLIC[acao]?.label || acao).toLowerCase());

      const aprovar = async (s) => {
        const meuNome = perfil?.nome_completo || perfil?.email || 'aprovador';
        try {
          if (s.modo === 'executar') {
            await executarAcaoSolicitada(s.acao, s.payload || {});
            await supabase.from('solicitacoes').update({ status: 'executada', aprovador_id: perfil?.id, aprovador_nome: meuNome, decided_at: new Date().toISOString() }).eq('id', s.id);
            await registrarLog(perfil, s.acao, s.entidade, s.entidade_ref, `${s.solicitante_nome} ${verboPassado(s.acao)}${s.entidade_ref ? ' ' + s.entidade_ref : ''} com permissão de ${meuNome}`);
            toast.success('Solicitação aprovada e executada.');
          } else {
            await supabase.from('solicitacoes').update({ status: 'aprovada', aprovador_id: perfil?.id, aprovador_nome: meuNome, decided_at: new Date().toISOString() }).eq('id', s.id);
            await registrarLog(perfil, 'aprovar_' + s.acao, s.entidade, s.entidade_ref, `${meuNome} autorizou ${s.solicitante_nome} a ${(ACOES_SOLIC[s.acao]?.label || s.acao).toLowerCase()}${s.entidade_ref ? ' (' + s.entidade_ref + ')' : ''}`);
            toast.success('Autorizado. O solicitante já pode executar a ação.');
          }
          setReload((r) => r + 1);
        } catch (e) { toast.error('Erro ao aprovar: ' + (e?.message || e)); }
      };

      const recusar = async (s) => {
        const motivo = prompt('Motivo da recusa (opcional):') || '';
        const meuNome = perfil?.nome_completo || perfil?.email || 'aprovador';
        try {
          await supabase.from('solicitacoes').update({ status: 'recusada', aprovador_id: perfil?.id, aprovador_nome: meuNome, motivo_decisao: motivo, decided_at: new Date().toISOString() }).eq('id', s.id);
          await registrarLog(perfil, 'recusar_' + s.acao, s.entidade, s.entidade_ref, `${meuNome} recusou a solicitação de ${s.solicitante_nome} (${ACOES_SOLIC[s.acao]?.label || s.acao})`);
          setReload((r) => r + 1);
        } catch (e) { toast.error('Erro: ' + (e?.message || e)); }
      };

      const statusBadge = (st) => {
        const m = { pendente: 'Pendente', aprovada: 'Autorizada', executada: 'Executada', recusada: 'Recusada', usada: 'Concluída', cancelada: 'Cancelada' };
        return m[st] || st;
      };

      const linha = (s, comBotoes) => (
        <div key={s.id} className="p-3 text-sm flex items-start justify-between gap-3 flex-wrap">
          <div className="min-w-0">
            <div><strong>{ACOES_SOLIC[s.acao]?.label || s.acao}</strong>{s.entidade_ref ? ` · ${s.entidade_ref}` : ''}</div>
            <div className="text-xs text-muted-foreground mt-0.5">
              Solicitado por {s.solicitante_nome || '—'} · {s.created_at ? new Date(s.created_at).toLocaleString('pt-BR') : ''}
              {s.aprovador_sugerido_nome ? ` · sugerido: ${s.aprovador_sugerido_nome}` : ''}
              {s.motivo_solicitacao ? ` · motivo: ${s.motivo_solicitacao}` : ''}
            </div>
            {!comBotoes && <div className="text-xs mt-0.5">Status: <strong>{statusBadge(s.status)}</strong>{s.aprovador_nome ? ` · por ${s.aprovador_nome}` : ''}</div>}
          </div>
          {comBotoes && (
            <div className="flex items-center gap-2">
              <Button size="sm" onClick={() => aprovar(s)}><Icon name="check" className="h-3.5 w-3.5" />Aprovar</Button>
              <Button size="sm" variant="outline" onClick={() => recusar(s)}><Icon name="x" className="h-3.5 w-3.5" />Recusar</Button>
            </div>
          )}
        </div>
      );

      return (
        <div>
          <PageHeader title="Solicitações" description="Aprove pedidos de quem não tem a permissão e acompanhe suas próprias solicitações." />
          <div className="flex items-center gap-2 mb-4">
            <Button variant={aba === 'aprovar' ? 'default' : 'outline'} size="sm" onClick={() => setAba('aprovar')}>Para aprovar {paraAprovar.length ? `(${paraAprovar.length})` : ''}</Button>
            <Button variant={aba === 'minhas' ? 'default' : 'outline'} size="sm" onClick={() => setAba('minhas')}>Minhas solicitações</Button>
          </div>
          <Card>
            <CardContent className="pt-4">
              {carregando ? (
                <div className="text-sm text-muted-foreground">Carregando…</div>
              ) : aba === 'aprovar' ? (
                paraAprovar.length === 0 ? <div className="text-sm text-muted-foreground">Nenhuma solicitação pendente para você aprovar.</div>
                  : <div className="rounded-md border divide-y">{paraAprovar.map((s) => linha(s, true))}</div>
              ) : (
                minhas.length === 0 ? <div className="text-sm text-muted-foreground">Você não fez solicitações.</div>
                  : <div className="rounded-md border divide-y">{minhas.map((s) => linha(s, false))}</div>
              )}
            </CardContent>
          </Card>
        </div>
      );
    }

    /* ====================================================================
       COMPLETAR CADASTRO — quando o convidado chega pelo link do e-mail
       ==================================================================== */
    function CompletarCadastro({ session, onDone }) {
      const toast = useToast();
      const [nome, setNome] = useState('');
      const [senha, setSenha] = useState('');
      const [senha2, setSenha2] = useState('');
      const [salvando, setSalvando] = useState(false);
      const email = session?.user?.email || '';
      const salvar = async () => {
        if (!nome.trim()) { toast.error('Informe seu nome completo.'); return; }
        if ((senha || '').length < 8) { toast.error('A senha deve ter ao menos 8 caracteres.'); return; }
        if (senha !== senha2) { toast.error('As senhas não conferem.'); return; }
        setSalvando(true);
        try {
          const { error } = await supabase.auth.updateUser({ password: senha, data: { nome_completo: nome.trim() } });
          if (error) throw error;
          await supabase.from('perfis').update({ nome_completo: nome.trim() }).eq('id', session.user.id);
          try { history.replaceState(null, '', window.location.pathname + window.location.search); } catch (e) {}
          toast.success('Cadastro concluído! Bem-vindo(a).');
          onDone && onDone();
        } catch (e) { toast.error('Erro ao concluir cadastro: ' + (e?.message || e)); }
        finally { setSalvando(false); }
      };
      return (
        <div className="flex items-center justify-center min-h-screen bg-background p-4">
          <Card className="w-full max-w-md">
            <CardHeader>
              <CardTitle>Complete seu cadastro</CardTitle>
              <CardDescription>Defina seu nome e uma senha para acessar. Conta: {email}</CardDescription>
            </CardHeader>
            <CardContent className="space-y-3">
              <div><Label>Nome completo</Label><Input value={nome} onChange={(e) => setNome(e.target.value)} placeholder="Seu nome completo" /></div>
              <div><Label>Senha (mín. 8 caracteres)</Label><Input type="password" value={senha} onChange={(e) => setSenha(e.target.value)} /></div>
              <div><Label>Confirmar senha</Label><Input type="password" value={senha2} onChange={(e) => setSenha2(e.target.value)} /></div>
              <Button onClick={salvar} disabled={salvando}>{salvando ? 'Salvando…' : 'Concluir cadastro'}</Button>
            </CardContent>
          </Card>
        </div>
      );
    }

    /* ====================================================================
       APP — root component
       ==================================================================== */
    function App() {
      const [session, setSession] = useState(null);
      const [loading, setLoading] = useState(true);
      const [currentPage, setCurrentPage] = useState('dashboard');
      const [perfil, setPerfil] = useState(null);
      const [modoConvite, setModoConvite] = useState(() => /type=(invite|recovery|signup)/.test(window.location.hash || ''));
      const [theme, setTheme] = useState(() => {
        try { return localStorage.getItem('confiance-theme') || 'light'; } catch (e) { return 'light'; }
      });

      useEffect(() => {
        const root = document.documentElement;
        if (theme === 'dark') root.classList.add('dark');
        else root.classList.remove('dark');
        try { localStorage.setItem('confiance-theme', theme); } catch (e) {}
      }, [theme]);

      useEffect(() => {
        let mounted = true;
        supabase.auth.getSession().then(({ data }) => {
          if (!mounted) return;
          setSession(data.session || null);
          setLoading(false);
        });
        const { data: listener } = supabase.auth.onAuthStateChange((_event, sess) => {
          if (!mounted) return;
          setSession(sess || null);
        });
        return () => { mounted = false; try { listener?.subscription?.unsubscribe?.(); } catch (e) {} };
      }, []);

      // Carrega o perfil (cargo + permissões) do usuário logado.
      useEffect(() => {
        const u = session?.user;
        if (!u) { setPerfil(null); return; }
        let ativo = true;
        (async () => {
          const { data } = await supabase.from('perfis').select('*').eq('id', u.id).limit(1);
          if (!ativo) return;
          const row = (data && data[0]) || null;
          if (row) setPerfil(row);
          else setPerfil({ id: u.id, email: u.email, nome_completo: (u.user_metadata && u.user_metadata.nome_completo) || u.email, cargo: ((u.email || '').toLowerCase() === ADMIN_EMAIL ? 'admin' : null), permissoes: {} });
        })();
        return () => { ativo = false; };
      }, [session]);

      useEffect(() => {
        const applyHash = () => {
          const h = (window.location.hash || '').replace('#', '').trim();
          if (['dashboard', 'analise', 'historico', 'cadastro'].includes(h)) setCurrentPage(h);
        };
        applyHash();
        window.addEventListener('hashchange', applyHash);
        return () => window.removeEventListener('hashchange', applyHash);
      }, []);

      // Atalhos de teclado (task #161)
      useEffect(() => {
        let prefix = null;
        let prefixTimer = null;
        const onKeyDown = (e) => {
          const t = e.target;
          const tag = (t?.tagName || '').toLowerCase();
          const isField = tag === 'input' || tag === 'textarea' || tag === 'select' || t?.isContentEditable;
          if (isField && e.key !== 'Escape') return;
          if (prefix === 'g') {
            const map = { d: 'dashboard', a: 'analise', h: 'historico', c: 'cadastro' };
            const dest = map[e.key.toLowerCase()];
            prefix = null;
            if (prefixTimer) { clearTimeout(prefixTimer); prefixTimer = null; }
            if (dest) {
              e.preventDefault();
              setCurrentPage(dest);
              try { window.location.hash = dest; } catch (err) {}
            }
            return;
          }
          if (e.key === 'g' && !e.ctrlKey && !e.metaKey && !e.altKey) {
            prefix = 'g';
            if (prefixTimer) clearTimeout(prefixTimer);
            prefixTimer = setTimeout(() => { prefix = null; prefixTimer = null; }, 1500);
            return;
          }
          if (e.key === '/' && !e.ctrlKey && !e.metaKey) {
            const q = document.querySelector('input[type="search"], input[placeholder*="Buscar" i], input[placeholder*="uscar" i]');
            if (q) { e.preventDefault(); q.focus(); }
            return;
          }
          if (e.key === '?') {
            e.preventDefault();
            alert(['ATALHOS DE TECLADO', '', 'Navegação:', '  g d  → Dashboard', '  g a  → Análise', '  g h  → Histórico', '  g c  → Cadastro', '', 'Busca:', '  /    → Focar no campo de busca', '', 'Ajuda:', '  ?    → Esta tela'].join('\n'));
          }
        };
        window.addEventListener('keydown', onKeyDown);
        return () => window.removeEventListener('keydown', onKeyDown);
      }, []);

      const navigate = (id) => {
        setCurrentPage(id);
        try { window.location.hash = id; } catch (e) {}
      };

      const handleLogout = async () => {
        try { await supabase.auth.signOut(); } catch (e) {}
        setSession(null);
      };

      const toggleTheme = () => setTheme((t) => (t === 'dark' ? 'light' : 'dark'));

      if (loading) {
        return (
          <div className="flex items-center justify-center min-h-screen bg-background text-foreground">
            <div className="flex items-center gap-3 text-sm text-muted-foreground">
              <Icon name="loader" className="h-5 w-5 animate-spin" />
              Carregando…
            </div>
          </div>
        );
      }

      if (!session) {
        return <LoginPage onLogin={(s) => setSession(s)} />;
      }

      // Convidado chegou pelo link do e-mail → completa nome e senha antes de entrar.
      if (modoConvite) {
        return <CompletarCadastro session={session} onDone={() => setModoConvite(false)} />;
      }

      const renderPage = () => {
        switch (currentPage) {
          case 'dashboard': return <DashboardPage />;
          case 'analise':   return <AnalisePage />;
          case 'historico': return <HistoricoPage />;
          case 'cadastro':  return <CadastroPage />;
          case 'solicitacoes': return <SolicitacoesPage />;
          case 'logs':      return <LogsPage />;
          case 'configuracoes': return <ConfiguracoesPage />;
          default:          return <DashboardPage />;
        }
      };

      const isAdmin = (session?.user?.email || '').toLowerCase() === ADMIN_EMAIL;
      const can = (key) => {
        if (isAdmin) return true;
        return !!(perfil && perfil.permissoes && perfil.permissoes[key]);
      };
      const permValue = {
        perfil: perfil || (session?.user ? { id: session.user.id, email: session.user.email, nome_completo: session.user.email } : null),
        isAdmin, can,
      };

      return (
        <PermContext.Provider value={permValue}>
          <SolicitacaoProvider>
            <div className="flex min-h-screen bg-background text-foreground">
              <Sidebar
                currentPage={currentPage}
                onNavigate={navigate}
                theme={theme}
                onToggleTheme={toggleTheme}
                userEmail={session?.user?.email || ''}
                onLogout={handleLogout}
                can={can}
              />
              <main className="flex-1 overflow-x-hidden p-6 lg:p-8">
                {renderPage()}
              </main>
            </div>
          </SolicitacaoProvider>
        </PermContext.Provider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(
      <ToastProvider>
        <App />
      </ToastProvider>
    );

  </script>
</body>
</html>
