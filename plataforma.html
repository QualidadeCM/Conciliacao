                <Button variant="outline" onClick={() => setSlackModal(null)} disabled={enviandoSlack}>Cancelar</Button>
                <Button onClick={confirmarEnvioSlack} disabled={enviandoSlack || sel === 0}>
                  {enviandoSlack ? (<><Icon name="loader" className="h-4 w-4 animate-spin" />Enviando…</>) : (<><Icon name="bell" className="h-4 w-4" />Enviar {sel > 0 ? sel + ' ' : ''}ao Slack</>)}
                </Button>
              </div>
              ); })()}
            </Modal>
          )}

          {/* === Modal de justificativa de ressalva === */}
          {justifyModal && (
            <Modal open onClose={() => !saving && setJustifyModal(null)}
              title="Justificar ressalva"
              description="Registre a justificativa do RT para tratar esta ressalva como conforme. O texto fica salvo no parecer.">
              <div className="space-y-3">
                <div className="text-xs p-3 rounded-md bg-muted/40 border">
                  <div className="font-semibold mb-1">{parecer.apontamentos?.[justifyModal.apIdx]?.documento_afetado || '—'}</div>
                  <div>{parecer.apontamentos?.[justifyModal.apIdx]?.descricao}</div>
                </div>
                <div>
                  <Label>Justificativa do RT *</Label>
                  <Textarea
                    rows={5}
                    value={justifyModal.text}
                    onChange={(e) => setJustifyModal((p) => ({ ...p, text: e.target.value }))}
                    placeholder="Descreva por que esta ressalva é aceitável para liberação do lote. Ex.: 'O acessório X foi anexado por motivo Y, confirmado pelo PCP em DD/MM.'"
                    autoFocus
                  />
                </div>
                <div className="flex justify-end gap-2 pt-1">
                  <Button variant="outline" onClick={() => setJustifyModal(null)} disabled={saving}>Cancelar</Button>
                  <Button onClick={() => handleSubmitJustify(justifyModal.apIdx, justifyModal.text)} disabled={saving || !justifyModal.text.trim()}>
                    {saving ? <><Icon name="loader" className="h-4 w-4 animate-spin" /> Salvando…</> : 'Registrar justificativa'}
                  </Button>
                </div>
              </div>
            </Modal>
          )}

          {/* === Modal de substituir documento corrigido === */}
          {reanalisarModal && (() => {
            const targetLabel = labelSlot[reanalisarModal.slotKey];
            const targetSubtitulo = reanalisarModal.slotKey === 'etiqueta_acessorio' && reanalisarModal.nome
              ? `${reanalisarModal.nome}${reanalisarModal.codigo ? ` (${reanalisarModal.codigo})` : ''}`
              : null;
            const fileNameToReplace = reanalisarModal.fileNameOriginal;
            return (
            <Modal open onClose={() => !saving && setReanalisarModal(null)}
              title="Substituir documento corrigido"
              description="Anexe o arquivo corrigido. Ele fica preparado e a re-análise é disparada pelo botão no topo da página.">
              <div className="space-y-3">
                {/* Identificação do arquivo a substituir */}
                <div className="text-sm p-3 rounded-md border" style={{ backgroundColor: 'hsl(var(--accent) / 0.06)', borderColor: 'hsl(var(--accent) / 0.3)' }}>
                  <div className="text-xs uppercase tracking-wide text-muted-foreground font-semibold">Documento a substituir</div>
                  <div className="font-semibold mt-0.5 font-mono break-all">{fileNameToReplace || targetLabel}</div>
                  <div className="text-xs text-muted-foreground mt-0.5">
                    {targetLabel}{targetSubtitulo ? ` · ${targetSubtitulo}` : ''}
                    {!fileNameToReplace && ' · (documento ausente na análise original)'}
                  </div>
                </div>
                {/* Resumo da NC apontada */}
                <div className="text-xs p-3 rounded-md bg-muted/40 border">
                  <div className="font-semibold mb-1">NC apontada: {parecer.apontamentos?.[reanalisarModal.apIdx]?.documento_afetado || '—'}</div>
                  <div>{parecer.apontamentos?.[reanalisarModal.apIdx]?.descricao}</div>
                </div>
                <div>
                  <Label>Arquivo corrigido * <span className="text-xs text-muted-foreground font-normal ml-1">(aceita: {acceptSlot[reanalisarModal.slotKey] || 'qualquer formato'})</span></Label>
                  {(() => {
                    const acc = acceptSlot[reanalisarModal.slotKey] || '';
                    const accList = acc.split(',').map((s) => s.trim().toLowerCase()).filter(Boolean);
                    const aceito = (f) => !accList.length || accList.includes('.' + (f.name || '').split('.').pop().toLowerCase());
                    const lerArquivo = async (f) => {
                      if (!f) return;
                      try {
                        setSaving(true);
                        const text = await extractTextFromFile(f);
                        setReanalisarModal((p) => ({ ...p, file: f, fileName: f.name, text }));
                      } catch (err) {
                        toast.error('Erro ao ler arquivo: ' + (err?.message || err));
                      } finally {
                        setSaving(false);
                      }
                    };
                    return (
                      <DropZone
                        onFiles={(arqs) => { const f = arqs.find(aceito) || arqs[0]; if (f) lerArquivo(f); }}
                        className="mt-1 rounded-md border border-dashed p-2 transition-colors"
                      >
                        {(dragging) => (<>
                          <input
                            type="file"
                            accept={acceptSlot[reanalisarModal.slotKey] || '*'}
                            onChange={(e) => { const f = e.target.files?.[0]; e.target.value = ''; lerArquivo(f); }}
                            className="w-full text-sm"
                          />
                          <div className="text-[11px] text-muted-foreground mt-1">{dragging ? 'Solte o arquivo aqui' : 'ou arraste o arquivo para cá'}</div>
                        </>)}
                      </DropZone>
                    );
                  })()}
                  {reanalisarModal.fileName && (
                    <div className="mt-1.5 text-xs text-muted-foreground">
                      Arquivo lido: <strong>{reanalisarModal.fileName}</strong> · {reanalisarModal.text?.length || 0} caracteres extraídos
                    </div>
                  )}
                </div>
                <div>
                  <Label>Motivo da substituição (opcional)</Label>
                  <Textarea
                    rows={2}
                    value={reanalisarModal.motivo}
                    onChange={(e) => setReanalisarModal((p) => ({ ...p, motivo: e.target.value }))}
                    placeholder="Ex.: Etiqueta reimpressa com o modelo correto após apontamento da QG."
                  />
                </div>
                <div className="flex justify-end gap-2 pt-1">
                  <Button variant="outline" onClick={() => setReanalisarModal(null)} disabled={saving}>Cancelar</Button>
                  <Button
                    disabled={saving || !reanalisarModal.file || !reanalisarModal.text}
                    onClick={() => {
                      setDocsCorrigidos((prev) => {
                        const item = {
                          file: reanalisarModal.file,
                          text: reanalisarModal.text,
                          fileName: reanalisarModal.fileName,
                          motivo: reanalisarModal.motivo || '',
                          nome: reanalisarModal.nome || null,
                          codigo: reanalisarModal.codigo || null,
                        };
                        if (reanalisarModal.slotKey === 'etiqueta_acessorio') {
                          const chave = reanalisarModal.chave || reanalisarModal.codigo || '__sem_codigo__';
                          return { ...prev, etiqueta_acessorio: { ...(prev.etiqueta_acessorio || {}), [chave]: item } };
                        }
                        return { ...prev, [reanalisarModal.slotKey]: item };
                      });
                      setReanalisarModal(null);
                      toast.success(`${targetLabel}${targetSubtitulo ? ' (' + targetSubtitulo + ')' : ''} anexado. Clique em "Refazer análise" no topo da página.`);
                    }}
                  >
                    {saving ? <><Icon name="loader" className="h-4 w-4 animate-spin" /> Lendo…</> : 'Anexar documento'}
                  </Button>
                </div>
              </div>
            </Modal>
            );
          })()}
        </div>
      );
    }

    /* ====================================================================
       HELPERS DO PARECER VIEW (layout executivo)
       ==================================================================== */

    function SectionTitle({ children }) {
      return (
        <h2 className="font-montserrat text-xs font-bold uppercase tracking-[0.12em] mt-8 mb-3" style={{ color: 'hsl(222 45% 22%)' }}>
          {children}
        </h2>
      );
    }

    function IdRow({ leftLabel, leftValue, rightLabel, rightValue, alt }) {
      const v = (x) => (x && x !== '—' && x !== '?') ? x : '—';
      return (
        <tr className={cn('border-b', alt && 'bg-muted/30')}>
          <td className="px-4 py-2.5 font-semibold text-xs uppercase tracking-wide text-muted-foreground">{leftLabel}</td>
          <td className="px-4 py-2.5 font-mono">{v(leftValue)}</td>
          <td className="px-4 py-2.5 font-semibold text-xs uppercase tracking-wide text-muted-foreground">{rightLabel}</td>
          <td className="px-4 py-2.5 font-mono">{v(rightValue)}</td>
        </tr>
      );
    }

    function SummaryRow({ tipo, count, alt }) {
      const style = TIPO_STYLES[tipo];
      return (
        <tr className={cn('border-b', alt && 'bg-muted/20')}>
          <td className="px-4 py-2.5">
            <span className="inline-flex items-center gap-2 font-semibold text-sm">
              <span className="inline-flex h-4 w-4 items-center justify-center rounded-full" style={{ backgroundColor: style.bg }}>
                <Icon name={style.icon} className="h-2.5 w-2.5 text-white" />
              </span>
              {style.label}
            </span>
          </td>
          <td className="px-4 py-2.5 text-center font-mono font-bold text-lg" style={{ color: count > 0 ? style.bg : 'hsl(var(--muted-foreground))' }}>{count}</td>
          <td className="px-4 py-2.5 text-sm text-muted-foreground">{style.impacto}</td>
        </tr>
      );
    }

    function CritiqueCard({ item, onJustify, onReanalisar, jaCorrigido, onRemoverEtiqueta, jaRemovida }) {
      const justificada = !!item.justificativa;
      const baseStyle = TIPO_STYLES[item.tipo] || TIPO_STYLES.INFO;
      // Quando justificada, troca para visual de OBSERVAÇÃO (verde) — fica claro
      // que a ressalva foi tratada pelo RT e não impede a liberação.
      const style = justificada ? TIPO_STYLES['OBSERVAÇÃO'] : baseStyle;
      const headerLabel = justificada ? 'JUSTIFICADA' : style.label;
      return (
        <Card className="overflow-hidden">
          <div className="px-4 py-2.5 font-semibold text-sm flex items-center justify-between gap-3" style={{ backgroundColor: style.bg, color: 'white' }}>
            <span>{item.codigo} — [{headerLabel}] — {item.documento}{item.campo ? ` — ${item.campo}` : ''}</span>
            <div className="flex items-center gap-2 no-print">
              {!justificada && onJustify && (
                <Button variant="ghost" size="sm" onClick={onJustify} className="h-7 px-2 text-white hover:bg-white/20" title="Registrar justificativa">
                  <Icon name="edit" className="h-3.5 w-3.5" />Justificar
                </Button>
              )}
              {!justificada && onReanalisar && !jaCorrigido && (
                <Button variant="ghost" size="sm" onClick={onReanalisar} className="h-7 px-2 text-white hover:bg-white/20" title="Substituir doc e re-analisar">
                  <Icon name="upload" className="h-3.5 w-3.5" />Corrigir
                </Button>
              )}
              {!justificada && jaCorrigido && (
                <span className="text-[11px] px-2 py-1 rounded bg-white/15">✓ Documento já anexado para correção</span>
              )}
              {!justificada && onRemoverEtiqueta && !jaRemovida && (
                <Button variant="ghost" size="sm" onClick={onRemoverEtiqueta} className="h-7 px-2 text-white hover:bg-white/20" title="Remover etiqueta anexada por engano — ela sai da análise e do pacote">
                  <Icon name="trash" className="h-3.5 w-3.5" />Remover etiqueta
                </Button>
              )}
              {!justificada && jaRemovida && (
                <span className="text-[11px] px-2 py-1 rounded bg-white/15">✓ Etiqueta marcada para remoção</span>
              )}
              {justificada && <Icon name="check" className="h-4 w-4" title="Ressalva justificada" />}
            </div>
          </div>
          <table className="w-full text-sm">
            <tbody>
              <CritiqueRow label="Campo" value={item.campo || '—'} />
              <CritiqueRow label="Encontrado" value={item.encontrado} alt />
              <CritiqueRow label="Esperado" value={item.esperado} />
              <CritiqueRow label="Fundamentação" value={item.fundamentacao} alt />
              <CritiqueRow label="Ação Requerida" value={item.acao_requerida} highlight={style.bg} />
              {justificada && (
                <tr className="border-b last:border-0 bg-status-conforme/10">
                  <td className="px-4 py-2.5 align-top w-[18%] font-semibold text-xs uppercase tracking-wide" style={{ color: 'hsl(var(--status-conforme))' }}>
                    Justificativa
                  </td>
                  <td className="px-4 py-2.5 align-top text-sm leading-relaxed">
                    <div>{item.justificativa}</div>
                    {item.justificada_por && (
                      <div className="text-xs text-muted-foreground mt-1.5">
                        — Registrada por <strong>{item.justificada_por}</strong>{item.justificada_em ? ' em ' + new Date(item.justificada_em).toLocaleString('pt-BR') : ''}
                      </div>
                    )}
                  </td>
                </tr>
              )}
            </tbody>
          </table>
        </Card>
      );
    }

    function CritiqueRow({ label, value, alt, highlight }) {
      return (
        <tr className={cn('border-b last:border-0', alt && 'bg-muted/20')}>
          <td className="px-4 py-2.5 align-top w-[18%] font-semibold text-xs uppercase tracking-wide" style={highlight ? { color: highlight } : { color: 'hsl(var(--muted-foreground))' }}>
            {label}
          </td>
          <td className="px-4 py-2.5 align-top text-sm leading-relaxed">{value || '—'}</td>
        </tr>
      );
    }

    function InfoField({ label, value }) {
      return (
        <div>
          <div className="text-muted-foreground uppercase tracking-wide font-semibold text-[10px]">{label}</div>
          <div className="font-mono text-sm">{value || '—'}</div>
        </div>
      );
    }

    /**
     * RESUMO DA ANÁLISE — tabela compacta agrupada por camada, com contadores
     * no topo. Design system Confiance: HSL tokens (status-conforme/ressalva/
     * nao-conforme), fontes Montserrat (títulos) + Raleway (corpo).
     * Mostra Item | Status | Observação curta.
     */
    function ResumoAnaliseSection({ camadas }) {
      const c1 = camadas?.camada_1 || [];
      const c2 = camadas?.camada_2 || [];
      const c3 = camadas?.camada_3 || [];
      const todos = [...c1, ...c2, ...c3];
      if (todos.length === 0) return null;

      // Contadores por status
      const stats = todos.reduce((acc, it) => {
        const s = (it.status || 'na').toLowerCase();
        acc[s] = (acc[s] || 0) + 1;
        return acc;
      }, {});
      const total = todos.length;
      const conf = stats.conforme || 0;
      const ress = stats.ressalva || 0;
      const ncon = stats.nao_conforme || 0;
      const na   = stats.na || 0;
      // N/A não entra no denominador do índice — itens "não aplicáveis" não são
      // pontos que podiam ter sido conformes ou não. Só conta o que de fato foi avaliado.
      const avaliados = conf + ress + ncon;
      const pctConf = avaliados > 0 ? Math.round((conf / avaliados) * 100) : 0;

      return (
        <div className="mb-6">
          {/* Contadores no topo — % de cada categoria sobre os AVALIADOS (sem N/A) */}
          <div className="grid grid-cols-2 md:grid-cols-4 gap-3 mb-4">
            <ResumoStat label="Conformes" value={conf} total={avaliados} bgVar="--status-conforme" />
            <ResumoStat label="Ressalvas" value={ress} total={avaliados} bgVar="--status-ressalva" />
            <ResumoStat label="Não conformes" value={ncon} total={avaliados} bgVar="--status-nao-conforme" />
            <ResumoStat label="Não aplicáveis" value={na} total={total} bgVar="--muted-foreground" muted />
          </div>

          {/* Tabela por camada */}
          <div className="space-y-4">
            {c1.length > 0 && <ResumoCamadaTabela titulo="Camada 1 — Consistência Interna entre Documentos" itens={c1} />}
            {c2.length > 0 && <ResumoCamadaTabela titulo="Camada 2 — Conformidade contra a Ficha Mestre" itens={c2} />}
            {c3.length > 0 && <ResumoCamadaTabela titulo="Camada 3 — Conformidade Regulatória" itens={c3} mostrarNorma />}
          </div>

          {/* Conclusão sumária */}
          <Card className="mt-4">
            <CardContent className="pt-5 pb-5">
              <div className="flex items-center justify-between gap-4 flex-wrap">
                <div>
                  <div className="text-xs uppercase tracking-wide text-muted-foreground font-semibold">Índice de conformidade</div>
                  <div className="font-montserrat text-3xl font-bold mt-1" style={{ color: pctConf === 100 ? 'hsl(var(--status-conforme))' : pctConf >= 80 ? 'hsl(var(--status-ressalva))' : 'hsl(var(--status-nao-conforme))' }}>
                    {pctConf}%
                  </div>
                  <div className="text-xs text-muted-foreground mt-0.5">
                    {conf} de {avaliados} pontos avaliados em conformidade
                    {na > 0 && ` · ${na} N/A excluído(s) do cálculo`}
                  </div>
                </div>
                <div className="flex-1 min-w-[200px] max-w-md">
                  <div className="h-3 rounded-full overflow-hidden flex" style={{ backgroundColor: 'hsl(var(--muted))' }}>
                    {conf > 0 && avaliados > 0 && <div style={{ width: `${(conf/avaliados)*100}%`, backgroundColor: 'hsl(var(--status-conforme))' }} />}
                    {ress > 0 && avaliados > 0 && <div style={{ width: `${(ress/avaliados)*100}%`, backgroundColor: 'hsl(var(--status-ressalva))' }} />}
                    {ncon > 0 && avaliados > 0 && <div style={{ width: `${(ncon/avaliados)*100}%`, backgroundColor: 'hsl(var(--status-nao-conforme))' }} />}
                  </div>
                  <div className="text-[10px] text-muted-foreground mt-1.5 flex gap-3 flex-wrap">
                    <span><span className="inline-block w-2 h-2 rounded-full mr-1" style={{ backgroundColor: 'hsl(var(--status-conforme))' }} />Conformes</span>
                    <span><span className="inline-block w-2 h-2 rounded-full mr-1" style={{ backgroundColor: 'hsl(var(--status-ressalva))' }} />Ressalvas</span>
                    <span><span className="inline-block w-2 h-2 rounded-full mr-1" style={{ backgroundColor: 'hsl(var(--status-nao-conforme))' }} />Não conformes</span>
                  </div>
                </div>
              </div>
            </CardContent>
          </Card>
        </div>
      );
    }

    function ResumoStat({ label, value, total, bgVar, muted }) {
      const pct = total > 0 ? Math.round((value / total) * 100) : 0;
      return (
        <Card className="overflow-hidden">
          <CardContent className="p-4">
            <div className="flex items-center justify-between mb-2">
              <span className="text-xs uppercase tracking-wide text-muted-foreground font-semibold">{label}</span>
              <span className="font-montserrat text-2xl font-bold" style={{ color: muted ? 'hsl(var(--muted-foreground))' : `hsl(var(${bgVar}))` }}>
                {value}
              </span>
            </div>
            <div className="h-1.5 rounded-full overflow-hidden" style={{ backgroundColor: 'hsl(var(--muted))' }}>
              <div className="h-full rounded-full transition-all" style={{ width: `${pct}%`, backgroundColor: muted ? 'hsl(var(--muted-foreground) / 0.4)' : `hsl(var(${bgVar}))` }} />
            </div>
            <div className="text-[10px] text-muted-foreground mt-1">{pct}% do total</div>
          </CardContent>
        </Card>
      );
    }

    function ResumoCamadaTabela({ titulo, itens, mostrarNorma }) {
      const conformes = itens.filter(i => i.status === 'conforme').length;
      const ressalvas = itens.filter(i => i.status === 'ressalva').length;
      const ncs      = itens.filter(i => i.status === 'nao_conforme').length;
      return (
        <Card className="overflow-hidden">
          <CardHeader className="pb-3">
            <div className="flex items-center justify-between gap-3 flex-wrap">
              <CardTitle className="text-sm font-montserrat">{titulo}</CardTitle>
              <div className="flex items-center gap-2 text-[11px]">
                {conformes > 0 && <ResumoBadge status="conforme" count={conformes} />}
                {ressalvas > 0 && <ResumoBadge status="ressalva" count={ressalvas} />}
                {ncs > 0       && <ResumoBadge status="nao_conforme" count={ncs} />}
              </div>
            </div>
          </CardHeader>
          <CardContent className="pt-0">
            <div className="overflow-x-auto">
              <table className="w-full text-xs">
                <thead>
                  <tr className="border-b text-left uppercase text-muted-foreground">
                    <th className="px-2 py-2 font-semibold w-[35%]">Item analisado</th>
                    <th className="px-2 py-2 font-semibold w-[14%]">Status</th>
                    {mostrarNorma && <th className="px-2 py-2 font-semibold w-[18%]">Norma</th>}
                    <th className="px-2 py-2 font-semibold">Observação</th>
                  </tr>
                </thead>
                <tbody>
                  {itens.map((it, i) => (
                    <tr key={i} className="border-b last:border-0">
                      <td className="px-2 py-2.5 align-top text-sm font-medium">{it.item}</td>
                      <td className="px-2 py-2.5 align-top"><ResumoBadge status={it.status} /></td>
                      {mostrarNorma && <td className="px-2 py-2.5 align-top text-xs font-mono text-muted-foreground">{it.norma || '—'}</td>}
                      <td className="px-2 py-2.5 align-top text-xs text-muted-foreground">{it.observacao || '—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </CardContent>
        </Card>
      );
    }

    function ResumoBadge({ status, count }) {
      const config = {
        conforme:     { label: 'Conforme',     bg: 'hsl(var(--status-conforme) / 0.12)',     fg: 'hsl(var(--status-conforme))',     icon: 'check' },
        ressalva:     { label: 'Ressalva',     bg: 'hsl(var(--status-ressalva) / 0.15)',     fg: 'hsl(var(--status-ressalva))',     icon: 'alert' },
        nao_conforme: { label: 'Não conforme', bg: 'hsl(var(--status-nao-conforme) / 0.12)', fg: 'hsl(var(--status-nao-conforme))', icon: 'x' },
        na:           { label: 'N/A',          bg: 'hsl(var(--muted))',                       fg: 'hsl(var(--muted-foreground))',    icon: 'info' },
      }[status] || { label: status || '—', bg: 'hsl(var(--muted))', fg: 'hsl(var(--muted-foreground))', icon: 'info' };
      return (
        <span className="inline-flex items-center gap-1 rounded-full px-2 py-0.5 text-[11px] font-medium" style={{ backgroundColor: config.bg, color: config.fg }}>
          <Icon name={config.icon} className="h-3 w-3" />
          {config.label}
          {typeof count === 'number' && ` (${count})`}
        </span>
      );
    }

    function CamadaCard({ titulo, itens, mostrarNorma }) {
      if (!itens || itens.length === 0) return null;
      return (
        <Card>
          <CardHeader>
            <CardTitle className="text-base">{titulo}</CardTitle>
          </CardHeader>
          <CardContent>
            <div className="space-y-2">
              {itens.map((it, i) => (
                <div key={i} className="flex items-start gap-3 py-2 border-b last:border-0">
                  <CamadaStatusIcon status={it.status} />
                  <div className="flex-1 min-w-0">
                    <div className="text-sm font-medium">{it.item}</div>
                    {mostrarNorma && it.norma && <div className="text-xs font-mono text-muted-foreground mt-0.5">{it.norma}</div>}
                    {it.observacao && <div className="text-xs text-muted-foreground mt-1">{it.observacao}</div>}
                  </div>
                </div>
              ))}
            </div>
          </CardContent>
        </Card>
      );
    }

    function CamadaStatusIcon({ status }) {
      const config = {
        conforme: { icon: 'check', color: 'hsl(var(--status-conforme))', title: 'Conforme' },
        ressalva: { icon: 'alert', color: 'hsl(var(--status-ressalva))', title: 'Ressalva' },
        nao_conforme: { icon: 'x', color: 'hsl(var(--status-nao-conforme))', title: 'Não Conforme' },
        na: { icon: 'info', color: 'hsl(var(--muted-foreground))', title: 'Não Aplicável' },
      };
      const c = config[status] || config.na;
      return (
        <div className="flex h-6 w-6 items-center justify-center rounded-full shrink-0" style={{ backgroundColor: c.color, color: 'white' }} title={c.title}>
          <Icon name={c.icon} className="h-3.5 w-3.5" />
        </div>
      );
    }

    /* ====================================================================
       HISTÓRICO
       ==================================================================== */
    /* ====================================================================
       Constantes para entrada manual — espelham as categorias usadas pelo
       agente nos gráficos do Dashboard. Documentadas pra que a Maria saiba
       quais valores aceitar na planilha e nos modais. (decisão 23/06/2026)
       ==================================================================== */
    const TIPOS_ERRO_MANUAL = [
      'Registro ANVISA','Modelo','Nome do produto','CNPJ','Fabricante','Endereço','Telefone',
      'Responsável Técnico','CREA','Responsável Legal','Nº de série','Cronologia incoerente',
      'Data','Validade','Lote/Código','Acessório','Inspeção/Medição','Outros',
    ];
    const DOCS_CORRIGIDOS_MANUAL = [
      { slot: 'op',                label: 'OP' },
      { slot: 'rc',                label: 'RC' },
      { slot: 'form_gq_0047',      label: 'FORM-GQ-0047' },
      { slot: 'etiqueta_externa',  label: 'Etiqueta Externa' },
      { slot: 'etiqueta_acessorio',label: 'Etiqueta Acessório' },
      { slot: 'op_reprocesso',     label: 'OP de Reprocesso' },
      { slot: 'rnc',               label: 'RNC' },
    ];
    // Normaliza um nome de tipo de erro (case/acento-insensitive) pra um item da lista
    const normalizarTipoErro = (s) => {
      const n = String(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().trim();
      return TIPOS_ERRO_MANUAL.find(t =>
        t.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase() === n
      ) || null;
    };
    // Idem para slots de documentos
    const normalizarSlotDoc = (s) => {
      const n = String(s||'').normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase().trim();
      return DOCS_CORRIGIDOS_MANUAL.find(d =>
        d.label.normalize('NFD').replace(/[̀-ͯ]/g,'').toLowerCase() === n ||
        d.slot.toLowerCase() === n
      )?.slot || null;
    };

    /* ====================================================================
       MODAL: Importar Análises Manuais (XLSX) — decisão 23/06/2026
       ==================================================================== */
    function ImportarAnalisesManuaisModal({ open, onClose, onImported }) {
      const toast = useToast();
      const [file, setFile] = useState(null);
      const [rows, setRows] = useState([]);
      const [parsing, setParsing] = useState(false);
      const [saving, setSaving] = useState(false);
      // Catálogo carregado pra validar e oferecer autocomplete nas células
      const [catalogo, setCatalogo] = useState({ modelos: [], sapiens: [] });

      const reset = () => { setFile(null); setRows([]); setCatalogo({ modelos: [], sapiens: [] }); };
      const handleClose = () => { reset(); onClose(); };

      // Revalida uma linha usando o catálogo carregado. Retorna a linha com `erro` atualizado.
      const revalidarLinha = (item, modelosSet, sapiensSet) => {
        const norm = (s) => String(s || '').trim().toLowerCase().replace(/-/g, '');
        const r = { ...item, erro: null };
        if (!r.data || (r.data instanceof Date && isNaN(r.data.getTime()))) r.erro = 'Data inválida (esperado DD/MM/AAAA)';
        else if (!r.numero_op) r.erro = 'Nº OP é obrigatório';
        else if (!r.numero_serie) r.erro = 'Nº Série é obrigatório';
        else if (!r.modelo) r.erro = 'Modelo é obrigatório';
        else if (!['conforme','ressalva','nao_conforme','conforme_corrigido'].includes(r.status)) r.erro = `Status inválido "${r.status}" (use conforme | ressalva | nao_conforme | conforme_corrigido)`;
        else if (!r.parecer) r.erro = 'Parecer é obrigatório';
        else if (r.status === 'conforme_corrigido' && (!r.tiposErro || r.tiposErro.length === 0)) r.erro = 'Status conforme_corrigido exige pelo menos 1 tipo de erro';
        else if (r.codigo_sapiens && !sapiensSet.has(norm(r.codigo_sapiens))) r.erro = `Código Sapiens "${r.codigo_sapiens}" não está no Catálogo de Produtos`;
        else if (!modelosSet.has(norm(r.modelo))) r.erro = `Modelo "${r.modelo}" não está no Catálogo de Produtos`;
        return r;
      };

      // Atualiza uma célula e re-valida só essa linha
      const updateCell = (linha, campo, valor) => {
        const norm = (s) => String(s || '').trim().toLowerCase().replace(/-/g, '');
        const modelosSet = new Set(catalogo.modelos.map((m) => norm(m)));
        const sapiensSet = new Set(catalogo.sapiens.map((s) => norm(s)));
        setRows((prev) => prev.map((r) => {
          if (r.linha !== linha) return r;
          let novo = { ...r };
          if (campo === 'data') {
            // Aceita "YYYY-MM-DD" (do input type=date) ou DD/MM/AAAA
            if (/^\d{4}-\d{2}-\d{2}$/.test(valor)) {
              const [y, mo, d] = valor.split('-').map(Number);
              novo.data = new Date(y, mo - 1, d, 12);
            } else if (/^\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4}$/.test(valor)) {
              const m = valor.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
              let y = parseInt(m[3], 10); if (y < 100) y += 2000;
              novo.data = new Date(y, parseInt(m[2], 10) - 1, parseInt(m[1], 10), 12);
            } else {
              novo.data = null;
            }
          } else if (campo === 'tiposErro' || campo === 'docsCorrigidos') {
            novo[campo] = valor;
          } else {
            novo[campo] = valor;
          }
          return revalidarLinha(novo, modelosSet, sapiensSet);
        }));
      };

      const parseXlsx = async (f) => {
        setParsing(true);
        setRows([]);
        try {
          if (!window.ExcelJS) throw new Error('ExcelJS não carregou. Recarregue a página (Ctrl+F5).');
          // Carrega catálogo pra validar e oferecer autocomplete
          const { data: produtos } = await supabase.from('produtos').select('id, modelo, codigo_sapiens, equipamento');
          const modelosCadastrados = new Set();
          const sapiensCadastrados = new Set();
          const modelosLista = [], sapiensLista = [];
          const norm = (s) => String(s || '').trim().toLowerCase().replace(/-/g, '');
          for (const p of produtos || []) {
            if (p.modelo) { modelosCadastrados.add(norm(p.modelo)); modelosLista.push(p.modelo); }
            if (p.codigo_sapiens) { sapiensCadastrados.add(norm(p.codigo_sapiens)); sapiensLista.push(p.codigo_sapiens); }
          }
          // Salva no state pro autocomplete e revalidação posterior
          setCatalogo({
            modelos: [...new Set(modelosLista)].sort(),
            sapiens: [...new Set(sapiensLista)].sort(),
          });

          const buf = new Uint8Array(await f.arrayBuffer());
          const wb = new window.ExcelJS.Workbook();
          await wb.xlsx.load(buf);
          const ws = wb.getWorksheet('Analises') || wb.worksheets[0];
          const out = [];
          for (let r = 2; r <= ws.rowCount; r++) {
            const row = ws.getRow(r);
            const dataCell = row.getCell(1).value;
            if (!dataCell) continue;
            // Data pode ser Date ou string DD/MM/AAAA
            let data = null;
            if (dataCell instanceof Date) {
              data = dataCell;
            } else {
              const s = String(dataCell).trim();
              const m = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})$/);
              if (m) {
                let y = parseInt(m[3], 10);
                if (y < 100) y += 2000;
                data = new Date(y, parseInt(m[2], 10) - 1, parseInt(m[1], 10));
              }
            }
            const status = String(row.getCell(6).value || '').trim().toLowerCase().replace(/\s+/g, '_');
            // Colunas opcionais 8 e 9: Tipos de erro (CSV) e Documentos corrigidos (CSV)
            const tiposErroRaw = String(row.getCell(8).value || '').trim();
            const docsCorrigidosRaw = String(row.getCell(9).value || '').trim();
            const tiposErro = tiposErroRaw ? tiposErroRaw.split(/[,;]/).map((s) => normalizarTipoErro(s.trim())).filter(Boolean) : [];
            const docsCorrigidos = docsCorrigidosRaw ? docsCorrigidosRaw.split(/[,;]/).map((s) => normalizarSlotDoc(s.trim())).filter(Boolean) : [];
            const item = {
              linha: r,
              data,
              numero_op: String(row.getCell(2).value || '').trim(),
              numero_serie: String(row.getCell(3).value || '').trim(),
              modelo: String(row.getCell(4).value || '').trim(),
              codigo_sapiens: String(row.getCell(5).value || '').trim(),
              status,
              parecer: String(row.getCell(7).value || '').trim(),
              tiposErro,
              docsCorrigidos,
              erro: null,
            };
            // Validações
            if (!item.data || isNaN(item.data.getTime())) item.erro = 'Data inválida (esperado DD/MM/AAAA)';
            else if (!item.numero_op) item.erro = 'Nº OP é obrigatório';
            else if (!item.numero_serie) item.erro = 'Nº Série é obrigatório';
            else if (!item.modelo) item.erro = 'Modelo é obrigatório';
            else if (!['conforme','ressalva','nao_conforme','conforme_corrigido'].includes(item.status)) item.erro = `Status inválido "${item.status}" (use conforme | ressalva | nao_conforme | conforme_corrigido)`;
            else if (!item.parecer) item.erro = 'Parecer é obrigatório';
            else if (item.status === 'conforme_corrigido' && item.tiposErro.length === 0) item.erro = 'Status conforme_corrigido exige pelo menos 1 tipo de erro (na coluna "Tipos de erro")';
            // Validação contra catálogo — decisão 29/06/2026: bloqueia OPs com
            // modelo/sapiens que não existem em "produtos" pra evitar análises
            // órfãs e manter consistência do dashboard.
            else if (item.codigo_sapiens && !sapiensCadastrados.has(norm(item.codigo_sapiens))) {
              item.erro = `Código Sapiens "${item.codigo_sapiens}" não está no Catálogo de Produtos. Cadastre antes de importar.`;
            }
            else if (!modelosCadastrados.has(norm(item.modelo))) {
              item.erro = `Modelo "${item.modelo}" não está no Catálogo de Produtos. Cadastre antes de importar.`;
            }
            out.push(item);
          }
          setRows(out);
        } catch (e) {
          toast.error('Erro ao ler XLSX: ' + (e?.message || e));
        }
        setParsing(false);
      };

      const handleFile = async (fileOrEvent) => {
        const f = fileOrEvent && fileOrEvent.target ? fileOrEvent.target.files?.[0] : fileOrEvent;
        if (!f) return;
        setFile(f);
        await parseXlsx(f);
      };

      const handleConfirmar = async () => {
        const validas = rows.filter((r) => !r.erro);
        if (validas.length === 0) { toast.error('Nenhuma linha válida para importar.'); return; }
        setSaving(true);
        try {
          // Busca produtos pra cruzar via codigo_sapiens ou modelo
          const { data: produtos } = await supabase.from('produtos').select('id, modelo, codigo_sapiens, equipamento');
          const byModelo = new Map(), bySapiens = new Map();
          for (const p of produtos || []) {
            if (p.modelo) byModelo.set(String(p.modelo).toLowerCase(), p);
            if (p.codigo_sapiens) bySapiens.set(String(p.codigo_sapiens).toLowerCase(), p);
          }
          // Busca análises existentes pra dedupe
          const { data: existentes } = await supabase.from('analises').select('numero_op, numero_serie');
          const existSet = new Set((existentes || []).map((a) => `${(a.numero_op||'').trim()}|${(a.numero_serie||'').trim()}`));

          let inseridas = 0, puladas = 0, errosBd = 0;
          for (const r of validas) {
            const key = `${r.numero_op}|${r.numero_serie}`;
            if (existSet.has(key)) { puladas++; continue; }
            const produto = bySapiens.get(r.codigo_sapiens.toLowerCase()) || byModelo.get(r.modelo.toLowerCase()) || null;
            const familia = produto?.equipamento || '';
            const produtoBase = {
              numero_op: r.numero_op,
              numero_serie: r.numero_serie,
              modelo: r.modelo,
              codigo_sapiens: r.codigo_sapiens || produto?.codigo_sapiens || '',
              familia,
            };
            // Monta apontamentos sintéticos a partir dos tipos de erro
            const apontamentos = (r.tiposErro || []).map((t, i) => ({
              ordem: i+1,
              criterio: t,
              documento_afetado: t,
              descricao: `Erro: ${t}`,
              severidade: 'nao_conforme',
              acao_recomendada: '',
              referencia: 'Importação manual',
            }));

            if (r.status === 'conforme_corrigido') {
              // Cria a NC original
              const parecerNC = {
                produto: produtoBase,
                resultado_geral: 'nao_conforme',
                parecer_resumo: `Análise original (NC) — corrigida posteriormente. ${r.parecer}`,
                parecer_tecnico: '',
                apontamentos,
                origem: 'manual',
              };
              const dtNC = new Date(r.data); dtNC.setHours(11, 0, 0, 0);
              const { data: ncRow, error: err1 } = await supabase.from('analises').insert({
                numero_op: r.numero_op, numero_serie: r.numero_serie, modelo: r.modelo,
                nome_produto: familia || r.modelo, status: 'nao_conforme',
                parecer_completo: parecerNC, created_at: dtNC.toISOString(),
                produto_id: produto?.id || null, origem_analise: 'manual',
              }).select('id').single();
              if (err1) { errosBd++; continue; }
              // Cria a re-análise conforme apontando pra NC
              const parecerOK = {
                produto: produtoBase,
                resultado_geral: 'conforme',
                parecer_resumo: r.parecer,
                parecer_tecnico: '',
                apontamentos: [],
                origem: 'manual',
              };
              const dtOK = new Date(r.data); dtOK.setHours(12, 0, 0, 0);
              const docsCsv = (r.docsCorrigidos || []).join(',');
              const { error: err2 } = await supabase.from('analises').insert({
                numero_op: r.numero_op, numero_serie: r.numero_serie, modelo: r.modelo,
                nome_produto: familia || r.modelo, status: 'conforme',
                parecer_completo: parecerOK, created_at: dtOK.toISOString(),
                produto_id: produto?.id || null, origem_analise: 'manual',
                analise_origem_id: ncRow.id,
                doc_substituido: docsCsv || 'correcao_manual',
                motivo_reanalise: r.parecer.slice(0, 200),
              });
              if (err2) { errosBd++; } else { inseridas += 2; existSet.add(key); }
            } else {
              // Status simples (conforme, ressalva, nao_conforme)
              const parecer_completo = {
                produto: produtoBase,
                resultado_geral: r.status,
                parecer_resumo: r.parecer,
                parecer_tecnico: '',
                apontamentos: r.status === 'nao_conforme' ? apontamentos : [],
                origem: 'manual',
              };
              const { error } = await supabase.from('analises').insert({
                numero_op: r.numero_op, numero_serie: r.numero_serie, modelo: r.modelo,
                nome_produto: familia || r.modelo, status: r.status,
                parecer_completo, created_at: r.data.toISOString(),
                produto_id: produto?.id || null, origem_analise: 'manual',
              });
              if (error) { errosBd++; } else { inseridas++; existSet.add(key); }
            }
          }
          toast.success(`${inseridas} análise(s) importada(s). ${puladas} pulada(s) (já existiam). ${errosBd} erro(s).`);
          onImported?.();
          handleClose();
        } catch (e) {
          toast.error('Erro na importação: ' + (e?.message || e));
        }
        setSaving(false);
      };

      if (!open) return null;
      const validas = rows.filter((r) => !r.erro).length;
      const invalidas = rows.length - validas;
      const foraCatalogo = rows.filter((r) => r.erro && /catálogo|catalogo/i.test(r.erro)).length;

      // Gera o template XLSX no navegador (mesma estrutura do arquivo entregue
      // na pasta Plataforma-Conciliacao). Útil quando o usuário não tem o
      // arquivo à mão.
      const handleBaixarTemplate = async () => {
        try {
          if (!window.ExcelJS) { toast.error('ExcelJS não carregou. Recarregue a página.'); return; }
          const wb = new window.ExcelJS.Workbook();
          wb.creator = 'Confiance Medical';
          // Aba 1: Instruções
          const inst = wb.addWorksheet('Instruções');
          inst.getColumn(1).width = 115;
          const lin = (texto, fmt) => {
            const row = inst.addRow([texto]);
            if (fmt) {
              const c = row.getCell(1);
              c.font = { bold: fmt.bold, size: fmt.size, color: fmt.fg ? { argb: fmt.fg } : undefined };
              if (fmt.bg) c.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: fmt.bg } };
              row.height = fmt.size ? 24 : 18;
            }
          };
          lin('IMPORTAÇÃO DE ANÁLISES MANUAIS — Confiance Medical', { bold: true, size: 14, bg: 'FF1F3A5C', fg: 'FFFFFFFF' });
          lin('');
          lin('Use esta planilha para importar análises de OPs feitas manualmente (antes da plataforma).');
          lin('Cada linha = 1 análise. Apague as linhas de exemplo (em cinza/itálico) antes de salvar.');
          lin('');
          lin('COLUNAS (em ordem):', { bold: true });
          lin('');
          lin('1. Data (DD/MM/AAAA) — obrigatório. Ex.: 15/01/2026.');
          lin('2. Nº OP — obrigatório. Ex.: 6500.');
          lin('3. Nº Série — obrigatório. Ex.: LEDT-202601-0001.');
          lin('4. Modelo — obrigatório. Use o mesmo do catálogo. Ex.: CM-LED.');
          lin('5. Código Sapiens — opcional, mas recomendado. Ex.: FNT0001.');
          lin('6. Status — obrigatório. Um dos valores:');
          lin('     • conforme — análise OK direto.');
          lin('     • ressalva — análise com pendência aceitável.');
          lin('     • nao_conforme — análise com bloqueador (sem correção registrada).');
          lin('     • conforme_corrigido — análise originalmente NC mas que foi corrigida.');
          lin('         (gera 2 análises automaticamente: NC + correção. Conta em "Corrigidas".)');
          lin('7. Parecer (texto livre) — obrigatório.');
          lin('8. Tipos de erro detectados (CSV, opcional) — obrigatório se status = conforme_corrigido.');
          lin('     Valores aceitos (use vírgula entre múltiplos):');
          lin('     Registro ANVISA, Modelo, Nome do produto, CNPJ, Fabricante, Endereço, Telefone,');
          lin('     Responsável Técnico, CREA, Responsável Legal, Nº de série, Cronologia incoerente,');
          lin('     Data, Validade, Lote/Código, Acessório, Inspeção/Medição, Outros');
          lin('9. Documentos corrigidos (CSV, opcional) — só faz sentido com status = conforme_corrigido.');
          lin('     Valores aceitos (use vírgula entre múltiplos):');
          lin('     OP, RC, FORM-GQ-0047, Etiqueta Externa, Etiqueta Acessório, OP de Reprocesso, RNC');

          // Aba 2: Analises (a planilha em si)
          const ws = wb.addWorksheet('Analises');
          ws.columns = [
            { header: 'Data (DD/MM/AAAA)', key: 'data', width: 18 },
            { header: 'Nº OP', key: 'numero_op', width: 12 },
            { header: 'Nº Série', key: 'numero_serie', width: 22 },
            { header: 'Modelo', key: 'modelo', width: 20 },
            { header: 'Código Sapiens', key: 'codigo_sapiens', width: 16 },
            { header: 'Status', key: 'status', width: 22 },
            { header: 'Parecer', key: 'parecer', width: 50 },
            { header: 'Tipos de erro (CSV)', key: 'tipos_erro', width: 36 },
            { header: 'Documentos corrigidos (CSV)', key: 'docs', width: 32 },
          ];
          const h = ws.getRow(1);
          h.font = { bold: true, color: { argb: 'FFFFFFFF' } };
          h.fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FF1F3A5C' } };
          h.alignment = { horizontal: 'left', vertical: 'middle' };
          h.height = 24;
          ws.views = [{ state: 'frozen', ySplit: 1 }];
          const exemplos = [
            ['15/01/2026','6500','LEDT-202601-0001','CM-LED','FNT0001','conforme','Análise OK direto.','',''],
            ['28/02/2026','6700','CMCAM-202602-0033','CM-CAM','CAM0001','ressalva','Validade do acessório não totalmente legível, confirmado em sistema.','',''],
            ['10/04/2026','7012','REC2-202604-0010','CM-CINEMED2F','GRA0002','nao_conforme','Modelo divergente da OP. Lote bloqueado, aguarda correção.','Modelo',''],
            ['22/05/2026','7088','LEDT-202605-0017','CM-LED','FNT0001','conforme_corrigido','OP foi devolvida com erro de CNPJ na etiqueta. Etiqueta refeita e relote analisado.','CNPJ','Etiqueta Externa'],
          ];
          exemplos.forEach((rowVals) => {
            const r = ws.addRow(rowVals);
            r.font = { italic: true, color: { argb: 'FF888888' } };
            r.getCell(1).numFmt = '@';
          });

          // Download
          const buf = await wb.xlsx.writeBuffer();
          const blob = new Blob([buf], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'Template_Importar_Analises_Manuais.xlsx';
          document.body.appendChild(a);
          a.click();
          setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 500);
          toast.success('Template baixado.');
        } catch (e) {
          toast.error('Erro ao gerar template: ' + (e?.message || e));
        }
      };

      return (
        <Modal open={open} onClose={handleClose} title="Importar análises manuais" description="Selecione a planilha de análises preenchida. A plataforma valida cada linha antes de importar." size="lg">
          <div className="space-y-4">
            <div>
              <div className="flex items-center justify-between gap-2 mb-1">
                <Label>Planilha (.xlsx)</Label>
                <Button variant="outline" size="sm" onClick={handleBaixarTemplate} title="Gerar e baixar o template oficial">
                  <Icon name="download" className="h-3.5 w-3.5" />Baixar template
                </Button>
              </div>
              <DropZone
                onFiles={(arqs) => { if (parsing || saving) return; const f = arqs.find((x) => /\.xlsx$/i.test(x.name)) || arqs[0]; if (f) handleFile(f); }}
                disabled={parsing || saving}
                className="rounded-md border border-dashed p-2 transition-colors"
              >
                {(dragging) => (<>
                  <Input type="file" accept=".xlsx" onChange={handleFile} disabled={parsing || saving} />
                  <div className="text-[11px] text-muted-foreground mt-1">{dragging ? 'Solte o .xlsx aqui' : 'ou arraste o arquivo .xlsx para cá'}</div>
                </>)}
              </DropZone>
              <p className="text-xs text-muted-foreground mt-1">Não tem o arquivo? Clique em <strong>Baixar template</strong> acima — ele vem com as instruções e exemplos.</p>
            </div>
            {parsing && <div className="text-sm text-muted-foreground"><Icon name="loader" className="h-4 w-4 animate-spin inline mr-2" />Lendo planilha…</div>}
            {rows.length > 0 && (
              <>
                <div className="flex items-center gap-4 text-sm">
                  <span><strong>{rows.length}</strong> linha(s) lidas</span>
                  <span className="text-green-600"><strong>{validas}</strong> válida(s)</span>
                  {invalidas > 0 && <span className="text-destructive"><strong>{invalidas}</strong> com erro</span>}
                  {foraCatalogo > 0 && <span className="text-destructive" title="Modelo ou Código Sapiens fora do Catálogo de Produtos"><strong>{foraCatalogo}</strong> fora do catálogo</span>}
                </div>
                <p className="text-xs text-muted-foreground">Edite qualquer célula abaixo para corrigir os dados antes de importar. Modelo e Código Sapiens têm sugestão automática do Catálogo.</p>
                {/* Datalists nativos para autocomplete */}
                <datalist id="dl-modelos-catalogo">
                  {catalogo.modelos.map((m) => <option key={m} value={m} />)}
                </datalist>
                <datalist id="dl-sapiens-catalogo">
                  {catalogo.sapiens.map((s) => <option key={s} value={s} />)}
                </datalist>
                <div className="max-h-96 overflow-auto border rounded-lg">
                  <table className="w-full text-xs">
                    <thead className="bg-muted sticky top-0 z-10">
                      <tr className="text-left">
                        <th className="px-2 py-1.5 w-12">Linha</th>
                        <th className="px-2 py-1.5 w-32">Data</th>
                        <th className="px-2 py-1.5 w-20">OP</th>
                        <th className="px-2 py-1.5 w-32">Série</th>
                        <th className="px-2 py-1.5 w-36">Modelo</th>
                        <th className="px-2 py-1.5 w-28">Sapiens</th>
                        <th className="px-2 py-1.5 w-32">Status</th>
                        <th className="px-2 py-1.5">Resultado / Parecer</th>
                      </tr>
                    </thead>
                    <tbody>
                      {rows.map((r) => {
                        const dataInput = r.data instanceof Date && !isNaN(r.data.getTime())
                          ? `${r.data.getFullYear()}-${String(r.data.getMonth()+1).padStart(2,'0')}-${String(r.data.getDate()).padStart(2,'0')}`
                          : '';
                        const cellInput = "w-full h-7 px-1.5 text-xs rounded border border-input bg-background focus:outline-none focus:ring-1 focus:ring-ring";
                        return (
                          <tr key={r.linha} className={cn('border-t align-top', r.erro && 'bg-destructive/10')}>
                            <td className="px-2 py-1.5 font-mono">{r.linha}</td>
                            <td className="px-2 py-1.5">
                              <input type="date" value={dataInput} onChange={(e) => updateCell(r.linha, 'data', e.target.value)} className={cellInput} />
                            </td>
                            <td className="px-2 py-1.5">
                              <input type="text" value={r.numero_op} onChange={(e) => updateCell(r.linha, 'numero_op', e.target.value)} className={cn(cellInput, 'font-mono')} />
                            </td>
                            <td className="px-2 py-1.5">
                              <input type="text" value={r.numero_serie} onChange={(e) => updateCell(r.linha, 'numero_serie', e.target.value)} className={cn(cellInput, 'font-mono')} />
                            </td>
                            <td className="px-2 py-1.5">
                              <input list="dl-modelos-catalogo" value={r.modelo} onChange={(e) => updateCell(r.linha, 'modelo', e.target.value)} className={cellInput} placeholder="CM-..." />
                            </td>
                            <td className="px-2 py-1.5">
                              <input list="dl-sapiens-catalogo" value={r.codigo_sapiens} onChange={(e) => updateCell(r.linha, 'codigo_sapiens', e.target.value)} className={cn(cellInput, 'font-mono')} placeholder="opcional" />
                            </td>
                            <td className="px-2 py-1.5">
                              <select value={r.status} onChange={(e) => updateCell(r.linha, 'status', e.target.value)} className={cellInput}>
                                <option value="conforme">conforme</option>
                                <option value="ressalva">ressalva</option>
                                <option value="nao_conforme">nao_conforme</option>
                                <option value="conforme_corrigido">conforme_corrigido</option>
                              </select>
                            </td>
                            <td className="px-2 py-1.5">
                              {r.erro
                                ? <div className="text-destructive text-[11px] leading-tight">{r.erro}</div>
                                : <div className="text-green-600 text-[11px]">OK</div>}
                              <input type="text" value={r.parecer || ''} onChange={(e) => updateCell(r.linha, 'parecer', e.target.value)} className={cn(cellInput, 'mt-1')} placeholder="Parecer (obrigatório)" />
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </>
            )}
            <div className="flex justify-end gap-2 pt-2 border-t">
              <Button variant="outline" onClick={handleClose} disabled={saving}>Cancelar</Button>
              <Button onClick={handleConfirmar} disabled={validas === 0 || saving}>
                {saving ? <><Icon name="loader" className="h-4 w-4 animate-spin mr-2" />Importando…</> : `Importar ${validas} análise(s)`}
              </Button>
            </div>
          </div>
        </Modal>
      );
    }

    /* ====================================================================
       MODAL: Marcar análise manual NC como Corrigida — decisão 23/06/2026
       Cria uma re-análise manual conforme, vinculada à NC original via
       analise_origem_id. Dashboard automaticamente conta como "Corrigida".
       ==================================================================== */
    function CorrigirManualModal({ analise, open, onClose, onSaved }) {
      const toast = useToast();
      const [dataCorr, setDataCorr] = useState(new Date().toISOString().slice(0, 10));
      const [parecer, setParecer] = useState('');
      const [docsCorr, setDocsCorr] = useState(new Set());
      const [tiposErro, setTiposErro] = useState(new Set());
      const [saving, setSaving] = useState(false);

      // Pré-preenche tipos de erro a partir dos apontamentos atuais da NC
      useEffect(() => {
        if (!open || !analise) return;
        const aps = analise.parecer_completo?.apontamentos || [];
        const tipos = new Set(
          aps.filter((a) => a.severidade === 'nao_conforme' || a.severidade === 'ressalva')
             .map((a) => a.criterio || a.documento_afetado || '')
             .filter((t) => TIPOS_ERRO_MANUAL.includes(t))
        );
        setTiposErro(tipos);
        setDocsCorr(new Set());
        setParecer('');
        setDataCorr(new Date().toISOString().slice(0, 10));
      }, [open, analise]);

      const toggleDoc = (slot) => setDocsCorr((prev) => {
        const next = new Set(prev);
        if (next.has(slot)) next.delete(slot); else next.add(slot);
        return next;
      });
      const toggleTipo = (t) => setTiposErro((prev) => {
        const next = new Set(prev);
        if (next.has(t)) next.delete(t); else next.add(t);
        return next;
      });

      const handleConfirmar = async () => {
        if (!parecer.trim()) { toast.error('Informe o parecer da correção.'); return; }
        if (!dataCorr) { toast.error('Informe a data da correção.'); return; }
        if (docsCorr.size === 0) { toast.error('Selecione pelo menos 1 documento corrigido.'); return; }
        if (tiposErro.size === 0) { toast.error('Selecione pelo menos 1 tipo de erro detectado.'); return; }
        setSaving(true);
        try {
          const dt = new Date(dataCorr + 'T12:00:00');
          // 1) Atualiza apontamentos da NC original com os tipos de erro selecionados
          const apontamentosAtualizados = [...tiposErro].map((t, i) => ({
            ordem: i + 1,
            criterio: t,
            documento_afetado: t,
            descricao: `Erro: ${t}`,
            severidade: 'nao_conforme',
            acao_recomendada: '',
            referencia: 'Entrada manual',
          }));
          const parecerNCAtualizado = {
            ...(analise.parecer_completo || {}),
            apontamentos: apontamentosAtualizados,
          };
          const { error: errUpdate } = await supabase.from('analises')
            .update({ parecer_completo: parecerNCAtualizado })
            .eq('id', analise.id);
          if (errUpdate) throw errUpdate;

          // 2) Cria a re-análise conforme apontando pra NC
          const parecerCorrigido = {
            ...(analise.parecer_completo || {}),
            produto: analise.parecer_completo?.produto || {
              numero_op: analise.numero_op,
              numero_serie: analise.numero_serie,
              modelo: analise.modelo,
            },
            resultado_geral: 'conforme',
            parecer_resumo: parecer.trim(),
            parecer_tecnico: '',
            apontamentos: [],
            origem: 'manual',
          };
          const { error } = await supabase.from('analises').insert({
            numero_op: analise.numero_op,
            numero_serie: analise.numero_serie,
            modelo: analise.modelo,
            nome_produto: analise.nome_produto || analise.modelo,
            status: 'conforme',
            parecer_completo: parecerCorrigido,
            created_at: dt.toISOString(),
            produto_id: analise.produto_id || null,
            origem_analise: 'manual',
            analise_origem_id: analise.id,
            doc_substituido: [...docsCorr].join(','),
            motivo_reanalise: parecer.trim().slice(0, 200),
          });
          if (error) throw error;
          toast.success('Correção registrada. Análise consta no Dashboard como Corrigida.');
          onSaved?.();
          onClose();
        } catch (e) {
          toast.error('Erro ao registrar correção: ' + (e?.message || e));
        }
        setSaving(false);
      };

      if (!open || !analise) return null;
      return (
        <Modal
          open={open}
          onClose={onClose}
          title={`Marcar como corrigida — OP ${analise.numero_op || '—'}`}
          description={`Cria uma re-análise manual conforme para esta análise NC. Aparece como "Corrigida" no Dashboard e mantém o histórico da NC original.`}
        >
          <div className="space-y-4">
            <div>
              <Label>Data da correção *</Label>
              <Input type="date" value={dataCorr} onChange={(e) => setDataCorr(e.target.value)} />
            </div>
            <div>
              <Label>Tipos de erro detectados *</Label>
              <p className="text-xs text-muted-foreground mb-1">Atualiza os apontamentos da análise NC original (vai para os gráficos "Erros que motivaram correção" e "Erros por tipo de equipamento").</p>
              <div className="grid grid-cols-2 gap-1.5 mt-1 max-h-48 overflow-auto p-2 border rounded-md">
                {TIPOS_ERRO_MANUAL.map((t) => (
                  <label key={t} className="flex items-center gap-2 text-sm cursor-pointer">
                    <input type="checkbox" checked={tiposErro.has(t)} onChange={() => toggleTipo(t)} className="rounded" />
                    {t}
                  </label>
                ))}
              </div>
            </div>
            <div>
              <Label>Documento(s) corrigido(s) *</Label>
              <div className="grid grid-cols-2 gap-1.5 mt-1">
                {DOCS_CORRIGIDOS_MANUAL.map((d) => (
                  <label key={d.slot} className="flex items-center gap-2 text-sm cursor-pointer">
                    <input type="checkbox" checked={docsCorr.has(d.slot)} onChange={() => toggleDoc(d.slot)} className="rounded" />
                    {d.label}
                  </label>
                ))}
              </div>
            </div>
            <div>
              <Label>Parecer da correção *</Label>
              <textarea
                className="flex w-full rounded-md border border-input bg-background px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-ring min-h-[80px]"
                placeholder="Ex.: Etiqueta refeita após correção do modelo. Lote re-analisado e liberado."
                value={parecer}
                onChange={(e) => setParecer(e.target.value)}
              />
            </div>
            <div className="flex justify-end gap-2 pt-2 border-t">
              <Button variant="outline" onClick={onClose} disabled={saving}>Cancelar</Button>
              <Button onClick={handleConfirmar} disabled={saving || !parecer.trim() || docsCorr.size === 0 || tiposErro.size === 0}>
                {saving ? <><Icon name="loader" className="h-4 w-4 animate-spin mr-2" />Salvando…</> : 'Registrar correção'}
              </Button>
            </div>
          </div>
        </Modal>
      );
    }

    /* ====================================================================
       MODAL: Nova análise manual individual — decisão 23/06/2026
       Permite criar 1 análise sem precisar de planilha. Mesmos campos.
       Para status conforme_corrigido cria NC + correção (igual planilha).
       ==================================================================== */
    function NovaAnaliseManualModal({ open, onClose, onSaved, editing }) {
      const toast = useToast();
      const isEdit = !!editing;
      const [form, setForm] = useState({
        data: new Date().toISOString().slice(0, 10),
        numero_op: '', numero_serie: '', modelo: '', codigo_sapiens: '',
        status: 'conforme', parecer: '',
      });
      const [tiposErro, setTiposErro] = useState(new Set());
      const [docsCorr, setDocsCorr] = useState(new Set());
      const [saving, setSaving] = useState(false);

      // Converte qualquer timestamp para "YYYY-MM-DD" usando o fuso LOCAL
      // (não UTC), pra que o input date mostre exatamente o dia que aparece
      // no histórico. (formatDateTime no histórico já é local, então tem que
      // bater com ele.)
      const toLocalDateString = (d) => {
        const dt = d ? new Date(d) : new Date();
        const yyyy = dt.getFullYear();
        const mm = String(dt.getMonth() + 1).padStart(2, '0');
        const dd = String(dt.getDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}`;
      };

      // Pré-preenche quando entra em modo edição
      useEffect(() => {
        if (!open) return;
        if (editing) {
          const p = editing.parecer_completo || {};
          const aps = p.apontamentos || [];
          const tipos = new Set(
            aps.filter((a) => a.severidade === 'nao_conforme' || a.severidade === 'ressalva')
               .map((a) => a.criterio || a.documento_afetado || '')
               .filter(Boolean)
          );
          const docsCsv = editing.doc_substituido || '';
          const docs = new Set(docsCsv ? docsCsv.split(/[,;]/).map((s) => s.trim()).filter(Boolean) : []);
          setForm({
            data: toLocalDateString(editing.created_at),
            numero_op: editing.numero_op || '',
            numero_serie: editing.numero_serie || '',
            modelo: editing.modelo || '',
            codigo_sapiens: p.produto?.codigo_sapiens || '',
            status: editing.status || 'conforme',
            parecer: p.parecer_resumo || '',
          });
          setTiposErro(tipos);
          setDocsCorr(docs);
        } else {
          setForm({ data: toLocalDateString(), numero_op: '', numero_serie: '', modelo: '', codigo_sapiens: '', status: 'conforme', parecer: '' });
          setTiposErro(new Set()); setDocsCorr(new Set());
        }
      }, [open, editing]);

      const handleClose = () => { onClose(); };

      const upd = (k) => (e) => setForm((p) => ({ ...p, [k]: e.target.value }));
      const toggleTipo = (t) => setTiposErro((p) => { const n = new Set(p); n.has(t) ? n.delete(t) : n.add(t); return n; });
      const toggleDoc = (s) => setDocsCorr((p) => { const n = new Set(p); n.has(s) ? n.delete(s) : n.add(s); return n; });

      const handleConfirmar = async () => {
        // Validações
        if (!form.data) { toast.error('Data é obrigatória.'); return; }
        if (!form.numero_op.trim()) { toast.error('Nº OP é obrigatório.'); return; }
        if (!form.numero_serie.trim()) { toast.error('Nº Série é obrigatório.'); return; }
        if (!form.modelo.trim()) { toast.error('Modelo é obrigatório.'); return; }
        if (!form.parecer.trim()) { toast.error('Parecer é obrigatório.'); return; }
        if (form.status === 'conforme_corrigido' && tiposErro.size === 0) {
          toast.error('Status "Conforme corrigido" exige pelo menos 1 tipo de erro.'); return;
        }
        if (isEdit && form.status === 'conforme_corrigido') {
          toast.error('No modo edição não é possível trocar para "Conforme corrigido". Apague e crie de novo.'); return;
        }
        setSaving(true);
        try {
          // Match com produto (busca tolerante: lowercase, sem hífens)
          const { data: produtos } = await supabase.from('produtos').select('id, modelo, codigo_sapiens, equipamento');
          const normKey = (s) => String(s || '').toLowerCase().replace(/-/g, '').trim();
          const byModelo = new Map(), bySapiens = new Map();
          for (const p of produtos || []) {
            if (p.modelo) byModelo.set(normKey(p.modelo), p);
            if (p.codigo_sapiens) bySapiens.set(normKey(p.codigo_sapiens), p);
          }
          const produto = bySapiens.get(normKey(form.codigo_sapiens)) || byModelo.get(normKey(form.modelo)) || null;
          const familia = produto?.equipamento || '';

          // Validação contra catálogo — decisão 29/06/2026
          if (form.codigo_sapiens.trim() && !bySapiens.has(normKey(form.codigo_sapiens))) {
            toast.error(`Código Sapiens "${form.codigo_sapiens}" não está no Catálogo de Produtos. Cadastre antes de registrar a análise.`);
            setSaving(false); return;
          }
          if (!byModelo.has(normKey(form.modelo))) {
            toast.error(`Modelo "${form.modelo}" não está no Catálogo de Produtos. Cadastre antes de registrar a análise.`);
            setSaving(false); return;
          }
          // Dedupe: só pula se NÃO está em edição (em edição mesmo OP+Série é OK pra própria análise)
          if (!isEdit) {
            const { data: existentes } = await supabase.from('analises').select('id, numero_op, numero_serie');
            const dup = (existentes || []).find((a) => (a.numero_op||'').trim() === form.numero_op.trim() && (a.numero_serie||'').trim() === form.numero_serie.trim());
            if (dup) { toast.error('Já existe análise com esta OP + Série. Não foi inserida.'); setSaving(false); return; }
          }

          const produtoBase = {
            numero_op: form.numero_op.trim(),
            numero_serie: form.numero_serie.trim(),
            modelo: form.modelo.trim(),
            codigo_sapiens: form.codigo_sapiens.trim() || produto?.codigo_sapiens || '',
            familia,
          };
          const apontamentos = [...tiposErro].map((t, i) => ({
            ordem: i+1, criterio: t, documento_afetado: t,
            descricao: `Erro: ${t}`, severidade: 'nao_conforme',
            acao_recomendada: '', referencia: 'Entrada manual',
          }));

          if (isEdit) {
            // Modo EDIÇÃO: UPDATE da análise existente
            const parecer_completo = {
              ...(editing.parecer_completo || {}),
              produto: produtoBase,
              resultado_geral: form.status,
              parecer_resumo: form.parecer.trim(),
              parecer_tecnico: '',
              apontamentos: form.status === 'nao_conforme' ? apontamentos : (editing.parecer_completo?.apontamentos && form.status === 'ressalva' ? [] : []),
              origem: 'manual',
            };
            const dt = new Date(form.data + 'T12:00:00');
            const updatePayload = {
              numero_op: produtoBase.numero_op,
              numero_serie: produtoBase.numero_serie,
              modelo: produtoBase.modelo,
              nome_produto: familia || produtoBase.modelo,
              status: form.status,
              parecer_completo,
              created_at: dt.toISOString(),
              produto_id: produto?.id || null,
            };
            // Se essa análise é uma re-análise (tem analise_origem_id), atualiza docs corrigidos
            if (editing.analise_origem_id) {
              updatePayload.doc_substituido = [...docsCorr].join(',') || editing.doc_substituido || 'correcao_manual';
              updatePayload.motivo_reanalise = form.parecer.trim().slice(0, 200);
            }
            const { error } = await supabase.from('analises').update(updatePayload).eq('id', editing.id);
            if (error) throw error;
            toast.success('Análise atualizada.');
            onSaved?.();
            handleClose();
            setSaving(false);
            return;
          }

          if (form.status === 'conforme_corrigido') {
            const dtNC = new Date(form.data + 'T11:00:00');
            const dtOK = new Date(form.data + 'T12:00:00');
            const parecerNC = { produto: produtoBase, resultado_geral: 'nao_conforme', parecer_resumo: `Análise original (NC) — corrigida posteriormente. ${form.parecer.trim()}`, parecer_tecnico: '', apontamentos, origem: 'manual' };
            const { data: ncRow, error: err1 } = await supabase.from('analises').insert({
              numero_op: produtoBase.numero_op, numero_serie: produtoBase.numero_serie, modelo: produtoBase.modelo,
              nome_produto: familia || produtoBase.modelo, status: 'nao_conforme',
              parecer_completo: parecerNC, created_at: dtNC.toISOString(),
              produto_id: produto?.id || null, origem_analise: 'manual',
            }).select('id').single();
            if (err1) throw err1;
            const parecerOK = { produto: produtoBase, resultado_geral: 'conforme', parecer_resumo: form.parecer.trim(), parecer_tecnico: '', apontamentos: [], origem: 'manual' };
            const { error: err2 } = await supabase.from('analises').insert({
              numero_op: produtoBase.numero_op, numero_serie: produtoBase.numero_serie, modelo: produtoBase.modelo,
              nome_produto: familia || produtoBase.modelo, status: 'conforme',
              parecer_completo: parecerOK, created_at: dtOK.toISOString(),
              produto_id: produto?.id || null, origem_analise: 'manual',
              analise_origem_id: ncRow.id,
              doc_substituido: [...docsCorr].join(',') || 'correcao_manual',
              motivo_reanalise: form.parecer.trim().slice(0, 200),
            });
            if (err2) throw err2;
            toast.success('Análise + correção registradas.');
          } else {
