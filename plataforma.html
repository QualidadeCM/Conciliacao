            `Inspeções duplicadas fora de ordem cronológica: ${dupsFora.join('; ')}.`,
            'Investigar registro no Sapiens: quando a mesma inspeção é feita por 2 inspetores, o segundo registro deve ser posterior ao primeiro.',
            'ISO 13485 §7.5.9 (rastreabilidade)',
            { estagios: [...dupEst], inspecoes: [...dupInsp] });
        }
      }

      // === Cruzamento Ficha × OP: estágios declarados com inspeção
      // Decisão 01/07/2026 (Maria Luiza): a Ficha Mestre declara quais estágios TÊM
      // inspeção associada. O agente verifica que:
      //   1) Todo estágio declarado tem inspeção correspondente na OP (senão NC bloqueadora).
      //   2) Toda inspeção da OP corresponde a um estágio declarado (senão ressalva).
      // Se a ficha não tem a declaração (array vazio), usa a regra padrão antiga
      // (estágios 5 e 7 nunca têm inspeção; todos os outros sim) — retrocompatibilidade.
      const decInsp = Array.isArray(produto?.estagiosComInspecao) ? produto.estagiosComInspecao : [];
      // Estágios 50 (Embalagem) e 60 (Conciliação da Produção) SEMPRE têm inspeção
      // em todos os equipamentos — são estágios fixos globais (decisão 01/07/2026).
      // Somamos automaticamente aos declarados pela ficha pra evitar falsa ressalva.
      const ESTAGIOS_INSP_UNIVERSAL = [50, 60];
      // Roda o cross-check sempre — mesmo se a ficha não declarou nada, os fixos
      // universais (50 e 60) já geram uma validação mínima.
      {
        const declarados = new Set([...decInsp, ...ESTAGIOS_INSP_UNIVERSAL]);
        // Estágios da OP presentes (operações executadas): universo do que a OP realmente cobriu
        const estagiosOP = new Set((op?.operacoes || []).map((o) => o.estagio_numero).filter((n) => n != null));
        // Inspeções encontradas por estágio na OP
        const inspPorEstagio = new Map();
        for (const i of (op?.inspecoesDetalhe || [])) {
          if (i.estagio == null) continue;
          if (!inspPorEstagio.has(i.estagio)) inspPorEstagio.set(i.estagio, []);
          inspPorEstagio.get(i.estagio).push(i);
        }
        // 1) Faltas: declarado + presente na OP mas SEM inspeção
        const faltantes = [];
        for (const est of declarados) {
          if (!estagiosOP.has(est)) continue; // se o estágio nem aparece na OP, não conta
          if (!inspPorEstagio.has(est) || inspPorEstagio.get(est).length === 0) faltantes.push(est);
        }
        if (faltantes.length > 0) {
          const nomes = faltantes.map((n) => {
            const e = ESTAGIOS_VARIAVEIS.find((v) => v.estagioNum === n);
            return e ? `${n} — ${e.nome}` : `${n}`;
          }).join('; ');
          add(C1, 'Inspeções previstas pela Ficha Mestre', 'nao_conforme',
            `Estágio(s) declarado(s) com inspeção mas SEM inspeção na OP: ${nomes}.`);
          apontar('nao_conforme', 1, 'OP',
            `Inspeção(ões) obrigatória(s) ausente(s) na OP: ${nomes}.`,
            'Verificar no Sapiens se a inspeção foi realmente executada e registrada. Se falha de processo, emitir RNC. Se a inspeção migrou pra outro estágio, atualizar a Ficha Mestre.',
            'ISO 13485 §8.2.4 (monitoramento e medição do produto)',
            { estagios: faltantes.map(nomeEstagio) });
        }
        // 2) Extras: inspeção presente na OP mas estágio NÃO declarado na ficha
        const extras = [];
        for (const est of inspPorEstagio.keys()) {
          if (!declarados.has(est)) extras.push(est);
        }
        if (extras.length > 0) {
          const nomes = extras.map((n) => {
            const e = ESTAGIOS_VARIAVEIS.find((v) => v.estagioNum === n);
            return e ? `${n} — ${e.nome}` : `${n}`;
          }).join('; ');
          add(C1, 'Inspeções não previstas na Ficha Mestre', 'ressalva',
            `Estágio(s) com inspeção na OP mas NÃO declarado(s) na Ficha: ${nomes}.`);
          apontar('ressalva', 2, 'Ficha Mestre',
            `Inspeção(ões) encontrada(s) em estágio(s) não previsto(s) pela ficha: ${nomes}.`,
            'Se a inspeção passou a ser realizada nesse(s) estágio(s), atualize a Ficha Mestre marcando "Tem inspeção" no(s) estágio(s) correspondente(s).',
            'ISO 13485 §4.2.4 (controle de documentos)');
        }
        if (faltantes.length === 0 && extras.length === 0) {
          const totalInsp = (op?.inspecoesDetalhe || []).length;
          add(C1, 'Inspeções previstas pela Ficha Mestre', 'conforme',
            `Todas as ${totalInsp} inspeções esperadas foram encontradas na OP (${decInsp.length} declaradas na ficha + estágios fixos 50 e 60). Nenhuma inspeção extra ou faltando.`);
        }
      }

      // Inspeções aprovadas — inspetores/estágios vêm de inspecoesDetalhe (op.inspecoes só tem numero+status)
      if (op?.inspecoes?.length > 0) {
        const naoConforme = op.inspecoes.filter((i) => i.status.toLowerCase() !== 'conforme' && i.status.toLowerCase() !== 'aprovado');
        // Monta lista "Estágio N: Nome (inspetor)" a partir de inspecoesDetalhe
        const detalhes = (op?.inspecoesDetalhe || [])
          .filter((i) => i.inspetor)
          .map((i) => `Estágio ${i.estagio} (${i.inspetor})`);
        const listaDet = detalhes.length ? ` — ${detalhes.join(', ')}` : '';
        if (naoConforme.length === 0) {
          add(C1, 'Status das inspeções da OP', 'conforme',
            `Todas as ${op.inspecoes.length} inspeções com status "Conforme"${listaDet}.`);
        } else {
          const detalhesInsp = (op?.inspecoesDetalhe || [])
            .filter((i) => naoConforme.some((n) => n.numero === i.numero));
          const detalhesNC = detalhesInsp
            .map((i) => `#${i.numero} (Estágio ${i.estagio}, ${i.inspetor || 'inspetor não identificado'})`);
          add(C1, 'Status das inspeções da OP', 'nao_conforme',
            `${naoConforme.length} inspeção(ões) reprovada(s): ${detalhesNC.length ? detalhesNC.join('; ') : naoConforme.map((i) => `#${i.numero}`).join('; ')}.`);
          const repEst = new Set(), repInsp = new Set();
          for (const i of detalhesInsp) {
            if (i.estagio != null) repEst.add(nomeEstagio(i.estagio));
            repInsp.add(`#${i.numero}${i.estagio != null ? ` · Est. ${i.estagio}` : ''}`);
          }
          apontar('nao_conforme', 1, 'OP',
            `Inspeções reprovadas: ${detalhesNC.length ? detalhesNC.join('; ') : naoConforme.map((i) => i.numero).join(', ')}. Exige OP de Reprocesso.`,
            'Anexar OP de Reprocesso correspondente ou emitir RNC.',
            'ISO 13485 §8.3',
            { estagios: [...repEst], inspecoes: [...repInsp] });
        }
      } else if (op?.aprovados > 0 && op?.reprovados === 0) {
        add(C1, 'Status das inspeções da OP', 'conforme', `${op.aprovados} marcações "Aprovado" detectadas.`);
      } else if (op?.reprovados > 0) {
        add(C1, 'Status das inspeções da OP', 'nao_conforme', `${op.reprovados} ocorrência(s) de "Reprovado".`);
        apontar('nao_conforme', 1, 'OP', `${op.reprovados} reprovação(ões) detectada(s).`, 'Investigar e exigir OP de Reprocesso e/ou RNC.', 'ISO 13485 §8.3');
      }

      // === CONFERÊNCIA: aptidão de operadores e inspetores por estágio (15/07/2026) ===
      // Cruza operações (por matrícula) e inspeções (por nome/apelido) da OP com o
      // cadastro de operadores. Regras:
      //   - Cadastrado mas SEM o estágio (N) / inspeção (Ni) na lista → NC (corrigir a OP).
      //   - NÃO cadastrado (pessoa nova) → RESSALVA (cadastrar e refazer → vira conforme).
      // Só roda se houver cadastro (senão não há base para conferir e não gera falso positivo).
      if (cadastroOperadores.length > 0 && ((op?.operacoes || []).length > 0 || (op?.inspecoesDetalhe || []).length > 0)) {
        const normOpr = (s) => String(s || '').normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase().replace(/\s+/g, ' ').trim();
        const porCodigo = new Map();
        for (const o of cadastroOperadores) { const c = String(o.codigo || '').trim(); if (c) porCodigo.set(c, o); }
        const acharPorNome = (nome) => {
          const nn = normOpr(nome); if (!nn) return null;
          return cadastroOperadores.find((o) => normOpr(o.nome) === nn || (o.apelidos || []).some((a) => normOpr(a) === nn)) || null;
        };
        const temEstagio = (o, num, role) => ((role === 'insp' ? o.estagios_inspecao : o.estagios) || []).map(Number).includes(num);
        const jaPendente = (nome, est, role) => cadastrosPendentes.some((p) => p.estagio === est && p.role === role && normOpr(p.nome) === normOpr(nome));

        const ncOp = new Set(), ncInsp = new Set(), ncOpEst = new Set(), ncInspEst = new Set();
        const ncOpEstNum = new Set(), ncInspEstNum = new Set();

        for (const o of (op?.operacoes || [])) {
          const est = o.estagio_numero; if (est == null) continue;
          const cod = String(o.operador_id || '').trim();
          const nome = (o.operador_nome || '').trim();
          const cadastrado = (cod && porCodigo.get(cod)) || acharPorNome(nome);
          if (!cadastrado) {
            if (!jaPendente(nome, est, 'op')) cadastrosPendentes.push({ nome, codigo: cod || null, estagio: est, role: 'op' });
            continue;
          }
          if (!temEstagio(cadastrado, est, 'op')) {
            ncOp.add(`${nome || cadastrado.nome} (Estágio ${est}, Op ${o.operacao_numero} ${o.operacao_desc || ''})`.trim());
            ncOpEst.add(nomeEstagio(est)); ncOpEstNum.add(est);
          }
        }
        for (const i of (op?.inspecoesDetalhe || [])) {
          const est = i.estagio; if (est == null) continue;
          const nome = (i.inspetor || '').trim(); if (!nome) continue;
          const cadastrado = acharPorNome(nome);
          if (!cadastrado) {
            if (!jaPendente(nome, est, 'insp')) cadastrosPendentes.push({ nome, codigo: null, estagio: est, role: 'insp' });
            continue;
          }
          if (!temEstagio(cadastrado, est, 'insp')) { ncInsp.add(`${nome} (Inspeção ${est}i)`); ncInspEst.add(nomeEstagio(est)); ncInspEstNum.add(est); }
        }

        // Lista de colaboradores APTOS a um estágio (por papel), para sugerir no alerta.
        const aptosDoEstagio = (num, role) => {
          const col = role === 'insp' ? 'estagios_inspecao' : 'estagios';
          const nomes = cadastroOperadores
            .filter((o) => o.ativo && (o[col] || []).map(Number).includes(num))
            .map((o) => `${o.nome}${o.codigo ? ` (#${o.codigo})` : ''}`);
          return nomes.length ? nomes.join(', ') : 'nenhum colaborador cadastrado para este estágio';
        };
        const sugestaoAptos = (nums, role) => [...nums].sort((a, b) => a - b)
          .map((n) => `${role === 'insp' ? `Inspeção ${n}i` : `Estágio ${n}`}: ${aptosDoEstagio(n, role)}`).join(' | ');

        if (ncOp.size > 0) {
          add(C1, 'Aptidão do operador ao estágio', 'ressalva', `Operador(es) executaram estágio fora da aptidão cadastrada: ${[...ncOp].join('; ')}. Conforme se justificado (colaborador treinado/instruído para a etapa).`);
          apontar('ressalva', 1, 'OP',
            `Operador fora da aptidão cadastrada no estágio: ${[...ncOp].join('; ')}. O colaborador não consta apto (conforme cadastro) a executar este estágio.`,
            'Justificar se o colaborador é treinado/instruído para esta etapa; se a operação é flexível, marcá-la como "operação livre" do equipamento; se a autorização é permanente, atualizar o cadastro do estágio; se foi engano, corrigir a OP.',
            'ISO 13485 §6.2 (competência) + §7.5.1',
            { estagios: [...ncOpEst], sugestaoCorreto: `Aptos a executar — ${sugestaoAptos(ncOpEstNum, 'op')}.` });
        }
        if (ncInsp.size > 0) {
          add(C1, 'Aptidão do inspetor à inspeção', 'ressalva', `Inspetor(es) fizeram inspeção fora da aptidão cadastrada: ${[...ncInsp].join('; ')}. Conforme se justificado (colaborador treinado/instruído para a inspeção).`);
          apontar('ressalva', 1, 'OP',
            `Inspetor fora da aptidão cadastrada na inspeção: ${[...ncInsp].join('; ')}. O colaborador não consta apto (conforme cadastro) a inspecionar este estágio.`,
            'Justificar se o colaborador é treinado/instruído para esta inspeção; se a autorização é permanente, atualizar o cadastro do estágio; se foi engano, corrigir a OP.',
            'ISO 13485 §6.2 (competência) + §8.2.4',
            { estagios: [...ncInspEst], sugestaoCorreto: `Aptos a inspecionar — ${sugestaoAptos(ncInspEstNum, 'insp')}.` });
        }
        if (cadastrosPendentes.length > 0) {
          const descr = cadastrosPendentes.map((p) => `${p.nome || '(sem nome)'}${p.codigo ? ' #' + p.codigo : ''} — ${p.role === 'insp' ? 'inspeção ' + p.estagio + 'i' : 'estágio ' + p.estagio}`).join('; ');
          const estRess = [...new Set(cadastrosPendentes.map((p) => nomeEstagio(p.estagio)))];
          add(C1, 'Colaboradores cadastrados', 'ressalva', `Colaborador(es) não cadastrado(s) no quadro de operadores/inspetores: ${descr}.`);
          apontar('ressalva', 1, 'OP',
            `Operador/inspetor não cadastrado: ${descr}. Cadastre no quadro de operadores do estágio para liberar a conferência.`,
            'Cadastrar o(s) colaborador(es) no quadro do estágio/inspeção correspondente e refazer a análise (não conta como correção).',
            'ISO 13485 §6.2 (competência)',
            { estagios: estRess });
        }
        // Itens CONFORME — registram explicitamente que a conferência foi feita e que
        // todos estavam aptos (quando não houve NC nem pendência para aquele papel).
        const opsChecadas = (op?.operacoes || []).filter((o) => o.estagio_numero != null).length;
        const inspChecadas = (op?.inspecoesDetalhe || []).filter((i) => i.estagio != null && (i.inspetor || '').trim()).length;
        const pendOp = cadastrosPendentes.filter((p) => p.role === 'op').length;
        const pendInsp = cadastrosPendentes.filter((p) => p.role === 'insp').length;
        const estOp = [...new Set((op?.operacoes || []).filter((o) => o.estagio_numero != null).map((o) => o.estagio_numero))].sort((a, b) => a - b);
        const estInsp = [...new Set((op?.inspecoesDetalhe || []).filter((i) => i.estagio != null && (i.inspetor || '').trim()).map((i) => i.estagio))].sort((a, b) => a - b);
        if (opsChecadas > 0 && ncOp.size === 0 && pendOp === 0) {
          add(C1, 'Aptidão do operador ao estágio', 'conforme',
            `Conferência de operadores realizada: ${opsChecadas} registro(s) de operação cruzado(s) com o cadastro. Todos os operadores estão aptos aos estágios que executaram${estOp.length ? ` (estágios ${estOp.join(', ')})` : ''}.`);
        }
        if (inspChecadas > 0 && ncInsp.size === 0 && pendInsp === 0) {
          add(C1, 'Aptidão do inspetor à inspeção', 'conforme',
            `Conferência de inspetores realizada: ${inspChecadas} inspeção(ões) cruzada(s) com o cadastro. Todos os inspetores estão aptos às inspeções que realizaram${estInsp.length ? ` (${estInsp.map((n) => n + 'i').join(', ')})` : ''}.`);
        }
      }

      // === Medições críticas — validação numérica contra faixa [Vlr_Min, Vlr_Max] ===
      // Decisão de 16/06/2026: notação "<X" (limite de resolução do instrumento) é
      // sempre considerada Aprovada quando o Sapiens marca Aprovado — a usuária pediu
      // pra remover o alerta de "X acima do Vlr_Max" porque não traz valor prático.
      if (op?.medicoes?.length > 0) {
        const parseNum = (s) => parseFloat(String(s).replace(/\./g, '').replace(',', '.'));
        const foraFaixa = [];
        for (const m of op.medicoes) {
          if (m.situacao && /Reprovado|N\/A/i.test(m.situacao)) continue; // só auditamos as Aprovadas
          const min = parseNum(m.vlr_min);
          const max = parseNum(m.vlr_max);
          const medStr = String(m.vlr_medido || '').trim();
          // "<X" → ignoramos do confronto numérico (sempre considerado Aprovado).
          if (/^<\s*[\d,]/.test(medStr)) continue;
          const medNum = parseNum(medStr);
          if (isNaN(medNum) || isNaN(min) || isNaN(max)) continue;
          // Tolerância numérica para arredondamento
          const eps = Math.max(Math.abs(max), Math.abs(min), 1) * 1e-6;
          if (medNum < min - eps || medNum > max + eps) {
            foraFaixa.push(`"${m.descricao}" (medido ${medNum} ${m.um}, faixa [${min}, ${max}])`);
          }
        }
        if (foraFaixa.length === 0) {
          add(C1, 'Medições críticas dentro da faixa', 'conforme',
            `Todas as ${op.medicoes.length} medições "Aprovado" têm o valor medido dentro da faixa [Vlr_Min, Vlr_Max] do Sapiens.`);
        } else {
          add(C1, 'Medições críticas dentro da faixa', 'nao_conforme',
            `${foraFaixa.length} medição(ões) com valor medido FORA da faixa [Min, Max], apesar de marcadas Aprovado no Sapiens: ${foraFaixa.slice(0, 3).join('; ')}${foraFaixa.length > 3 ? `; e mais ${foraFaixa.length - 3}.` : '.'}`);
          apontar('nao_conforme', 1, 'OP', `Medições marcadas Aprovado no Sapiens mas com valor medido fora da faixa Vlr_Min–Vlr_Max declarada: ${foraFaixa.join('; ')}.`, 'Verificar se houve revisão de plano de inspeção após a medição, erro de digitação no Sapiens ou inversão de coluna. Em caso de inconsistência real, abrir RNC.', 'ISO 13485 §8.2.4 e §7.6');
        }
      }

      // === FORM-GQ-0047 — verificação consolidada (geração, revisão, datas, cópia) ===
      // Em vez de 4-5 linhas separadas, gera UMA linha resumida com tudo sobre o FORM.
      const dataConcilOP = op?.dataConciliacao;
      const dataConcilFORM = fm?.dataConciliacao;
      const dataConcil = dataConcilOP || dataConcilFORM;
      // Se a data da conciliação (estágio 60) não foi identificada em lugar nenhum,
      // sinaliza como ressalva — a GQ deve conferir manualmente (pode ser problema de
      // leitura do PDF ou conciliação de fato ausente). Sem isso, as checagens de data
      // seriam puladas silenciosamente.
      if (!dataConcil) {
        add(C1, 'Data da conciliação (estágio 60)', 'ressalva', 'Não foi possível identificar a data da conciliação (estágio 60) na OP nem no FORM.');
        apontar('ressalva', 1, 'OP', 'Data da conciliação (estágio 60) não identificada na OP nem no FORM-GQ-0047.', 'Conferir manualmente se a conciliação (estágio 60) foi registrada e se a data está legível no documento.', 'ISO 13485 §8.2.4');
      }
      if (!fm) {
        add(C1, 'FORM-GQ-0047', 'ressalva', 'FORM-GQ-0047 não disponível.');
      } else {
        const okForm = [];
        const ressForm = [];
        // Geração: virtual = OK pela plataforma; real = anexado pelo usuário
        if (fm._virtual) {
          okForm.push(`Rev. ${fm.revisao} gerado pela plataforma`);
        } else {
          okForm.push(`Rev. ${fm.revisao || '?'} anexado pelo usuário`);
        }
        // Revisão vs data conciliação
        if (dataConcil && fm.dataRevisaoForm) {
          if (fm.dataRevisaoForm > dataConcil) {
            ressForm.push(`revisão (${fm.dataRevisaoForm}) posterior à conciliação (${dataConcil})`);
            apontar('ressalva', 1, 'FORM-GQ-0047', 'Data de revisão do FORM é posterior à data da conciliação.', 'Confirmar qual revisão era vigente no dia da conciliação.', '');
          } else {
            okForm.push(`revisão vigente em ${dataConcil}`);
          }
        }
        // Datas conciliação OP × FORM
        if (dataConcilOP && dataConcilFORM) {
          if (dataConcilOP === dataConcilFORM) {
            okForm.push(`data conciliação ${dataConcilOP} (OP=FORM)`);
          } else {
            ressForm.push(`data conciliação divergente: OP=${dataConcilOP}, FORM=${dataConcilFORM}`);
            apontar('ressalva', 1, 'OP × FORM-GQ-0047', `Data da conciliação na OP (${dataConcilOP}) não confere com a data registrada no FORM (${dataConcilFORM}).`, 'Verificar qual data está correta e ajustar o documento divergente.', '');
          }
        } else if (dataConcilOP) {
          okForm.push(`data conciliação ${dataConcilOP} (extraída da OP)`);
        }
        // Cópia controlada
        if (fm.copia === 'controlada') {
          ressForm.push('marcado como "cópia controlada"');
          apontar('ressalva', 1, 'FORM-GQ-0047', 'FORM apresenta marcação "cópia controlada".', 'Trocar para cópia não controlada conforme Obs3 do Manual.', '');
        }
        const status = ressForm.length > 0 ? 'ressalva' : 'conforme';
        const msg = ressForm.length === 0
          ? `FORM-GQ-0047 ${okForm.join('; ')}.`
          : `${okForm.join('; ')}. Problemas: ${ressForm.join('; ')}.`;
        add(C1, 'FORM-GQ-0047 — geração, revisão e datas', status, msg);
      }

      // RC — só sinaliza quando o documento está ausente OU tem componente "Não Conforme".
      // Os checks antigos "Origem e Situação" e "quantidades sem divergência" foram
      // removidos em 16/06/2026 — não traziam valor prático (faltavam no formato CSV
      // e o padrão "0/0" raramente indica problema real).
      if (!rc) {
        add(C1, 'RC anexada', 'nao_conforme', 'RC não identificada ou não pôde ser parseada.');
        apontar('nao_conforme', 1, 'RC', 'RC ausente ou não parseável.', 'Anexar a RC do lote.', 'ISO 13485 §7.5.9');
      } else if (rc.naoConformes > 0) {
        add(C1, 'RC — sem componentes "Não Conforme"', 'nao_conforme',
          `${rc.naoConformes} ocorrência(s) marcada(s) como "Não Conforme" na RC.`);
        apontar('nao_conforme', 1, 'RC', `${rc.naoConformes} componente(s) "Não Conforme".`, 'Investigar e exigir RNC.', 'ISO 13485 §8.3');
      }

      // === Etiqueta Externa — verificação consolidada de TODOS os campos ===
      // Gera UMA linha resumida no parecer com contagem de campos OK × problemas.
      // Apontamentos detalhados (com severidade própria) continuam indo pra lista abaixo.
      // Inclui (decisão 17/06/2026): fabricante, CNPJ, endereço, telefone, RT, resp.legal
      // confrontados diretamente contra os valores da Ficha Mestre.
      if (et) {
        const okCampos = [];
        const ncCampos = [];     // problemas críticos (nao_conforme)
        const ressCampos = [];   // problemas menores (ressalva)
        // Normaliza strings: remove pontuação leve, espaços extras, maiúsculas.
        // Útil pra comparar "S.A." × "S/A" ou "RJ – CEP" × "RJ - CEP".
        const norm = (s) => String(s || '')
          .normalize('NFD').replace(/[̀-ͯ]/g, '')   // tira acentos
          .replace(/[.,;:\/\-–—()\[\]]/g, ' ')                 // pontuação → espaço
          .replace(/\s+/g, ' ')
          .trim()
          .toUpperCase();
        const normNum = (s) => String(s || '').replace(/\D/g, '');

        // 0. Família/Nome do Produto — calibração 23/06/2026.
        // Comparação tolerante após normalizar (sem acentos, maiúsculas,
        // pontuação): aceita quando uma contém a outra. Ex.: etiqueta
        // "MICROCÂMERA" bate com ficha "Microcâmera CM" (e vice-versa).
        // Isso cobre casos legítimos onde a etiqueta usa o nome do tipo
        // de produto e a ficha usa o nome com sigla/sufixo.
        if (et.familia && produto?.familia) {
          const a = norm(et.familia), b = norm(produto.familia);
          if (a === b || a.includes(b) || b.includes(a)) {
            okCampos.push(`família "${et.familia}"`);
          } else {
            ncCampos.push(`família "${et.familia}" ≠ Ficha "${produto.familia}"`);
            apontar('nao_conforme', 1, 'Etiqueta Externa', `Nome do produto na etiqueta (${et.familia}) não confere com a Ficha (${produto.familia}).`, 'Corrigir o nome do produto na etiqueta antes da liberação — palavras faltantes/sobrando.', 'RDC 751/2022');
          }
        } else if (produto?.familia && !et.familia) {
          ressCampos.push('nome da família ausente/ilegível na etiqueta');
        }
        // 1. Modelo (NC se diverge — crítico)
        if (et.modelo && produto?.modelo) {
          if (et.modelo.toUpperCase() === produto.modelo.toUpperCase()) {
            okCampos.push(`modelo "${et.modelo}"`);
          } else {
            ncCampos.push(`modelo "${et.modelo}" ≠ Ficha "${produto.modelo}"`);
            apontar('nao_conforme', 1, 'Etiqueta Externa', `Modelo da etiqueta (${et.modelo}) não confere com a Ficha (${produto?.modelo}).`, 'Corrigir a etiqueta antes da liberação.', 'RDC 751/2022');
          }
        }
        // 2. Série OP × Etiqueta (NC se diverge — crítico)
        if (et.serie && op?.serie) {
          if (et.serie === op.serie) {
            okCampos.push(`série "${et.serie}"`);
          } else {
            ncCampos.push(`série "${et.serie}" ≠ OP "${op.serie}"`);
            apontar('nao_conforme', 1, 'Etiqueta × OP', `Número de série divergente.`, 'Corrigir o documento com erro.', 'ISO 13485 §7.5.9');
          }
        }
        // 3. Fabricante (Razão Social) — Etiqueta × Ficha (NC)
        if (et.fabricante && produto?.razaoSocial) {
          if (norm(et.fabricante) === norm(produto.razaoSocial)) {
            okCampos.push('fabricante');
          } else {
            ncCampos.push(`fabricante "${et.fabricante}" ≠ Ficha "${produto.razaoSocial}"`);
            apontar('nao_conforme', 1, 'Etiqueta Externa', `Fabricante na etiqueta (${et.fabricante}) não confere com a Ficha (${produto.razaoSocial}).`, 'Corrigir o nome do fabricante na etiqueta.', 'RDC 751/2022');
          }
        } else if (produto?.razaoSocial && !et.fabricante) {
          ressCampos.push('campo Fabricante ausente/ilegível na etiqueta');
        }
        // 4. CNPJ — Etiqueta × Ficha (NC se diverge, ressalva se ausente)
        if (et.cnpj && produto?.cnpj) {
          if (normNum(et.cnpj) === normNum(produto.cnpj)) {
            okCampos.push('CNPJ');
          } else {
            ncCampos.push(`CNPJ ${et.cnpj} ≠ Ficha ${produto.cnpj}`);
            apontar('nao_conforme', 1, 'Etiqueta Externa', `CNPJ na etiqueta (${et.cnpj}) não confere com a Ficha (${produto.cnpj}).`, 'Corrigir o CNPJ na etiqueta.', 'RDC 751/2022');
          }
        } else if (produto?.cnpj && !et.cnpj) {
          ressCampos.push('CNPJ ausente/ilegível na etiqueta');
        }
        // 5. Endereço da fábrica — Etiqueta × Ficha (ressalva — strings podem variar)
        if (et.endereco && produto?.enderecoFabrica) {
          // Compara após remover pontuação. Se o endereço da Ficha está contido na
          // versão normalizada da etiqueta (ou vice-versa), considera OK.
          const a = norm(et.endereco), b = norm(produto.enderecoFabrica);
          if (a === b || a.includes(b) || b.includes(a)) {
            okCampos.push('endereço');
          } else {
            ressCampos.push(`endereço divergente: etq="${et.endereco}" × Ficha="${produto.enderecoFabrica}"`);
            apontar('ressalva', 1, 'Etiqueta Externa', `Endereço na etiqueta diverge da Ficha. Etq: ${et.endereco}. Ficha: ${produto.enderecoFabrica}.`, 'Verificar se a divergência é só formatação ou se o endereço foi alterado.', 'RDC 665/2022');
          }
        } else if (produto?.enderecoFabrica && !et.endereco) {
          ressCampos.push('endereço ausente/ilegível na etiqueta');
        }
        // 6. Telefone — Etiqueta × Ficha (ressalva)
        if (et.telefone && produto?.telefone) {
          if (normNum(et.telefone) === normNum(produto.telefone)) {
            okCampos.push('telefone');
          } else {
            ressCampos.push(`telefone "${et.telefone}" ≠ Ficha "${produto.telefone}"`);
            apontar('ressalva', 1, 'Etiqueta Externa', `Telefone na etiqueta (${et.telefone}) não confere com a Ficha (${produto.telefone}).`, 'Corrigir o telefone na etiqueta.', 'RDC 665/2022');
          }
        }
        // 7. Responsável Técnico (nome) — Etiqueta × Ficha (NC)
        if (et.rt && produto?.rt) {
          if (norm(et.rt) === norm(produto.rt)) {
            okCampos.push(`RT "${et.rt}"`);
          } else {
            ncCampos.push(`RT "${et.rt}" ≠ Ficha "${produto.rt}"`);
            apontar('nao_conforme', 1, 'Etiqueta Externa', `Responsável Técnico na etiqueta (${et.rt}) não confere com a Ficha (${produto.rt}).`, 'Corrigir o nome do RT na etiqueta.', 'RDC 751/2022');
          }
        }
        // 8. CREA da RT
        if (et.crea && produto?.creaRt) {
          if (normNum(et.crea) === normNum(produto.creaRt)) {
            okCampos.push(`CREA da RT (${et.crea})`);
          } else {
            ressCampos.push(`CREA "${et.crea}" ≠ Ficha "${produto.creaRt}"`);
          }
        }
        // 9. Responsável Legal — Etiqueta × Ficha (NC)
        if (et.rl && produto?.responsavelLegal) {
          if (norm(et.rl) === norm(produto.responsavelLegal)) {
            okCampos.push(`Resp. Legal "${et.rl}"`);
          } else {
            ncCampos.push(`Resp. Legal "${et.rl}" ≠ Ficha "${produto.responsavelLegal}"`);
            apontar('nao_conforme', 1, 'Etiqueta Externa', `Responsável Legal na etiqueta (${et.rl}) não confere com a Ficha (${produto.responsavelLegal}).`, 'Corrigir o nome do Responsável Legal na etiqueta.', 'RDC 751/2022');
          }
        }
        // 10. Data de fabricação = Emissão OP (ressalva se diverge)
        if (et.dataFabricacao && op?.dataEmissao) {
          if (et.dataFabricacao === op.dataEmissao) {
            okCampos.push('data de fabricação');
          } else {
            ressCampos.push(`data fab. "${et.dataFabricacao}" ≠ Emissão OP "${op.dataEmissao}"`);
          }
        }
        // 11. Validade INDETERMINADO (ressalva se outro valor)
        if (et.validade) {
          if (/INDETERMINAD/i.test(et.validade)) {
            okCampos.push('validade INDETERMINADO');
          } else {
            ressCampos.push(`validade "${et.validade}" (esperado INDETERMINADO)`);
          }
        }

        // Status final consolidado.
        const totalProblemas = ncCampos.length + ressCampos.length;
        const status = ncCampos.length > 0 ? 'nao_conforme' : ressCampos.length > 0 ? 'ressalva' : 'conforme';
        const msg = totalProblemas === 0
          ? `Todos os ${okCampos.length} campos da etiqueta estão corretos: ${okCampos.join(', ')}.`
          : `${okCampos.length} campo(s) OK${okCampos.length > 0 ? ' (' + okCampos.join(', ') + ')' : ''}. ${totalProblemas} problema(s): ${[...ncCampos, ...ressCampos].join('; ')}.`;
        add(C1, 'Etiqueta Externa × Ficha Mestre', status, msg);
      }

      // ============ CAMADA 3: Conformidade Regulatória ============
      // Rastreabilidade consolidada (OP + RC com lotes/séries)
      const lotesRC = (rc?.lotesSeries?.length || 0) + (rc?.seriesComPrefixo?.length || 0);
      if (lotesRC > 0) {
        add(C3, 'Rastreabilidade do lote', 'conforme',
          `Série do equipamento identificada em OP/Etiqueta. RC com ${rc.lotesSeries?.length || 0} lote(s) e ${rc.seriesComPrefixo?.length || 0} série(s) alfanumérica(s) — componentes rastreáveis.`,
          'ISO 13485:2016 §7.5.9 e §8.3');
      } else {
        add(C3, 'Rastreabilidade do lote', 'conforme',
          'Série do equipamento identificada em OP e Etiqueta.',
          'ISO 13485:2016 §7.5.9');
      }

      add(C3, 'Rotulagem regulatória', et && et.temEnderecoBela && et.temCEP && et.temCNPJ && et.registroAnvisa ? 'conforme' : 'ressalva',
        et ? 'Etiqueta com campos regulatórios (fabricante, endereço, CNPJ, registro ANVISA).' : 'Etiqueta não pôde ser parseada.',
        'RDC 665/2022 e RDC 751/2022');

      // Checklist de liberação — o X marcando "SIM" é gráfico no PDF e raramente vem como texto.
      // Comportamento v1.1: o parecer técnico é EMITIDO ANTES da assinatura do RT, então o esperado
      // é que o FORM já esteja preenchido (família/modelo/série) mas o "X" no checkbox de liberação
      // só venha depois. Por isso, 'incerto' (FORM aparenta estar preenchido) é tratado como CONFORME
      // com nota, evitando ressalva falsa recorrente.
      let liberadoStatus, liberadoMsg;
      if (fm?.liberado === 'SIM') {
        liberadoStatus = 'conforme';
        liberadoMsg = 'Campo "Liberado para comercialização" marcado SIM no FORM-GQ-0047.';
      } else if (fm?.liberado === 'NAO') {
        liberadoStatus = 'nao_conforme';
        liberadoMsg = 'Campo "Liberado para comercialização" marcado NÃO no FORM-GQ-0047.';
      } else if (fm?.liberado === 'incerto') {
        liberadoStatus = 'conforme';
        liberadoMsg = 'FORM-GQ-0047 aparenta estar preenchido (família, modelo e série detectados). A marcação SIM no checkbox de liberação é gráfica e será conferida visualmente pelo RT no momento da assinatura — comportamento esperado v1.1 (parecer emitido ANTES da liberação).';
      } else if (!fm) {
        liberadoStatus = 'ressalva';
        liberadoMsg = 'FORM-GQ-0047 não pôde ser parseado.';
      } else {
        liberadoStatus = 'ressalva';
        liberadoMsg = 'Não foi possível inferir o estado de preenchimento do FORM-GQ-0047. Conferir manualmente.';
      }
      add(C3, 'Checklist de liberação (FORM-GQ-0047)', liberadoStatus, liberadoMsg, 'ISO 13485:2016 §8.2.4');

      add(C3, 'Controle de processo (BPF)', op?.estagios?.length > 0 ? 'conforme' : 'ressalva',
        op?.estagios?.length ? `${op.estagios.length} estágio(s) documentado(s) na OP.` : 'Estágios não detectados na OP.',
        'RDC 665/2022');

      // Check de "Ensaios elétricos de segurança" REMOVIDO da Camada 3 (decisão de 03/06/2026).
      // Justificativa: gerava ressalva falsa-positiva para eletromédicos quando a OP não
      // continha textualmente os termos esperados, mesmo quando a inspeção elétrica era
      // feita corretamente. O Sapiens registra os ensaios em planos específicos que nem
      // sempre aparecem na exportação textual da OP. A validação IEC 60601 já é garantida
      // pelo fluxo da QG via FORM-GQ-0047 e pelos certificados de calibração específicos.

      // OP de Reprocesso — guiada pelo anexo no slot "OP de Reprocesso", NÃO pelo
      // tipo da OP normal (decisão da usuária em 16/06/2026). A OP de Reprocesso é
      // uma SEGUNDA OP, anexada à OP normal quando há retrabalho/correção. Se a
      // usuária anexou o arquivo, marcamos como aplicável e conforme; senão, N/A.
      if (opReprocessoAnexado) {
        add(C3, 'OP de Reprocesso', 'conforme',
          'OP de Reprocesso anexada à análise — conferir conteúdo e cruzar com inspeções reprovadas/RNCs no parecer final.');
      } else {
        add(C3, 'OP de Reprocesso', 'na',
          'Nenhuma OP de Reprocesso anexada — não aplicável a este lote.');
      }

      // RNCs associados — mesma lógica: guiada pelo anexo no slot "RNC".
      if (rncAnexado) {
        add(C3, 'RNCs associados', 'conforme',
          'RNC anexado à análise — conferir conteúdo e correlacionar com a OP de Reprocesso quando houver.');
      } else {
        add(C3, 'RNCs associados', 'na',
          'Nenhum RNC anexado — não aplicável a este lote.');
      }

      // ============ Resultado geral ============
      let resultado_geral;
      if (ncMaior > 0) resultado_geral = 'nao_conforme';
      else if (ncMenor > 0) resultado_geral = 'ressalva';
      else resultado_geral = 'conforme';

      // ============ Parecer resumo ============
      // N/A não entra no denominador — só conta o que foi avaliado.
      const todosItens = [...C1, ...C2, ...C3];
      const conformes = todosItens.filter((i) => i.status === 'conforme').length;
      const avaliadosTotal = todosItens.filter((i) => i.status !== 'na').length;
      let resumo;
      if (resultado_geral === 'conforme') {
        resumo = `Análise concluída. Todos os ${avaliadosTotal} pontos avaliados estão em conformidade. ${conformes} ✅. Lote pronto para liberação pelo Responsável Técnico (Samara Campos/Fernando) conforme ISO 13485:2016 §8.2.4.`;
      } else if (resultado_geral === 'ressalva') {
        resumo = `Análise concluída com ${ncMenor} ressalva(s) menor(es). ${conformes}/${avaliadosTotal} pontos avaliados em conformidade. Verificar os apontamentos antes da liberação pelo RT.`;
      } else {
        resumo = `Análise concluída com ${ncMaior} NÃO CONFORMIDADE(S) CRÍTICA(S) e ${ncMenor} ressalva(s). Lote NÃO está pronto para liberação. Endereçar todos os apontamentos críticos.`;
      }

      // ============ CRONOLOGIA detalhada ============
      // Associa a inspeção ao estágio da operação (regra 30/06/2026: estágios 5 e 7 não têm
      // inspeção; todos os outros têm exatamente 1 — se aparecer 2× com planos diferentes,
      // mostra ambas).
      const inspsPorEstagio = new Map();
      for (const i of (op?.inspecoesDetalhe || [])) {
        if (i.estagio == null) continue;
        if (!inspsPorEstagio.has(i.estagio)) inspsPorEstagio.set(i.estagio, []);
        inspsPorEstagio.get(i.estagio).push(i);
      }
      const fmtInsp = (i) => `${i.numero || '?'}${i.plano ? ' / '+i.plano : ''} — ${i.status || '?'} em ${i.data || '?'} ${i.hora || ''} (${i.inspetor || '?'})`;
      const cronologia = (op?.operacoes || []).map((o) => {
        const insps = inspsPorEstagio.get(o.estagio_numero) || [];
        return {
          estagio: `${o.estagio_numero} — ${o.estagio_nome}`,
          operacao: `Op ${o.operacao_numero} ${o.operacao_desc}`,
          inicio: o.inicio,
          fim: o.fim,
          tempo_min: o.tempo_min,
          operador: `${o.operador_id} ${o.operador_nome}`,
          inspecao: insps.length > 0 ? insps.map(fmtInsp).join(' | ') : '—',
        };
      });

      // Sequência de números de inspeção (ordem crescente = OK)
      const numsInsp = (op?.inspecoesDetalhe || []).map((i) => parseInt(i.numero)).filter((n) => !isNaN(n));
      const inspecoesOrdem = numsInsp.length > 0 && numsInsp.every((n, i) => i === 0 || n >= numsInsp[i - 1]);

      // ============ MEDIÇÕES CRÍTICAS ============
      const medicoes = (op?.medicoes || []).map((m) => ({
        descricao: m.descricao,
        vlr_medido: m.vlr_medido,
        faixa: `${m.vlr_min} – ${m.vlr_max} ${m.um}`.replace(/^\s*–/, 'Máx'),
        situacao: m.situacao,
      }));

      // ============ CRUZAMENTO FORM × Ficha × Roteiro OP ============
      // Lista cada um dos 16 itens do FORM-GQ-0047 com:
      //  - esperado: SIM / N/A
      //  - presenca real na OP (para os variáveis que têm estagioNum)
      //  - status: conforme / ressalva (se Ficha diz SIM mas OP não tem o estágio)
      const cruzamento = [];
      if (Array.isArray(produto?.estagiosAplicaveis)) {
        const aplicaveisSet = new Set(produto.estagiosAplicaveis);

        // Variáveis — SIM se aplicável + estágio presente; ressalva se aplicável mas ausente; N/A se Ficha não marcou
        for (const est of ESTAGIOS_VARIAVEIS) {
          const aplicavel = aplicaveisSet.has(est.nome);
          const presenteNaOP = !!est.estagioNum && op?.estagios?.some((e) => e.numero === est.estagioNum);
          let status = 'conforme';
          let nota;
          let esperado;
          if (aplicavel) {
            esperado = 'SIM';
            if (!presenteNaOP) {
              status = 'ressalva';
              nota = `Ficha marca como aplicável mas Estágio ${est.estagioNum} não detectado na OP.`;
            } else {
              nota = `Estágio ${est.estagioNum} presente na OP.`;
            }
          } else {
            esperado = 'N/A';
            nota = 'Ficha não marca como aplicável a este produto.';
          }
          cruzamento.push({
            item: est.nome,
            esperado,
            roteiro_op: est.estagioNum ? (presenteNaOP ? `Estágio ${est.estagioNum} presente` : `Estágio ${est.estagioNum} ausente`) : '—',
            status,
            nota,
          });
        }

        // Fixos — sempre SIM. Apenas registrar.
        for (const est of ESTAGIOS_FIXOS) {
          cruzamento.push({
            item: est.nome,
            esperado: 'SIM',
            roteiro_op: '—',
            status: 'conforme',
            nota: 'Item fixo — esperado SIM em qualquer produto.',
          });
        }

        // Condicionais — SIM se documento anexado, N/A senão.
        // Os flags vêm do orquestrador (executarAnaliseLocal), que sabe se a usuária
        // anexou um arquivo nos slots op_reprocesso/rnc. NÃO usar regex no corpus
        // porque o texto desses slots não está incluído no corpus.
        for (const est of ESTAGIOS_CONDICIONAIS) {
          const anexado = est.slotKey === 'op_reprocesso' ? opReprocessoAnexado
                        : est.slotKey === 'rnc'          ? rncAnexado
                        : false;
          cruzamento.push({
            item: est.nome,
            esperado: anexado ? 'SIM' : 'N/A',
            roteiro_op: '—',
            status: 'conforme',
            nota: anexado ? 'Documento anexado — marcado SIM.' : 'Documento não anexado — marcado N/A.',
          });
        }
      }

      // ============ DOCUMENTOS ANALISADOS (com detalhes) ============
      const docsList = [];
      if (op) docsList.push(`Ordem de Produção (OP) nº ${op.op || '?'}, série ${op.serie || '?'}, tipo ${op.tipo_op?.codigo || '?'}-${op.tipo_op?.nome || '?'}`);
      if (rc) docsList.push(`Relação de Componentes (RC) — Origem ${rc.origem || '?'}, situação ${rc.situacao || '?'}, ${rc.codigos?.length || 0} códigos detectados`);
      if (fm) docsList.push(`FORM-GQ-0047 preenchido — Rev. ${fm.revisao || '?'}, conciliação em ${fm.dataConciliacao || '?'}, Liberado = ${fm.liberado || '?'}`);
      if (et) docsList.push(`Etiqueta Externa do Produto — modelo ${et.modelo || '?'}, série ${et.serie || '?'}, ANVISA ${et.registroAnvisa || '?'}`);
      if (etAcs.length) {
        etAcs.forEach((e, i) => {
          docsList.push(`Etiqueta de Acessório ${i + 1} — ${e.descricao || '?'} (${e.codigoSapiens || '?'}), lote/série ${e.loteOuSerie || '?'}, ${e.tipoFabForn === 'F' ? 'Fabricante Confiance' : 'Fornecedor'}`);
        });
      }

      // ============ RECOMENDAÇÕES DE MELHORIA ============
      const recos = [];
      if ((op?.inspecoesDetalhe?.length || 0) > 1) {
        const nums = op.inspecoesDetalhe.map((i) => i.numero);
        const dups = [...new Set(nums.filter((n, idx) => nums.indexOf(n) !== idx))];
        if (dups.length) {
          recos.push(`Inspeção ${dups.join(', ')} aparece com múltiplos planos (prática padrão do Sapiens). Recomenda-se formalizar essa estrutura na Ficha Mestre para auditoria.`);
        }
      }
      if (!et) {
        recos.push('Etiqueta Externa (.docx) deve ser anexada e legível para conferência automática de fabricante, registro ANVISA, série e validade.');
      }

      // ============ SUGESTÕES DE MELHORIA REGULATÓRIA ============
      const sugestoesRegulatorias = gerarSugestoesRegulatorias({ op, fm, et, rc, produto, corpus });

      // ============ PARECER TÉCNICO (parágrafo completo) ============
      let parecerTecnico = '';
      const prodNome = produto?.familia || '—';
      const prodModelo = produto?.modelo || '—';
      const ncEpr = (op?.tipo_op?.codigo === 'N' && op?.reprovados === 0)
        ? 'OP tipo Normal, sem reprovações em inspeções intermediárias.'
        : (op?.reprovados > 0 ? `${op.reprovados} reprovação(ões) detectada(s).` : '');

      // Heurística inline (substitui a variável `eletricaTermos` que foi removida junto com o
      // check de Ensaios elétricos da Camada 3 — mantemos só para enriquecer o parecer textual
      // quando o produto é claramente eletromédico).
      const corpusTemEletrico = /Corrente\s+de\s+fuga|rigidez\s+diel[ée]trica|aterramento|isola[çc][ãa]o|\b60601\b/i.test(corpus);
      if (resultado_geral === 'conforme') {
        parecerTecnico = `A documentação do lote ${op?.serie || ''} (OP ${op?.op || ''}) do ${prodNome} ${prodModelo} apresenta consistência interna íntegra entre OP, RC e FORM-GQ-0047 nas três camadas de análise, com aderência à BOM aprovada na Ficha Mestre, aos parâmetros de processo especificados e às normas ISO 13485:2016, RDC 665/2022, RDC 751/2022${corpusTemEletrico ? ' e IEC 60601-1' : ''}. ${ncEpr} Nenhuma não conformidade foi identificada nas verificações automatizadas. Os campos de assinatura (Vistos de Aprovação da OP e Visto de Liberação do FORM-GQ-0047) estão corretamente em branco, prontos para receber a assinatura do Responsável Técnico após este parecer, conforme fluxo definido no protocolo v1.1. Conforme exigência da ISO 13485:2016 §8.2.4, a decisão final de liberação do lote para comercialização é prerrogativa exclusiva do Responsável Técnico humano (${produto?.rt || 'Samara Campos'} ou Fernando). Este parecer constitui apoio técnico à decisão.`;
      } else if (resultado_geral === 'ressalva') {
        parecerTecnico = `A documentação do lote ${op?.serie || ''} (OP ${op?.op || ''}) do ${prodNome} ${prodModelo} apresenta consistência interna na maior parte dos pontos verificados, mas ${ncMenor} ressalva(s) menor(es) foi(ram) identificada(s) que requer(em) atenção do Responsável Técnico antes da liberação. Ver seção "Apontamentos" acima. Nenhuma não conformidade crítica foi identificada. ${ncEpr} Conforme ISO 13485:2016 §8.2.4, a decisão final é do RT humano (${produto?.rt || 'Samara Campos'} ou Fernando).`;
      } else {
        parecerTecnico = `A documentação do lote ${op?.serie || ''} (OP ${op?.op || ''}) do ${prodNome} ${prodModelo} apresenta ${ncMaior} NÃO CONFORMIDADE(S) CRÍTICA(S) que impedem a liberação imediata. ${ncMenor > 0 ? `Adicionalmente, ${ncMenor} ressalva(s) menor(es) também foi(ram) identificada(s).` : ''} As não conformidades estão detalhadas na seção "Apontamentos" e devem ser endereçadas com tratativa formal (emissão de RNC quando aplicável, segundo ISO 13485:2016 §8.3) antes que o lote possa ser considerado para liberação. Conforme ISO 13485:2016 §8.2.4, a decisão final é do RT humano (${produto?.rt || 'Samara Campos'} ou Fernando).`;
      }

      return {
        produto: {
          nome: prodNome,
          modelo: prodModelo,
          codigo_sapiens: produto?.codigoSapiens || op?.codigoSapiens || '—',
          derivacao: op?.derivacao || produto?.derivacao || '—',
          derivacao_descricao: produto?.derivacaoDescricao || '—',
          numero_op: op?.op || '—',
          numero_serie: op?.serie || et?.serie || fm?.serie || '—',
          tipo_op: op?.tipo_op ? `${op.tipo_op.codigo} — ${op.tipo_op.nome}` : '—',
          data_emissao: op?.dataEmissao || '—',
          // Data da conciliação vem da OP (inspeção do Estágio 60); FORM serve como cruzamento
          data_conciliacao: op?.dataConciliacao || fm?.dataConciliacao || '—',
          pedido: op?.pedido || '—',
          registro_anvisa: produto?.registroAnvisa || et?.registroAnvisa || '—',
        },
        resultado_geral,
        parecer_resumo: resumo,
        parecer_tecnico: parecerTecnico,
        documentos_analisados: docsList,
        cronologia,
        cronologia_ordem_inspecoes_ok: inspecoesOrdem,
        medicoes_criticas: medicoes,
        cruzamento_marcacoes: cruzamento,
        camadas: { camada_1: C1, camada_2: C2, camada_3: C3 },
        apontamentos,
        cadastros_pendentes: cadastrosPendentes,
        recomendacoes_melhoria: recos,
        sugestoes_regulatorias: sugestoesRegulatorias,
      };
    }

    /* ====================================================================
       ORQUESTRADOR — chamado pelo botão "Analisar lote"
       ==================================================================== */
    async function executarAnaliseLocal(slots, opts = {}) {
      // 1) Parsear cada documento
      const docs = {
        op: parseOP(slots.op?.text || ''),
        rc: parseRC(slots.rc?.text || ''),
        form: parseForm0047(slots.form_gq_0047?.text || ''),
        etiqueta: parseEtiqueta(slots.etiqueta_externa?.text || ''),
        etAcessorios: (slots.etiqueta_acessorio || []).filter((it) => it.status === 'done').map((it) => parseEtiquetaAcessorio(it.text)),
      };

      const corpus = [
        slots.op?.text || '',
        slots.rc?.text || '',
        slots.form_gq_0047?.text || '',
        slots.etiqueta_externa?.text || '',
        ...(slots.etiqueta_acessorio || []).filter((it) => it.status === 'done').map((it) => it.text),
      ].join('\n\n');

      // 2) Carregar produtos com fichas mestres do Supabase
      const produtos = await loadProdutosComFichas();
      const identificacao = detectarProdutoNoTexto(corpus, produtos, docs.op?.derivacao);
      const produto = identificacao?.produto || null;

      // BLOQUEIO: análise não prossegue sem produto identificado E sem ficha mestre cadastrada.
      // Decisão de 01/06/2026: produto sem Ficha Mestre = análise impedida (em vez de prosseguir
      // gerando NCs falsos). O usuário precisa cadastrar a Ficha Mestre pela plataforma antes
      // de analisar lotes desse produto.
      if (!produto) {
        const codSapiens = docs.op?.codigoSapiens || '?';
        const derivacao = docs.op?.derivacao || '?';
        const modelo = docs.op?.modelo || '?';
        const err = new Error(
          `Produto não identificado na OP (código Sapiens: ${codSapiens}, modelo: ${modelo}, derivação: ${derivacao}). ` +
          `Cadastre o produto no menu Cadastro → Catálogo antes de analisar lotes desse produto. ` +
          `Análise interrompida.`
        );
        err.code = 'PRODUTO_NAO_CADASTRADO';
        throw err;
      }
      if (!produto.ficha_id) {
        const err = new Error(
          `O produto ${produto.familia} · ${produto.modelo} (derivação ${produto.derivacao}) está no catálogo, ` +
          `mas ainda NÃO possui uma Ficha Mestre cadastrada. ` +
          `Cadastre a Ficha Mestre desse produto no menu Cadastro → Fichas Mestres antes de analisar este lote. ` +
          `Análise interrompida.`
        );
        err.code = 'FICHA_MESTRE_AUSENTE';
        err.produto = produto;
        throw err;
      }
      if (!produto.fichaApta) {
        const err = new Error(
          `A Ficha Mestre do produto ${produto.familia} · ${produto.modelo} (derivação ${produto.derivacao}) ainda NÃO foi revisada e liberada para análise. ` +
          `Abra Cadastro → Fichas Mestres, revise a ficha desse equipamento e marque "Ficha revisada e apta para análise" antes de analisar este lote. ` +
          `Análise interrompida.`
        );
        err.code = 'FICHA_MESTRE_NAO_APTA';
        err.produto = produto;
        throw err;
      }

      // BLOQUEIO de duplicidade: análise não prossegue se já existe análise
      // com a mesma (numero_op, numero_serie). Decisão de 29/06/2026.
      // Re-análises (com analise_origem_id) NÃO passam por este caminho —
      // elas são disparadas pelo handleReanalisar dentro do ParecerView, então
      // a checagem só pega "Analisar lote" do zero pela tela de Nova análise.
      const opCheck = (docs.op?.op || '').trim();
      const serieCheck = (docs.op?.serie || '').trim();
      if (opCheck && serieCheck) {
        const { data: existentes } = await supabase
          .from('analises')
          .select('id, status, created_at, origem_analise')
          .eq('numero_op', opCheck)
          .eq('numero_serie', serieCheck)
          .order('created_at', { ascending: false })
          .limit(1);
        // Só bloqueia se a análise existente estiver FINALIZADA/APROVADA:
        // 'conforme' (OK direto) ou 'conforme_corrigido' (NC que já foi corrigida).
        // Para 'nao_conforme' e 'ressalva' permitimos refazer a análise direto pela
        // tela de Nova análise, sem precisar abrir pelo Histórico (decisão 06/07/2026).
        // Regra (10/07/2026): uma OP já finalizada no Histórico só pode ser REANALISADA
        // se estiver na lista importada do Sapiens (permitirRefazer) — ex.: análises
        // manuais que não tiveram a inspeção e voltaram a aparecer como pendentes.
        // Fora da lista, o bloqueio de duplicidade continua valendo.
        const STATUS_BLOQUEIA_REFAZER = ['conforme', 'conforme_corrigido'];
        if (!opts.permitirRefazer && existentes && existentes.length > 0 && STATUS_BLOQUEIA_REFAZER.includes((existentes[0].status || '').toLowerCase())) {
          const ex = existentes[0];
          const origemTxt = ex.origem_analise === 'manual' ? 'manualmente' : 'pelo agente';
          const dataTxt = ex.created_at ? new Date(ex.created_at).toLocaleDateString('pt-BR') : '?';
          const err = new Error(
            `Esta OP já foi analisada — OP ${opCheck}, Série ${serieCheck} já consta no Histórico (${origemTxt}, em ${dataTxt}, status: ${(ex.status || '').toUpperCase()}). ` +
            `Para reanalisar, a OP precisa estar na lista de OPs finalizadas (importe a planilha do Sapiens em "Buscar OPs finalizadas" e clique em Reanalisar). ` +
            `Para apenas revisar/corrigir, abra a análise pelo Histórico. Análise interrompida para evitar duplicidade.`
          );
          err.code = 'ANALISE_DUPLICADA';
          err.analiseExistenteId = ex.id;
          throw err;
        }
      }

      // 3) Pré-carrega a data de aprovação do template ativo do FORM-GQ-0047 (best-effort).
      //    Essa data é usada na análise para a comparação "Revisão do FORM vigente
      //    na conciliação". Se a extração falhar (timeout, Supabase indisponível, etc.),
      //    a análise prossegue com data null → o FORM virtual usa o fallback hardcoded.
      let formApprovalDate = null;
      try {
        const formApproval = await _loadFormTemplateApprovalDate();
        formApprovalDate = formApproval?.date || null;
      } catch (e) {
        console.warn('Falha ao pré-carregar data de aprovação do template, seguindo sem ela:', e?.message || e);
      }

      // 4) Rodar análise
      // Detecta se o usuário anexou OP de Reprocesso ou RNC (qualquer arquivo nesses slots)
      const opReprocessoAnexado = !!(slots.op_reprocesso?.file || slots.op_reprocesso?.text);
      const rncAnexado          = !!(slots.rnc?.file          || slots.rnc?.text);
      // Carrega o cadastro de operadores (para a conferência de aptidão por estágio).
      // Best-effort: se falhar/estiver vazio, a conferência é simplesmente pulada.
      let operadores = [];
      try {
        const { data: opsData } = await supabase.from('operadores').select('nome, codigo, apelidos, estagios, estagios_inspecao, ativo');
        operadores = opsData || [];
      } catch (e) { console.warn('Falha ao carregar operadores para a conferência:', e?.message || e); }
      const parecer = analisarConciliacao({
        docs, produto, identificacao, corpus, formApprovalDate,
        opReprocessoAnexado, rncAnexado, operadores,
      });

      // 4) Salvar no Supabase — limpando campos voláteis (Uint8Array não serializa em jsonb)
      const parecerParaBanco = JSON.parse(JSON.stringify(parecer, (key, value) => {
        if (typeof key === 'string' && key.startsWith('_')) return undefined; // remove _formXlsxBytes, _slots, etc.
        if (value instanceof Uint8Array) return undefined;
        return value;
      }));
      const { data: { user } } = await supabase.auth.getUser();
      const { data: analise, error: analErr } = await supabase
        .from('analises')
        .insert({
          produto_id: produto?.id || null,
          ficha_id: produto?.ficha_id || null,
          numero_op: parecer.produto.numero_op !== '—' ? parecer.produto.numero_op : null,
          numero_serie: parecer.produto.numero_serie !== '—' ? parecer.produto.numero_serie : null,
          nome_produto: parecer.produto.nome !== '—' ? parecer.produto.nome : null,
          modelo: parecer.produto.modelo !== '—' ? parecer.produto.modelo : null,
          registro_anvisa: parecer.produto.registro_anvisa !== '—' ? parecer.produto.registro_anvisa : null,
          status: parecer.resultado_geral,
          parecer_resumo: parecer.parecer_resumo,
          parecer_completo: parecerParaBanco,
          finalizada_em: new Date().toISOString(),
          created_by: user?.id || null,
        })
        .select()
        .single();

      if (analErr) throw new Error('Erro ao salvar análise: ' + analErr.message);

      // Anexa o id da análise no parecer pra UI conseguir atualizar (justificativas, re-análise)
      parecer._analiseId = analise?.id || null;

      if (parecer.apontamentos.length > 0) {
        const aps = parecer.apontamentos.map((ap, i) => ({
          analise_id: analise.id,
          ordem: i + 1,
          codigo: ap.codigo,
          severidade: ap.severidade,
          camada: ap.camada,
          documento_afetado: ap.documento_afetado,
          referencia_normativa: ap.referencia_normativa,
          descricao: ap.descricao,
          recomendacao: ap.recomendacao,
        }));
        await supabase.from('apontamentos').insert(aps);
      }

      // 5) Geração automática do FORM-GQ-0047 preenchido (XLSX com formatação preservada)
      //    Fica anexado ao parecer e disponível para download direto na tela de resultado.
      //    Passa flags de OP de Reprocesso e RNC: SIM se documento anexado, N/A senão.
      try {
        const opcoes = {
          opReprocessoAnexado: !!(slots.op_reprocesso?.file || slots.op_reprocesso?.text),
          rncAnexado:          !!(slots.rnc?.file          || slots.rnc?.text),
        };
        const { xlsxBytes, stats: formStats } = await fillFormXlsxTemplate(docs.op, produto, opcoes);
        parecer._formXlsxBytes = xlsxBytes; // anexado ao parecer (não persistido no banco)
        parecer._formXlsxStats = formStats;
      } catch (e) {
        console.warn('Falha ao gerar FORM-GQ-0047 automaticamente:', e);
        parecer._formXlsxError = e?.message || String(e);
      }

      // 6) Anexar arquivos originais (apenas referências File) para uso no pacote ZIP.
      //    Não vai para o banco — removido pelo JSON.stringify replacer no save.
      parecer._slots = {
        op: slots.op?.file || null,
        rc: slots.rc?.file || null,
        form_gq_0047: slots.form_gq_0047?.file || null,
        etiqueta_externa: slots.etiqueta_externa?.file || null,
        etiqueta_acessorio: (slots.etiqueta_acessorio || []).filter(it => it.status === 'done').map(it => it.file),
        op_reprocesso: slots.op_reprocesso?.file || null,
        rnc: slots.rnc?.file || null,
      };
      // Salva também os textos extraídos no parecer_completo (JSONB) — assim
      // a re-análise consegue re-rodar com texto do slot que NÃO foi corrigido
      // sem precisar do arquivo original. Decisão 17/06/2026.
      parecer.slots_text = {
        op: slots.op?.text || '',
        rc: slots.rc?.text || '',
        form_gq_0047: slots.form_gq_0047?.text || '',
        etiqueta_externa: slots.etiqueta_externa?.text || '',
        etiqueta_acessorio: (slots.etiqueta_acessorio || []).filter(it => it.status === 'done').map(it => it.text),
        op_reprocesso: slots.op_reprocesso?.text || '',
        rnc: slots.rnc?.text || '',
      };

      // 7) Upload dos arquivos ORIGINAIS pro Storage (decisão 19/06/2026)
      //    Permite re-análises com docs originais preservados + download do pacote
      //    pelo Histórico depois de qualquer tempo. Best-effort: se falhar, não
      //    quebra a análise — só perde a capacidade de re-baixar do histórico.
      if (analise?.id) {
        try {
          const aId = analise.id;
          const arquivos = {};
          const safeName = (s) => (s || 'arquivo').replace(/[^\w\d.\-]+/g, '_');
          const uploadOriginal = async (slotKey, file) => {
            if (!file || !file.name) return null;
            const path = `${aId}/originais/${slotKey}_${safeName(file.name)}`;
            const { error } = await supabase.storage
              .from('pacotes-analise')
              .upload(path, file, { upsert: true });
            if (error) { console.warn('Upload origem falhou:', slotKey, error?.message); return null; }
            return { path, filename: file.name };
          };
          // FORM virtual (XLSX bytes gerados) — também sobe
          if (parecer._formXlsxBytes) {
            const formName = `FORM-GQ-0047_${parecer.produto?.numero_op || 'semOP'}.xlsx`;
            const path = `${aId}/originais/form_gerado_${formName}`;
            const { error } = await supabase.storage
              .from('pacotes-analise')
              .upload(path, parecer._formXlsxBytes, {
                upsert: true,
                contentType: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet',
              });
            if (!error) arquivos.form_gerado_xlsx = { path, filename: formName };
          }
          // Slots originais (em paralelo)
          const [op, rc, form_manual, et, opRep, rnc, ...etAcs] = await Promise.all([
            uploadOriginal('op', slots.op?.file),
            uploadOriginal('rc', slots.rc?.file),
            uploadOriginal('form_gq_0047', slots.form_gq_0047?.file),
            uploadOriginal('etiqueta_externa', slots.etiqueta_externa?.file),
            uploadOriginal('op_reprocesso', slots.op_reprocesso?.file),
            uploadOriginal('rnc', slots.rnc?.file),
            ...(slots.etiqueta_acessorio || [])
              .filter(it => it.status === 'done')
              .map((it, i) => uploadOriginal(`etiqueta_acessorio_${i}`, it.file)),
          ]);
          arquivos.op = op;
          arquivos.rc = rc;
          arquivos.form_gq_0047 = form_manual;
          arquivos.etiqueta_externa = et;
          arquivos.op_reprocesso = opRep;
          arquivos.rnc = rnc;
          arquivos.etiqueta_acessorio = etAcs.filter(Boolean);

          parecer.arquivos_originais = arquivos;
          // Persiste o mapeamento em parecer_completo para a histórico ler depois
          const parecerAtualizado = JSON.parse(JSON.stringify(parecer, (key, value) => {
            if (typeof key === 'string' && key.startsWith('_')) return undefined;
            if (value instanceof Uint8Array) return undefined;
            return value;
          }));
          await supabase.from('analises').update({ parecer_completo: parecerAtualizado }).eq('id', aId);
        } catch (e) {
          console.warn('Falha ao salvar arquivos originais no Storage:', e);
        }
      }

      return parecer;
    }

    /* ====================================================================
       BUSCAR OPs FINALIZADAS PENDENTES (Fase 0)
       Importa o relatório .xlsx exportado do Sapiens (consulta "movimentos de
       O.P. com Inspeção pendente (SGQ)"), extrai os números de OP, cruza com as
       análises já feitas e lista as pendentes. Clicar numa OP abre a Nova Análise.
       Observação: o Sapiens exporta um OOXML "torto" (usa "\" nos nomes internos
       do zip), então lemos a planilha manualmente via JSZip.
       ==================================================================== */
    function BuscarOPsPendentes({ onSelecionar, onNovaAvulsa }) {
      const toast = useToast();
      const { perfil } = usePerm();
      const inputRef = useRef();
      const [carregando, setCarregando] = useState(false);
      const [busca, setBusca] = useState('');
      const [soPendentes, setSoPendentes] = useState(false);
      const [itens, setItens] = useState([]);            // worklist do BANCO: [{ op, added_at }]
      const [analisesMap, setAnalisesMap] = useState(new Map()); // op(norm) -> análise mais recente
      const [fileName, setFileName] = useState('');
      const normOp = (v) => String(v || '').replace(/\D/g, '');

      // Carrega a worklist do BANCO (persiste a F5) + status das análises. Remove da fila
      // as OPs (re)analisadas DEPOIS de entrarem na lista (análise.created_at > added_at).
      const carregar = useCallback(async () => {
        const [wlRes, anRes] = await Promise.all([
          supabase.from('worklist_ops').select('op, added_at').order('added_at', { ascending: true }),
          supabase.from('analises').select('numero_op, numero_serie, status, created_at, id').order('created_at', { ascending: false }),
        ]);
        const mapa = new Map();
        for (const a of (anRes.data || [])) { const k = normOp(a.numero_op); if (k && !mapa.has(k)) mapa.set(k, a); }
        const manter = [], remover = [];
        for (const w of (wlRes.data || [])) {
          const a = mapa.get(normOp(w.op));
          if (a && a.created_at && w.added_at && new Date(a.created_at) > new Date(w.added_at)) remover.push(w.op);
          else manter.push(w);
        }
        if (remover.length) { try { await supabase.from('worklist_ops').delete().in('op', remover); } catch (e) { /* ignora */ } }
        setAnalisesMap(mapa);
        setItens(manter);
      }, []);
      useEffect(() => { carregar(); }, [carregar]);
      useRealtime('analises', () => carregar());
      useRealtime('worklist_ops', () => carregar());

      const parseXlsxSapiens = async (file) => {
        const buf = await file.arrayBuffer();
        const zip = await JSZip.loadAsync(buf);
        const nome = Object.keys(zip.files).find((n) => /sheet1\.xml$/i.test(n)) || Object.keys(zip.files).find((n) => /sheet\d+\.xml$/i.test(n));
        if (!nome) throw new Error('Formato inesperado (não achei a planilha interna).');
        const xml = await zip.file(nome).async('string');
        const rowsM = xml.match(/<row[\s\S]*?<\/row>/g) || [];
        const ops = [];
        for (const rw of rowsM) {
          const cells = rw.match(/<c\b[^>]*>[\s\S]*?<\/c>|<c\b[^>]*\/>/g) || [];
          for (const c of cells) {
            const refM = c.match(/r="([A-Z]+)\d+"/);
            if (!refM || refM[1] !== 'B') continue; // coluna B = O.P.
            const vM = c.match(/<v>([\s\S]*?)<\/v>/) || c.match(/<t[^>]*>([\s\S]*?)<\/t>/);
            if (!vM) continue;
            const n = parseInt(String(vM[1]).replace(/\D/g, ''), 10);
            if (n >= 1000 && n <= 999999) ops.push(String(n));
          }
        }
        return [...new Set(ops)];
      };

      const importar = async (file) => {
        if (!file) return;
        setCarregando(true);
        try {
          const ops = await parseXlsxSapiens(file);
          if (!ops.length) { toast.error('Nenhuma OP encontrada. Confirme se é o relatório de OPs do Sapiens.'); return; }
          // Único critério de exclusão: OP já presente na lista (duplicata).
          const jaNaLista = new Set(itens.map((i) => normOp(i.op)));
          const novas = [], duplicadas = [];
          for (const op of ops) { (jaNaLista.has(normOp(op)) ? duplicadas : novas).push(normOp(op)); }
          const novasUnicas = [...new Set(novas)];
          if (novasUnicas.length) {
            const rows = novasUnicas.map((op) => ({ op, added_at: new Date().toISOString(), added_by: perfil?.email || null }));
            const { error } = await supabase.from('worklist_ops').upsert(rows, { onConflict: 'op', ignoreDuplicates: true });
            if (error) throw error;
          }
          setFileName(file.name);
          await carregar();
          const partes = [`${novasUnicas.length} OP(s) adicionada(s)`];
          if (duplicadas.length) partes.push(`${duplicadas.length} duplicada(s) ignorada(s) (já estavam na lista)`);
          toast.success(partes.join(' · ') + '.', { duration: 9000 });
          registrarLog(perfil, 'buscar_ops', 'analise', file.name, `${perfil?.nome_completo || perfil?.email || 'Usuário'} importou OPs finalizadas: ${novasUnicas.length} adicionada(s), ${duplicadas.length} duplicada(s) ignorada(s)`);
        } catch (e) { toast.error('Erro ao ler a planilha: ' + (e?.message || e)); }
        finally { setCarregando(false); }
      };

      const removerOp = async (op) => { setItens((prev) => prev.filter((x) => x.op !== op)); try { await supabase.from('worklist_ops').delete().eq('op', op); } catch (e) { /* ignora */ } };
      const limparLista = async () => { setItens([]); setFileName(''); try { await supabase.from('worklist_ops').delete().not('op', 'is', null); } catch (e) { /* ignora */ } };

      const badgeDe = (a) => {
        if (!a) return { txt: 'Pendente', v: '--status-ressalva' };
        if (a.status === 'conforme') return { txt: 'Conforme', v: '--status-conforme' };
        if (a.status === 'conforme_corrigido') return { txt: 'Conforme corrigido', v: '--status-conforme' };
        if (a.status === 'nao_conforme') return { txt: 'Não conforme', v: '--status-nao-conforme' };
        if (a.status === 'ressalva') return { txt: 'Ressalva', v: '--status-ressalva' };
        return { txt: a.status || 'Pendente', v: '--status-ressalva' };
      };
      const linhas = itens.map((w) => ({ op: w.op, a: analisesMap.get(normOp(w.op)) || null }));
      const filtradas = linhas.filter((l) => {
        if (soPendentes && l.a) return false; // pendente = sem análise
        if (busca && !l.op.includes(busca.replace(/\D/g, ''))) return false;
        return true;
      });

      return (
        <div>
          <PageHeader
            title="Buscar OPs finalizadas"
            description="Importe o relatório de OPs do Sapiens. OPs já presentes na lista são ignoradas ao reimportar. O status de cada OP é atualizado automaticamente; você remove da lista o que quiser (o X ao lado)."
            actions={
              <div className="flex items-center gap-2 flex-wrap">
                <input ref={inputRef} type="file" accept=".xlsx,.xls" className="hidden" onChange={(e) => { if (e.target.files[0]) importar(e.target.files[0]); e.target.value = ''; }} />
                <Button variant="outline" onClick={() => inputRef.current?.click()} disabled={carregando}>
                  {carregando ? (<><Icon name="loader" className="h-4 w-4 animate-spin" />Lendo…</>) : (<><Icon name="upload" className="h-4 w-4" />Importar planilha do Sapiens</>)}
                </Button>
                <Button onClick={onNovaAvulsa}><Icon name="plus" className="h-4 w-4" />Nova análise avulsa</Button>
              </div>
            }
          />
          <DropZone
            onFiles={(arqs) => { if (carregando) return; const f = arqs.find((x) => /\.(xlsx|xls)$/i.test(x.name)) || arqs[0]; if (f) importar(f); }}
            disabled={carregando}
            className="block rounded-lg transition-colors"
          >
          {itens.length === 0 ? (
            <Card>
              <CardContent className="py-10 text-center text-sm text-muted-foreground space-y-2">
                <div>Nenhuma OP pendente na lista.</div>
                <div className="text-xs text-accent">Você também pode arrastar a planilha do Sapiens para esta área.</div>
                <div className="max-w-xl mx-auto text-xs">
                  No Sapiens, abra <strong>“Consulta de movimentos de O.P. com Inspeção pendente (SGQ)”</strong>, filtre Origem 070 / Estágio 60 / a data desejada, clique em <strong>Mostrar</strong>, e exporte o relatório (botão direito → extrair). Depois importe o .xlsx aqui.
                </div>
                <div className="pt-2"><Button variant="outline" size="sm" onClick={() => inputRef.current?.click()}><Icon name="upload" className="h-4 w-4" />Importar planilha</Button></div>
              </CardContent>
            </Card>
          ) : (
            <Card>
              <CardHeader>
                <div className="flex items-center gap-3 flex-wrap">
                  <label className="flex items-center gap-2 text-sm cursor-pointer select-none">
                    <input type="checkbox" checked={soPendentes} onChange={(e) => setSoPendentes(e.target.checked)} className="h-4 w-4" />
                    Mostrar só pendentes
                  </label>
                  <Input value={busca} onChange={(e) => setBusca(e.target.value)} placeholder="Buscar OP…" className="max-w-[160px]" />
                  <span className="text-xs text-muted-foreground">{fileName}</span>
                  <Button variant="ghost" size="sm" onClick={limparLista} title="Limpar toda a lista importada"><Icon name="trash" className="h-3.5 w-3.5" />Limpar lista</Button>
                  <span className="text-xs text-muted-foreground ml-auto">{filtradas.length} de {linhas.length} OP(s)</span>
                </div>
              </CardHeader>
              <CardContent>
                <div className="rounded-md border divide-y max-h-[62vh] overflow-y-auto">
                  {filtradas.map(({ op, a }) => {
                    const b = badgeDe(a);
                    return (
                      <div key={op} className="flex items-center justify-between gap-3 p-3">
                        <div className="flex items-center gap-3 min-w-0 flex-wrap">
                          <span className="font-mono font-semibold">OP {op}</span>
                          <span className="text-[10px] font-semibold px-2 py-0.5 rounded-full" style={{ backgroundColor: `hsl(var(${b.v}) / 0.15)`, color: `hsl(var(${b.v}))` }}>{b.txt}</span>
                          {a?.numero_serie && <span className="text-xs text-muted-foreground">{a.numero_serie}</span>}
                          {a?.created_at && <span className="text-xs text-muted-foreground">· analisada em {new Date(a.created_at).toLocaleDateString('pt-BR')}</span>}
                        </div>
                        <div className="flex items-center gap-1">
                          <Button size="sm" variant={a ? 'outline' : 'default'} onClick={() => onSelecionar(op)}>
                            <Icon name="search" className="h-3.5 w-3.5" />{a ? 'Reanalisar' : 'Analisar'}
                          </Button>
                          <Button size="sm" variant="ghost" onClick={() => removerOp(op)} title="Remover da lista"><Icon name="x" className="h-3.5 w-3.5" /></Button>
                        </div>
                      </div>
                    );
                  })}
                  {filtradas.length === 0 && <div className="p-4 text-sm text-muted-foreground text-center">Nenhuma OP com esse filtro.</div>}
                </div>
              </CardContent>
            </Card>
          )}
          </DropZone>
        </div>
      );
    }

    function AnalisePage() {
      const toast = useToast();
      const { perfil: usuarioAtual } = usePerm();
      const [slots, setSlots] = useState({
        op: null,
        rc: null,
        form_gq_0047: null,
        etiqueta_externa: null,
        etiqueta_acessorio: [],
        op_reprocesso: null,
        rnc: null,
      });
      const [previewing, setPreviewing] = useState(null);
      const [prefilling, setPrefilling] = useState(null); // { kind: 'op'|'form', content: {...}, loading?: bool }
      const [analyzing, setAnalyzing] = useState(false);
      const folderInputRef = useRef(null);        // input escondido p/ envio de pasta inteira
      const [classificandoPasta, setClassificandoPasta] = useState(false);
      const [parecer, setParecer] = useState(null); // resultado da análise
      // Etapa: 'buscar' (lista de OPs finalizadas pendentes, a partir do xlsx do Sapiens)
      // ou 'nova' (tela de upload/nova análise). Pode-se pular direto para 'nova'.
      const [etapa, setEtapa] = useState('buscar');
      const [opSelecionada, setOpSelecionada] = useState(null); // OP escolhida na lista (só informativo)

      // Gera o pré-preenchimento ANOTANDO o PDF original.
      // Para OP: ✓ em cada [ ] e data da conciliação ao lado de cada label "Data" na última página.
      // Para FORM: ✓ na coluna SIM ou N/A de cada item, conforme Ficha Mestre.
      // Retorna um Blob URL que é exibido em iframe no PrefillModal e pode ser baixado.
      async function openPrefill(kind) {
        setPrefilling({ kind, loading: true });
        try {
          // Identificar produto e parsear OP
          const corpus = [
            slots.op?.text || '',
            slots.rc?.text || '',
            slots.form_gq_0047?.text || '',
            slots.etiqueta_externa?.text || '',
            ...(slots.etiqueta_acessorio || []).filter((it) => it.status === 'done').map((it) => it.text),
          ].join('\n\n');
          const produtos = await loadProdutosComFichas();
          const opParsed = parseOP(slots.op?.text || '');
          const ident = detectarProdutoNoTexto(corpus, produtos, opParsed?.derivacao);
          const produto = ident?.produto || null;

          if (kind === 'form') {
            // FORM-GQ-0047 — preenchido em XLSX a partir do template oficial Rev. 8.
            // Lê do estado atual dos slots se OP de Reprocesso/RNC foram anexados.
            const opcoes = {
              opReprocessoAnexado: !!(slots.op_reprocesso?.file || slots.op_reprocesso?.text),
              rncAnexado:          !!(slots.rnc?.file          || slots.rnc?.text),
            };
            const { xlsxBytes, stats } = await fillFormXlsxTemplate(opParsed, produto, opcoes);
            const blob = new Blob([xlsxBytes], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
            const blobUrl = URL.createObjectURL(blob);
            const filename = `FORM-GQ-0047_${(opParsed?.op || 'semOP')}_${(produto?.modelo || 'produto').replace(/[^\w\d-]+/g, '_')}_${new Date().toISOString().slice(0, 10)}.xlsx`;
            setPrefilling({ kind, loading: false, blobUrl, blob, filename, stats, produto, opParsed, isXlsx: true });
            return;
          }

          // OP — continua sendo PDF anotado (✓ verde nos colchetes de inspeção)
          const sourceFile = slots.op?.file;
          if (!sourceFile) throw new Error('Arquivo de origem da OP não encontrado.');
          const { pdfBytes, stats } = await annotatePdfPreserveOriginal(sourceFile, { kind, opParsed, produto });
          const blob = new Blob([pdfBytes], { type: 'application/pdf' });
          const blobUrl = URL.createObjectURL(blob);
          const filename = `PrePreench_OP_${(opParsed?.op || 'semOP')}_${(produto?.modelo || 'produto').replace(/[^\w\d-]+/g, '_')}_${new Date().toISOString().slice(0, 10)}.pdf`;
          setPrefilling({ kind, loading: false, blobUrl, blob, filename, stats, produto, opParsed, isXlsx: false });
        } catch (e) {
          console.error(e);
          toast.error('Não foi possível gerar o pré-preenchimento. ' + (e?.message || ''));
          setPrefilling(null);
        }
      }

      // FORM-GQ-0047 NÃO está mais nos obrigatórios — a plataforma gera ele do template oficial
      // embutido e o pré-preenche automaticamente a partir da Ficha Mestre + OP. Se o usuário
      // ainda quiser subir um FORM já preenchido manualmente, o upload continua disponível
      // como opcional (caminho de fallback / auditoria comparativa).
      const obrigatorios = ['op', 'rc', 'etiqueta_externa'];
      const allObrigatoriosOk = obrigatorios.every((k) => slots[k]?.status === 'done');
      const anyExtracting =
        Object.values(slots).some((v) => v && !Array.isArray(v) && v.status === 'extracting') ||
        slots.etiqueta_acessorio.some((it) => it.status === 'extracting');

      // ============== PREVIEW DO FORM-GQ-0047 ==============
      // Assim que a OP é processada, geramos o FORM preenchido em background
      // para que o usuário possa visualizar/baixar ANTES de clicar em "Analisar lote".
      // Estado: null | { loading: true } | { bytes, stats, filename, produto }
      const [formPreview, setFormPreview] = useState(null);

      async function tryGenerateFormPreview(opText) {
        if (!opText) return;
        setFormPreview({ loading: true });
        try {
          const opParsed = parseOP(opText);
          if (!opParsed?.op && !opParsed?.serie) {
            setFormPreview({ error: 'Não foi possível parsear a OP — confira se o arquivo é a OP correta do Sapiens.' });
            return;
          }
          const produtos = await loadProdutosComFichas();
          const ident = detectarProdutoNoTexto(opText, produtos, opParsed?.derivacao);
          const produto = ident?.produto || null;
          if (!produto) {
            setFormPreview({
              error: `Produto não identificado na OP (código Sapiens "${opParsed?.codigoSapiens || '?'}", modelo "${opParsed?.modelo || '?'}", derivação "${opParsed?.derivacao || '?'}"). Cadastre o produto no menu Cadastro → Catálogo antes de analisar lotes desse produto.`,
