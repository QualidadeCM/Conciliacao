</body></html>`;
      }

      // Baixar PACOTE COMPLETO em ZIP — todos os documentos do lote organizados em uma pasta
      // ZIP chamada OP_<numeroop>_<numeroserie>, ex.: OP_6819_LEDT-20261-6.zip
      //
      // Política de formatos:
      //   · OP: PDF anotado com ✓ verde nos colchetes (pdf-lib, sem restrição → assinável)
      //   · FORM-GQ-0047: XLSX preenchido → CONVERTIDO para PDF via CloudConvert (assinável)
      //   · Etiqueta Externa e Etiquetas de Acessórios: DOCX original (Word não vai para PDF)
      //   · RC, OP Reprocesso, RNC: PDF original (já vem assim do Sapiens)
      //   · Parecer: TXT com sumário executivo
      // Lazy-load dos arquivos originais do Storage para slots faltantes em _slots.
      // Usado quando ParecerView é aberto a partir do Histórico (sem files em memória)
      // ou após re-análise (slots que não foram corrigidos ficam null em _slots).
      // Retorna um objeto _slots populado com Blobs reais — pronto pra montar o ZIP.
      const restaurarSlotsDoStorage = async () => {
        const slotsAtuais = parecer._slots || {};
        const arqOrig = parecer.arquivos_originais || {};
        const slotsNovos = { ...slotsAtuais };
        const fetchBlob = async (ref) => {
          if (!ref?.path) return null;
          try {
            const { data, error } = await supabase.storage.from('pacotes-analise').download(ref.path);
            if (error || !data) return null;
            // Converte Blob → File para preservar o nome
            return new File([data], ref.filename || ref.path.split('/').pop(), { type: data.type });
          } catch (e) {
            console.warn('Erro restaurando do Storage:', ref?.path, e?.message);
            return null;
          }
        };
        const isFile = (f) => f && (f instanceof Blob || f.arrayBuffer);
        // Slots singulares
        for (const k of ['op', 'rc', 'form_gq_0047', 'etiqueta_externa', 'op_reprocesso', 'rnc']) {
          if (!isFile(slotsAtuais[k]) && arqOrig[k]) {
            slotsNovos[k] = await fetchBlob(arqOrig[k]);
          }
        }
        // Slot multi (acessórios)
        if ((!Array.isArray(slotsAtuais.etiqueta_acessorio) || slotsAtuais.etiqueta_acessorio.every((f) => !isFile(f))) && Array.isArray(arqOrig.etiqueta_acessorio)) {
          slotsNovos.etiqueta_acessorio = await Promise.all(arqOrig.etiqueta_acessorio.map(fetchBlob));
          slotsNovos.etiqueta_acessorio = slotsNovos.etiqueta_acessorio.filter(Boolean);
        }
        // FORM XLSX bytes (gerado pela plataforma). Devolvemos no objeto retornado
        // (slotsNovos._formXlsxBytes) para uso IMEDIATO no mesmo tick — o setParecer
        // é assíncrono e não reflete no closure atual, o que fazia o FORM-GQ-0047
        // sumir do pacote quando baixado pelo Histórico (correção 06/07/2026).
        slotsNovos._formXlsxBytes = parecer._formXlsxBytes || null;
        if (!slotsNovos._formXlsxBytes && arqOrig.form_gerado_xlsx?.path) {
          try {
            const { data } = await supabase.storage.from('pacotes-analise').download(arqOrig.form_gerado_xlsx.path);
            if (data) {
              const buf = new Uint8Array(await data.arrayBuffer());
              slotsNovos._formXlsxBytes = buf;
              setParecer((p) => ({ ...p, _formXlsxBytes: buf }));
            }
          } catch (e) {
            console.warn('FORM XLSX bytes não restaurado:', e?.message);
          }
        }
        // Atualiza _slots no estado
        setParecer((p) => ({ ...p, _slots: slotsNovos }));
        return slotsNovos;
      };

      const handleDownloadZip = async () => {
        if (!window.JSZip) { alert('JSZip não carregou. Recarregue a página (Ctrl+F5).'); return; }
        setZipBuilding(true);
        try {
        // Lazy-load arquivos originais do Storage (necessário quando vier de Histórico
        // ou de Re-análise onde slots não corrigidos ficam null). Decisão 19/06/2026.
        setZipStage('Carregando arquivos originais do Storage…');
        const slots = await restaurarSlotsDoStorage();
        const zip = new window.JSZip();
        const folder = zip.folder(packBaseName);
        let warnings = [];

        // 1) FORM-GQ-0047 — converte XLSX para PDF (assinável no Adobe).
        //    Usa os bytes devolvidos por restaurarSlotsDoStorage (slots._formXlsxBytes),
        //    garantindo o FORM no pacote também quando baixado pelo Histórico.
        const formXlsxBytes = slots._formXlsxBytes || parecer._formXlsxBytes;
        if (formXlsxBytes) {
          setZipStage('Convertendo FORM-GQ-0047 para PDF (CloudConvert — 10-30s)…');
          try {
            const pdfBytes = await convertToPdf(
              formXlsxBytes,
              `FORM-GQ-0047_${opNum}_${serieStr}.xlsx`,
              'xlsx'
            );
            folder.file(`FORM-GQ-0047_${opNum}_${serieStr}.pdf`, pdfBytes);
          } catch (e) {
            console.warn('Falha ao converter FORM para PDF, mantendo XLSX no pacote:', e);
            warnings.push('FORM-GQ-0047 não pôde ser convertido para PDF (' + (e?.message || 'erro') + '). Mantido como XLSX no pacote.');
            folder.file(`FORM-GQ-0047_${opNum}_${serieStr}.xlsx`, formXlsxBytes);
          }
        }

        // 2) OP anotada com ✓ verde nos colchetes + RE-CONVERSÃO via CloudConvert.
        //    A re-conversão é ESSENCIAL: o PDF do Sapiens vem com restrições embutidas
        //    que bloqueiam assinatura/edição no Adobe Acrobat. O pdf-lib só sobrepõe
        //    as anotações de ✓, sem remover as restrições. Passando pelo CloudConvert
        //    (optimize/qpdf), o PDF é regenerado SEM restrições e fica assinável.
        const isFileForOp = (f) => f && typeof f === 'object' && (f instanceof Blob || f.arrayBuffer);
        if (isFileForOp(slots.op)) {
          setZipStage('Anotando OP com ✓ verde nos colchetes…');
          let opPdfBytes = null;
          try {
            const { pdfBytes } = await annotatePdfPreserveOriginal(slots.op, {
              kind: 'op',
              opParsed: { serie: parecer.produto?.numero_serie, dataConciliacao: parecer.produto?.data_conciliacao || null, op: parecer.produto?.numero_op },
              produto: null,
            });
            opPdfBytes = pdfBytes;
          } catch (e) {
            console.warn('Falha ao anotar OP, usando original:', e);
            opPdfBytes = new Uint8Array(await slots.op.arrayBuffer());
            warnings.push('OP não pôde ser anotada com ✓ — versão original será incluída.');
          }

          // Re-conversão para remover restrições do Sapiens e habilitar assinatura
          setZipStage('Removendo restrições da OP para permitir assinatura no Adobe (CloudConvert — 10-30s)…');
          try {
            const opCleanPdf = await convertToPdf(
              opPdfBytes,
              `OP_${opNum}_${serieStr}.pdf`,
              'pdf'
            );
            folder.file(`OP_${opNum}_${serieStr}_preenchida.pdf`, opCleanPdf);
          } catch (e) {
            console.warn('Falha ao re-converter OP (restrições podem persistir):', e);
            warnings.push('OP não pôde ser re-convertida via CloudConvert (' + (e?.message || 'erro') + '). Versão anotada incluída — pode haver restrições do Sapiens que bloqueiam assinatura no Adobe.');
            folder.file(`OP_${opNum}_${serieStr}_preenchida.pdf`, opPdfBytes);
          }
        }

        // 3) Documentos originais — mantidos no formato original (não convertidos).
        //    Defensivo: re-análises podem ter arquivos null porque os dados vieram só
        //    do texto extraído (sem o File). Pula null/undefined silenciosamente.
        const isFile = (f) => f && typeof f === 'object' && (f instanceof Blob || f.arrayBuffer || f.size != null);
        if (isFile(slots.rc)) folder.file(`RC_${opNum}.pdf`, slots.rc);
        if (isFile(slots.etiqueta_externa)) folder.file(`Etiqueta_Externa_${modeloStr}.docx`, slots.etiqueta_externa);
        if (Array.isArray(slots.etiqueta_acessorio) && slots.etiqueta_acessorio.length > 0) {
          const acsFolder = folder.folder('Etiquetas_Acessorios');
          const nomesUsados = {}; // nome-base → quantas vezes já usado
          slots.etiqueta_acessorio.forEach((f, i) => {
            if (!isFile(f)) return; // pula entradas null (re-análise sem arquivo)
            // Mantém o nome ORIGINAL da etiqueta (com espaços/acentos), neutralizando
            // apenas os caracteres inválidos em nome de arquivo do Windows (< > : " / \ | ? *).
            const base = (f.name || `acessorio_${i + 1}.docx`).replace(/[<>:"/\\|?*\x00-\x1f]/g, '_');
            const jaUsado = nomesUsados[base] || 0;
            nomesUsados[base] = jaUsado + 1;
            let nome = base;
            if (jaUsado > 0) { // colisão de nome → sufixo numérico antes da extensão
              const dot = base.lastIndexOf('.');
              nome = dot > 0 ? `${base.slice(0, dot)} (${jaUsado})${base.slice(dot)}` : `${base} (${jaUsado})`;
            }
            acsFolder.file(nome, f);
          });
        }
        if (isFile(slots.op_reprocesso)) folder.file(`OP_Reprocesso_${opNum}.pdf`, slots.op_reprocesso);
        if (isFile(slots.rnc)) folder.file(`RNC_${opNum}.pdf`, slots.rnc);

        // 4) FORM-GQ-0047 manualmente preenchido (se foi anexado para validação cruzada)
        if (isFile(slots.form_gq_0047)) {
          folder.file(`FORM-GQ-0047_${opNum}_manual.pdf`, slots.form_gq_0047);
        }

        // 5) Resumo da Análise em PDF — gerado HTML → convertido em PDF via CloudConvert
        //    (substitui o antigo Parecer.txt por um relatório visual respeitando o design system)
        setZipStage('Gerando Resumo da Análise em PDF (CloudConvert — 10-30s)…');
        try {
          const html = gerarResumoHTML(parecer);
          const htmlBytes = new TextEncoder().encode(html);
          const resumoPdf = await convertToPdf(
            htmlBytes,
            `Resumo_Analise_${packBaseName}.html`,
            'html'
          );
          folder.file(`Resumo_Analise_${packBaseName}.pdf`, resumoPdf);
        } catch (e) {
          console.warn('Falha ao gerar Resumo PDF, caindo em fallback TXT:', e);
          warnings.push('Resumo da Análise não pôde ser convertido para PDF (' + (e?.message || 'erro') + '). Versão em TXT incluída como fallback.');
          // Fallback: TXT simples
          const sumario = [
            `Análise de Conciliação · ${packBaseName}`,
            ``,
            `Produto: ${parecer.produto?.nome || '—'} · ${parecer.produto?.modelo || '—'}`,
            `Série/Lote: ${parecer.produto?.numero_serie || '—'}`,
            `OP: ${parecer.produto?.numero_op || '—'}`,
            `Data da conciliação: ${parecer.produto?.data_conciliacao || '—'}`,
            ``,
            `Resultado: ${(parecer.resultado_geral || '').toUpperCase()}`,
            ``,
            `Parecer:`,
            parecer.parecer_resumo || '',
            ``,
            parecer.parecer_tecnico || '',
          ].join('\n');
          folder.file(`Resumo_Analise_${packBaseName}.txt`, sumario);
        }

        // Avisos (se houver) no pacote
        if (warnings.length > 0) {
          folder.file('_AVISOS.txt', 'Avisos durante a geração do pacote:\n\n' + warnings.map((w, i) => `${i+1}. ${w}`).join('\n'));
        }

        // 6) Gerar e baixar
        setZipStage('Empacotando ZIP…');
        const blob = await zip.generateAsync({ type: 'blob' });
        const fileName = `${packBaseName}.zip`;
        // Grava na pasta configurada (Configurações) através do SERVIÇO LOCAL — que tem
        // acesso real ao filesystem (o navegador não consegue no drive de rede). Se a
        // pasta não estiver configurada ou o serviço falhar, cai no download padrão.
        let salvouViaServico = false;
        let destPathCfg = (localStorage.getItem('confiance_pasta_destino') || '').trim();
        let porMesCfg = localStorage.getItem('confiance_pasta_por_mes') === 'true';
        // Se este navegador não tem a pasta em cache, busca a config COMPARTILHADA no banco
        // (definida uma vez pelo admin em Configurações — vale para todos os usuários).
        if (!destPathCfg) {
          try {
            const { data } = await supabase.from('config_app').select('chave, valor').in('chave', ['pasta_destino', 'pasta_por_mes']);
            const map = Object.fromEntries((data || []).map((r) => [r.chave, r.valor]));
            destPathCfg = (map.pasta_destino || '').trim();
            porMesCfg = map.pasta_por_mes === 'true';
          } catch (e) { /* segue sem config */ }
        }
        // Opção: gravar dentro da subpasta do mês corrente (ex.: ...\Pendente de Assinatura\JULHO)
        if (destPathCfg && porMesCfg) {
          const MESES = ['JANEIRO', 'FEVEREIRO', 'MARÇO', 'ABRIL', 'MAIO', 'JUNHO', 'JULHO', 'AGOSTO', 'SETEMBRO', 'OUTUBRO', 'NOVEMBRO', 'DEZEMBRO'];
          destPathCfg = destPathCfg.replace(/[\\/]+$/, '') + '\\' + MESES[new Date().getMonth()];
        }
        if (CONVERSAO_PDF_LOCAL && destPathCfg) {
          try {
            setZipStage('Salvando o pacote na pasta (serviço)…');
            const base = CONVERSAO_PDF_LOCAL.replace(/\/converter-pdf$/, '');
            const resp = await fetch(base + '/salvar-pacote', {
              method: 'POST',
              headers: { 'Content-Type': 'application/octet-stream', 'X-Dest-Path': destPathCfg, 'X-Filename': fileName, 'X-Extract': 'true' },
              body: blob,
            });
            if (resp.ok) {
              const j = await resp.json().catch(() => ({}));
              salvouViaServico = true;
              toast.success(`Pacote salvo em: ${j.caminho || (destPathCfg + '\\' + fileName)}`, { duration: 8000 });
            } else {
              const j = await resp.json().catch(() => ({}));
              toast.error('Falha ao salvar na pasta pelo serviço: ' + (j.error || ('HTTP ' + resp.status)) + '. Baixando pelo navegador.', { duration: 10000 });
            }
          } catch (e) {
            toast.error('Serviço de salvamento indisponível — baixando pelo navegador.', { duration: 8000 });
          }
        }
        if (!salvouViaServico) triggerDownload(blob, fileName);
        registrarLog(usuarioAtual, 'baixar_pacote', 'analise', `OP ${opNum}${serieStr ? ' / ' + serieStr : ''}`, `${usuarioAtual?.nome_completo || usuarioAtual?.email || 'Usuário'} baixou o pacote da OP ${opNum}`);

        // 7) Em paralelo: faz upload do ZIP pro Storage e salva o caminho na
        //    análise — permite re-download do Histórico sem regenerar (decisão 18/06/2026)
        // Usa o id da análise ATUAL do parecer (após reanálise, o parecer é a nova
        // análise conforme — é NELA que o pacote deve ser marcado, senão o Histórico
        // mostra a nova análise como "pendente de download").
        const aidPacote = parecer?._analiseId || analiseId;
        if (aidPacote) {
          try {
            setZipStage('Salvando pacote no banco…');
            const aId = aidPacote;
            const path = `${aId}/${fileName}`;
            const { error: upErr } = await supabase.storage
              .from('pacotes-analise')
              .upload(path, blob, {
                contentType: 'application/zip',
                upsert: true,
              });
            if (upErr) {
              // Diagnóstico amigável dos dois erros mais comuns
              const msg = String(upErr.message || upErr);
              if (/bucket.*not.*found|not.*exist/i.test(msg)) {
                alert('Aviso: o pacote foi baixado, mas o bucket "pacotes-analise" não existe no Supabase. Rode migration-pacote-zip-storage.sql no Supabase Studio para que o histórico mantenha o pacote como backup.');
              } else {
                alert('Aviso: o pacote foi baixado, mas falhou ao salvar no banco como backup: ' + msg);
              }
              throw upErr;
            }
            const { error: dbErr } = await supabase.from('analises').update({
              pacote_zip_path: path,
              pacote_zip_filename: fileName,
              pacote_zip_size: blob.size,
              pacote_zip_uploaded_at: new Date().toISOString(),
            }).eq('id', aId);
            if (dbErr) {
              const msg = String(dbErr.message || dbErr);
              if (/column.*pacote_zip|does not exist/i.test(msg)) {
                alert('Aviso: o pacote foi baixado, mas a coluna pacote_zip_path não existe em analises. Rode migration-pacote-zip-storage.sql no Supabase Studio.');
              } else {
                alert('Aviso: o pacote foi baixado, mas falhou ao registrar no banco: ' + msg);
              }
              throw dbErr;
            }
            // Atualiza o parecer local pra UI refletir
            setParecer((p) => ({ ...p, pacote_zip_path: path, pacote_zip_filename: fileName, pacote_zip_size: blob.size }));
          } catch (e) {
            console.warn('Falha ao salvar ZIP no Storage (download local OK):', e);
          }
        }
        } catch (e) {
          alert('Erro ao gerar pacote: ' + (e?.message || e));
        } finally {
          setZipBuilding(false);
          setZipStage('');
        }
      };

      // === Alerta de NC no Slack (PCP corrige OP; Almoxarifado corrige etiquetas) ===
      // Responsável por documento afetado:
      const responsavelPorSlot = (slotKey) => {
        if (slotKey === 'etiqueta_externa' || slotKey === 'etiqueta_acessorio') return 'Almoxarifado';
        return 'PCP'; // OP, RC, FORM, reprocesso, RNC → PCP
      };
      const [enviandoSlack, setEnviandoSlack] = useState(false);
      const [slackModal, setSlackModal] = useState(null); // { itens: [...] } — caixa editável antes de enviar
      const ncsAbertas = (parecer.apontamentos || []).filter((a) => a.severidade === 'nao_conforme');
      // Não conformidades OU ressalvas — ambas podem ter sido causadas por ficha desatualizada
      const apontAbertos = (parecer.apontamentos || []).filter((a) => a.severidade === 'nao_conforme' || a.severidade === 'ressalva');

      // Abre a caixa editável: monta, por NC, o erro, a norma, a correção imediata e a
      // ação corretiva sugerida (com detecção de reincidência entre análises).
      const abrirAlertaSlack = async () => {
        if (!ncsAbertas.length) { toast.error('Não há não conformidades para enviar.'); return; }
        setEnviandoSlack(true);
        try {
          // === Reincidência baseada no ERRO (categoria + equipamento + alvo) ===
          // Janela móvel de 30 dias + comparação com a base histórica (~12 meses
          // anteriores). Limiares configuráveis (config_app), com defaults calibrados.
          const thr = { piso: 3, incidencia: 0.03, fator: 3 };
          const reincMap = new Map();
          let equipMapRef = new Map();
          try {
            const { data: cfg } = await supabase.from('config_app').select('chave, valor').in('chave', ['reinc_piso', 'reinc_incidencia_pct', 'reinc_fator_salto']);
            const cm = Object.fromEntries((cfg || []).map((r) => [r.chave, r.valor]));
            if (cm.reinc_piso) thr.piso = parseInt(cm.reinc_piso, 10) || thr.piso;
            if (cm.reinc_incidencia_pct) thr.incidencia = (parseFloat(cm.reinc_incidencia_pct) || 3) / 100;
            if (cm.reinc_fator_salto) thr.fator = parseFloat(cm.reinc_fator_salto) || thr.fator;
          } catch (e) { /* usa defaults */ }
          try {
            const agora = Date.now();
            const D30 = 30 * 864e5, DBASE = 395 * 864e5; // base: de -395d a -30d
            const [mRes, aRes, pRes] = await Promise.all([
              supabase.from('analises').select('id, created_at, modelo, numero_op, numero_serie').order('created_at', { ascending: false }).limit(6000),
              supabase.from('apontamentos').select('analise_id, descricao, documento_afetado, severidade').in('severidade', ['nao_conforme', 'ressalva']).limit(9000),
              supabase.from('produtos').select('modelo, equipamento'),
            ]);
            equipMapRef = new Map((pRes.data || []).map((p) => [String(p.modelo || '').toLowerCase(), p.equipamento]));
            const metaById = new Map((mRes.data || []).map((m) => [m.id, m]));
            const idade = (iso) => agora - new Date(iso).getTime();
            const lotes30 = new Set(), lotesBase = new Set();
            for (const m of (mRes.data || [])) {
              const a = idade(m.created_at); const lote = `${m.numero_op || '?'}|${m.numero_serie || '?'}`;
              if (a <= D30) lotes30.add(lote); else if (a <= DBASE) lotesBase.add(lote);
            }
            const key30 = new Map(), keyBase = new Map();
            for (const ap of (aRes.data || [])) {
              const m = metaById.get(ap.analise_id); if (!m) continue;
              const a = idade(m.created_at); if (a > DBASE) continue;
              const cat = categorizarErroSlack((ap.descricao || '') + ' ' + (ap.documento_afetado || ''));
              const equip = equipMapRef.get(String(m.modelo || '').toLowerCase()) || m.modelo || '—';
              const chave = chaveReincidencia(cat, equip, extrairAlvoErro(ap.descricao, ap.documento_afetado));
              const alvoMap = a <= D30 ? key30 : keyBase;
              if (!alvoMap.has(chave)) alvoMap.set(chave, new Set());
              alvoMap.get(chave).add(ap.analise_id);
            }
            const L30 = lotes30.size || 1, LB = lotesBase.size || 1;
            for (const chave of new Set([...key30.keys(), ...keyBase.keys()])) {
              const ocorr30d = (key30.get(chave) || new Set()).size;
              const ocorrBase = (keyBase.get(chave) || new Set()).size;
              const incid30d = ocorr30d / L30;
              const base = ocorrBase / LB;
              reincMap.set(chave, { ocorr30d, ocorrBase, incid30d, base, nivel: classificarNivelReinc(ocorr30d, incid30d, base, thr), L30, LB });
            }
          } catch (e) { /* reincidência é best-effort */ }
          const equipAtual = parecer.produto?.equipamento || parecer.produto?.familia || equipMapRef.get(String(parecer.produto?.modelo || '').toLowerCase()) || parecer.produto?.modelo || '—';
          // Tenta extrair o REGISTRO CORRETO (valor de referência) da descrição — a
          // referência costuma vir após "RC", "ficha", "esperado", "correto", "deveria".
          const extrairCorreto = (desc) => {
            const pats = [
              /\bRC\s*=?\s*["']([^"']+)["']/i,
              /ficha(?:\s+mestre)?[^"'\n]{0,20}["']([^"']+)["']/i,
              /(?:esperad[oa]|correto|deveria(?:\s+ser)?)\s*[:=]?\s*["']?([^"'\n×;]{1,80}?)["']?(?=\s*[×;.,]|$)/i,
            ];
            for (const re of pats) { const m = String(desc || '').match(re); if (m && m[1]) return m[1].trim(); }
            return '';
          };
          const itens = ncsAbertas.map((ap) => {
            const { slotKey, nome } = mapApontamento(ap);
            const doc = (slotKey === 'etiqueta_acessorio' && nome) ? `Etiqueta de Acessório (${nome})` : (labelSlot[slotKey] || ap.documento_afetado || 'Documento');
            const cat = categorizarErroSlack((ap.descricao || '') + ' ' + (ap.documento_afetado || ''));
            const alvo = extrairAlvoErro(ap.descricao, ap.documento_afetado);
            const chave = chaveReincidencia(cat, equipAtual, alvo);
            const info = reincMap.get(chave) || { nivel: 'pontual', ocorr30d: 0, incid30d: 0, base: 0 };
            const reincidente = info.nivel !== 'pontual';
            const desc = String(ap.descricao || '').replace(/\s+/g, ' ').trim();
            const rec = String(ap.recomendacao || '').replace(/\s+/g, ' ').trim();
            const sep = separarRecomendacao(rec);
            const incidPct = (info.incid30d * 100).toFixed(1);
            const nivelLabel = info.nivel === 'reincidente' ? 'Reincidente' : info.nivel === 'emergente' ? 'Em alta' : info.nivel === 'possivel' ? 'Possível reincidente' : 'Pontual';
            // Slack = operacional: SÓ o que corrigir agora. Causa raiz e ação corretiva
            // saem do alerta e passam para o relatório de reincidência (aba Dashboard).
            return {
              codigo: ap.codigo || 'NC',
              doc,
              responsavel: responsavelPorSlot(slotKey),
              erro: desc,
              correto: ap.sugestao_correto || extrairCorreto(desc),
              norma: ap.referencia_normativa || '',
              correcao: sep.imediata || 'Corrigir o documento conforme o registro correto.',
              reincidente,
              nivel: info.nivel,
              nivelLabel,
              incidPct,
              // Por padrão, casos PONTUAIS já vêm desmarcados (normalmente não precisam ir ao Slack).
              enviar: info.nivel !== 'pontual',
            };
          });
          setSlackModal({ itens });
        } catch (e) { toast.error('Erro ao preparar o alerta: ' + (e?.message || e)); }
        finally { setEnviandoSlack(false); }
      };
      const setItemSlack = (idx, campo, valor) => setSlackModal((m) => ({ itens: m.itens.map((it, i) => (i === idx ? { ...it, [campo]: valor } : it)) }));

      // Envia ao Slack o conteúdo (já editado) da caixa e registra no histórico.
      const confirmarEnvioSlack = async () => {
        if (!slackModal) return;
        const p = parecer.produto || {};
        // Só envia as NCs marcadas (pontuais vêm desmarcadas por padrão).
        const itens = slackModal.itens.filter((it) => it.enviar);
        if (itens.length === 0) { toast.error('Nenhuma NC marcada para envio. Marque ao menos uma (ou cancele).'); return; }
        setEnviandoSlack(true);
        try {
          const blocos = itens.map((it) => {
            const linhas = [
              `• *${it.codigo}* — ${it.doc}  →  responsável: *${it.responsavel}*`,
              `   *O que está errado:* ${it.erro}`,
            ];
            if (it.correto) linhas.push(`   *Registro correto:* ${it.correto}`);
            if (it.norma) linhas.push(`   *Norma/legislação:* ${it.norma}`);
            linhas.push(`   *Correção imediata:* ${it.correcao}`);
            return linhas.join('\n');
          });
          const texto = [
            `:rotating_light: *NÃO CONFORMIDADE — OP ${p.numero_op || '—'} / ${p.numero_serie || '—'}* (${p.modelo || '—'})`,
            `Conferência da Qualidade identificou ${itens.length} não conformidade(s):`,
            '',
            ...blocos,
          ].join('\n\n');
          const base = CONVERSAO_PDF_LOCAL.replace(/\/converter-pdf$/, '');
          const resp = await fetch(`${base}/notificar-slack`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ texto }) });
          if (!resp.ok) { const err = await resp.json().catch(() => ({})); throw new Error(err.error || `HTTP ${resp.status}`); }
          const resumo = itens.map((it) => `${it.codigo} [${it.doc}]: ${it.erro}${it.correto ? ' | Correto: ' + it.correto : ''} | Correção: ${it.correcao}`).join(' || ');
          await registrarLog(usuarioAtual, 'notificar_slack', 'analise', `OP ${p.numero_op || '?'} / ${p.numero_serie || '?'}`, `${usuarioAtual?.nome_completo || usuarioAtual?.email || 'Usuário'} enviou alerta de NC ao Slack da OP ${p.numero_op || '?'} (${itens.length} NC). ${resumo}`);
          toast.success('Alerta enviado ao Slack.');
          setSlackModal(null);
        } catch (e) { toast.error('Falha ao enviar ao Slack: ' + (e?.message || e)); }
        finally { setEnviandoSlack(false); }
      };

      // === Atualizar a ficha mestre desatualizada e refazer a análise ===
      // Caso a NC seja um falso positivo por ficha mestre desatualizada: abre o
      // editor da ficha do equipamento (salvar gera uma nova revisão) e, ao salvar,
      // refaz a análise SEM contar como correção (tipo_reanalise='atualizacao_ficha').
      const [fichaEditorData, setFichaEditorData] = useState(null); // { ficha, produto }
      const [carregandoFicha, setCarregandoFicha] = useState(false);
      const SEL_FICHA = `*, produto:produtos(id, equipamento, modelo, codigo_referencia, codigo_sapiens, registro_anvisa), acessorios:acessorios_aplicaveis(ordem, descricao, codigo_sapiens, obrigatorio, is_fabricante_confiance, esteril, pode_sair_apenas_na_nf, grupo_alternativo)`;
      // Colaboradores identificados na OP que não estão no cadastro de operadores.
      const cadastrosPendentes = parecer.cadastros_pendentes || [];
      const [cadastrando, setCadastrando] = useState(false);
      // Cadastra os operadores/inspetores faltantes no quadro do estágio e refaz a
      // análise (sem contar como correção — vira conforme, igual ao ajuste de ficha).
      const cadastrarPendentesERefazer = async () => {
        if (!(isAdmin || can('config_editar'))) { toast.error('Sem permissão para cadastrar operadores. Peça a um administrador ou faça em Configurações → Operadores por estágio.'); return; }
        if (cadastrosPendentes.length === 0) return;
        setCadastrando(true);
        try {
          const norm = (s) => String(s || '').normalize('NFD').replace(/[̀-ͯ]/g, '').toLowerCase().replace(/\s+/g, ' ').trim();
          const { data: existentesRaw } = await supabase.from('operadores').select('*');
          const existentes = existentesRaw || [];
          const autorNome = usuarioAtual?.nome_completo || usuarioAtual?.email || null;
          for (const p of cadastrosPendentes) {
            const col = p.role === 'insp' ? 'estagios_inspecao' : 'estagios';
            const cod = (p.codigo || '').trim();
            let alvo = cod ? existentes.find((o) => String(o.codigo || '').trim() === cod) : null;
            if (!alvo) alvo = existentes.find((o) => norm(o.nome) === norm(p.nome));
            if (alvo) {
              const est = [...new Set([...((alvo[col] || []).map(Number)), p.estagio])].sort((a, b) => a - b);
              await supabase.from('operadores').update({ [col]: est, codigo: cod || alvo.codigo || null, ativo: true, updated_at: new Date().toISOString(), updated_by: autorNome }).eq('id', alvo.id);
              alvo[col] = est; alvo.ativo = true;
            } else {
              const ins = { nome: p.nome || '(sem nome)', codigo: cod || null, apelidos: [], estagios: p.role === 'op' ? [p.estagio] : [], estagios_inspecao: p.role === 'insp' ? [p.estagio] : [], ativo: true, updated_by: autorNome };
              const { data: novo } = await supabase.from('operadores').insert(ins).select().single();
              if (novo) existentes.push(novo);
            }
            await registrarLog(usuarioAtual, 'cadastrar_operador', 'operador', p.nome || '(sem nome)', `${autorNome || 'Usuário'} cadastrou ${p.nome}${cod ? ' #' + cod : ''} em ${p.role === 'insp' ? p.estagio + 'i' : 'estágio ' + p.estagio} a partir da conferência da OP`);
          }
          await handleReanalisar({ modoCadastro: true });
        } catch (e) {
          toast.error('Erro ao cadastrar operador(es): ' + (e?.message || e));
          setCadastrando(false);
        }
      };
      useEffect(() => { if (!reanalisando) setCadastrando(false); }, [parecer]);

      const abrirAtualizarFicha = async () => {
        if (!can('cadastro_fichas')) { toast.error('Você não tem permissão para editar fichas mestres.'); return; }
        setCarregandoFicha(true);
        try {
          let produtoId = null, fichaId = null;
          if (analiseId) {
            const { data: an } = await supabase.from('analises').select('produto_id, ficha_id').eq('id', analiseId).single();
            produtoId = an?.produto_id || null; fichaId = an?.ficha_id || null;
          }
          if (!fichaId && !produtoId) { toast.error('Não foi possível identificar a ficha mestre desta OP.'); return; }
          let q = supabase.from('fichas_mestres').select(SEL_FICHA);
          q = fichaId ? q.eq('id', fichaId) : q.eq('produto_id', produtoId);
          const { data: fichas, error } = await q.limit(1);
          if (error) throw error;
          const ficha = fichas && fichas[0];
          if (!ficha) { toast.error('Ficha mestre não encontrada para este equipamento.'); return; }
          setFichaEditorData({ ficha, produto: ficha.produto || null });
        } catch (e) { toast.error('Erro ao abrir a ficha: ' + (e?.message || e)); }
        finally { setCarregandoFicha(false); }
      };

      if (fichaEditorData) {
        return (
          <div className="fixed inset-0 z-50 overflow-y-auto bg-background p-4 md:p-8">
            <div className="max-w-5xl mx-auto">
              <div className="mb-3 rounded-md border border-amber-300 bg-amber-50 px-3 py-2 text-sm text-amber-900">
                Atualize a ficha mestre deste equipamento. Ao salvar, uma nova revisão é criada e a análise da OP {opNum} é <strong>refeita automaticamente</strong> — sem contar como correção.
              </div>
              <FichaMestreEditor
                ficha={fichaEditorData.ficha}
                produto={fichaEditorData.produto}
                onClose={() => setFichaEditorData(null)}
                onSaved={async () => {
                  setFichaEditorData(null);
                  await handleReanalisar({ modoFicha: true });
                }}
              />
            </div>
          </div>
        );
      }

      return (
        <div>
          {/* Banner: operador/inspetor não cadastrado (ressalva) → cadastrar e refazer */}
          {cadastrosPendentes.length > 0 && (
            <div className="no-print mb-4 rounded-md border-l-4 px-4 py-3" style={{ borderLeftColor: 'hsl(var(--status-ressalva))', backgroundColor: 'hsl(var(--status-ressalva) / 0.10)' }}>
              <div className="flex items-start justify-between gap-3 flex-wrap">
                <div className="text-sm">
                  <div className="font-semibold flex items-center gap-2"><Icon name="alertTriangle" className="h-4 w-4" style={{ color: 'hsl(var(--status-ressalva))' }} />{cadastrosPendentes.length} colaborador(es) não cadastrado(s) no quadro de operadores</div>
                  <div className="text-muted-foreground mt-0.5 text-xs">
                    {cadastrosPendentes.map((p, i) => (
                      <div key={i}><strong>{p.nome || '(sem nome)'}</strong>{p.codigo ? ` #${p.codigo}` : ''} — {p.role === 'insp' ? `inspeção ${p.estagio}i` : `estágio ${p.estagio}`}</div>
                    ))}
                  </div>
                  <div className="text-[11px] text-muted-foreground mt-1">Ao cadastrar, a análise é refeita e a ressalva vira conforme (não conta como correção).</div>
                </div>
                {(isAdmin || can('config_editar')) && (
                  <Button variant="outline" onClick={cadastrarPendentesERefazer} disabled={cadastrando || reanalisando} title="Cadastra os colaboradores no quadro do estágio/inspeção e refaz a análise.">
                    {(cadastrando || reanalisando) ? (<><Icon name="loader" className="animate-spin" />Cadastrando e refazendo…</>) : (<><Icon name="plus" />Cadastrar e refazer análise</>)}
                  </Button>
                )}
              </div>
            </div>
          )}

          {/* === ACTION BUTTONS (não imprime) === */}
          <div className="no-print mb-4 flex flex-wrap items-center justify-end gap-2">
            {apontAbertos.length > 0 && can('cadastro_fichas') && (
              <Button variant="outline" onClick={abrirAtualizarFicha} disabled={carregandoFicha} title="A NC ou ressalva é causada por ficha mestre desatualizada? Atualize a ficha (gera nova revisão) e refaça a análise — não conta como correção.">
                {carregandoFicha ? (<><Icon name="loader" className="animate-spin" />Abrindo ficha…</>) : (<><Icon name="edit" />Atualizar ficha e refazer</>)}
              </Button>
            )}
            {ncsAbertas.length > 0 && (
              <Button variant="outline" onClick={abrirAlertaSlack} disabled={enviandoSlack} title="Revisar e enviar as não conformidades para o canal do Slack (PCP e Almoxarifado)">
                {enviandoSlack ? (<><Icon name="loader" className="animate-spin" />Preparando…</>) : (<><Icon name="bell" />Enviar NC ao Slack</>)}
              </Button>
            )}
            {parecer._formXlsxBytes && (
              <Button variant="outline" onClick={handleDownloadForm} title="Baixar apenas o FORM-GQ-0047 preenchido em Excel">
                <Icon name="download" />FORM-GQ-0047 (Excel)
              </Button>
            )}
            {(parecer._slots || parecer.arquivos_originais) && can('historico_baixar') && (
              <Button
                variant="default"
                onClick={canDownloadZip ? handleDownloadZip : undefined}
                disabled={zipBuilding || !canDownloadZip}
                title={canDownloadZip ? `Baixar pacote ZIP completo: ${packBaseName}.zip` : downloadGateMotivo}
              >
                {zipBuilding ? (
                  <>
                    <Icon name="loader" className="animate-spin" />
                    Baixando pacote da OP {opNum}…
                  </>
                ) : (
                  <>
                    <Icon name="download" />Baixar pacote da OP {opNum}
                  </>
                )}
              </Button>
            )}
            <Button variant="outline" onClick={handleExportPDF} title="Salvar este parecer como PDF">
              <Icon name="download" />Parecer em PDF
            </Button>
            {allowDelete && (
              <Button variant="ghost" onClick={onDelete} title="Excluir análise">
                <Icon name="trash" />
              </Button>
            )}
            {onBack && (
              <Button variant="outline" onClick={onBack}>
                <Icon name={backIcon} />{backLabel}
              </Button>
            )}
          </div>

          {/* Banner: docs corrigidos prontos para re-análise (decisão 17/06/2026) */}
          {(() => {
            // Desempacota docsCorrigidos em lista (acessórios contam por código)
            const itensCorrigidos = [];
            for (const k of Object.keys(docsCorrigidos)) {
              if (k === 'etiqueta_acessorio') {
                for (const cod of Object.keys(docsCorrigidos[k] || {})) {
                  const v = docsCorrigidos[k][cod];
                  if (!v || typeof v !== 'object' || !('fileName' in v)) continue; // ignora formas inesperadas
                  itensCorrigidos.push({ label: `${labelSlot[k]}${v.nome ? ' (' + v.nome + ')' : ''}`, fileName: v.fileName });
                }
              } else {
                itensCorrigidos.push({ label: labelSlot[k], fileName: docsCorrigidos[k].fileName });
              }
            }
            const itensRemovidos = [...etiquetasRemovidas];
            if (itensCorrigidos.length === 0 && itensRemovidos.length === 0) return null;
            return (
              <div className="mb-4 rounded-md border-l-4 px-4 py-3 no-print" style={{ borderLeftColor: 'hsl(var(--accent))', backgroundColor: 'hsl(var(--accent) / 0.08)' }}>
                <div className="flex items-start justify-between gap-3 flex-wrap">
                  <div className="flex items-start gap-2 flex-1 min-w-0">
                    <Icon name="upload" className="h-4 w-4 mt-0.5 shrink-0" style={{ color: 'hsl(var(--accent))' }} />
                    <div className="text-sm">
                      {itensCorrigidos.length > 0 && (
                        <>
                          <div className="font-semibold">{itensCorrigidos.length} documento(s) corrigido(s) anexado(s)</div>
                          <div className="text-muted-foreground mt-0.5">
                            {itensCorrigidos.map((it, i) => (
                              <div key={i} className="text-xs"><strong>{it.label}</strong>: {it.fileName}</div>
                            ))}
                          </div>
                        </>
                      )}
                      {itensRemovidos.length > 0 && (
                        <div className={itensCorrigidos.length > 0 ? 'mt-2' : ''}>
                          <div className="font-semibold">{itensRemovidos.length} etiqueta(s) de acessório marcada(s) para remoção</div>
                          <div className="text-muted-foreground mt-0.5 text-xs">Código(s): {itensRemovidos.join(', ')} — sairão da análise e do pacote ao refazer.</div>
                        </div>
                      )}
                    </div>
                  </div>
                  <div className="flex items-center gap-2">
