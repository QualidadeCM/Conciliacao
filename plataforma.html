    }

    /* ====================================================================
       Aba "Template FORM-GQ-0047" — gerencia o template oficial usado para
       preenchimento automático após análise. Armazenado no Supabase Storage
       (bucket "form-templates", arquivo "current.xlsx"). Se o bucket não
       tiver template, a plataforma usa a versão embutida no HTML.
       ==================================================================== */
    function TemplateFormTab() {
      const toast = useToast();
      const fileInputRef = useRef(null);
      const [status, setStatus] = useState({ loading: true });

      const load = async () => {
        setStatus({ loading: true });
        try {
          const { data: files, error } = await supabase.storage.from('form-templates').list('', { limit: 5, search: 'current' });
          if (error) throw error;
          const current = (files || []).find(f => f.name === 'current.xlsx');
          // Tenta extrair a data de aprovação do template ATIVO (do bucket ou embutido)
          let approval = null;
          try {
            approval = await _loadFormTemplateApprovalDate();
          } catch (e) { /* mantém approval=null */ }
          if (current) {
            setStatus({ loading: false, source: 'bucket', updated_at: current.updated_at || current.created_at, size: current.metadata?.size, approvalDate: approval?.date, approvalRaw: approval?.raw });
          } else {
            setStatus({ loading: false, source: 'embedded', approvalDate: approval?.date, approvalRaw: approval?.raw });
          }
        } catch (e) {
          setStatus({ loading: false, source: 'embedded', error: e?.message || 'Erro ao consultar bucket' });
        }
      };

      useEffect(() => { load(); }, []);

      // Wrapper de timeout — força rejeição de Promise se demorar demais.
      // Útil porque o Supabase SDK às vezes pendura indefinidamente quando o bucket
      // não existe ou a sessão expirou, sem retornar erro nem completar.
      const withTimeout = (promise, ms, label = 'operação') => Promise.race([
        promise,
        new Promise((_, reject) => setTimeout(() => reject(new Error(`Timeout: a ${label} demorou mais de ${ms/1000}s. Verifique sua conexão e se o bucket "form-templates" foi criado no Supabase.`)), ms)),
      ]);

      const handleUpload = async (fileOrEvent) => {
        let file;
        if (fileOrEvent && fileOrEvent.target) { file = fileOrEvent.target.files[0]; fileOrEvent.target.value = ''; }
        else { file = fileOrEvent; }
        if (!file) return;
        if (!file.name.toLowerCase().endsWith('.xlsx')) {
          toast.error('Arquivo precisa ser .xlsx');
          return;
        }
        setStatus(prev => ({ ...prev, uploading: true }));
        try {
          // 1) VALIDAÇÃO PRÉVIA do bucket (5s timeout) — falha rápido se bucket não existe
          let bucketOk = false;
          try {
            const probe = await withTimeout(
              supabase.storage.from('form-templates').list('', { limit: 1 }),
              5000,
              'verificação do bucket'
            );
            if (probe?.error) throw probe.error;
            bucketOk = true;
          } catch (probeErr) {
            const msg = String(probeErr?.message || probeErr || '');
            console.error('Bucket probe failed:', probeErr);
            if (/timeout/i.test(msg) || /bucket.*not.*found|not.*found.*bucket|does not exist|404/i.test(msg)) {
              toast.error('Bucket "form-templates" não está acessível. Verifique se você rodou a migration "migration-form-templates-bucket.sql" no Supabase SQL Editor. Depois recarregue a página (Ctrl+F5).', { duration: 20000 });
            } else {
              toast.error('Erro ao acessar o bucket: ' + msg, { duration: 12000 });
            }
            setStatus(prev => ({ ...prev, uploading: false }));
            return;
          }

          // 2) UPLOAD com timeout de 15s
          const { error } = await withTimeout(
            supabase.storage
              .from('form-templates')
              .upload('current.xlsx', file, { upsert: true, contentType: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' }),
            15000,
            'enviar template'
          );
          if (error) {
            toast.error('Erro ao enviar: ' + (error?.message || error), { duration: 12000 });
            setStatus(prev => ({ ...prev, uploading: false }));
            return;
          }
          toast.success('Template atualizado. Próximas análises vão usar a nova versão.');
          await load();
        } catch (err) {
          console.error('handleUpload error:', err);
          toast.error('Falha inesperada: ' + (err?.message || String(err)), { duration: 12000 });
          setStatus(prev => ({ ...prev, uploading: false }));
        }
      };

      const handleDownload = async () => {
        try {
          const { data, error } = await supabase.storage.from('form-templates').download('current.xlsx');
          if (error) throw error;
          const a = document.createElement('a');
          a.href = URL.createObjectURL(data);
          a.download = 'FORM-GQ-0047_template_atual.xlsx';
          document.body.appendChild(a);
          a.click();
          setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 500);
        } catch (e) {
          toast.error('Erro ao baixar: ' + (e?.message || e));
        }
      };

      const handleRestore = async () => {
        if (!confirm('Deletar o template customizado e voltar para o embutido na plataforma? A operação não pode ser desfeita.')) return;
        try {
          const { error } = await supabase.storage.from('form-templates').remove(['current.xlsx']);
          if (error) throw error;
          toast.success('Template customizado removido. Próximas análises usarão o embutido.');
          await load();
        } catch (e) {
          toast.error('Erro ao restaurar: ' + (e?.message || e));
        }
      };

      const formatBytes = (n) => {
        if (!n) return '—';
        if (n < 1024) return `${n} B`;
        if (n < 1024*1024) return `${(n/1024).toFixed(1)} KB`;
        return `${(n/1024/1024).toFixed(1)} MB`;
      };

      return (
        <div className="space-y-4">
          <Card>
            <CardHeader>
              <CardTitle>Template usado para preenchimento</CardTitle>
              <CardDescription>
                Quando você sobe uma OP para análise, a plataforma preenche o FORM-GQ-0047 a partir deste template.
                Substitua aqui para atualizar a versão usada por todos os usuários (versionamento ISO 13485 §4.2.4).
              </CardDescription>
            </CardHeader>
            <CardContent>
             <DropZone
               onFiles={(arqs) => { if (status.uploading) return; const f = arqs.find((x) => /\.xlsx$/i.test(x.name)) || arqs[0]; if (f) handleUpload(f); }}
               disabled={status.uploading}
               className="rounded-lg transition-colors"
             >
              {status.loading ? (
                <div className="flex items-center gap-2 text-sm text-muted-foreground">
                  <Icon name="loader" className="h-4 w-4 animate-spin" />
                  Consultando bucket…
                </div>
              ) : status.source === 'bucket' ? (
                <div className="space-y-3">
                  <div className="flex items-start gap-3 p-3 rounded-lg" style={{ backgroundColor: 'hsl(142 60% 92%)', color: 'hsl(142 60% 22%)' }}>
                    <Icon name="check" className="h-5 w-5 mt-0.5 shrink-0" />
                    <div className="min-w-0 flex-1">
                      <div className="text-sm font-semibold">Template customizado ativo</div>
                      <div className="text-xs mt-1">
                        Subido em {status.updated_at ? new Date(status.updated_at).toLocaleString('pt-BR') : '—'} · {formatBytes(status.size)}
                      </div>
                    </div>
                  </div>
                  {status.approvalDate && (
                    <div className="flex items-start gap-3 p-3 rounded-lg border bg-card">
                      <Icon name="check" className="h-5 w-5 mt-0.5 shrink-0 text-accent" />
                      <div className="min-w-0 flex-1">
                        <div className="text-sm font-semibold">Data de aprovação detectada: {status.approvalDate.split('-').reverse().join('/')}</div>
                        <div className="text-xs text-muted-foreground mt-1">
                          Extraída da célula A35 do template. Será usada pelo agente para validar a "Revisão do FORM vigente na conciliação".
                        </div>
                      </div>
                    </div>
                  )}
                  <div className="flex flex-wrap gap-2">
                    <Button variant="outline" onClick={handleDownload}><Icon name="download" />Baixar atual</Button>
                    <Button variant="outline" onClick={() => fileInputRef.current?.click()} disabled={status.uploading}>
                      {status.uploading ? <><Icon name="loader" className="animate-spin" />Enviando…</> : <><Icon name="upload" />Substituir</>}
                    </Button>
                    <Button variant="ghost" onClick={handleRestore}><Icon name="trash" />Restaurar embutido</Button>
                  </div>
                </div>
              ) : (
                <div className="space-y-3">
                  <div className="flex items-start gap-3 p-3 rounded-lg border" style={{ backgroundColor: 'hsl(var(--accent) / 0.06)' }}>
                    <Icon name="info" className="h-5 w-5 mt-0.5 shrink-0" style={{ color: 'hsl(var(--accent))' }} />
                    <div className="min-w-0 flex-1">
                      <div className="text-sm font-semibold">Usando template embutido na plataforma</div>
                      <div className="text-xs text-muted-foreground mt-1">
                        Não há template customizado no bucket. As análises usam a versão padrão do FORM-GQ-0047 que vem com a plataforma
                        {status.approvalDate && <> — data de aprovação detectada: <strong>{status.approvalDate.split('-').reverse().join('/')}</strong></>}.
                        Suba um novo XLSX para passar a usar uma versão customizada.
                      </div>
                    </div>
                  </div>
                  <Button onClick={() => fileInputRef.current?.click()} disabled={status.uploading}>
                    {status.uploading ? <><Icon name="loader" className="animate-spin" />Enviando…</> : <><Icon name="upload" />Subir novo template</>}
                  </Button>
                </div>
              )}
              <input
                ref={fileInputRef}
                type="file"
                accept=".xlsx"
                className="hidden"
                onChange={handleUpload}
              />
             </DropZone>
            </CardContent>
          </Card>

          <Card>
            <CardHeader>
              <CardTitle className="text-sm">Sobre o template</CardTitle>
            </CardHeader>
            <CardContent>
              <div className="text-xs text-muted-foreground space-y-2">
                <p>
                  O template precisa manter a <strong>estrutura de células esperada</strong> pela função de preenchimento:
                </p>
                <ul className="list-disc list-inside space-y-1 ml-2">
                  <li><code>A9</code>, <code>A10</code> — labels "PRODUTO:" e "MODELO:" (alinhamento à esquerda)</li>
                  <li><code>G9</code>, <code>G10</code> — labels "Nº série/Lote:" e "Data da Conciliação:"</li>
                  <li><code>A14</code> a <code>A29</code> — 16 itens do roteiro (linha A:F mesclada)</li>
                  <li><code>G14</code> a <code>I29</code> — colunas SIM (G) / NÃO (H) / N/A (I)</li>
                  <li><code>B31</code> — texto "Liberado para comercialização? Sim:[    ] Não:[    ] N/A:[    ]" (B31:I31 mesclado)</li>
                </ul>
                <p>
                  Se mudar a estrutura, ajustes no código de preenchimento podem ser necessários — me avise caso troque o layout.
                </p>
              </div>
            </CardContent>
          </Card>
        </div>
      );
    }

    const TabButton = ({ active, onClick, icon, children }) => (
      <button onClick={onClick} className={cn(
        'flex items-center gap-2 px-4 py-2.5 text-sm font-medium border-b-2 -mb-px transition-colors',
        active ? 'border-accent text-foreground' : 'border-transparent text-muted-foreground hover:text-foreground'
      )}>
        <Icon name={icon} />{children}
      </button>
    );

    function CatalogoTab() {
      const toast = useToast();
      const [produtos, setProdutos] = useState([]);
      const [loading, setLoading] = useState(true);
      const [editing, setEditing] = useState(null);
      // Filtros (decisão 18/06/2026): busca textual + filtro por equipamento + modelo
      const [busca, setBusca] = useState('');
      const [filtroEquipamento, setFiltroEquipamento] = useState('');
      const [filtroModelo, setFiltroModelo] = useState('');

      const load = useCallback(async () => {
        setLoading(true);
        const { data, error } = await supabase.from('produtos').select('*').order('equipamento', { ascending: true });
        if (error) toast.error('Erro ao carregar produtos: ' + error.message);
        setProdutos(data || []);
        setLoading(false);
      }, []);

      useEffect(() => { load(); }, [load]);

      const handleDelete = async (id, modelo) => {
        if (!confirm(`Excluir o produto "${modelo}"? Esta ação não pode ser desfeita.`)) return;
        const { error } = await supabase.from('produtos').delete().eq('id', id);
        if (error) toast.error('Erro ao excluir: ' + error.message);
        else { toast.success('Produto excluído.'); load(); }
      };

      // Listas únicas para os dropdowns de filtro
      const equipamentosUnicos = useMemo(() => {
        return [...new Set(produtos.map((p) => p.equipamento).filter(Boolean))].sort();
      }, [produtos]);
      const modelosUnicos = useMemo(() => {
        return [...new Set(produtos
          .filter((p) => !filtroEquipamento || p.equipamento === filtroEquipamento)
          .map((p) => p.modelo).filter(Boolean))].sort();
      }, [produtos, filtroEquipamento]);

      // Aplica filtros + busca textual
      const produtosFiltrados = useMemo(() => {
        const q = busca.trim().toLowerCase();
        return produtos.filter((p) => {
          if (filtroEquipamento && p.equipamento !== filtroEquipamento) return false;
          if (filtroModelo && p.modelo !== filtroModelo) return false;
          if (!q) return true;
          return (
            (p.modelo || '').toLowerCase().includes(q) ||
            (p.equipamento || '').toLowerCase().includes(q) ||
            (p.codigo_sapiens || '').toLowerCase().includes(q) ||
            (p.codigo_referencia || '').toLowerCase().includes(q) ||
            (p.registro_anvisa || '').toLowerCase().includes(q)
          );
        });
      }, [produtos, busca, filtroEquipamento, filtroModelo]);

      const limparFiltros = () => {
        setBusca(''); setFiltroEquipamento(''); setFiltroModelo('');
      };

      return (
        <div>
          <div className="mb-4 flex items-center justify-between">
            <p className="text-sm text-muted-foreground">
              {produtosFiltrados.length} de {produtos.length} produto(s)
              {(busca || filtroEquipamento || filtroModelo) && (
                <button onClick={limparFiltros} className="ml-2 text-xs underline text-accent hover:opacity-80">limpar filtros</button>
              )}
            </p>
            <Button onClick={() => setEditing({})}><Icon name="plus" />Novo produto</Button>
          </div>

          {/* === Filtros e busca === */}
          <Card className="mb-4">
            <CardContent className="pt-5 pb-5">
              <div className="grid grid-cols-1 md:grid-cols-3 gap-3 items-end">
                <div>
                  <Label className="text-xs">Buscar (modelo, equipamento, código)</Label>
                  <Input
                    placeholder="Ex.: CM-LED, ART0001, LEDT…"
                    value={busca}
                    onChange={(e) => setBusca(e.target.value)}
                  />
                </div>
                <div>
                  <Label className="text-xs">Filtrar por equipamento</Label>
                  <select
                    value={filtroEquipamento}
                    onChange={(e) => { setFiltroEquipamento(e.target.value); setFiltroModelo(''); }}
                    className="w-full rounded-md border bg-background px-3 py-2 text-sm"
                  >
                    <option value="">Todos os equipamentos</option>
                    {equipamentosUnicos.map((eq) => <option key={eq} value={eq}>{eq}</option>)}
                  </select>
                </div>
                <div>
                  <Label className="text-xs">Filtrar por modelo</Label>
                  <select
                    value={filtroModelo}
                    onChange={(e) => setFiltroModelo(e.target.value)}
                    className="w-full rounded-md border bg-background px-3 py-2 text-sm"
                  >
                    <option value="">Todos os modelos</option>
                    {modelosUnicos.map((m) => <option key={m} value={m}>{m}</option>)}
                  </select>
                </div>
              </div>
            </CardContent>
          </Card>

          <Card>
            <CardContent className="p-0">
              {loading ? (
                <div className="p-6 text-sm text-muted-foreground">Carregando…</div>
              ) : produtosFiltrados.length === 0 ? (
                <div className="p-12 text-center">
                  <p className="text-sm text-muted-foreground">
                    {produtos.length === 0 ? 'Nenhum produto cadastrado.' : 'Nenhum produto corresponde aos filtros aplicados.'}
                  </p>
                  {produtos.length > 0 && (busca || filtroEquipamento || filtroModelo) && (
                    <button onClick={limparFiltros} className="mt-3 text-xs underline text-accent">limpar filtros</button>
                  )}
                </div>
              ) : (
                <div className="overflow-x-auto">
                  <table className="w-full text-sm">
                    <thead>
                      <tr className="border-b text-left text-xs uppercase text-muted-foreground bg-muted/30">
                        <th className="px-4 py-3 font-semibold">Equipamento</th>
                        <th className="px-4 py-3 font-semibold">Modelo</th>
                        <th className="px-4 py-3 font-semibold">Código Ref.</th>
                        <th className="px-4 py-3 font-semibold">Registro ANVISA</th>
                        <th className="px-4 py-3 font-semibold">Código Sapiens</th>
                        <th className="px-4 py-3 font-semibold w-32">Ações</th>
                      </tr>
                    </thead>
                    <tbody>
                      {produtosFiltrados.map((p) => (
                        <tr key={p.id} className="border-b hover:bg-muted/50 transition-colors">
                          <td className="px-4 py-3">{p.equipamento}</td>
                          <td className="px-4 py-3 font-semibold">{p.modelo}</td>
                          <td className="px-4 py-3 font-mono text-xs">{p.codigo_referencia}</td>
                          <td className="px-4 py-3 font-mono text-xs">{p.registro_anvisa}</td>
                          <td className="px-4 py-3 font-mono text-xs">{p.codigo_sapiens || '—'}</td>
                          <td className="px-4 py-3">
                            <div className="flex items-center gap-1">
                              <Button variant="ghost" size="icon" onClick={() => setEditing(p)} title="Editar"><Icon name="edit" className="h-3.5 w-3.5" /></Button>
                              <Button variant="ghost" size="icon" onClick={() => handleDelete(p.id, p.modelo)} title="Excluir"><Icon name="trash" className="h-3.5 w-3.5" /></Button>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                </div>
              )}
            </CardContent>
          </Card>
          {editing !== null && (
            <ProdutoModal produto={editing} onClose={() => setEditing(null)} onSaved={() => { setEditing(null); load(); }} />
          )}
        </div>
      );
    }

    function ProdutoModal({ produto, onClose, onSaved }) {
      const toast = useToast();
      const isNew = !produto?.id;
      const [form, setForm] = useState({
        equipamento: produto?.equipamento || '',
        modelo: produto?.modelo || '',
        codigo_referencia: produto?.codigo_referencia || '',
        registro_anvisa: produto?.registro_anvisa || '',
        codigo_sapiens: produto?.codigo_sapiens || '',
      });
      const [saving, setSaving] = useState(false);

      const handleSave = async (e) => {
        e.preventDefault();
        setSaving(true);
        const payload = {
          ...form,
          codigo_sapiens: form.codigo_sapiens || null,
        };
        const res = isNew
          ? await supabase.from('produtos').insert(payload)
          : await supabase.from('produtos').update(payload).eq('id', produto.id);
        setSaving(false);
        if (res.error) {
          if (/duplicate|unique/i.test(res.error.message)) {
            toast.error(`Já existe um produto cadastrado com o modelo "${form.modelo}". Use um modelo diferente.`);
          } else {
            toast.error('Erro ao salvar: ' + res.error.message);
          }
        } else {
          toast.success(isNew ? 'Produto criado.' : 'Produto atualizado.');
          onSaved();
        }
      };

      return (
        <Modal open onClose={onClose} title={isNew ? 'Novo produto' : 'Editar produto'} description="Cadastro do produto. A derivação é informada na criação de cada Ficha Mestre.">
          <form onSubmit={handleSave} className="space-y-4">
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div className="md:col-span-2 space-y-2">
                <Label>Equipamento *</Label>
                <Input value={form.equipamento} onChange={(e) => setForm({ ...form, equipamento: e.target.value })} placeholder="FONTE DE LUZ LED" required />
              </div>
              <div className="space-y-2">
                <Label>Modelo *</Label>
                <Input value={form.modelo} onChange={(e) => setForm({ ...form, modelo: e.target.value })} placeholder="CM-LED" required />
              </div>
              <div className="space-y-2">
                <Label>Código de Referência *</Label>
                <Input value={form.codigo_referencia} onChange={(e) => setForm({ ...form, codigo_referencia: e.target.value })} placeholder="LEDT" required />
              </div>
              <div className="space-y-2">
                <Label>Registro/Notificação ANVISA *</Label>
                <Input value={form.registro_anvisa} onChange={(e) => setForm({ ...form, registro_anvisa: e.target.value })} placeholder="80337650008" required />
              </div>
              <div className="space-y-2">
                <Label>Código Sapiens</Label>
                <Input value={form.codigo_sapiens} onChange={(e) => setForm({ ...form, codigo_sapiens: e.target.value })} placeholder="FNT0001" />
              </div>
              <div className="md:col-span-2 pt-2 border-t border-border/60">
                <p className="text-xs text-muted-foreground">
                  <strong>Sobre derivações:</strong> Cada modelo pode ter múltiplas variantes (derivações). Elas não ficam mais cadastradas aqui — são informadas no momento de criar a Ficha Mestre do produto. Para criar uma nova derivação do mesmo produto, vá em <strong>Cadastro → Fichas Mestres</strong>, selecione o produto e crie uma nova ficha com a derivação desejada.
                </p>
              </div>
            </div>
            <div className="flex justify-end gap-2 pt-2">
              <Button type="button" variant="outline" onClick={onClose}>Cancelar</Button>
              <Button type="submit" disabled={saving}>{saving ? 'Salvando…' : 'Salvar'}</Button>
            </div>
          </form>
        </Modal>
      );
    }

    /* ====================================================================
       FICHA MESTRE — EDITOR COMPLETO
       Permite criar/editar uma Ficha Mestre com 8 seções, baseado na
       estrutura da Ficha Mestre do CM-LED como modelo de referência.
       ==================================================================== */

    // Estágios VARIÁVEIS do roteiro do FORM-GQ-0047 (cadastráveis na Ficha Mestre).
    // O cadastro da Ficha guarda apenas os APLICÁVEIS — sem N/A ou justificativa.
    // Cada estágio tem um padrão regex que casa as descrições típicas do Sapiens
    // (para detecção automática de presença na OP).
    const ESTAGIOS_VARIAVEIS = [
      { nome: 'Separação de Componentes',                  estagioNum: 5,  textoFORM: 'Separação de componentes' },
      { nome: 'Preparação de Componentes',                 estagioNum: 7,  textoFORM: 'Preparação de Componentes' },
      { nome: 'Montagem',                                  estagioNum: 10, textoFORM: 'Montagem' },
      { nome: 'Fechamento da Tela',                        estagioNum: 15, textoFORM: 'Fechamento da Tela' },
      { nome: 'Preparação de Gabinete',                    estagioNum: 20, textoFORM: 'Preparação de Gabinete' },
      { nome: 'Fechamento e Acabamento Gabinete Plástico', estagioNum: 25, textoFORM: 'Fechamento e Acabamento Gabinete Plástico' },
      { nome: 'Montagem Eletrônica',                       estagioNum: 30, textoFORM: 'Montagem Eletrônica' },
      { nome: 'Programação',                               estagioNum: 35, textoFORM: 'Programação' },
      { nome: 'Gravação',                                  estagioNum: 39, textoFORM: 'Gravação' },
      { nome: 'Finalização',                               estagioNum: 40, textoFORM: 'Finalização' },
    ];

    // Estágios FIXOS — sempre marcados SIM no FORM, qualquer produto.
    const ESTAGIOS_FIXOS = [
      { nome: 'Controle de Qualidade do produto acabado',  textoFORM: 'Controle de Qualidade do produto acabado' },
      { nome: 'Etapa de Embalagem do produto acabado',     textoFORM: 'Etapa de Embalagem do produto acabado' },
      { nome: 'Conciliação da Produção do produto acabado',textoFORM: 'Conciliação da Produção do produto acabado' },
      { nome: 'Verificação da rotulagem',                  textoFORM: 'Verificação da rotulagem' },
    ];

    // Estágios CONDICIONAIS — SIM se documento correspondente foi anexado,
    // N/A caso contrário.
    const ESTAGIOS_CONDICIONAIS = [
      { nome: 'Ordem de Produção de Reprocesso', slotKey: 'op_reprocesso',  textoFORM: 'Ordem de Produção de Reprocesso' },
      { nome: 'RNCs associados',                  slotKey: 'rnc',           textoFORM: 'RNCs associados' },
    ];

    // Estágios oferecidos no cadastro de operadores (os que têm operação/inspeção na OP):
    // os variáveis + Embalagem (50) e Conciliação da Produção (60), que são fixos universais.
    const ESTAGIOS_OPERADOR = [
      ...ESTAGIOS_VARIAVEIS.map((e) => ({ num: e.estagioNum, nome: e.nome })),
      { num: 50, nome: 'Embalagem' },
      { num: 60, nome: 'Conciliação da Produção' },
    ].sort((a, b) => a.num - b.num);
    // Estágios que NÃO possuem inspeção (não têm "Ni"): Separação (5) e Preparação (7).
    const ESTAGIOS_SEM_INSPECAO = new Set([5, 7]);
    const temInspecao = (num) => !ESTAGIOS_SEM_INSPECAO.has(num);

    function CollapsibleSection({ title, description, open, onToggle, children, badge }) {
      return (
        <Card className="mb-3">
          <button
            type="button"
            onClick={onToggle}
            className="w-full flex items-center justify-between gap-4 p-4 text-left hover:bg-muted/40 transition-colors"
          >
            <div className="flex-1 min-w-0">
              <div className="font-semibold text-sm flex items-center gap-2">
                {title}
                {badge && <span className="text-xs bg-accent/20 text-accent-foreground rounded-full px-2 py-0.5">{badge}</span>}
              </div>
              {description && <div className="text-xs text-muted-foreground mt-0.5">{description}</div>}
            </div>
            <Icon name={open ? 'check' : 'plus'} className="h-4 w-4 shrink-0 text-muted-foreground" />
          </button>
          {open && <div className="p-4 pt-0 border-t">{children}</div>}
        </Card>
      );
    }

    function FichaMestreEditor({ ficha, produto, onClose, onSaved }) {
      const toast = useToast();
      const { perfil: usuarioAtual } = usePerm();
      const isNew = !ficha?.id;
      const [aptaAnalise, setAptaAnalise] = useState(ficha?.apta_analise === true);
      const [revisoesOpen, setRevisoesOpen] = useState(false);
      const [revisoes, setRevisoes] = useState([]);
      const [revLoading, setRevLoading] = useState(false);
      useEffect(() => {
        if (!revisoesOpen || !ficha?.id) return;
        setRevLoading(true);
        supabase.from('fichas_mestres_versoes').select('*').eq('ficha_id', ficha.id).order('versao', { ascending: false })
          .then(({ data }) => { setRevisoes(data || []); setRevLoading(false); });
      }, [revisoesOpen, ficha?.id]);
      // Reverter a ficha para uma revisão anterior (permitido a todos — é reversível).
      const reverterRevisao = async (v) => {
        if (!confirm(`Reverter a ficha para a revisão ${v.versao} (${v.created_at ? new Date(v.created_at).toLocaleString('pt-BR') : ''})? Uma nova revisão será criada com esse conteúdo.`)) return;
        try {
          const snap = v.snapshot || {};
          const fichaSnap = { ...(snap.ficha || {}) }; delete fichaSnap.id;
          await supabase.from('fichas_mestres').update({ ...fichaSnap, updated_at: new Date().toISOString() }).eq('id', ficha.id);
          await supabase.from('acessorios_aplicaveis').delete().eq('ficha_id', ficha.id);
          const accs = (snap.acessorios || []).map((r, i) => ({ ...r, ficha_id: ficha.id, ordem: r.ordem || i + 1 }));
          if (accs.length) {
            let ins = await supabase.from('acessorios_aplicaveis').insert(accs);
            if (ins.error && /grupo_alternativo/i.test(ins.error.message || '')) {
              await supabase.from('acessorios_aplicaveis').insert(accs.map(({ grupo_alternativo, ...r }) => r));
            }
          }
          const { data: vs } = await supabase.from('fichas_mestres_versoes').select('versao').eq('ficha_id', ficha.id).order('versao', { ascending: false }).limit(1);
          const prox = ((vs && vs[0] ? vs[0].versao : 0) || 0) + 1;
          await supabase.from('fichas_mestres_versoes').insert({ ficha_id: ficha.id, versao: prox, snapshot: snap, motivo: `Revertido para v${v.versao}`, criado_por_id: usuarioAtual?.id || null, criado_por_nome: usuarioAtual?.nome_completo || usuarioAtual?.email || null });
          await registrarLog(usuarioAtual, 'reverter_ficha', 'ficha', `${produto?.modelo || 'produto'} deriv.${fichaSnap.derivacao || '—'}`, `${usuarioAtual?.nome_completo || usuarioAtual?.email || 'Usuário'} reverteu a Ficha Mestre de ${produto?.modelo || 'produto'} para a revisão ${v.versao}`);
          toast.success(`Ficha revertida para a revisão ${v.versao}.`);
          setRevisoesOpen(false);
          onSaved();
        } catch (e) { toast.error('Erro ao reverter: ' + (e?.message || e)); }
      };

      const [form, setForm] = useState({
        // Derivação agora vive na FICHA (decisão 18/06/2026 — antes era no produto).
        // Cada ficha define sua própria derivação. Auto-detect ao importar OP.
        derivacao:             ficha?.derivacao             || '001',
        derivacao_descricao:   ficha?.derivacao_descricao   || 'Padrão',
        nome_comercial:        ficha?.nome_comercial        || produto?.equipamento || '',
        convencao_nro_serie:   ficha?.convencao_nro_serie   || (produto?.codigo_referencia ? `${produto.codigo_referencia}-AAAAMM-N` : ''),
        exemplo_nro_serie:     ficha?.exemplo_nro_serie     || '',
        data_concessao_anvisa: ficha?.data_concessao_anvisa || 'INDETERMINADO',
        razao_social:          ficha?.razao_social          || 'Confiance Medical Produtos Médicos S.A.',
        cnpj:                  ficha?.cnpj                  || '05.209.279/0001-31',
        endereco_fabrica:      ficha?.endereco_fabrica      || 'Rua Bela, 852, São Cristóvão, Rio de Janeiro – RJ – CEP: 20930-380',
        telefone:              ficha?.telefone              || '(21) 3293-1650',
        responsavel_tecnico:   ficha?.responsavel_tecnico   || 'Samara Campos',
        crea_rt:               ficha?.crea_rt               || '2019108911',
        responsavel_legal:     ficha?.responsavel_legal     || 'Cristiano Mendes Brega',
      });

      // Reconstrói blocos alternativos a partir das linhas com grupo_alternativo.
      // Cada bloco = { descricao, codigos:[], is_fabricante_confiance, esteril, pode_sair_apenas_na_nf }.
      const montarBlocosAlt = (linhas) => {
        const m = {};
        for (const a of linhas) {
          const g = (a.grupo_alternativo || '').trim();
          if (!g) continue;
          if (!m[g]) m[g] = {
            descricao: a.descricao || g,
            is_fabricante_confiance: !!a.is_fabricante_confiance,
            esteril: !!a.esteril,
            pode_sair_apenas_na_nf: !!a.pode_sair_apenas_na_nf,
            codigos: [],
          };
          if (a.codigo_sapiens) m[g].codigos.push(a.codigo_sapiens);
        }
        return Object.values(m);
      };

      const _acsOrdenados = (ficha?.acessorios || []).slice().sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
      // Acessórios comuns (sem grupo) e blocos alternativos (com grupo) são editados separadamente.
      const [acessorios, setAcessorios] = useState(
        _acsOrdenados.filter((a) => !(a.grupo_alternativo || '').trim())
      );
      const [acessoriosAlt, setAcessoriosAlt] = useState(
        montarBlocosAlt(_acsOrdenados)
      );
      // estagios_aplicaveis: array com os nomes dos estágios variáveis aplicáveis ao produto.
      // Subset dos 10 nomes em ESTAGIOS_VARIAVEIS. Os 4 fixos e 2 condicionais NÃO ficam aqui.
      const [estagiosAplicaveis, setEstagiosAplicaveis] = useState(
        () => new Set(ficha?.estagios_aplicaveis || [])
      );
      // estagios_com_inspecao: Set<number> dos estágios que têm inspeção associada na OP.
      // Configurável pela QG (Maria Luiza, 01/07/2026) — antes era regra hardcoded
      // "5 e 7 nunca têm; todos os outros sim". Cada ficha declara sua lista.
      const [estagiosComInspecao, setEstagiosComInspecao] = useState(
        () => new Set((ficha?.estagios_com_inspecao || []).map(Number).filter((n) => !isNaN(n)))
      );
      const [regras, setRegras] = useState(
        (ficha?.regras_negocio || []).map(r => typeof r === 'string' ? r : (r?.regra || ''))
      );
      const [saving, setSaving] = useState(false);
      const [importOpen, setImportOpen] = useState(false);
      const [clonarOpen, setClonarOpen] = useState(false);
      const [open, setOpen] = useState({
        identificacao: true, fabricante: false, acessorios: true, roteiro: true,
        regras: false,
      });

      const toggleEstagio = (nome) => setEstagiosAplicaveis((prev) => {
        const next = new Set(prev);
        if (next.has(nome)) {
          next.delete(nome);
          // Se o estágio não é mais aplicável, também remove a inspeção
          const est = ESTAGIOS_VARIAVEIS.find((e) => e.nome === nome);
          if (est) setEstagiosComInspecao((p) => {
            const s = new Set(p);
            s.delete(est.estagioNum);
            return s;
          });
        } else {
          next.add(nome);
        }
        return next;
      });

      const toggleInspecao = (estagioNum, nome) => setEstagiosComInspecao((prev) => {
        const next = new Set(prev);
        if (next.has(estagioNum)) {
          next.delete(estagioNum);
        } else {
          next.add(estagioNum);
          // Ativar inspeção implica que o estágio é aplicável
          setEstagiosAplicaveis((p) => {
            if (p.has(nome)) return p;
            const s = new Set(p);
            s.add(nome);
            return s;
          });
        }
        return next;
      });

      // Aplica os dados clonados de outra derivação como estado inicial
      const aplicarClone = (clone) => {
        if (!clone) return;
        setForm((prev) => ({
          ...prev,
          nome_comercial:        clone.nome_comercial || prev.nome_comercial,
          convencao_nro_serie:   clone.convencao_nro_serie || prev.convencao_nro_serie,
          exemplo_nro_serie:     clone.exemplo_nro_serie || prev.exemplo_nro_serie,
          data_concessao_anvisa: clone.data_concessao_anvisa || prev.data_concessao_anvisa,
        }));
        const _cloneAcs = (clone.acessorios || []).slice().sort((a, b) => (a.ordem || 0) - (b.ordem || 0));
        setAcessorios(_cloneAcs.filter((a) => !(a.grupo_alternativo || '').trim()).map((a) => ({
          descricao: a.descricao, codigo_sapiens: a.codigo_sapiens,
          obrigatorio: a.obrigatorio !== false,
          is_fabricante_confiance: !!a.is_fabricante_confiance,
          esteril: !!a.esteril,
          pode_sair_apenas_na_nf: !!a.pode_sair_apenas_na_nf,
        })));
        setAcessoriosAlt(montarBlocosAlt(_cloneAcs));
        setEstagiosAplicaveis(new Set(clone.estagios_aplicaveis || []));
        setEstagiosComInspecao(new Set((clone.estagios_com_inspecao || []).map(Number).filter((n) => !isNaN(n))));
        setRegras((clone.regras_negocio || []).map((r) => typeof r === 'string' ? r : (r?.regra || '')));
        setClonarOpen(false);
        toast.success(`Dados da derivação "${clone.produto?.derivacao} — ${clone.produto?.derivacao_descricao}" carregados como ponto de partida. Revise antes de salvar.`);
      };
      const toggle = (k) => setOpen((p) => ({ ...p, [k]: !p[k] }));

      // === Importa dados de documentos exemplo (OP+RC+Etiquetas) e pré-preenche o formulário ===
      const handleImportFromDocs = async ({ op, rc, et, acs }) => {
        // Extrai texto e parseia todos os documentos enviados
        const opData = op ? parseOP(await extractTextFromFile(op)) : null;
        const rcData = rc ? parseRC(await extractTextFromFile(rc)) : null;
        const etData = et ? parseEtiqueta(await extractTextFromFile(et)) : null;
        const acsData = await Promise.all((acs || []).map(async (f) => {
          try { return { nome: f.name, parsed: parseEtiquetaAcessorio(await extractTextFromFile(f)) }; }
          catch (e) { return { nome: f.name, parsed: null, erro: e.message }; }
        }));

        // === IDENTIFICAÇÃO + FABRICANTE ===
        const upd = {};
        // Família: prioriza etiqueta (mais autoritativa que OP)
        const familia = etData?.familia || opData?.familia;
        if (familia && !form.nome_comercial.trim()) upd.nome_comercial = familia;
        // Derivação: vem da OP (decisão 18/06/2026 — derivação agora vive na ficha,
        // detectamos automaticamente do par "FNT0001 - 001 - Fonte de Luz..." que aparece
        // no cabeçalho da OP do Sapiens).
        if (opData?.derivacao) {
          const d = String(opData.derivacao).padStart(3, '0');
          upd.derivacao = d;
        }
        // Convenção + exemplo de série: vem da OP
        if (opData?.serie) {
          upd.exemplo_nro_serie = opData.serie;
          const m = opData.serie.match(/^([A-Z]+)/);
          if (m) upd.convencao_nro_serie = `${m[1]}-AAAAMM-N`;
        }
        // Responsáveis e fabricante: vêm da etiqueta externa
        if (etData?.rt) upd.responsavel_tecnico = etData.rt;
        if (etData?.crea) upd.crea_rt = etData.crea;
        if (etData?.rl) upd.responsavel_legal = etData.rl;
        // Validade INDETERMINADO confirmada
        if (etData?.validade && /INDETERMINAD/i.test(etData.validade)) upd.data_concessao_anvisa = 'INDETERMINADO';
        if (Object.keys(upd).length) setForm((p) => ({ ...p, ...upd }));

        // === ESTÁGIOS APLICÁVEIS: detecta na OP quais estágios variáveis estão presentes ===
        if (opData?.estagios?.length > 0) {
          const nums = new Set(opData.estagios.map((e) => e.numero));
          const detectados = ESTAGIOS_VARIAVEIS.filter((est) => nums.has(est.estagioNum)).map((est) => est.nome);
          setEstagiosAplicaveis(new Set(detectados));
        }

        // === ACESSÓRIOS: das etiquetas de acessório (uma etiqueta = um acessório) ===
        if (acsData.length > 0) {
          const novosAcessorios = acsData
            .filter((a) => a.parsed)
            .map((a) => {
              const p = a.parsed;
              return {
                descricao: p.descricao || '(Adicionar descrição)',
                codigo_sapiens: p.codigoSapiens || '',
                obrigatorio: true, // se a etiqueta foi produzida, é acessório obrigatório do produto
                is_fabricante_confiance: p.tipoFabForn === 'F',
                esteril: !!p.validadeIndeterminada ? false : !!(p.validadeISO || (p.validade && !/indetermina/i.test(p.validade))),
              };
            });
          if (novosAcessorios.length > 0) setAcessorios(novosAcessorios);
        }

        // === Toast resumindo o que foi pré-preenchido ===
        const resumo = [];
        if (opData?.estagios?.length) resumo.push(`${opData.estagios.length} estágios`);
        if (etData) resumo.push('etiqueta produto');
        if (acsData.length) resumo.push(`${acsData.length} acessório(s)`);
        toast.success(`Dados importados: ${resumo.join(', ') || 'parcial'}. Revise cada seção e ajuste antes de salvar.`);
        setImportOpen(false);
      };

      const updateForm = (k, v) => setForm((p) => ({ ...p, [k]: v }));

      // Helpers para arrays
      const addAcessorio = () => setAcessorios((p) => [...p, { descricao: '', codigo_sapiens: '', obrigatorio: true, is_fabricante_confiance: false, esteril: false, pode_sair_apenas_na_nf: false }]);
      const removeAcessorio = (i) => setAcessorios((p) => p.filter((_, idx) => idx !== i));
      const updateAcessorio = (i, k, v) => setAcessorios((p) => p.map((a, idx) => idx === i ? { ...a, [k]: v } : a));

      // Helpers para blocos alternativos (descrição única + vários códigos Sapiens possíveis)
      const addBlocoAlt = () => setAcessoriosAlt((p) => [...p, { descricao: '', codigos: ['', ''], is_fabricante_confiance: false, esteril: false, pode_sair_apenas_na_nf: false }]);
      const removeBlocoAlt = (i) => setAcessoriosAlt((p) => p.filter((_, idx) => idx !== i));
      const updateBlocoAlt = (i, k, v) => setAcessoriosAlt((p) => p.map((b, idx) => idx === i ? { ...b, [k]: v } : b));
      const addCodigoAlt = (i) => setAcessoriosAlt((p) => p.map((b, idx) => idx === i ? { ...b, codigos: [...(b.codigos || []), ''] } : b));
      const removeCodigoAlt = (i, j) => setAcessoriosAlt((p) => p.map((b, idx) => idx === i ? { ...b, codigos: (b.codigos || []).filter((_, k) => k !== j) } : b));
      const updateCodigoAlt = (i, j, v) => setAcessoriosAlt((p) => p.map((b, idx) => idx === i ? { ...b, codigos: (b.codigos || []).map((c, k) => k === j ? v : c) } : b));

      // (Helpers de roteiro/inspecoes/bom removidos — Seções 4/5/6 não usam mais arrays editáveis.
      //  Estágios variáveis agora são checkboxes via setEstagiosAplicaveis / toggleEstagio.)

      const addRegra = () => setRegras((p) => [...p, '']);
      const removeRegra = (i) => setRegras((p) => p.filter((_, idx) => idx !== i));
      const updateRegra = (i, v) => setRegras((p) => p.map((r, idx) => idx === i ? v : r));

      const handleSave = async () => {
        console.group('[Ficha Mestre · Save]');
        if (!form.nome_comercial.trim()) {
          console.warn('Validação: nome_comercial vazio');
          console.groupEnd();
          toast.error('Nome comercial é obrigatório.');
          return;
        }
        // Derivação obrigatória + normaliza para 3 dígitos
        const derivNorm = (form.derivacao || '').replace(/\D/g, '').padStart(3, '0').slice(0, 3);
        if (!/^\d{3}$/.test(derivNorm)) {
          console.warn('Validação: derivação inválida');
          console.groupEnd();
          toast.error('Derivação deve ter exatamente 3 dígitos (ex.: 001).');
          return;
        }
        if (!form.derivacao_descricao.trim()) {
          console.warn('Validação: derivacao_descricao vazio');
          console.groupEnd();
          toast.error('Descrição da derivação é obrigatória.');
          return;
        }
        // aplica a normalização ao form antes de salvar
        form.derivacao = derivNorm;
        setSaving(true);
        try {
          // Número da nova revisão — mantém o "selo" (versao) da ficha em sincronia com o
          // histórico de revisões (fichas_mestres_versoes). Nova ficha = v1; edição = última+1.
          let proxVersao = 1;
          if (!isNew && ficha?.id) {
            try {
              const { data: vs } = await supabase.from('fichas_mestres_versoes').select('versao').eq('ficha_id', ficha.id).order('versao', { ascending: false }).limit(1);
              const ultima = (vs && vs[0] ? vs[0].versao : (ficha?.versao || 0)) || 0;
              proxVersao = ultima + 1;
            } catch (e) { proxVersao = (ficha?.versao || 1) + 1; }
          }
          const fichaData = {
            produto_id: produto.id,
            versao: proxVersao,
            ativa: true,
            apta_analise: aptaAnalise,
            ...form,
            // estagios_aplicaveis: array text[] com os nomes dos estágios variáveis aplicáveis
            estagios_aplicaveis: Array.from(estagiosAplicaveis),
            // estagios_com_inspecao: jsonb array com números dos estágios que têm inspeção
            estagios_com_inspecao: Array.from(estagiosComInspecao).sort((a, b) => a - b),
            regras_negocio: regras.filter((r) => r.trim()).map((r) => ({ regra: r })),
          };
          console.log('isNew:', isNew, '| ficha?.id:', ficha?.id, '| produto.id:', produto?.id);
          console.log('fichaData payload:', fichaData);

          let fichaId = ficha?.id;
          if (isNew) {
            const res = await supabase.from('fichas_mestres').insert(fichaData).select().single();
            console.log('INSERT result:', res);
            if (res.error) throw res.error;
            fichaId = res.data?.id;
          } else {
            const res = await supabase.from('fichas_mestres').update(fichaData).eq('id', ficha.id).select();
            console.log('UPDATE result:', res);
            if (res.error) throw res.error;
            // Detecção do silent failure por RLS: update sem error mas data vazio = nada foi alterado
            if (!res.data || res.data.length === 0) {
              throw new Error(
                'Nenhuma linha foi atualizada. Causa provável: política RLS bloqueando UPDATE, ' +
                'ou a Ficha (id=' + ficha.id + ') não existe mais no banco. ' +
                'Verifique no Supabase Studio → Authentication → Policies se há policy de UPDATE em fichas_mestres.'
              );
            }
          }

          // Replace child records — só acessórios agora (roteiro e inspeções removidos do modelo)
          if (fichaId) {
            const delRes = await supabase.from('acessorios_aplicaveis').delete().eq('ficha_id', fichaId);
            console.log('DELETE acessorios result:', delRes);

            // Acessórios comuns (uma linha cada, sem grupo)
            const linhasComuns = acessorios
              .filter((a) => a.descricao && a.codigo_sapiens)
              .map((a) => ({
                descricao: a.descricao, codigo_sapiens: a.codigo_sapiens,
                obrigatorio: a.obrigatorio !== false,
                is_fabricante_confiance: !!a.is_fabricante_confiance,
                esteril: !!a.esteril,
                pode_sair_apenas_na_nf: !!a.pode_sair_apenas_na_nf,
                grupo_alternativo: null,
              }));

            // Blocos alternativos: expandem em N linhas (uma por código), todas
            // compartilhando grupo_alternativo = descrição do bloco. obrigatorio=false
            // individualmente (a regra "pelo menos um" é do grupo).
            const linhasAlt = [];
            for (const b of acessoriosAlt) {
              const desc = (b.descricao || '').trim();
              const cods = (b.codigos || []).map((c) => (c || '').trim()).filter(Boolean);
              if (!desc || cods.length === 0) continue;
              for (const c of cods) {
                linhasAlt.push({
                  descricao: desc, codigo_sapiens: c,
                  obrigatorio: false,
                  is_fabricante_confiance: !!b.is_fabricante_confiance,
                  esteril: !!b.esteril,
                  pode_sair_apenas_na_nf: !!b.pode_sair_apenas_na_nf,
                  grupo_alternativo: desc,
                });
              }
            }

            const rows = [...linhasComuns, ...linhasAlt].map((r, i) => ({ ficha_id: fichaId, ordem: i + 1, ...r }));
            if (rows.length > 0) {
              let insRes = await supabase.from('acessorios_aplicaveis').insert(rows);
              console.log('INSERT acessorios result:', insRes);
              // Fallback: se a coluna grupo_alternativo ainda não existe no banco
              // (migration não aplicada), o insert inteiro é rejeitado. Reinsere sem
              // o campo para não perder os acessórios e avisa que a regra de grupos
              // só funciona após rodar a migration.
              const colFaltando = insRes.error && (
                insRes.error.code === 'PGRST204' ||
                /grupo_alternativo/i.test(insRes.error.message || '') ||
                /grupo_alternativo/i.test(insRes.error.details || '')
              );
              if (colFaltando) {
                console.warn('Coluna grupo_alternativo ausente — reinserindo sem o campo.');
                const rowsSemGrupo = rows.map(({ grupo_alternativo, ...r }) => r);
                insRes = await supabase.from('acessorios_aplicaveis').insert(rowsSemGrupo);
                console.log('INSERT acessorios (fallback) result:', insRes);
                if (insRes.error) throw insRes.error;
                if (acessoriosAlt.length > 0) {
                  toast.error('Acessórios salvos, MAS os grupos alternativos NÃO foram registrados como grupo: falta a coluna "grupo_alternativo" no banco. Rode a migration migration-grupo-alternativo-acessorios.sql no Supabase.', { duration: 20000 });
                }
              } else if (insRes.error) {
                throw insRes.error;
              }
            }

            // Snapshot de revisão — guarda o estado salvo para consulta/reversão.
            // Usa o MESMO proxVersao do selo da ficha (mantém list e revisões em sincronia).
            try {
              const { error: revErr } = await supabase.from('fichas_mestres_versoes').insert({
                ficha_id: fichaId, versao: proxVersao,
                snapshot: { ficha: fichaData, acessorios: rows.map(({ ficha_id, ...r }) => r) },
                motivo: isNew ? 'Criação' : 'Salvamento',
                criado_por_id: usuarioAtual?.id || null,
                criado_por_nome: usuarioAtual?.nome_completo || usuarioAtual?.email || null,
              });
              if (revErr) throw revErr;
            } catch (e) {
              console.warn('Falha ao gravar revisão da ficha:', e?.message || e);
              toast.error('A ficha foi salva, mas a REVISÃO não foi registrada: ' + (e?.message || e) + '. Confirme se a migration migration-fichas-revisoes.sql foi rodada no Supabase.', { duration: 15000 });
            }
          } else {
            console.warn('Sem fichaId após o INSERT/UPDATE — acessórios não foram persistidos.');
          }

          console.log('Save concluído com sucesso');
          console.groupEnd();
          const refFicha = `${produto?.modelo || produto?.codigo_sapiens || 'produto'} (deriv. ${form.derivacao || '—'})`;
          registrarLog(usuarioAtual, isNew ? 'criar_ficha' : 'editar_ficha', 'ficha', refFicha, `${usuarioAtual?.nome_completo || usuarioAtual?.email || 'Usuário'} ${isNew ? 'criou' : 'atualizou'} a Ficha Mestre de ${refFicha}`);
          toast.success(isNew ? 'Ficha Mestre criada!' : 'Ficha Mestre atualizada!');
          onSaved();
        } catch (err) {
          console.error('Erro ao salvar a Ficha:', err);
          console.groupEnd();
          const msg = err?.message || err?.details || err?.hint || JSON.stringify(err) || 'sem detalhes';
          toast.error('Erro ao salvar: ' + msg, { duration: 15000 });
        } finally {

        }
      };

      // Derivação agora vive na FICHA (decisão 18/06/2026) — title puxa do

      const derivStr = (form.derivacao || ficha?.derivacao || '000');

    /* Modal de seleção de derivação de origem para clonagem */
    function ClonarDerivacaoModal({ open, onClose, produto, onClone }) {
      const toast = useToast();
      const [loading, setLoading] = useState(false);
      const [opcoes, setOpcoes] = useState([]); // [{ ficha, produto }]
      const [selecionado, setSelecionado] = useState(null);

      useEffect(() => {
        if (!open || !produto) return;
        const carregar = async () => {
          setLoading(true);
          setSelecionado(null);
          // Busca produtos do mesmo modelo (outras derivações) e suas fichas ativas
          const { data, error } = await supabase
            .from('produtos')
            .select(`
              id, modelo, codigo_sapiens, derivacao, derivacao_descricao,
              ficha:fichas_mestres!fichas_mestres_produto_id_fkey(
                id, nome_comercial, convencao_nro_serie, exemplo_nro_serie,
                data_concessao_anvisa, ativa,
                estagios_aplicaveis, regras_negocio,
                acessorios:acessorios_aplicaveis(ordem, descricao, codigo_sapiens, obrigatorio, is_fabricante_confiance, esteril, pode_sair_apenas_na_nf, grupo_alternativo)
              )
            `)
            .eq('modelo', produto.modelo)
            .neq('id', produto.id);
          setLoading(false);
          if (error) {
            toast.error('Erro ao buscar derivações: ' + error.message);
            return;
          }
          const lista = (data || [])
            .map((p) => {
              const fichas = Array.isArray(p.ficha) ? p.ficha : (p.ficha ? [p.ficha] : []);
              const ficha = fichas.find((f) => f && f.ativa) || null;
              if (!ficha) return null;
              return { ...ficha, produto: { id: p.id, derivacao: p.derivacao, derivacao_descricao: p.derivacao_descricao, codigo_sapiens: p.codigo_sapiens, modelo: p.modelo } };
            })
            .filter(Boolean)
            .sort((a, b) => (a.produto.derivacao || '000').localeCompare(b.produto.derivacao || '000'));
          setOpcoes(lista);
        };
        carregar();
      }, [open, produto?.id, produto?.modelo]);

      return (
        <Modal
          open={open}
          onClose={onClose}
          title="Clonar de outra derivação"
          description={`Selecione uma derivação cadastrada do modelo "${produto?.modelo}" para usar como ponto de partida. Os campos serão preenchidos e ficarão editáveis antes de salvar.`}
          size="lg"
        >
          <div className="space-y-3">
            {loading && <div className="text-sm text-muted-foreground p-4">Carregando derivações…</div>}
            {!loading && opcoes.length === 0 && (
              <div className="rounded-md border border-dashed p-6 text-center text-sm text-muted-foreground">
                Não existem outras derivações com Ficha Mestre cadastrada para o modelo <strong>{produto?.modelo}</strong>.
                <br />
                Cadastre a ficha do zero ou volte e crie primeiro uma derivação de referência.
              </div>
            )}
            {!loading && opcoes.length > 0 && (
              <div className="rounded-md border divide-y max-h-96 overflow-y-auto">
                {opcoes.map((opt) => {
                  const ativo = selecionado === opt.id;
                  return (
                    <button
                      key={opt.id}
                      type="button"
                      onClick={() => setSelecionado(opt.id)}
                      className={`w-full text-left p-3 transition-colors ${ativo ? 'bg-accent/15' : 'hover:bg-muted/50'}`}
                    >
                      <div className="flex items-center gap-3">
                        <div className={`w-4 h-4 rounded-full border-2 shrink-0 ${ativo ? 'bg-primary border-primary' : 'border-muted-foreground/40'}`} />
                        <div className="flex-1 min-w-0">
                          <div className="font-semibold text-sm">
                            <span className="font-mono">{opt.produto.derivacao}</span>
                            <span className="text-muted-foreground"> · </span>
                            <span>{opt.produto.derivacao_descricao}</span>
                          </div>
                          <div className="text-xs text-muted-foreground mt-0.5">
                            {(opt.acessorios?.length || 0)} acessórios · {(opt.estagios_aplicaveis?.length || 0)} estágios variáveis aplicáveis
                          </div>
                        </div>
                      </div>
                    </button>
                  );
                })}
              </div>
            )}
            <div className="flex justify-end gap-2 pt-2 border-t">
              <Button variant="outline" onClick={onClose}>Cancelar</Button>
              <Button
                disabled={!selecionado}
                onClick={() => {
                  const sel = opcoes.find((o) => o.id === selecionado);
                  if (sel) onClone(sel);
                }}
              >
                Aplicar clone
              </Button>
            </div>
          </div>
        </Modal>
      );
    }

    /* Modal para importar dados de documentos exemplo (OP+RC+Etiquetas) e pré-preencher a Ficha */
    function ImportarDocumentosModal({ open, onClose, onImport }) {
      const [opFile, setOpFile] = useState(null);
      const [rcFile, setRcFile] = useState(null);
      const [etFile, setEtFile] = useState(null);
      const [acFiles, setAcFiles] = useState([]);
      const [importing, setImporting] = useState(false);
      const toast = useToast();

      useEffect(() => {
        if (!open) { setOpFile(null); setRcFile(null); setEtFile(null); setAcFiles([]); }
      }, [open]);

      const handleImport = async () => {
        if (!opFile && !etFile && acFiles.length === 0) {
          toast.error('Envie ao menos um documento para importar.');
          return;
        }
        setImporting(true);
        try {
          await onImport({ op: opFile, rc: rcFile, et: etFile, acs: acFiles });
        } catch (err) {
          toast.error('Erro ao importar: ' + err.message);
        } finally {
          setImporting(false);
        }
      };

      const SimpleSlot = ({ label, hint, accept, file, onSelect, onClear }) => {
        const inputRef = useRef();
        const acceptList = (accept || '').split(',').map((s) => s.trim().toLowerCase()).filter(Boolean);
        const aceito = (f) => !acceptList.length || acceptList.includes('.' + (f.name || '').split('.').pop().toLowerCase());
        return (
          <DropZone
            onFiles={(arqs) => { const f = arqs.find(aceito); if (f) onSelect(f); }}
            className={cn('flex items-center justify-between gap-4 rounded-lg border p-3 transition-colors', file ? '' : 'border-dashed')}
            style={file ? { borderColor: 'hsl(var(--status-conforme) / 0.5)', backgroundColor: 'hsl(var(--status-conforme) / 0.05)' } : {}}
          >
            <div className="min-w-0 flex-1">
              <div className="text-sm font-medium flex items-center gap-2">
                {label}
                {file && <Icon name="check" className="h-4 w-4" style={{ color: 'hsl(var(--status-conforme))' }} />}
              </div>
              <div className="text-xs text-muted-foreground truncate">{file ? file.name : `${hint} · arraste ou selecione`}</div>
            </div>
            <input ref={inputRef} type="file" accept={accept} className="hidden"
              onChange={(e) => { if (e.target.files[0]) onSelect(e.target.files[0]); e.target.value = ''; }} />
            <div className="flex items-center gap-1">
              {file && (
                <Button variant="ghost" size="icon" onClick={onClear} title="Remover">
                  <Icon name="trash" className="h-3.5 w-3.5" />
                </Button>
              )}
              <Button variant="outline" size="sm" onClick={() => inputRef.current?.click()}>
                <Icon name="upload" className="h-3.5 w-3.5" />{file ? 'Trocar' : 'Selecionar'}
              </Button>
            </div>
          </DropZone>
        );
      };

      const MultiSlot = ({ label, hint, accept, files, onSelect, onClearOne }) => {
        const inputRef = useRef();
        const hasItems = files.length > 0;
        const acceptList = (accept || '').split(',').map((s) => s.trim().toLowerCase()).filter(Boolean);
        const aceito = (f) => !acceptList.length || acceptList.includes('.' + (f.name || '').split('.').pop().toLowerCase());
        return (
          <DropZone
            onFiles={(arqs) => { const ok = arqs.filter(aceito); if (ok.length) onSelect(ok); }}
            className={cn('rounded-lg border p-3 transition-colors', hasItems ? '' : 'border-dashed')}
            style={hasItems ? { borderColor: 'hsl(var(--status-conforme) / 0.5)', backgroundColor: 'hsl(var(--status-conforme) / 0.05)' } : {}}
          >
            <div className="flex items-center justify-between gap-4">
              <div className="min-w-0 flex-1">
                <div className="text-sm font-medium flex items-center gap-2">
                  {label}
                  {hasItems && <Icon name="check" className="h-4 w-4" style={{ color: 'hsl(var(--status-conforme))' }} />}
                </div>
                <div className="text-xs text-muted-foreground">{hasItems ? `${files.length} arquivo(s) selecionado(s)` : `${hint} · arraste ou selecione`}</div>
              </div>
              <input ref={inputRef} type="file" accept={accept} multiple className="hidden"
                onChange={(e) => { if (e.target.files.length > 0) onSelect(Array.from(e.target.files)); e.target.value = ''; }} />
              <Button variant="outline" size="sm" onClick={() => inputRef.current?.click()}>
                <Icon name="upload" className="h-3.5 w-3.5" />Adicionar
              </Button>
            </div>
            {hasItems && (
              <div className="mt-3 space-y-1.5 pt-3 border-t" style={{ borderColor: 'hsl(var(--status-conforme) / 0.2)' }}>
                {files.map((f, i) => (
                  <div key={i} className="flex items-center justify-between gap-2 text-xs">
                    <span className="truncate">{f.name}</span>
                    <button onClick={() => onClearOne(i)} className="text-muted-foreground hover:text-destructive shrink-0">
                      <Icon name="trash" className="h-3 w-3" />
                    </button>
                  </div>
                ))}
              </div>
            )}
          </DropZone>
        );
      };

      return (
        <Modal
          open={open}
          onClose={onClose}
          title="Importar dados de documentos exemplo"
          description="Sobe um conjunto de documentos exemplo deste produto para o agente pré-preencher a Ficha Mestre. Você revisa cada seção e ajusta antes de salvar."
          size="lg"
        >
          <div className="space-y-3 mb-4">
            <SimpleSlot
              label="Ordem de Produção (OP)"
              hint="PDF — extrai estágios, série e convenção"
              accept=".pdf"
              file={opFile}
              onSelect={setOpFile}
              onClear={() => setOpFile(null)}
            />
            <SimpleSlot
              label="Relação de Componentes (RC)"
              hint="PDF, XLSX ou CSV — extrai códigos Sapiens para a BOM"
              accept=".pdf,.xlsx,.csv"
              file={rcFile}
              onSelect={setRcFile}
              onClear={() => setRcFile(null)}
            />
            <SimpleSlot
              label="Etiqueta Externa do Produto"
              hint="DOCX — extrai família, modelo, RT, CREA e responsável legal"
              accept=".docx"
              file={etFile}
              onSelect={setEtFile}
              onClear={() => setEtFile(null)}
            />
            <MultiSlot
              label="Etiquetas de Acessórios"
              hint="DOCX — uma por acessório aplicável (extrai descrição, código, fabricante/fornecedor, estéril)"
              accept=".docx"
              files={acFiles}
              onSelect={(arr) => setAcFiles((prev) => [...prev, ...arr])}
              onClearOne={(i) => setAcFiles((prev) => prev.filter((_, idx) => idx !== i))}
            />
          </div>

          <Card className="mb-4" style={{ borderColor: 'hsl(var(--accent) / 0.3)', backgroundColor: 'hsl(var(--accent) / 0.05)' }}>
            <CardContent className="pt-4 pb-4">
              <div className="flex items-start gap-2">
                <Icon name="info" className="h-4 w-4 text-accent mt-0.5 shrink-0" />
                <div className="text-xs space-y-1.5">
                  <div><strong>Mapeamento documento → seção da Ficha:</strong></div>
                  <ul className="list-disc pl-5 space-y-1">
                    <li><strong>OP →</strong> exemplo de nº de série, convenção de série, roteiro do FORM-GQ-0047 (estágios encontrados = SIM, demais = N/A), inspeções e critérios (uma por estágio)</li>
                    <li><strong>RC →</strong> exemplo de lote e validade dos acessórios, descrições dos acessórios</li>
                    <li><strong>Etiqueta Externa →</strong> dados de identificação do produto (família, modelo, fabricante, CNPJ, endereço, RT, CREA)</li>
                    <li><strong>Etiqueta Acessório →</strong> descrição, lote e validade dos acessórios</li>
                  </ul>
                </div>
              </div>
            </CardContent>
          </Card>

          <div className="flex justify-end gap-2 pt-3 border-t">
            <Button variant="outline" onClick={onClose} disabled={importing}>Cancelar</Button>
            <Button onClick={handleImport} disabled={importing || (!opFile && !etFile && acFiles.length === 0)}>
              {importing ? <><Icon name="loader" className="h-4 w-4 animate-spin mr-2" />Importando…</> : <><Icon name="upload" className="h-4 w-4 mr-2" />Importar e preencher Ficha</>}
            </Button>
          </div>
        </Modal>
      );
    }

    /* ====================================================================
       Cadastro: aba Catálogo (produtos) — vide CatalogoTab acima
       ==================================================================== */

    /* ====================================================================
       ProdutoSelectorModal — modal de seleção de produto pra criar Ficha
       Mestre. Aparece quando o usuário clica em "Nova Ficha Mestre".
       Lista produtos do catálogo com busca por modelo / equipamento /
       código Sapiens.
       ==================================================================== */
    function ProdutoSelectorModal({ open, onClose, onSelect, produtosSemFicha }) {
      const [query, setQuery] = useState('');
      useEffect(() => { if (open) setQuery(''); }, [open]);

      const lista = useMemo(() => {
        const q = (query || '').trim().toLowerCase();
        const arr = produtosSemFicha || [];
        if (!q) return arr.slice().sort((a, b) => String(a.modelo || a.codigo_sapiens || '').localeCompare(String(b.modelo || b.codigo_sapiens || '')));
        return arr.filter((p) =>
          String(p.modelo || '').toLowerCase().includes(q) ||
          String(p.equipamento || '').toLowerCase().includes(q) ||
          String(p.codigo_sapiens || '').toLowerCase().includes(q) ||
          String(p.codigo_referencia || '').toLowerCase().includes(q)
        );
      }, [produtosSemFicha, query]);

      if (!open) return null;
      return (
        <Modal
          open={open}
          onClose={onClose}
          title="Escolher produto"
          description="Selecione o produto do catálogo para criar uma nova Ficha Mestre. Você pode criar várias fichas para o mesmo produto, uma por derivação."
          size="lg"
        >
          <div className="space-y-3">
            <Input
              placeholder="Buscar por equipamento, modelo, Sapiens ou Cod. Ref…"
              value={query}
              onChange={(e) => setQuery(e.target.value)}
              autoFocus
            />
            {lista.length === 0 ? (
              <div className="rounded-lg border border-dashed p-8 text-center text-sm text-muted-foreground">
                Nenhum produto encontrado{query ? ` para "${query}"` : ''}.
                <div className="text-xs mt-1">Cadastre produtos na aba Catálogo antes de criar fichas.</div>
              </div>
            ) : (
              <div className="max-h-96 overflow-auto border rounded-lg divide-y">
                {lista.map((p) => (
                  <button
                    key={p.id}
                    onClick={() => onSelect(p)}
                    className="w-full text-left px-3 py-2.5 hover:bg-muted/60 transition-colors flex items-center justify-between gap-3"
                  >
                    <div className="min-w-0 flex-1">
                      <div className="text-sm font-medium truncate">{p.modelo || p.codigo_sapiens || '—'}</div>
                      <div className="text-xs text-muted-foreground truncate">
                        {p.equipamento || '—'}
                        {p.codigo_sapiens ? ` · Sapiens ${p.codigo_sapiens}` : ''}
                        {p.codigo_referencia ? ` · Ref ${p.codigo_referencia}` : ''}
                      </div>
                    </div>
                    <Icon name="chevronLeft" className="h-3.5 w-3.5 rotate-180 text-muted-foreground shrink-0" />
                  </button>
                ))}
              </div>
            )}
            <div className="flex justify-end pt-2 border-t">
              <Button variant="outline" onClick={onClose}>Cancelar</Button>
            </div>
          </div>
        </Modal>
      );
    }

    /* ====================================================================
       FichasTab — aba "Fichas Mestres" na página de Cadastro
       ==================================================================== */
    function FichasTab() {
      const toast = useToast();
      const { perfil: usuarioAtual, can } = usePerm();
      const { pedirOuExecutar } = useSolic();
      const [fichas, setFichas] = useState([]);
      const [produtos, setProdutos] = useState([]);
      const [loading, setLoading] = useState(true);
      const [reloadKey, setReloadKey] = useState(0);
      const [editing, setEditing] = useState(null);
      const [selectorOpen, setSelectorOpen] = useState(false);
      const [filtroEquip, setFiltroEquip] = useState('');
      const [filtroApta, setFiltroApta] = useState('todas'); // 'todas' | 'aptas' | 'pendentes'

      useEffect(() => {
        const load = async () => {
          setLoading(true);
          const [fichasRes, produtosRes] = await Promise.all([
            supabase.from('fichas_mestres')
              .select(`*, produto:produtos(id, equipamento, modelo, codigo_referencia, codigo_sapiens, registro_anvisa), acessorios:acessorios_aplicaveis(ordem, descricao, codigo_sapiens, obrigatorio, is_fabricante_confiance, esteril, pode_sair_apenas_na_nf, grupo_alternativo)`)
              .eq('ativa', true)
              .order('created_at', { ascending: false }),
            supabase.from('produtos').select('id, equipamento, modelo, codigo_referencia, codigo_sapiens, registro_anvisa').eq('ativo', true).order('modelo'),
          ]);
          setFichas(fichasRes.data || []);
          setProdutos(produtosRes.data || []);
          setLoading(false);
        };
        load();
      }, [reloadKey]);

      const produtosSemFicha = useMemo(() => produtos, [produtos]);

      const handleEdit = (ficha) => setEditing({ ficha, produto: ficha.produto });
      const handleNew = (produto) => { setSelectorOpen(false); setEditing({ ficha: null, produto }); };
      const handleDelete = async (ficha) => {
        const refFicha = `${ficha.produto?.modelo || ficha.produto?.codigo_sapiens || 'produto'} (deriv. ${ficha.derivacao || '—'})`;
        // Sem permissão → solicita aprovação; com permissão → exclui direto.
        pedirOuExecutar({ acao: 'excluir_ficha', entidade: 'ficha', entidadeRef: refFicha, payload: { ficha_id: ficha.id } }, async () => {
          if (!confirm(`Excluir a Ficha Mestre de ${refFicha}? Esta ação não pode ser desfeita.`)) return;
          try {
            const { error } = await supabase.from('fichas_mestres').delete().eq('id', ficha.id);
            if (error) throw error;
            await registrarLog(usuarioAtual, 'excluir_ficha', 'ficha', refFicha, `${usuarioAtual?.nome_completo || usuarioAtual?.email || 'Usuário'} excluiu a Ficha Mestre de ${refFicha}`);
            toast.success('Ficha Mestre excluída.');
            setReloadKey((k) => k + 1);
          } catch (err) { toast.error('Erro ao excluir: ' + err.message); }
        });
      };

      const equipamentos = Array.from(new Set(fichas.map((f) => f.produto?.equipamento).filter(Boolean))).sort();
      const fichasFiltradas = fichas.filter((f) => {
        if (filtroEquip && (f.produto?.equipamento || '') !== filtroEquip) return false;
        if (filtroApta === 'aptas' && !f.apta_analise) return false;
        if (filtroApta === 'pendentes' && f.apta_analise) return false;
        return true;
      });
      const exportarFichasXlsx = () => {
        if (!fichasFiltradas.length) { toast.error('Nenhuma ficha para exportar.'); return; }
        const linhas = fichasFiltradas.map((f) => ({
          'Equipamento': f.produto?.equipamento || '',
          'Modelo': f.produto?.modelo || '',
          'Código Sapiens': f.produto?.codigo_sapiens || '',
          'Derivação': f.derivacao || '',
          'Descrição derivação': f.derivacao_descricao || '',
          'Registro ANVISA': f.produto?.registro_anvisa || '',
          'Nº acessórios': (f.acessorios || []).length,
          'Estágios aplicáveis': (f.estagios_aplicaveis || []).length,
          'Situação': f.apta_analise ? 'Apta' : 'Pendente de revisão',
          'Revisão': f.versao || 1,
        }));
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(linhas);
        ws['!cols'] = [{ wch: 28 }, { wch: 18 }, { wch: 14 }, { wch: 10 }, { wch: 28 }, { wch: 16 }, { wch: 12 }, { wch: 14 }, { wch: 20 }, { wch: 10 }];
        XLSX.utils.book_append_sheet(wb, ws, 'Fichas Mestres');
        XLSX.writeFile(wb, `fichas_mestres${filtroEquip ? '_' + filtroEquip.replace(/[^\w\dÀ-ÿ]+/g, '_') : ''}_${new Date().toISOString().slice(0, 10)}.xlsx`);
        registrarLog(usuarioAtual, 'exportar_fichas', 'ficha', filtroEquip || 'todas', `${usuarioAtual?.nome_completo || usuarioAtual?.email || 'Usuário'} exportou fichas mestres (${filtroEquip || 'todos os equipamentos'}) em XLSX`);
      };

      if (editing) {
        return (
          <FichaMestreEditor
            ficha={editing.ficha}
            produto={editing.produto}
            onClose={() => setEditing(null)}
            onSaved={() => { setEditing(null); setReloadKey((k) => k + 1); }}
          />
        );
      }

      return (
        <div>
          <PageHeader
            title="Fichas Mestres"
            description="Cada ficha define a derivação de um produto, etiquetas, acessórios e regras de cruzamento."
            actions={
              <div className="flex items-center gap-2 flex-wrap">
                <select value={filtroEquip} onChange={(e) => setFiltroEquip(e.target.value)} className="h-9 rounded-md border border-input bg-background px-2 text-sm" title="Filtrar por equipamento">
                  <option value="">Todos os equipamentos</option>
                  {equipamentos.map((eq) => <option key={eq} value={eq}>{eq}</option>)}
                </select>
                <select value={filtroApta} onChange={(e) => setFiltroApta(e.target.value)} className="h-9 rounded-md border border-input bg-background px-2 text-sm" title="Filtrar por situação de revisão">
                  <option value="todas">Todas as situações</option>
                  <option value="aptas">✓ Aptas</option>
                  <option value="pendentes">⚠ Pendentes de revisão</option>
                </select>
                <Button variant="outline" onClick={exportarFichasXlsx} title="Exportar as fichas filtradas em Excel"><Icon name="download" className="h-4 w-4" />XLSX</Button>
                <Button onClick={() => setSelectorOpen(true)}><Icon name="plus" />Nova Ficha Mestre</Button>
              </div>
            }
          />
          {loading ? (
            <div className="flex items-center justify-center py-12 text-muted-foreground text-sm">
              <Icon name="loader" className="h-4 w-4 animate-spin mr-2" />Carregando fichas…
            </div>
          ) : fichasFiltradas.length === 0 ? (
            <Card>
              <CardContent className="py-10 text-center">
                <div className="text-sm text-muted-foreground">{filtroEquip ? `Nenhuma ficha para o equipamento "${filtroEquip}".` : 'Nenhuma Ficha Mestre cadastrada.'}</div>
                {!filtroEquip && produtosSemFicha.length > 0 && (
                  <Button className="mt-4" onClick={() => setSelectorOpen(true)}>
                    <Icon name="plus" />Cadastrar primeira Ficha
                  </Button>
                )}
              </CardContent>
            </Card>
          ) : (
            <Card className="overflow-hidden">
              <FichasAgrupadas fichas={fichasFiltradas} onEdit={handleEdit} onDelete={handleDelete} />
            </Card>
          )}
          <ProdutoSelectorModal
            open={selectorOpen}
            onClose={() => setSelectorOpen(false)}
            onSelect={handleNew}
            produtosSemFicha={produtosSemFicha}
          />
        </div>
      );
    }

    /* ====================================================================
       FichasAgrupadas — agrupa fichas por modelo
       ==================================================================== */
    function FichasAgrupadas({ fichas, onEdit, onDelete }) {
      const [aberto, setAberto] = useState({});
      const grupos = useMemo(() => {
        const map = new Map();
        for (const f of fichas) {
          const key = f.produto?.id || f.produto_id || f.id;
          if (!map.has(key)) map.set(key, { produto: f.produto, fichas: [] });
          map.get(key).fichas.push(f);
        }
        return [...map.values()].sort((a, b) =>
