              produtoNaoCadastrado: true,
            });
            return;
          }
          if (!produto.ficha_id) {
            setFormPreview({
              error: `O produto ${produto.familia} · ${produto.modelo} (derivação ${produto.derivacao}) está no catálogo, mas ainda NÃO possui Ficha Mestre cadastrada. Cadastre a Ficha Mestre desse produto no menu Cadastro → Fichas Mestres antes de analisar este lote.`,
              fichaAusente: true,
              produto,
            });
            return;
          }
          // Lê do estado atual dos slots se OP de Reprocesso/RNC foram anexados.
          // Se a usuária anexar OP-rep ou RNC depois desse preview, o preview NÃO é
          // recalculado automaticamente (apenas na re-extração da OP) — pelo menos a
          // análise final sempre passa por executarAnaliseLocal e gera o FORM correto.
          const opcoesPreview = {
            opReprocessoAnexado: !!(slots.op_reprocesso?.file || slots.op_reprocesso?.text),
            rncAnexado:          !!(slots.rnc?.file          || slots.rnc?.text),
          };
          const { xlsxBytes, stats } = await fillFormXlsxTemplate(opParsed, produto, opcoesPreview);
          const opNum = (opParsed?.op || 'semOP').replace(/[^\w\d-]+/g, '_');
          const serieStr = (opParsed?.serie || 'semSerie').replace(/[^\w\d-]+/g, '_');
          setFormPreview({
            bytes: xlsxBytes,
            stats,
            filename: `FORM-GQ-0047_${opNum}_${serieStr}.xlsx`,
            produto,
            opParsed,
          });
        } catch (e) {
          console.error('Falha ao gerar preview do FORM:', e);
          setFormPreview({ error: e?.message || 'Erro ao gerar preview.' });
        }
      }

      const handleDownloadFormPreview = async () => {
        if (!formPreview?.bytes) return;
        const blob = new Blob([formPreview.bytes], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        // Em Chrome/Edge/Opera: abre diálogo "Salvar como..." para escolher pasta
        const ext = '.xlsx';
        const mime = 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet';
        if (window.showSaveFilePicker) {
          try {
            const handle = await window.showSaveFilePicker({
              suggestedName: formPreview.filename,
              types: [{ description: 'Planilha Excel', accept: { [mime]: [ext] } }],
            });
            const writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();
            return;
          } catch (e) {
            if (e?.name === 'AbortError') return;
            console.warn('showSaveFilePicker falhou, usando fallback:', e);
          }
        }
        // Fallback: download tradicional
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = formPreview.filename;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 500);
      };

      async function processSingle(key, file) {
        setSlots((prev) => ({ ...prev, [key]: { file, text: '', status: 'extracting' } }));
        try {
          const text = await extractTextFromFile(file);
          setSlots((prev) => ({ ...prev, [key]: { file, text, status: 'done' } }));
          // Dispara automaticamente o preview do FORM-GQ-0047 quando a OP termina de ser extraída
          if (key === 'op' && text) {
            tryGenerateFormPreview(text);
          }
          // Quando OP de Reprocesso ou RNC são anexadas, re-gera o preview do FORM
          // para refletir a marcação SIM nessas linhas (se a OP já foi processada).
          if ((key === 'op_reprocesso' || key === 'rnc')) {
            setSlots((prev) => {
              if (prev.op?.text) tryGenerateFormPreview(prev.op.text);
              return prev;
            });
          }
        } catch (err) {
          setSlots((prev) => ({ ...prev, [key]: { file, text: '', status: 'error', error: err.message } }));
          toast.error(`Erro ao extrair "${file.name}": ${err.message}`);
        }
      }

      async function processMulti(key, fileList) {
        const newItems = Array.from(fileList).map((file) => ({ file, text: '', status: 'extracting' }));
        setSlots((prev) => ({ ...prev, [key]: [...prev[key], ...newItems] }));
        for (const item of newItems) {
          try {
            const text = await extractTextFromFile(item.file);
            setSlots((prev) => ({
              ...prev,
              [key]: prev[key].map((it) => (it.file === item.file ? { ...it, text, status: 'done' } : it)),
            }));
          } catch (err) {
            setSlots((prev) => ({
              ...prev,
              [key]: prev[key].map((it) => (it.file === item.file ? { ...it, status: 'error', error: err.message } : it)),
            }));
            toast.error(`Erro em "${item.file.name}": ${err.message}`);
          }
        }
      }

      // Classifica um arquivo da pasta no slot correto (OP, RC, etiqueta externa,
      // etiqueta de acessório, reprocesso, RNC, FORM). Usa nome + extensão e, quando
      // ambíguo, o CONTEÚDO extraído (ex.: etiqueta de acessório tem "Acessório Exclusivo";
      // OP tem "O.P./Estágio"; RC tem "Relação de Componentes").
      async function classificarArquivo(file) {
        const nome = (file.name || '').toLowerCase();
        const ext = (nome.match(/\.[^.]+$/) || [''])[0];
        if (ext === '.xlsx' || ext === '.csv') return { slot: 'rc' };
        if (ext === '.docx') {
          let txt = '';
          try { txt = await extractTextFromFile(file); } catch (e) {}
          if (/acess[óo]rio\s+exclusivo/i.test(txt)) return { slot: 'etiqueta_acessorio' };
          return { slot: 'etiqueta_externa' };
        }
        if (ext === '.pdf') {
          if (/reprocesso/i.test(nome)) return { slot: 'op_reprocesso' };
          if (/\brnc\b/i.test(nome)) return { slot: 'rnc' };
          if (/form.?gq.?0047/i.test(nome)) return { slot: 'form_gq_0047' };
          if (/^rc[_\-\s]/i.test(nome) || /rela[çc][ãa]o.*componentes/i.test(nome)) return { slot: 'rc' };
          if (/^op[_\-\s]/i.test(nome) || /ordem.*produ/i.test(nome)) return { slot: 'op' };
          // Ambíguo pelo nome → desambigua pelo conteúdo
          let txt = '';
          try { txt = await extractTextFromFile(file); } catch (e) {}
          if (/FORM-GQ-0047|CHECK-?LIST/i.test(txt)) return { slot: 'form_gq_0047' };
          if (/rela[çc][ãa]o de componentes/i.test(txt)) return { slot: 'rc' };
          if (/O\.?P\.?\s*:|Est[áa]gio\s*:|Ordem de Produ/i.test(txt)) return { slot: 'op' };
          if (/n[ãa]o\s+conformidade|\bRNC\b/i.test(txt)) return { slot: 'rnc' };
          return { slot: null };
        }
        return { slot: null };
      }

      // Recebe todos os arquivos de uma pasta, classifica cada um e preenche os slots.
      async function processarPasta(fileList) {
        const files = Array.from(fileList || []).filter((f) => /\.(pdf|docx|xlsx|csv)$/i.test(f.name));
        if (files.length === 0) { toast.error('Nenhum arquivo compatível (PDF, DOCX, XLSX, CSV) foi encontrado na pasta.'); return; }
        setClassificandoPasta(true);
        try {
          const acessorios = [];
          const reconhecidos = [];
          const ignorados = [];
          const rotulo = { op: 'OP', rc: 'RC', etiqueta_externa: 'Etiqueta Externa', op_reprocesso: 'OP de Reprocesso', rnc: 'RNC', form_gq_0047: 'FORM-GQ-0047 manual' };
          for (const f of files) {
            const c = await classificarArquivo(f);
            if (!c.slot) { ignorados.push(f.name); continue; }
            if (c.slot === 'etiqueta_acessorio') { acessorios.push(f); reconhecidos.push(`${f.name} → Etiqueta de Acessório`); continue; }
            await processSingle(c.slot, f);
            reconhecidos.push(`${f.name} → ${rotulo[c.slot] || c.slot}`);
          }
          if (acessorios.length > 0) await processMulti('etiqueta_acessorio', acessorios);
          if (reconhecidos.length > 0) {
            toast.success(`${reconhecidos.length} arquivo(s) classificado(s) automaticamente${acessorios.length ? ` (incluindo ${acessorios.length} etiqueta(s) de acessório)` : ''}.`, { duration: 8000 });
          }
          if (ignorados.length > 0) {
            toast.error(`Não reconhecido(s) (verifique manualmente): ${ignorados.join(', ')}.`, { duration: 12000 });
          }
        } finally {
          setClassificandoPasta(false);
        }
      }

      function clearSlot(key) {
        setSlots((prev) => {
          const next = { ...prev, [key]: null };
          // Se removeu OP de Reprocesso ou RNC e a OP já estava processada, re-gera
          // o preview do FORM para refletir as marcações N/A nas linhas condicionais.
          if ((key === 'op_reprocesso' || key === 'rnc') && prev.op?.text) {
            // setTimeout para garantir que o setSlots foi commitado antes
            setTimeout(() => tryGenerateFormPreview(prev.op.text), 0);
          }
          return next;
        });
        if (key === 'op') setFormPreview(null); // limpa preview quando a OP é removida
      }
      function clearAcessorio(file) {
        setSlots((prev) => ({ ...prev, etiqueta_acessorio: prev.etiqueta_acessorio.filter((it) => it.file !== file) }));
      }

      const handleAnalyze = async () => {
        if (!allObrigatoriosOk || analyzing) return;
        setAnalyzing(true);
        setParecer(null);
        try {
          // Análise 100% local — regras determinísticas em JS aplicadas aos textos extraídos.
          // Sem chamada a API externa de LLM.
          // Libera a reanálise de OP já finalizada SOMENTE se ela estiver na worklist
          // (tabela no banco) — consulta direta para não depender de estado em memória.
          const opNum = (parseOP(slots.op?.text || '')?.op || '').replace(/\D/g, '');
          let naLista = false;
          if (opNum) { try { const { data } = await supabase.from('worklist_ops').select('op').eq('op', opNum).limit(1); naLista = !!(data && data.length); } catch (e) { /* ignora */ } }
          const parecer = await executarAnaliseLocal(slots, { permitirRefazer: naLista });
          setParecer(parecer);
          const opRef = parecer?.produto?.numero_op || '?';
          registrarLog(usuarioAtual, 'executar_analise', 'analise', `OP ${opRef}`, `${usuarioAtual?.nome_completo || usuarioAtual?.email || 'Usuário'} executou a análise da OP ${opRef} (${(parecer?.resultado_geral || '').toUpperCase()})`);
          toast.success('Análise concluída. Parecer abaixo.');
        } catch (err) {
          // Bloqueios específicos têm tratamento diferenciado (sem stack trace, mensagem clara)
          if (err?.code === 'PRODUTO_NAO_CADASTRADO' || err?.code === 'FICHA_MESTRE_AUSENTE' || err?.code === 'ANALISE_DUPLICADA') {
            toast.error(err.message, { duration: 14000 });
          } else {
            toast.error('Erro na análise: ' + err.message);
          }
        } finally {
          setAnalyzing(false);
        }
      };

      const handleNovaAnalise = () => {
        setParecer(null);
        setFormPreview(null);
        setSlots({
          op: null, rc: null, form_gq_0047: null, etiqueta_externa: null,
          etiqueta_acessorio: [], op_reprocesso: null, rnc: null,
        });
        // Volta para a lista de OPs pendentes (worklist)
        setOpSelecionada(null);
        setEtapa('buscar');
      };

      // Data da conciliação detectada na OP submetida (mostrada no card e usada na
      // pré-visualização). ISO "yyyy-mm-dd" ou null.
      const dataConcilDetectada = useMemo(() => {
        if (slots.op?.status !== 'done' || !slots.op?.text) return null;
        try { return parseOP(slots.op.text)?.dataConciliacao || null; } catch (e) { return null; }
      }, [slots.op?.status, slots.op?.text]);

      // Se já temos parecer, mostra tela de resultado
      if (parecer) {
        return <ParecerView parecer={parecer} analiseId={parecer._analiseId} onBack={handleNovaAnalise} backLabel="Nova análise" backIcon="plus" />;
      }

      // Etapa de busca: lista de OPs finalizadas pendentes (importadas do Sapiens).
      if (etapa === 'buscar') {
        return (
          <BuscarOPsPendentes
            onSelecionar={(op) => { setOpSelecionada(op); setEtapa('nova'); }}
            onNovaAvulsa={() => { setOpSelecionada(null); setEtapa('nova'); }}
          />
        );
      }

      return (
        <div>
          <div className="no-print mb-3 flex items-center justify-between gap-3 flex-wrap">
            <Button variant="ghost" size="sm" onClick={() => { setOpSelecionada(null); setEtapa('buscar'); }}>
              <Icon name="arrowLeft" className="h-4 w-4" />Voltar à lista de OPs
            </Button>
            {opSelecionada && (
              <span className="text-sm px-3 py-1.5 rounded-md border font-medium" style={{ backgroundColor: 'hsl(var(--accent) / 0.10)', color: 'hsl(var(--accent))' }}>
                Analisando OP {opSelecionada} — anexe os documentos deste lote
              </span>
            )}
          </div>
          <PageHeader
            title="Nova análise"
            description="Faça upload dos documentos do lote. A plataforma extrai o texto automaticamente no seu navegador antes de enviar para o agente."
          />

          <div className="grid grid-cols-1 lg:grid-cols-3 gap-4">
            <Card className="lg:col-span-2">
              <CardHeader>
                <CardTitle className="flex items-center gap-2"><Icon name="upload" className="h-5 w-5 text-accent" />Documentos obrigatórios</CardTitle>
                <CardDescription>Sem estes 4 arquivos extraídos, a análise não pode ser executada.</CardDescription>
              </CardHeader>
              <CardContent className="space-y-3">
                {/* Envio de PASTA inteira — classificação automática dos arquivos nos slots */}
                <input
                  type="file"
                  ref={folderInputRef}
                  style={{ display: 'none' }}
                  webkitdirectory=""
                  directory=""
                  multiple
                  onChange={(e) => { if (e.target.files?.length) processarPasta(e.target.files); e.target.value = ''; }}
                />
                <DropZone
                  onFiles={(arquivos) => { if (!classificandoPasta) processarPasta(arquivos); }}
                  disabled={classificandoPasta}
                  className="rounded-lg border border-dashed border-accent/50 bg-accent/5 p-3 flex items-center justify-between gap-3 flex-wrap transition-colors"
                >
                  {(dragging) => (<>
                    <div className="text-sm">
                      <div className="font-semibold flex items-center gap-2"><Icon name="upload" className="h-4 w-4 text-accent" />Enviar a pasta inteira da OP (detecção automática)</div>
                      <div className="text-xs text-muted-foreground mt-0.5">{dragging ? 'Solte a pasta ou os arquivos aqui — a plataforma classifica sozinha.' : 'Arraste a pasta (ou os arquivos) para cá, ou clique em Selecionar. A plataforma separa sozinha OP, RC, etiqueta externa, etiquetas de acessório, reprocesso, RNC e FORM.'}</div>
                    </div>
                    <Button variant="outline" size="sm" disabled={classificandoPasta} onClick={() => folderInputRef.current && folderInputRef.current.click()}>
                      {classificandoPasta ? (<><Icon name="loader" className="h-4 w-4 animate-spin" />Classificando…</>) : (<><Icon name="upload" className="h-4 w-4" />Selecionar pasta</>)}
                    </Button>
                  </>)}
                </DropZone>
                <UploadSlotV2
                  label="Ordem de Produção (OP)"
                  formats="PDF"
                  accept=".pdf"
                  slot={slots.op}
                  onSelect={(f) => processSingle('op', f)}
                  onClear={() => clearSlot('op')}
                  onPreview={() => slots.op?.status === 'done' && setPreviewing({ label: 'Ordem de Produção', text: slots.op.text })}
                  onPrefill={slots.op?.status === 'done' ? () => openPrefill('op') : undefined}
                  infoExtra={slots.op?.status === 'done' ? (
                    dataConcilDetectada
                      ? { ok: true, texto: `Conciliação detectada: ${dataConcilDetectada.split('-').reverse().join('/')}` }
                      : { ok: false, texto: 'Data da conciliação não detectada — verificar manualmente' }
                  ) : null}
                />
                <UploadSlotV2 label="Relação de Componentes (RC)" formats="PDF, XLSX ou CSV" accept=".pdf,.xlsx,.csv" slot={slots.rc} onSelect={(f) => processSingle('rc', f)} onClear={() => clearSlot('rc')} onPreview={() => slots.rc?.status === 'done' && setPreviewing({ label: 'Relação de Componentes', text: slots.rc.text })} />
                <UploadSlotV2 label="Etiqueta Externa do Produto" formats="DOCX" accept=".docx" slot={slots.etiqueta_externa} onSelect={(f) => processSingle('etiqueta_externa', f)} onClear={() => clearSlot('etiqueta_externa')} onPreview={() => slots.etiqueta_externa?.status === 'done' && setPreviewing({ label: 'Etiqueta Externa', text: slots.etiqueta_externa.text })} />

                {/* Card dinâmico do FORM-GQ-0047: muda conforme o estado do preview gerado a partir da OP */}
                {!slots.op?.status && (
                  <div className="rounded-lg border border-dashed p-3 bg-accent/5 border-accent/30">
                    <div className="flex items-start gap-3">
                      <Icon name="sparkles" className="h-5 w-5 mt-0.5 shrink-0" style={{ color: 'hsl(var(--accent))' }} />
                      <div className="min-w-0 flex-1">
                        <div className="text-sm font-medium">FORM-GQ-0047 — gerado pela plataforma</div>
                        <div className="text-xs text-muted-foreground mt-0.5">
                          Não precisa anexar. Quando você subir a OP, a plataforma vai preencher o template oficial Rev. 8 automaticamente.
                        </div>
                      </div>
                    </div>
                  </div>
                )}
                {slots.op?.status === 'extracting' && (
                  <div className="rounded-lg border p-3 bg-muted/30">
                    <div className="flex items-center gap-3">
                      <Icon name="loader" className="h-5 w-5 animate-spin" />
                      <div className="text-sm text-muted-foreground">Aguardando extração da OP para gerar o FORM-GQ-0047…</div>
                    </div>
                  </div>
                )}
                {slots.op?.status === 'done' && formPreview?.loading && (
                  <div className="rounded-lg border p-3 bg-muted/30">
                    <div className="flex items-center gap-3">
                      <Icon name="loader" className="h-5 w-5 animate-spin" />
                      <div className="text-sm text-muted-foreground">Gerando FORM-GQ-0047 preenchido…</div>
                    </div>
                  </div>
                )}
                {slots.op?.status === 'done' && formPreview?.error && (
                  <div className="rounded-lg border p-3" style={{ backgroundColor: 'hsl(38 92% 95%)', borderColor: 'hsl(38 92% 70%)' }}>
                    <div className="flex items-start gap-3">
                      <Icon name="alert" className="h-5 w-5 mt-0.5 shrink-0" style={{ color: 'hsl(38 92% 35%)' }} />
                      <div className="min-w-0 flex-1">
                        <div className="text-sm font-medium" style={{ color: 'hsl(38 92% 25%)' }}>Não foi possível gerar o FORM-GQ-0047 ainda</div>
                        <div className="text-xs mt-0.5" style={{ color: 'hsl(38 92% 30%)' }}>{formPreview.error}</div>
                      </div>
                    </div>
                  </div>
                )}
                {slots.op?.status === 'done' && formPreview?.bytes && (
                  <div className="rounded-lg border p-3" style={{ backgroundColor: 'hsl(142 60% 95%)', borderColor: 'hsl(142 60% 60%)' }}>
                    <div className="flex items-start gap-3">
                      <Icon name="check" className="h-5 w-5 mt-0.5 shrink-0" style={{ color: 'hsl(142 60% 30%)' }} />
                      <div className="min-w-0 flex-1">

    // ------------------------------------------------------------------
    // Drag-and-drop reutilizável: lê arquivos de um evento de "drop",
    // inclusive quando o que foi arrastado é uma PASTA (traversal recursivo
    // via webkitGetAsEntry). Sempre devolve uma lista plana de File.
    // ------------------------------------------------------------------
    function coletarArquivosDrop(dataTransfer) {
      const items = dataTransfer && dataTransfer.items;
      const semEntry = !items || !items.length || typeof items[0].webkitGetAsEntry !== 'function';
      if (semEntry) return Promise.resolve(Array.from((dataTransfer && dataTransfer.files) || []));
      const entries = [];
      for (let i = 0; i < items.length; i++) {
        const ent = items[i].webkitGetAsEntry && items[i].webkitGetAsEntry();
        if (ent) entries.push(ent);
      }
      if (!entries.length) return Promise.resolve(Array.from(dataTransfer.files || []));
      const out = [];
      const lerEntry = (entry) => new Promise((resolve) => {
        if (entry.isFile) {
          entry.file((f) => {
            // preserva o caminho relativo (útil ao classificar arquivos de pasta)
            try {
              if (entry.fullPath && !f.webkitRelativePath) {
                Object.defineProperty(f, 'webkitRelativePath', { value: entry.fullPath.replace(/^\//, ''), configurable: true });
              }
            } catch (e) { /* ignora navegadores que não permitem */ }
            out.push(f); resolve();
          }, () => resolve());
        } else if (entry.isDirectory) {
          const reader = entry.createReader();
          const lerLote = () => reader.readEntries((subs) => {
            if (!subs.length) return resolve();
            Promise.all(subs.map(lerEntry)).then(lerLote);
          }, () => resolve());
          lerLote();
        } else { resolve(); }
      });
      return Promise.all(entries.map(lerEntry)).then(() => out);
    }

    // Wrapper visual que aceita arrastar-e-soltar. Passa a lista de File para
    // onFiles. `children` pode ser função (recebe o estado `dragging`) ou nós.
    function DropZone({ onFiles, disabled = false, className, activeClassName = 'ring-2 ring-accent ring-offset-2 ring-offset-background', children, ...rest }) {
      const [dragging, setDragging] = useState(false);
      const aoArrastar = (e) => { e.preventDefault(); e.stopPropagation(); if (!disabled) setDragging(true); };
      const aoSair = (e) => { e.preventDefault(); e.stopPropagation(); setDragging(false); };
      const aoSoltar = async (e) => {
        e.preventDefault(); e.stopPropagation(); setDragging(false);
        if (disabled) return;
        const arquivos = await coletarArquivosDrop(e.dataTransfer);
        if (arquivos && arquivos.length) onFiles(arquivos);
      };
      return (
        <div
          className={cn(className, dragging && activeClassName)}
          onDragOver={aoArrastar}
          onDragEnter={aoArrastar}
          onDragLeave={aoSair}
          onDrop={aoSoltar}
          {...rest}
        >
          {typeof children === 'function' ? children(dragging) : children}
        </div>
      );
    }

    function UploadSlotV2({ label, formats, accept, slot, onSelect, onClear, onPreview, onPrefill, prefillLabel = 'Pré-visualização', prefillDisabled = false, prefillDisabledReason = '', infoExtra = null }) {
      const inputRef = useRef();
      const [dragging, setDragging] = useState(false);
      const status = slot?.status;
      const clickable = status === 'done';

      const acceptList = (accept || '').split(',').map((s) => s.trim().toLowerCase());
      const isAcceptedFile = (file) => {
        const ext = '.' + (file.name || '').split('.').pop().toLowerCase();
        return acceptList.length === 0 || acceptList.includes(ext);
      };

      const handleDragOver = (e) => { e.preventDefault(); e.stopPropagation(); setDragging(true); };
      const handleDragLeave = (e) => { e.preventDefault(); e.stopPropagation(); setDragging(false); };
      const handleDrop = (e) => {
        e.preventDefault(); e.stopPropagation(); setDragging(false);
        if (status === 'extracting') return;
        const files = e.dataTransfer?.files;
        if (!files || files.length === 0) return;
        const file = files[0];
        if (!isAcceptedFile(file)) { return; }
        onSelect(file);
      };

      const bgStyle = dragging
        ? { borderColor: 'hsl(var(--accent))', backgroundColor: 'hsl(var(--accent) / 0.1)' }
        : status === 'done'
          ? { borderColor: 'hsl(var(--status-conforme) / 0.5)', backgroundColor: 'hsl(var(--status-conforme) / 0.05)' }
          : status === 'error'
            ? { borderColor: 'hsl(var(--destructive) / 0.5)', backgroundColor: 'hsl(var(--destructive) / 0.05)' }
            : status === 'extracting'
              ? { borderColor: 'hsl(var(--accent) / 0.5)', backgroundColor: 'hsl(var(--accent) / 0.05)' }
              : {};

      return (
        <div
          className={cn('flex items-center justify-between gap-4 rounded-lg border p-3 transition-colors', !slot && 'border-dashed', clickable && 'cursor-pointer hover:brightness-95', dragging && 'ring-2 ring-accent ring-offset-2 ring-offset-background')}
          style={bgStyle}
          onClick={clickable ? onPreview : undefined}
          onDragOver={handleDragOver}
          onDragEnter={handleDragOver}
          onDragLeave={handleDragLeave}
          onDrop={handleDrop}
        >
          <div className="min-w-0 flex-1">
            <div className="text-sm font-medium flex items-center gap-2">
              {label}
              {status === 'done' && <Icon name="check" className="h-4 w-4" style={{ color: 'hsl(var(--status-conforme))' }} />}
              {status === 'error' && <Icon name="x" className="h-4 w-4 text-destructive" />}
              {status === 'extracting' && <Icon name="loader" className="h-4 w-4 animate-spin text-accent" />}
            </div>
            <div className="text-xs text-muted-foreground truncate">
              {!slot && (dragging ? 'Solte o arquivo aqui' : `${formats} · arraste ou selecione`)}
              {status === 'extracting' && `Extraindo "${slot.file.name}"…`}
              {status === 'done' && `${slot.file.name} · ${slot.text.length.toLocaleString('pt-BR')} caracteres (clique para ver)`}
              {status === 'error' && `Erro: ${slot.error}`}
            </div>
            {infoExtra && (
              <div className="text-xs mt-0.5 font-medium flex items-center gap-1" style={{ color: infoExtra.ok ? 'hsl(var(--status-conforme))' : 'hsl(var(--status-ressalva))' }}>
                <Icon name={infoExtra.ok ? 'check' : 'alertTriangle'} className="h-3 w-3" />
                {infoExtra.texto}
              </div>
            )}
          </div>
          <input
            ref={inputRef}
            type="file"
            accept={accept}
            className="hidden"
            onChange={(e) => {
              if (e.target.files[0]) onSelect(e.target.files[0]);
              e.target.value = '';
            }}
          />
          <div className="flex items-center gap-1" onClick={(e) => e.stopPropagation()}>
            {slot && status !== 'extracting' && (
              <Button variant="ghost" size="icon" onClick={onClear} title="Remover">
                <Icon name="trash" className="h-3.5 w-3.5" />
              </Button>
            )}
            {(onPrefill || prefillDisabled) && status === 'done' && (
              <Button
                variant="outline"
                size="sm"
                onClick={prefillDisabled ? undefined : onPrefill}
                disabled={prefillDisabled}
                title={prefillDisabled ? prefillDisabledReason : `${prefillLabel} este documento conforme o protocolo`}
              >
                <Icon name="sparkles" className="h-3.5 w-3.5" />
                {prefillLabel}
              </Button>
            )}
            <Button variant="outline" size="sm" onClick={() => inputRef.current?.click()} disabled={status === 'extracting'}>
              <Icon name="upload" className="h-3.5 w-3.5" />
              {slot ? 'Trocar' : 'Selecionar'}
            </Button>
          </div>
        </div>
      );
    }

    function MultiUploadSlot({ label, formats, accept, items, onSelect, onClear, onPreview }) {
      const inputRef = useRef();
      const [dragging, setDragging] = useState(false);
      const hasItems = items.length > 0;

      const acceptList = (accept || '').split(',').map((s) => s.trim().toLowerCase());
      const isAcceptedFile = (file) => {
        const ext = '.' + (file.name || '').split('.').pop().toLowerCase();
        return acceptList.length === 0 || acceptList.includes(ext);
      };

      const handleDragOver = (e) => { e.preventDefault(); e.stopPropagation(); setDragging(true); };
      const handleDragLeave = (e) => { e.preventDefault(); e.stopPropagation(); setDragging(false); };
      const handleDrop = (e) => {
        e.preventDefault(); e.stopPropagation(); setDragging(false);
        const files = e.dataTransfer?.files;
        if (!files || files.length === 0) return;
        const filtered = Array.from(files).filter(isAcceptedFile);
        if (filtered.length === 0) return;
        // Constrói FileList-like array (onSelect espera files iterable)
        const dt = new DataTransfer();
        filtered.forEach((f) => dt.items.add(f));
        onSelect(dt.files);
      };

      const bgStyle = dragging
        ? { borderColor: 'hsl(var(--accent))', backgroundColor: 'hsl(var(--accent) / 0.1)' }
        : hasItems
          ? { borderColor: 'hsl(var(--status-conforme) / 0.5)', backgroundColor: 'hsl(var(--status-conforme) / 0.05)' }
          : {};
      return (
        <div
          className={cn('rounded-lg border p-3 transition-colors', !hasItems && 'border-dashed', dragging && 'ring-2 ring-accent ring-offset-2 ring-offset-background')}
          style={bgStyle}
          onDragOver={handleDragOver}
          onDragEnter={handleDragOver}
          onDragLeave={handleDragLeave}
          onDrop={handleDrop}
        >
          <div className="flex items-center justify-between gap-4">
            <div>
              <div className="text-sm font-medium flex items-center gap-2">
                {label}
                {hasItems && <Icon name="check" className="h-4 w-4" style={{ color: 'hsl(var(--status-conforme))' }} />}
              </div>
              <div className="text-xs text-muted-foreground">{!hasItems ? (dragging ? 'Solte os arquivos aqui' : `${formats} · arraste ou selecione`) : `${items.length} arquivo(s)`}</div>
            </div>
            <input
              ref={inputRef}
              type="file"
              accept={accept}
              multiple
              className="hidden"
              onChange={(e) => {
                if (e.target.files.length > 0) onSelect(e.target.files);
                e.target.value = '';
              }}
            />
            <Button variant="outline" size="sm" onClick={() => inputRef.current?.click()}>
              <Icon name="upload" className="h-3.5 w-3.5" />
              Adicionar
            </Button>
          </div>
          {hasItems && (
            <div className="mt-3 space-y-1.5 pt-3 border-t" style={{ borderColor: 'hsl(var(--status-conforme) / 0.2)' }}>
              {items.map((item, idx) => (
                <div key={idx} className="flex items-center justify-between gap-2 text-xs">
                  <button
                    onClick={() => item.status === 'done' && onPreview(item)}
                    className={cn('flex items-center gap-2 min-w-0 flex-1 text-left', item.status === 'done' && 'hover:text-accent')}
                    disabled={item.status !== 'done'}
                  >
                    {item.status === 'extracting' && <Icon name="loader" className="h-3 w-3 animate-spin shrink-0" />}
                    {item.status === 'done' && <Icon name="check" className="h-3 w-3 shrink-0" style={{ color: 'hsl(var(--status-conforme))' }} />}
                    {item.status === 'error' && <Icon name="x" className="h-3 w-3 shrink-0 text-destructive" />}
                    <span className="truncate">{item.file.name}</span>
                    {item.status === 'done' && <span className="text-muted-foreground shrink-0">({item.text.length.toLocaleString('pt-BR')})</span>}
                    {item.status === 'error' && <span className="text-destructive shrink-0">{item.error}</span>}
                  </button>
                  <button onClick={() => onClear(item.file)} className="text-muted-foreground hover:text-destructive shrink-0">
                    <Icon name="trash" className="h-3 w-3" />
                  </button>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    /* ====================================================================
       PREFILL MODAL — preview do PDF anotado (OP ou FORM) em iframe.
       O conteúdo é o PDF ORIGINAL com as marcações desenhadas por cima.
       Botão "Baixar PDF" salva o blob diretamente (sem usar window.print).
       ==================================================================== */
    function PrefillModal({ state, onClose }) {
      const open = !!state;
      const loading = state?.loading;
      const blobUrl = state?.blobUrl;
      const blob = state?.blob;
      const filename = state?.filename;
      const stats = state?.stats || {};

      // Limpa o blob URL quando o modal fecha
      useEffect(() => {
        return () => {
          if (blobUrl) {
            // pequeno delay para o iframe terminar de usar
            setTimeout(() => URL.revokeObjectURL(blobUrl), 1000);
          }
        };
      }, [blobUrl]);

      async function handleDownload() {
        if (!blob || !filename) return;
        // Em Chrome/Edge/Opera: abre diálogo "Salvar como..." nativo para escolher pasta
        const ext = (filename.match(/\.[^.]+$/) || ['.bin'])[0].toLowerCase();
        const mimeMap = {
          '.pdf':  ['application/pdf', 'Documento PDF'],
          '.xlsx': ['application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', 'Planilha Excel'],
        };
        const [mime, descr] = mimeMap[ext] || [blob.type || 'application/octet-stream', 'Arquivo'];
        if (window.showSaveFilePicker) {
          try {
            const handle = await window.showSaveFilePicker({
              suggestedName: filename,
              types: [{ description: descr, accept: { [mime]: [ext] } }],
            });
            const writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();
            return;
          } catch (e) {
            if (e?.name === 'AbortError') return;
            console.warn('showSaveFilePicker falhou, usando fallback:', e);
          }
        }
        // Fallback: download tradicional
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => {
          document.body.removeChild(a);
          URL.revokeObjectURL(a.href);
        }, 500);
      }

      if (!open) return null;

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 animate-fade-in" onClick={onClose}>
          <div className="relative w-full max-w-6xl bg-card border rounded-xl shadow-xl max-h-[95vh] flex flex-col" onClick={(e) => e.stopPropagation()}>
            <div className="flex items-start justify-between p-5 pb-3 border-b">
              <div className="min-w-0 flex-1">
                <h2 className="font-montserrat text-lg font-bold">
                  Pré-visualização — {state?.kind === 'op' ? 'Ordem de Produção' : 'FORM-GQ-0047'}
                </h2>
                <p className="mt-0.5 text-xs text-muted-foreground">
                  PDF original com as marcações desenhadas por cima. Layout 100% preservado.
                </p>
                {!loading && (
                  <div className="mt-2 flex flex-wrap items-center gap-2 text-[11px]">
                    {typeof stats.totalChecks === 'number' && stats.totalChecks > 0 && (
                      <span className="inline-flex items-center gap-1 rounded-full px-2 py-0.5" style={{ backgroundColor: 'hsl(142 60% 92%)', color: 'hsl(142 60% 25%)' }}>
                        <Icon name="check" className="h-3 w-3" />{stats.totalChecks} marcação(ões) ✓
                      </span>
                    )}
                    {typeof stats.datesAdded === 'number' && stats.datesAdded > 0 && (
                      <span className="inline-flex items-center gap-1 rounded-full px-2 py-0.5" style={{ backgroundColor: 'hsl(215 75% 92%)', color: 'hsl(215 75% 30%)' }}>
                        <Icon name="clock" className="h-3 w-3" />{stats.datesAdded} data(s) adicionada(s)
                      </span>
                    )}
                    {typeof stats.camposPreenchidos === 'number' && stats.camposPreenchidos > 0 && (
                      <span className="inline-flex items-center gap-1 rounded-full px-2 py-0.5" style={{ backgroundColor: 'hsl(265 60% 92%)', color: 'hsl(265 60% 28%)' }}>
                        <Icon name="edit" className="h-3 w-3" />{stats.camposPreenchidos} campo(s) preenchido(s)
                      </span>
                    )}
                    {typeof stats.itensMatched === 'number' && (
                      <span
                        className="inline-flex items-center gap-1 rounded-full px-2 py-0.5"
                        style={{
                          backgroundColor: stats.itensMatched === stats.totalItensRoteiro ? 'hsl(142 60% 92%)' : 'hsl(38 92% 92%)',
                          color: stats.itensMatched === stats.totalItensRoteiro ? 'hsl(142 60% 25%)' : 'hsl(38 92% 28%)',
                        }}
                      >
                        <Icon name="info" className="h-3 w-3" />
                        {stats.itensMatched}/{stats.totalItensRoteiro} itens do roteiro localizados
                      </span>
                    )}
                    {stats.colunasDetectadas === 'não' && typeof stats.totalItensRoteiro === 'number' && stats.totalItensRoteiro > 0 && (
                      <span className="inline-flex items-center gap-1 rounded-full px-2 py-0.5" style={{ backgroundColor: 'hsl(0 72% 92%)', color: 'hsl(0 72% 35%)' }}>
                        <Icon name="alert" className="h-3 w-3" />Colunas SIM/NÃO/N/A não detectadas
                      </span>
                    )}
                    {stats.liberacaoMarcada === true && (
                      <span className="inline-flex items-center gap-1 rounded-full px-2 py-0.5" style={{ backgroundColor: 'hsl(142 60% 92%)', color: 'hsl(142 60% 25%)' }}>
                        <Icon name="check" className="h-3 w-3" />Liberado para comercialização = Sim
                      </span>
                    )}
                  </div>
                )}
              </div>
              <div className="flex items-center gap-2 shrink-0">
                {!loading && blob && (
                  <Button variant="default" size="sm" onClick={handleDownload}>
                    <Icon name="download" className="h-3.5 w-3.5" />
                    {state?.isXlsx ? 'Baixar Excel' : 'Baixar PDF'}
                  </Button>
                )}
                <button onClick={onClose} className="rounded-md p-1 hover:bg-muted transition-colors">
                  <Icon name="x" className="h-5 w-5" />
                </button>
              </div>
            </div>

            <div className="flex-1 min-h-0 bg-muted/30 p-3">
              {loading && (
                <div className="flex items-center gap-3 text-sm text-muted-foreground py-12 justify-center">
                  <Icon name="loader" className="h-5 w-5 animate-spin" />
                  {state?.kind === 'form'
                    ? 'Abrindo template do FORM-GQ-0047 e preenchendo células…'
                    : 'Carregando fonte, identificando posições no PDF e desenhando marcações…'}
                </div>
              )}
              {!loading && blobUrl && !state?.isXlsx && (
                <iframe
                  src={blobUrl}
                  title="PDF pré-preenchido"
                  className="w-full h-full rounded-md border bg-white"
                  style={{ minHeight: '70vh' }}
                />
              )}
              {!loading && blobUrl && state?.isXlsx && (
                <div className="h-full flex flex-col items-center justify-center text-center p-8 gap-4" style={{ minHeight: '60vh' }}>
                  <div className="rounded-full p-4" style={{ backgroundColor: 'hsl(142 60% 92%)' }}>
                    <Icon name="check" className="h-12 w-12" style={{ color: 'hsl(142 60% 30%)' }} />
                  </div>
                  <div className="space-y-1.5 max-w-xl">
                    <h3 className="font-montserrat text-base font-bold">FORM-GQ-0047 preenchido</h3>
                    <p className="text-sm text-muted-foreground">
                      O arquivo Excel oficial Rev. 8 foi preenchido com os dados do lote e está pronto para download.
                      Abra no Microsoft Excel (ou Google Sheets / LibreOffice Calc) para revisar, imprimir e coletar as
                      assinaturas do RT e da Garantia da Qualidade.
                    </p>
                  </div>
                  <div className="flex flex-col items-center gap-2 mt-3">
                    <Button variant="default" size="lg" onClick={handleDownload} className="gap-2">
                      <Icon name="download" className="h-5 w-5" />
                      Baixar {filename}
                    </Button>

    function categorizarErroSlack(txt) {
      for (const c of CATEGORIAS_ERRO_SLACK) if (c.re.test(txt || '')) return c.nome;
      return 'Outros';
    }
    // Alvo específico do erro (acessório/campo) extraído da descrição — para a chave
    // de reincidência ficar no nível acionável (ex.: "Cabeça de Câmera CM-SCAM (IPM0023)").
    function extrairAlvoErro(desc, documento) {
      const t = String(desc || '') + ' ' + String(documento || '');
      let m = t.match(/([A-Za-zÀ-ÿ][\wÀ-ÿ .\/-]{2,40}?)\s*\(\s*([A-Z]{2,6}[-\s]?\d{2,6}|IPM\d+)\s*\)/);
      if (m) return `${m[1].trim()} (${m[2].replace(/\s/g, '')})`;
      m = t.match(/\b(IPM\d+|[A-Z]{2,6}\d{3,6})\b/);
      if (m) return m[1];
      return '';
    }
    // Chave de reincidência: categoria de erro + equipamento + alvo específico.
    const chaveReincidencia = (cat, equip, alvo) => [cat || 'Outros', equip || '—', alvo || '—'].join(' · ');
    // Classifica o nível de reincidência de uma chave a partir das métricas da janela
    // de 30 dias e da base histórica. thr = { piso, incidencia (fração), fator }.
    function classificarNivelReinc(ocorr30d, incid30d, base, thr) {
      if (ocorr30d >= thr.piso && incid30d >= thr.incidencia) return 'reincidente';
      if (ocorr30d >= 2 && ((base <= 0.01 && incid30d >= thr.incidencia) || (base > 0 && incid30d >= thr.fator * base))) return 'emergente';
      // Um gatilho atingido (piso OU incidência), mas não os dois → alerta precoce.
      if (ocorr30d >= thr.piso || incid30d >= thr.incidencia) return 'possivel';
      return 'pontual';

    function sugerirAcaoCorretiva(cat, reincidente) {

      }[cat] || 'Avaliar a causa raiz e se o desvio pode recorrer em outros lotes.';
      return reincidente ? `Erro reincidente — priorizar o tratamento da causa raiz para evitar repetição. ${base}` : base;

    // Separa a recomendação do agente entre AÇÃO IMEDIATA (fix direto) e frases de

    // "verificar se afeta outros lotes…", "avaliar…", "revisar o processo/modelo…".
    const _CAUSA_RE_SLACK = /(poss[íi]vel|prov[áa]vel|causa|verificar se|avaliar|impact|outros?\s+(?:lotes?|produtos?)|revisar o (?:processo|modelo|template)|recorr|reincid)/i;
    function separarRecomendacao(rec) {
      const frases = String(rec || '').split(/(?<=[.!?])\s+/).map((s) => s.trim()).filter(Boolean);
      const imediata = [], causa = [];
      for (const f of frases) (_CAUSA_RE_SLACK.test(f) ? causa : imediata).push(f);
      return { imediata: imediata.join(' '), causa: causa.join(' ') };
    }

    function ParecerView({ parecer: parecerInicial, onBack, backLabel = 'Nova análise', backIcon = 'plus', allowDelete = false, onDelete, analiseId }) {

      // === Mapeamento documento_afetado → slot + identificador específico ===

      const labelSlot = {

      // Identifica slot a partir do apontamento. Para acessório, retorna também

      const mapApontamento = (ap) => {
        const d = String(ap?.documento_afetado || '').toLowerCase();
        const desc = String(ap?.descricao || '') + ' ' + String(ap?.documento_afetado || '');
        let slotKey = null;

        if (slotKey === 'etiqueta_acessorio') {
          const m = desc.match(/\b([A-Z]{2,5}\d{4,5})\b/);

          const etqInfo = parecer.documentos_analisados?.find((s) => typeof s === 'string' && s.includes(codigo || '___'));
          const nomeMatch = ap?.descricao?.match(/([A-ZÁÉÍÓÚÂÊÔÃÕÇ][\wÁ-ÿ /\-]+?)\s*\(\s*[A-Z]{2,5}\d{4,5}\s*\)/);
          const nome = nomeMatch ? nomeMatch[1].trim() : (codigo || 'acessório');
          // Chave sempre presente: quando não há código Sapiens (ex.: etiqueta

        return { slotKey, codigo: null, nome: null, slotDisplayKey: slotKey };
      };
      // Dado um slotDisplayKey, retorna o objeto corrigido (se houver)
      const getCorrigido = (slotDisplayKey) => {
        if (!slotDisplayKey) return null;
        if (slotDisplayKey.includes(':')) {
          const [k, codigo] = slotDisplayKey.split(':');
          return docsCorrigidos[k]?.[codigo] || null;
        }
        return docsCorrigidos[slotDisplayKey] || null;
      };
      // Nome do arquivo original carregado para um slot (se disponível)
      const getOriginalFileName = (slotKey, codigo) => {
        if (!parecer._slots) return null;
        if (slotKey === 'etiqueta_acessorio') {
          const arr = parecer._slots.etiqueta_acessorio || [];
          // Tenta achar o arquivo pelo código (parsed text contém o código)

      // Estado de loading para o download do ZIP (CloudConvert pode demorar 10-30s)
      const [zipBuilding, setZipBuilding] = useState(false);

      const camadas = parecer.camadas || {};

      const dataGeracao = new Date().toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });

      // === Mapeamento de severidades para o sumário executivo ===
      const counts = { BLOQUEADOR: 0, ALERTA: 0, 'OBSERVAÇÃO': 0, INFO: 0 };
      apontamentos.forEach((ap) => { counts[tipoApontamento(ap)] = (counts[tipoApontamento(ap)] || 0) + 1; });
      counts['OBSERVAÇÃO'] += recomendacoes.length;

      // === Handlers de justificativa e re-análise (decisão 17/06/2026) ===

      const handleSubmitJustify = async (apIdx, texto) => {
        if (!texto || !texto.trim()) {

          // Marca também o item correspondente na camada (best-effort por descrição)
          // para que o índice de conformidade reflita.
          if (novoParecer.camadas) {
            const target = ap.descricao || '';
            for (const cKey of ['camada_1', 'camada_2', 'camada_3']) {
              const arr = novoParecer.camadas[cKey] || [];
              for (const it of arr) {
                if (it.status !== 'ressalva') continue;
                if (it.observacao && (it.observacao.includes(target.slice(0, 40)) || target.includes((it.observacao || '').slice(0, 40)))) {
                  it.status = 'conforme';
                  it.observacao = (it.observacao || '') + ` [JUSTIFICADA: ${texto.trim()}]`;
                  break;
                }
              }

          }
          // === Recalcula resultado_geral considerando justificativas ===
          // Decisão 01/07/2026: se todas as ressalvas foram justificadas e não há NC,
          // o status geral vira "conforme" e o histórico reflete isso.
          const aps = novoParecer.apontamentos || [];
          const ncAbertas = aps.filter((a) => a.severidade === 'nao_conforme');
          const ressAbertas = aps.filter((a) => a.severidade === 'ressalva' && !a.justificativa);
          let novoResultado;
          if (ncAbertas.length > 0) novoResultado = 'nao_conforme';
          else if (ressAbertas.length > 0) novoResultado = 'ressalva';
          else novoResultado = 'conforme';
          novoParecer.resultado_geral = novoResultado;
          // Atualiza também o resumo pra refletir o novo estado
          const conformesFinal = [
            ...(novoParecer.camadas?.camada_1 || []),
            ...(novoParecer.camadas?.camada_2 || []),
            ...(novoParecer.camadas?.camada_3 || []),
          ].filter((i) => i.status === 'conforme').length;
          const avaliadosFinal = [
            ...(novoParecer.camadas?.camada_1 || []),
            ...(novoParecer.camadas?.camada_2 || []),
            ...(novoParecer.camadas?.camada_3 || []),
          ].filter((i) => i.status !== 'na').length;
          if (novoResultado === 'conforme') {
            novoParecer.parecer_resumo = `Análise concluída. Todos os ${avaliadosFinal} pontos avaliados estão em conformidade (incluindo ${aps.filter((a) => a.justificativa).length} ressalva(s) justificada(s) pelo RT). ${conformesFinal} ✅. Lote pronto para liberação pelo Responsável Técnico (Samara Campos/Fernando) conforme ISO 13485:2016 §8.2.4.`;

      // === Handler de re-análise com documentos corrigidos (decisão 17/06/2026) ===

      // vinculada à atual via analise_origem_id.
      const handleReanalisar = async (opts = {}) => {

          const baseTexts = parecer.slots_text || {};
          const txt = (k) => docsCorrigidos[k]?.text ?? baseTexts[k] ?? '';
          // === Fetch dos arquivos ORIGINAIS do Storage para os slots NÃO corrigidos ===
          // Isso garante que o pacote ZIP gerado depois da re-análise vai conter

          // Decisão 19/06/2026.
          const arqOrig = parecer.arquivos_originais || {};

            if (docsCorrigidos[slotKey]?.file) return docsCorrigidos[slotKey].file; // já tem corrigido
            const ref = arqOrig[slotKey];

              const { data, error } = await supabase.storage.from('pacotes-analise').download(ref.path);

              console.warn('Erro restaurando original:', slotKey, e?.message);
              return null;
            }
          };
          const [opFileRestored, rcFileRestored, formManualRestored, etFileRestored, opRepRestored, rncRestored] = await Promise.all([
            fetchOrigFile('op'),
            fetchOrigFile('rc'),
            fetchOrigFile('form_gq_0047'),
            fetchOrigFile('etiqueta_externa'),
            fetchOrigFile('op_reprocesso'),
            fetchOrigFile('rnc'),

          // Etiquetas de acessório: substitui POR CÓDIGO (mantém todas as outras)

          const baseAcsTextos = baseTexts.etiqueta_acessorio || [];
          const baseAcsArquivos = arqOrig.etiqueta_acessorio || [];
          // Map texto-original → arquivo-original do Storage (mesma ordem que foi

          const acsParseado = (await Promise.all((baseAcsTextos || []).map(async (t, i) => {
            const m = (t || '').match(/C[óo]digo[\s:]+([A-Z]{2,5}\d{4,5})/i);

            }

            if (!jaTem) {
              acsParseado.push({ text: acessoriosCorrigidos[codigo].text, file: acessoriosCorrigidos[codigo].file, status: 'done' });

          const slotsParaParse = {
            op:              { text: txt('op'),              file: docsCorrigidos.op?.file              || opFileRestored,    status: 'done' },
            rc:              { text: txt('rc'),              file: docsCorrigidos.rc?.file              || rcFileRestored,    status: 'done' },
            form_gq_0047:    { text: txt('form_gq_0047'),    file: docsCorrigidos.form_gq_0047?.file    || formManualRestored, status: 'done' },
            etiqueta_externa:{ text: txt('etiqueta_externa'),file: docsCorrigidos.etiqueta_externa?.file|| etFileRestored,    status: 'done' },
            etiqueta_acessorio: acsParseado,
            op_reprocesso:   { text: txt('op_reprocesso'),   file: docsCorrigidos.op_reprocesso?.file   || opRepRestored,     status: 'done' },
            rnc:             { text: txt('rnc'),             file: docsCorrigidos.rnc?.file             || rncRestored,       status: 'done' },
          };
          // Limpa slots vazios para não confundir o detector
          for (const k of ['op','rc','form_gq_0047','etiqueta_externa','op_reprocesso','rnc']) {
            if (!slotsParaParse[k].text) slotsParaParse[k] = null;
          }
          if (slotsParaParse.etiqueta_acessorio.length === 0 || slotsParaParse.etiqueta_acessorio.every((it) => !it.text)) {
            slotsParaParse.etiqueta_acessorio = [];
          }

          const novoParecer = await executarAnaliseLocal(slotsParaParse, { permitirRefazer: true });
          if (modoFicha || modoCadastro) {
            // Ajuste sem correção de documento (ficha desatualizada OU cadastro de
            // operador/inspetor). Vincula à original (rastreabilidade) mas NÃO conta
            // como correção no dashboard.
            const tipo = modoCadastro ? 'atualizacao_cadastro' : 'atualizacao_ficha';
            const motivoPadrao = modoCadastro
              ? (opts.motivoCadastro || 'Operador/inspetor cadastrado no quadro do estágio — a documentação do lote estava conforme.')
              : (opts.motivoFicha || 'Ficha mestre atualizada (nova revisão) — a documentação do lote estava conforme.');
            if (novoParecer._analiseId && analiseId) {
              await supabase.from('analises').update({
                analise_origem_id: analiseId,
                tipo_reanalise: tipo,
                doc_substituido: null,
                motivo_reanalise: motivoPadrao,
              }).eq('id', novoParecer._analiseId);
            }
            const acaoLog = modoCadastro ? 'atualizar_cadastro_reanalise' : 'atualizar_ficha_reanalise';
            const descLog = modoCadastro
              ? `${usuarioAtual?.nome_completo || usuarioAtual?.email || 'Usuário'} cadastrou operador/inspetor e refez a análise da OP ${opNum} (novo resultado: ${(novoParecer.resultado_geral || '').toUpperCase()}; não conta como correção)`
              : `${usuarioAtual?.nome_completo || usuarioAtual?.email || 'Usuário'} atualizou a ficha mestre e refez a análise da OP ${opNum} (novo resultado: ${(novoParecer.resultado_geral || '').toUpperCase()}; não conta como correção)`;
            registrarLog(usuarioAtual, acaoLog, 'analise', `OP ${opNum}${serieStr ? ' / ' + serieStr : ''}`, descLog);
            toast.success(modoCadastro ? 'Colaborador(es) cadastrado(s) e análise refeita. Não contabilizada como correção.' : 'Ficha atualizada e análise refeita. Não contabilizada como correção.');
            setParecer(novoParecer);
            setDocsCorrigidos({});
            setEtiquetasRemovidas(new Set());
            window.scrollTo({ top: 0, behavior: 'smooth' });
            return;
          }
          if (novoParecer._analiseId && analiseId) {
            const docsLabel = slotKeysCorrigidos.map((k) => labelSlot[k]).join(', ');
            const todosMotivos = [];
            for (const k of slotKeysCorrigidos) {
              if (k === 'etiqueta_acessorio') {
                for (const cod of Object.keys(docsCorrigidos[k])) {
                  if (docsCorrigidos[k][cod].motivo) todosMotivos.push(`${cod}: ${docsCorrigidos[k][cod].motivo}`);
                }
              } else if (docsCorrigidos[k].motivo) todosMotivos.push(docsCorrigidos[k].motivo);
            }
            if (etiquetasRemovidas.size > 0) {
              todosMotivos.push(`Etiqueta(s) de acessório removida(s) por engano: ${[...etiquetasRemovidas].join(', ')}`);
            }
            // Remoção de etiqueta conta como "Etiqueta Acessório" na estatística do
            // dashboard (mesma categoria da correção). Não duplica se já houver correção
            // de etiqueta de acessório nesta re-análise.
            const docsSubstituidos = [...slotKeysCorrigidos];
            if (etiquetasRemovidas.size > 0 && !docsSubstituidos.includes('etiqueta_acessorio')) {
              docsSubstituidos.push('etiqueta_acessorio');
            }
            await supabase.from('analises').update({
              analise_origem_id: analiseId,
              doc_substituido: docsSubstituidos.join(','),
              motivo_reanalise: todosMotivos.join(' | ') || `Re-análise com ${docsLabel} corrigido(s)`,
            }).eq('id', novoParecer._analiseId);
          }
          toast.success('Re-análise concluída. Mostrando o novo resultado.');
          registrarLog(usuarioAtual, 'refazer_analise', 'analise', `OP ${opNum}${serieStr ? ' / ' + serieStr : ''}`, `${usuarioAtual?.nome_completo || usuarioAtual?.email || 'Usuário'} refez a análise da OP ${opNum} (novo resultado: ${(novoParecer.resultado_geral || '').toUpperCase()})`);
          setParecer(novoParecer);
          setDocsCorrigidos({});
          setEtiquetasRemovidas(new Set());
          window.scrollTo({ top: 0, behavior: 'smooth' });
        } catch (e) {
          console.error('Erro na re-análise:', e);
          toast.error('Erro ao refazer a análise: ' + (e?.message || e));
        } finally {
          setReanalisando(false);
        }
      };

      // === Lista unificada de críticas (apontamentos + recomendações) ===
      const criticas = [];
      apontamentos.forEach((ap, i) => {
        const tipo = tipoApontamento(ap);
        criticas.push({
          apIdx: i, // referência ao índice do apontamento original (para justificar)
          codigo: ap.codigo || `C-${String(i + 1).padStart(2, '0')}`,
          tipo,
          documento: ap.documento_afetado || '—',
          campo: ap.campo || '',
          encontrado: ap.encontrado || ap.descricao || '—',
          esperado: ap.esperado || '—',
          fundamentacao: ap.fundamentacao || ap.referencia_normativa || '—',
          acao_requerida: ap.acao_requerida || ap.recomendacao || '—',
          justificativa: ap.justificativa || null,
          justificada_em: ap.justificada_em || null,
          justificada_por: ap.justificada_por || null,
        });
      });
      recomendacoes.forEach((rec, i) => {
        criticas.push({
          codigo: `R-${String(i + 1).padStart(2, '0')}`,
          tipo: 'OBSERVAÇÃO',
          documento: '—',
          campo: 'Melhoria sugerida',
          encontrado: '—',
          esperado: '—',
          fundamentacao: 'Manual de Conciliações Confiance Medical · Boa prática operacional',
          acao_requerida: rec,
        });
      });

      // === Gate de download (decisão 17/06/2026) ===
      // Bloqueador (NC) → ZIP bloqueado. Ressalva sem justificativa → ZIP bloqueado.
      // Conforme ou todas as ressalvas justificadas → ZIP permitido.
      const temBloqueador = apontamentos.some((ap) => ap.severidade === 'nao_conforme');
      const ressalvasPendentes = apontamentos.filter((ap) => ap.severidade === 'ressalva' && !ap.justificativa);
      const canDownloadZip = !temBloqueador && ressalvasPendentes.length === 0;
      const downloadGateMotivo = temBloqueador
        ? 'Lote bloqueado — corrija as não conformidades antes de baixar o pacote.'
        : ressalvasPendentes.length > 0
          ? `${ressalvasPendentes.length} ressalva(s) ainda sem justificativa do RT — justifique para liberar o download.`
          : '';

      // === Banner do sumário executivo ===
      let banner;
      if (parecer.resultado_geral === 'nao_conforme') {
        banner = { text: `BLOQUEADO — ${counts.BLOQUEADOR} bloqueador(es) impedem a liberação`, bg: TIPO_STYLES.BLOQUEADOR.bg };
      } else if (parecer.resultado_geral === 'ressalva') {
        const total = counts.ALERTA + counts['OBSERVAÇÃO'];
        banner = { text: `APROVADO COM ALERTAS — ${total} ponto(s) requerem atenção do RT`, bg: TIPO_STYLES.ALERTA.bg };
      } else {
        banner = { text: 'CONFORME — Sem bloqueios ou alertas identificados', bg: TIPO_STYLES['OBSERVAÇÃO'].bg };
      }

      const sanitize = (s) => String(s || '').replace(/[^\w\d-]+/g, '_').replace(/_+/g, '_').replace(/^_|_$/g, '');
      const opNum = sanitize(parecer.produto?.numero_op !== '—' ? parecer.produto?.numero_op : 'semOP');
      const modeloStr = sanitize(parecer.produto?.modelo !== '—' ? parecer.produto?.modelo : 'produto');
      const serieStr = sanitize(parecer.produto?.numero_serie !== '—' ? parecer.produto?.numero_serie : 'semSerie');
      const packBaseName = `OP_${opNum}_${serieStr}`; // ex.: OP_6819_LEDT-20261-6

      const handleExportPDF = () => {
        const dataStr = new Date().toISOString().slice(0, 10);
        const filename = `Conciliacao_OP-${opNum}_${modeloStr}_${serieStr}_${dataStr}`;
        const originalTitle = document.title;
        document.title = filename;
        setTimeout(() => {
          window.print();
          setTimeout(() => { document.title = originalTitle; }, 500);
        }, 50);
      };

      // Helper genérico para download.
      // Em Chrome/Edge/Opera (Chromium): abre o diálogo "Salvar como..." nativo (File System
      // Access API) para o usuário escolher pasta de destino. Em Firefox/Safari: cai no
      // download tradicional que vai direto para a pasta Downloads padrão.
      const triggerDownload = async (blob, filename, startInHandle) => {
        // Detecta mime e extensão para o picker
        const ext = (filename.match(/\.[^.]+$/) || ['.bin'])[0].toLowerCase();
        const mimeMap = {
          '.pdf':  ['application/pdf', 'Documento PDF'],
          '.xlsx': ['application/vnd.openxmlformats-officedocument.spreadsheetml.sheet', 'Planilha Excel'],
          '.docx': ['application/vnd.openxmlformats-officedocument.wordprocessingml.document', 'Documento Word'],
          '.zip':  ['application/zip', 'Arquivo compactado ZIP'],
          '.txt':  ['text/plain', 'Documento de texto'],
        };
        const [mime, descr] = mimeMap[ext] || [blob.type || 'application/octet-stream', 'Arquivo'];

        // Caminho 1: Save File Picker (Chrome/Edge/Opera Chromium) — usuária escolhe pasta
        if (window.showSaveFilePicker) {
          try {
            const optsPicker = {
              suggestedName: filename,
              types: [{ description: descr, accept: { [mime]: [ext] } }],
            };
            if (startInHandle) optsPicker.startIn = startInHandle; // abre já na pasta de destino
            const handle = await window.showSaveFilePicker(optsPicker);
            const writable = await handle.createWritable();
            await writable.write(blob);
            await writable.close();
            return;
          } catch (e) {
            // Se o usuário cancelar o diálogo, sair silenciosamente.
            if (e?.name === 'AbortError') return;
            // Qualquer outro erro: cai no fallback abaixo.
            console.warn('showSaveFilePicker falhou, usando fallback:', e);
          }
        }

        // Caminho 2 (fallback): download tradicional → pasta Downloads padrão do navegador.
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 500);
      };

      // Baixar APENAS o FORM-GQ-0047 preenchido (XLSX com formatação preservada)
      const handleDownloadForm = () => {
        const bytes = parecer._formXlsxBytes;
        if (!bytes) { alert('FORM-GQ-0047 não disponível.'); return; }
        const blob = new Blob([bytes], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
        triggerDownload(blob, `FORM-GQ-0047_${opNum}_${serieStr}.xlsx`);
      };

      // Converte qualquer Office/PDF → PDF assinável via Edge Function `converter-para-pdf`
      // (que usa CloudConvert). PDF resultante é "puro" (sem criptografia/restrição) —
      // compatível com assinatura digital pelo Adobe Acrobat (ICP-Brasil ou similar).
      //
      // sourceFormat: 'xlsx' | 'docx' | 'pdf' | etc.
      //   Para 'pdf', a Edge Function usa optimize/qpdf para REGERAR o PDF removendo
      //   restrições — útil para PDFs do Sapiens que vêm com proteção embutida.
      // Chamada ao serviço LOCAL (LibreOffice/Ghostscript/Chromium). Sem necessidade
      // de token — é interno na rede da empresa.
      const convertViaLocal = async (sourceBytes, filename, sourceFormat) => {
        const resp = await fetch(CONVERSAO_PDF_LOCAL, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/octet-stream',
            'X-Source-Format': sourceFormat,
            'X-Filename': filename,
          },
          body: sourceBytes,
        });
        if (!resp.ok) {
          let msg = `HTTP ${resp.status}`;
          try { msg = (await resp.json()).error || msg; } catch {}
          throw new Error(msg);
        }
        return new Uint8Array(await resp.arrayBuffer());
      };
      // Chamada ao CloudConvert via Edge Function (fallback / modo antigo).
      const convertViaCloud = async (sourceBytes, filename, sourceFormat) => {
        const { data: { session } } = await supabase.auth.getSession();
        if (!session?.access_token) throw new Error('Sessão não encontrada — faça login novamente.');
        const fnUrl = SUPABASE_URL.replace(/\/rest\/v1\/?$/, '') + '/functions/v1/converter-para-pdf';
        const resp = await fetch(fnUrl, {
          method: 'POST',
          headers: {
            'Authorization': `Bearer ${session.access_token}`,
            'Content-Type': 'application/octet-stream',
            'X-Source-Format': sourceFormat,
            'X-Filename': filename,
          },
          body: sourceBytes,
        });
        if (!resp.ok) {
          let msg = `HTTP ${resp.status}`;
          try { msg = (await resp.json()).error || msg; } catch {}
          throw new Error(msg);
        }
        return new Uint8Array(await resp.arrayBuffer());
      };
      // Converte Office/PDF/HTML → PDF assinável. Se o serviço LOCAL estiver
      // configurado, tenta ele primeiro; em qualquer falha (fora do ar, erro),
      // cai automaticamente no CloudConvert para não travar o pacote.
      const convertToPdf = async (sourceBytes, filename, sourceFormat) => {
        if (CONVERSAO_PDF_LOCAL) {
          try {
            return await convertViaLocal(sourceBytes, filename, sourceFormat);
          } catch (e) {
            console.warn('[convertToPdf] serviço local falhou, tentando CloudConvert:', e?.message || e);
          }
        }
        return await convertViaCloud(sourceBytes, filename, sourceFormat);
      };
      // Atalho retro-compatível (mantém código antigo funcionando se houver)
      const convertXlsxToPdf = (bytes, filename) => convertToPdf(bytes, filename, 'xlsx');

      // ============== GERAR HTML DO RESUMO DA ANÁLISE ==============
      // Constrói uma página HTML standalone (com CSS embutido respeitando o
      // design system Confiance) que será convertida em PDF pelo CloudConvert
      // e adicionada ao pacote ZIP.
      function gerarResumoHTML(parecer) {
        const camadas = parecer.camadas || {};
        const c1 = camadas.camada_1 || [];
        const c2 = camadas.camada_2 || [];
        const c3 = camadas.camada_3 || [];
        const todos = [...c1, ...c2, ...c3];

        // Contadores
        const stats = todos.reduce((acc, it) => {
          const s = (it.status || 'na').toLowerCase();
          acc[s] = (acc[s] || 0) + 1;
          return acc;
        }, {});
        const total = todos.length;
        const conf = stats.conforme || 0;
        const ress = stats.ressalva || 0;
        const ncon = stats.nao_conforme || 0;
        const na   = stats.na || 0;
        // N/A não entra no denominador — só conta o que foi efetivamente avaliado.
        const avaliados = conf + ress + ncon;
        const pctConf = avaliados > 0 ? Math.round((conf / avaliados) * 100) : 0;
        const pctColor = pctConf === 100 ? '#16a34a' : pctConf >= 80 ? '#d97706' : '#dc2626';
        const resultado = (parecer.resultado_geral || 'em_andamento').toUpperCase().replace('_', ' ');
        const resultadoColor = parecer.resultado_geral === 'conforme' ? '#16a34a'
          : parecer.resultado_geral === 'ressalva' ? '#d97706' : '#dc2626';

        const p = parecer.produto || {};
        const dataGeracao = new Date().toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });

        const badge = (status) => {
          const map = {
            'conforme':     { txt: 'Conforme',     bg: '#dcfce7', fg: '#166534' },
            'ressalva':     { txt: 'Ressalva',     bg: '#fef3c7', fg: '#92400e' },
            'nao_conforme': { txt: 'Não conforme', bg: '#fee2e2', fg: '#991b1b' },
            'na':           { txt: 'N/A',          bg: '#f3f4f6', fg: '#4b5563' },
          };
          const c = map[status] || map.na;
          return `<span class="badge" style="background:${c.bg};color:${c.fg}">${c.txt}</span>`;
        };

        const escapeHtml = (s) => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

        const tabelaCamada = (titulo, itens, mostrarNorma = false) => {
          if (!itens || itens.length === 0) return '';
          const stat = {
            c: itens.filter(i => i.status === 'conforme').length,
            r: itens.filter(i => i.status === 'ressalva').length,
            n: itens.filter(i => i.status === 'nao_conforme').length,
          };
          const linhas = itens.map(it => `
            <tr>
              <td class="td-item">${escapeHtml(it.item)}</td>
              <td class="td-status">${badge(it.status)}</td>
              ${mostrarNorma ? `<td class="td-norma">${escapeHtml(it.norma || '—')}</td>` : ''}
              <td class="td-obs">${escapeHtml(it.observacao || '—')}</td>
            </tr>`).join('');
          return `
            <h2 class="camada-titulo">
              ${escapeHtml(titulo)}
              <span class="camada-counts">
                ${stat.c > 0 ? `<span class="mini-badge" style="background:#dcfce7;color:#166534">${stat.c} Conforme${stat.c>1?'s':''}</span>` : ''}
                ${stat.r > 0 ? `<span class="mini-badge" style="background:#fef3c7;color:#92400e">${stat.r} Ressalva${stat.r>1?'s':''}</span>` : ''}
                ${stat.n > 0 ? `<span class="mini-badge" style="background:#fee2e2;color:#991b1b">${stat.n} NC</span>` : ''}
              </span>
            </h2>
            <table class="tabela-camada">
              <thead><tr>
                <th style="width:32%">Item analisado</th>
                <th style="width:14%">Status</th>
                ${mostrarNorma ? '<th style="width:18%">Norma</th>' : ''}
                <th>Observação</th>
              </tr></thead>
              <tbody>${linhas}</tbody>
            </table>`;
        };

        // Seção de APONTAMENTOS (NC/ressalvas) com a justificativa do RT quando houver.
        // Lê direto de parecer.apontamentos (não depende do casamento com a camada).
        const apontsList = parecer.apontamentos || [];
        const apontamentosHtml = apontsList.length === 0 ? '' : `
          <div class="secao-titulo">APONTAMENTOS</div>
          ${apontsList.map((ap) => {
            const cor = ap.severidade === 'nao_conforme' ? '#dc2626' : ap.severidade === 'ressalva' ? '#d97706' : '#16a34a';
            const just = ap.justificativa
              ? `<div style="margin-top:4pt;padding:5pt 7pt;background:#dcfce7;border-radius:3pt;font-size:8.5pt;color:#166534;"><strong>Justificativa (RT):</strong> ${escapeHtml(ap.justificativa)}${ap.justificada_por ? ` — registrada por ${escapeHtml(ap.justificada_por)}${ap.justificada_em ? ' em ' + new Date(ap.justificada_em).toLocaleString('pt-BR') : ''}` : ''}</div>`
              : (ap.severidade === 'ressalva' ? `<div style="margin-top:4pt;padding:5pt 7pt;background:#fef3c7;border-radius:3pt;font-size:8.5pt;color:#92400e;">Ressalva pendente de justificativa do Responsável Técnico.</div>` : '');
            return `<div style="border:0.5pt solid #d4d4d4;border-left:3pt solid ${cor};border-radius:3pt;padding:7pt 9pt;margin-bottom:6pt;">
              <div style="font-size:9pt;">${badge(ap.severidade)} &nbsp;<strong>${escapeHtml(ap.codigo || '')}</strong> · ${escapeHtml(ap.documento_afetado || '')}${ap.referencia_normativa ? ` · <span style="font-family:'Courier New',monospace;font-size:7.5pt;color:#6b7280;">${escapeHtml(ap.referencia_normativa)}</span>` : ''}</div>
              <div style="font-size:8.5pt;margin-top:3pt;color:#374151;">${escapeHtml(ap.descricao || '')}</div>
              ${ap.recomendacao ? `<div style="font-size:8.5pt;margin-top:3pt;color:#4b5563;"><strong>Ação:</strong> ${escapeHtml(ap.recomendacao)}</div>` : ''}
              ${just}
            </div>`;
          }).join('')}`;

        return `<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8"><title>Resumo da Análise · ${escapeHtml(p.numero_op || '')}</title>
<style>

${parecer.parecer_tecnico ? `
