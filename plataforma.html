    /* ====================================================================
       ANÁLISE (extração de PDF/DOCX no navegador + upload)
       Estrutura de cada slot:
         null  |  { file, text, status: 'extracting'|'done'|'error', error? }
       Multi (etiqueta_acessorio): array dos objetos acima.
       ==================================================================== */

    async function extractTextFromFile(file) {
      const ext = file.name.toLowerCase().split('.').pop();
      if (ext === 'pdf') {
        if (!window.pdfjsLib) throw new Error('PDF.js não carregou. Recarregue a página.');
        const buf = await file.arrayBuffer();
        const pdf = await window.pdfjsLib.getDocument({ data: buf }).promise;
        let fullText = '';
        for (let i = 1; i <= pdf.numPages; i++) {
          const page = await pdf.getPage(i);
          const content = await page.getTextContent();

          // === MUDANÇA-CHAVE ===
          // Extrai posição X/Y de cada pedaço de texto e ORDENA explicitamente por:
          // 1) Y descendente (no PDF, Y maior = topo da página)
          // 2) X ascendente (esquerda → direita)
          // Isso reconstrói a ordem natural de leitura mesmo quando o pdf.js
          // entrega os itens em ordem de stream (que pode ser coluna por coluna).
          const items = content.items
            .filter((it) => it.str && it.str.length > 0)
            .map((it) => ({
              str: it.str,
              x: it.transform ? it.transform[4] : 0,
              y: it.transform ? it.transform[5] : 0,
            }));

          items.sort((a, b) => {
            const yDiff = Math.round(b.y) - Math.round(a.y);
            if (Math.abs(yDiff) > 3) return yDiff; // linhas diferentes
            return a.x - b.x; // mesma linha: esquerda → direita
          });

          // Agrupa em linhas pelo Y, separando colunas com espaço duplo quando há
          // grande lacuna horizontal (heurística: gap > 30 pontos)
          let lastY = null;
          let lastX = null;
          let line = '';
          for (const item of items) {
            const y = Math.round(item.y);
            if (lastY !== null && Math.abs(y - lastY) > 3) {
              fullText += line.trimEnd() + '\n';
              line = '';
              lastX = null;
            }
            // Separador entre colunas na mesma linha
            const sep = (lastX !== null && (item.x - lastX) > 30) ? '  ' : (line && !line.endsWith(' ') ? ' ' : '');
            line += sep + item.str;
            lastY = y;
            lastX = item.x + (item.str.length * 5); // estimativa do fim do texto
          }
          if (line) fullText += line.trimEnd() + '\n';
          fullText += '\n';
        }
        return fullText.trim();
      }
      if (ext === 'docx') {
        if (!window.mammoth) throw new Error('Mammoth.js não carregou. Recarregue a página.');
        const buf = await file.arrayBuffer();
        const result = await window.mammoth.extractRawText({ arrayBuffer: buf });
        return (result.value || '').trim();
      }
      if (ext === 'csv') {
        // RC pode vir exportada do Sapiens em CSV (separador ';' tipicamente).
        // Como parseRC trabalha com regex sobre o texto bruto, simplesmente lemos
        // o arquivo como texto preservando quebras de linha — os tokens (códigos,
        // séries, lotes) ficam reconhecíveis igual ao PDF/XLSX.
        return (await file.text()).trim();
      }
      if (ext === 'xlsx') {
        // RC pode vir tanto em PDF quanto em XLSX (exportações diferentes do Sapiens).
        // Estratégia: extrair cada linha da planilha como uma linha de texto, juntando
        // as células com espaço duplo. parseRC consegue achar os tokens (códigos, séries,
        // lotes, N/A, etc.) em qualquer um dos dois formatos porque tudo é regex.
        if (!window.ExcelJS) throw new Error('ExcelJS não carregou. Recarregue a página.');
        const buf = await file.arrayBuffer();
        const wb = new window.ExcelJS.Workbook();
        await wb.xlsx.load(buf);
        let fullText = '';
        wb.eachSheet((ws) => {
          ws.eachRow({ includeEmpty: false }, (row) => {
            const vals = [];
            row.eachCell({ includeEmpty: false }, (cell) => {
              let v = cell.value;
              if (v && typeof v === 'object') {
                if (Array.isArray(v.richText)) v = v.richText.map((r) => r.text || '').join('');
                else if (v.result !== undefined) v = v.result;
                else if (v.text !== undefined) v = v.text;
                else if (v.hyperlink && v.text) v = v.text;
                else if (v instanceof Date) v = v.toLocaleDateString('pt-BR');
                else v = '';
              }
              if (v != null && v !== '') vals.push(String(v).trim());
            });
            if (vals.length > 0) fullText += vals.join('  ') + '\n';
          });
          fullText += '\n';
        });
        return fullText.trim();
      }
      throw new Error('Formato não suportado: .' + ext + '. Aceitos: .pdf, .docx, .xlsx.');
    }

    /* ====================================================================
       PARSERS (determinísticos via regex)
       Lê os textos extraídos dos documentos e extrai dados estruturados.
       ==================================================================== */

    function parseOP(text) {
      if (!text) return null;
      const r = { _raw: text };
      let m;

      // OP: ordem dos padrões importa — mais específicos PRIMEIRO para evitar falsos positivos
      // (ex.: o ano "2026" é 4 dígitos e poderia ser confundido com nº de OP)
      const opPatts = [
        // 1. "070 Origem: 6.819" — valor X.XXX após "Origem: 070"
        /\d{3}\s+Origem[\s:]+\s*(\d{1,3}(?:\.\d{3})+|\d{4,7})\b/i,
        // 2. "Origem: 070 6.819" — valor após Origem+número (ordem normal Sapiens)
        /Origem[\s:]+\d{3}\s+(\d{1,3}(?:\.\d{3})+|\d{4,7})\b/i,
        // 3. "O.P.: 6.819" — label-valor padrão
        /\bO\.?\s*P\.?\s*[:.]?\s*(\d{1,3}(?:\.\d{3})+|\d{5,7})\b/i,
        // 4. "X.XXX ... O.P." — valor antes do label (APENAS formato X.XXX, evita match em anos)
        /\b(\d{1,3}(?:\.\d{3})+)\s+[\s\S]{0,40}?O\.?\s*P\.?/i,
        // 5. Fallback: "Ordem de Produção XXXXX"
        /Ordem\s+de\s+Produ[cç][ãa]o[^\d]{0,40}(\d{4,7})/i,
      ];
      for (const re of opPatts) { m = text.match(re); if (m) { r.op = m[1].replace(/\./g, ''); break; } }

      // Origem: "070 Origem:" ou "Origem: 070" — testa ambos
      const origemPatts = [
        /Origem\s*:?\s+(\d{3})\b/i,
        /\b(\d{3})\s+Origem/i,
      ];
      for (const re of origemPatts) { m = text.match(re); if (m) { r.origem = m[1]; break; } }

      // Produto (código Sapiens)
      m = text.match(/Produto\s*:?\s*([A-Z]{2,5}\d{4,5})\b/i);
      if (!m) m = text.match(/\b([A-Z]{2,5}\d{4,5})\b/);
      if (m) r.codigoSapiens = m[1];

      // Derivação: "FNT0001 - 001 -" ou "001 - Fonte de Luz..."
      m = text.match(/[A-Z]{2,5}\d{4,5}\s*[-–]\s*(\d{3})\s*[-–]/);
      if (!m) m = text.match(/\b(\d{3})\s*[-–]\s+(?:Fonte|Microc|Monitor|Insufl|Sistema|Cabo|Endos|Litotrit|Acess)/i);
      if (m) r.derivacao = m[1];

      // Modelo (CM-XXX)
      m = text.match(/\b(CM-[A-Z0-9]+)\b/);
      if (m) r.modelo = m[1];

      // Família: o nome do produto vem entre derivação e modelo: "001 - Fonte de Luz Led - CM-LED"
      m = text.match(/\d{3}\s*[-–]\s*([A-ZÁ-Ÿ][\wÁ-Ÿà-ÿ\s]+?)\s*[-–]\s*CM-/i);
      if (m) r.familia = m[1].trim();

      // Tipo OP
      m = text.match(/\bTipo\s*:?\s*([NR])\s*[-–]\s*(\w+)/i);
      if (!m) m = text.match(/\b([NR])\s*[-–]\s*(Normal|Reprocesso)\b/i);
      if (m) r.tipo_op = { codigo: m[1].toUpperCase(), nome: m[2] };

      // Série (PREFIXO-AAAAMM-N)
      // Série (PREFIXO-AAAAMM-N). Prefixo aceita letras + dígitos (ex.: REC3UHD), começando com letra.
      m = text.match(/\b([A-Z][A-Z0-9]{2,7}-?\d{4,6}-\d+)\b/);
      if (m) r.serie = m[1].toUpperCase().replace(/\s/g, '');

      // Pedido: "Pedido: X.XXX" ou "X.XXX Pedido:" (valor antes do label)
      const pedidoPatts = [
        /Pedido\s*:?\s+(\d{1,3}(?:\.\d{3})+|\d{3,7})\b/i,
        /\b(\d{1,3}(?:\.\d{3})+|\d{3,7})\s+Pedido/i,
      ];
      for (const re of pedidoPatts) { m = text.match(re); if (m) { r.pedido = m[1].replace(/\./g, ''); break; } }

      // Rel. Prod.: PP-105270 (busca pelo padrão de letra+digitos)
      m = text.match(/Rel\.?\s*Prod\.?\s*:?\s*([A-Z]{1,3}-?\d{4,8})/i);
      if (!m) m = text.match(/\b(PP-?\d{5,8})\b/);
      if (m) r.relProd = m[1];

      // Data emissão: data SEM hora seguinte (não captura datas de operações que têm dd/mm/yyyy hh:mm)
      m = text.match(/\b(\d{2})\/(\d{2})\/(\d{4})\b(?!\s+\d{2}:\d{2})/);
      if (m) r.dataEmissao = `${m[3]}-${m[2]}-${m[1]}`;

      // Usuário Ger. OP: "283 Yasmin Rocha" (ID + nome). Pega o primeiro padrão ID+Nome compatível.
      m = text.match(/(\d{2,4})\s+([A-ZÁ-Ÿ][a-zà-ÿ]+(?:\s+[A-ZÁ-Ÿ][a-zà-ÿ]+){1,3})\b/);
      if (m) r.usuarioGerOP = m[2].trim();

      r.aprovados = (text.match(/\bAprovado\b/gi) || []).length;
      r.reprovados = (text.match(/\bReprovado\b|\bN[ãa]o\s+[Aa]provad[oa]\b/gi) || []).length;

      // ===== ESTÁGIOS por NOMES CONHECIDOS (em vez de "Estágio: X") =====
      const knownStages = [
        { num: 5,  pats: [/Separa[çc][ãa]o de Componentes/i, /Separar componentes/i] },
        { num: 7,  pats: [/Prepara[çc][ãa]o de Componentes/i] },
        { num: 10, pats: [/Montagem do produto/i, /Realizar montagem/i] },
        { num: 15, pats: [/Fechamento da Tela/i] },
        { num: 20, pats: [/Prepara[çc][ãa]o de Gabinete/i, /Preparar o gabinete/i] },
        { num: 25, pats: [/Fechamento e Acabamento Gabinete/i, /Acabamento Gabinete Pl[áa]stico/i] },
        { num: 30, pats: [/Montagem Eletr[ôo]nica/i, /Conectar Rabichos/i, /Regular os par[âa]metros/i, /Testes preliminares/i] },
        { num: 35, pats: [/(?<![Ee]m\s)Programa[çc][ãa]o(?!\s+do\s+display)/i] },
        { num: 37, pats: [/Grava[çc][ãa]o de firmware/i, /Grava[çc][ãa]o\s+\(firmware\)/i] },
        { num: 40, pats: [/Finaliza[çc][ãa]o/i, /Fechar o equipamento/i, /CQ Final/i] },
        { num: 45, pats: [/Controle de Qualidade do produto acabado/i] },
        { num: 50, pats: [/\bEmbalagem\b/i, /Embalar Produto/i] },
        { num: 60, pats: [/Concilia[çc][ãa]o da Produ[çc][ãa]o/i, /Conferir Concilia[çc][ãa]o/i] },
      ];
      const nomesEstagios = {
        5: 'Separação de Componentes', 7: 'Preparação de Componentes', 10: 'Montagem',
        15: 'Fechamento da Tela', 20: 'Preparação de Gabinete',
        25: 'Fechamento e Acabamento Gabinete Plástico', 30: 'Montagem Eletrônica',
        35: 'Programação', 37: 'Gravação', 40: 'Finalização',
        45: 'Controle de Qualidade', 50: 'Embalagem', 60: 'Conciliação da Produção',
      };
      r.estagios = [];
      // Fonte AUTORITATIVA: marcadores "Estágio: N <nome>" do Sapiens. Cada seção da
      // OP abre com esse cabeçalho, então ele lista com segurança todos os estágios
      // reais do roteiro (ex.: 5, 10, 39, 50, 60).
      const genRe = /Est[áa]gio\s*:?\s*(\d{1,3})\b/gi;
      let gm;
      while ((gm = genRe.exec(text)) !== null) {
        const num = parseInt(gm[1]);
        if (!r.estagios.find((e) => e.numero === num)) {
          r.estagios.push({ numero: num, nome: nomesEstagios[num] || `Estágio ${num}` });
        }
      }
      // Fallback por NOME de operação — SÓ quando a OP não traz nenhum cabeçalho
      // "Estágio: N". É menos confiável (pode captar termos em textos livres, como
      // "testes preliminares" na descrição de uma operação), então nunca roda junto
      // com os marcadores explícitos, evitando falsos positivos de estágio.
      if (r.estagios.length === 0) {
        for (const s of knownStages) {
          if (s.pats.some((p) => p.test(text))) {
            r.estagios.push({ numero: s.num, nome: nomesEstagios[s.num] });
          }
        }
      }
      r.estagios.sort((a, b) => a.numero - b.numero);
      // (r.inspecoes e r.inspecoesDetalhe foram preenchidos acima na seção de inspeções)
      r.datasTimeline = [];
      const dr = /(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2})/g;
      let dm;
      while ((dm = dr.exec(text)) !== null) {
        r.datasTimeline.push({
          iso: `${dm[3]}-${dm[2]}-${dm[1]}T${dm[4]}:${dm[5]}`,
          str: `${dm[1]}/${dm[2]}/${dm[3]} ${dm[4]}:${dm[5]}`,
        });
      }

      // === CRONOLOGIA DETALHADA: operações por estágio com datas/horas/operadores ===
      // Padrão típico de linha: "10 Separar componentes 26/01/2026 11:30 26/01/2026 12:00 30 237 Guilherme Silva"
      r.operacoes = [];
      const opRe = /(?:^|\n)\s*(\d{1,3})\s+([A-ZÁ-Ÿa-zà-ÿ][\w\sÁ-Ÿà-ÿ\.,\-\/]+?)\s+(\d{2}\/\d{2}\/\d{4})\s+(\d{2}:\d{2})\s+(\d{2}\/\d{2}\/\d{4})\s+(\d{2}:\d{2})\s+(\d+)\s+(\d+)\s+([A-ZÁ-Ÿ][A-ZÁ-Ÿa-zà-ÿ\s]+?)(?=\s*\n|$)/g;
      // Para vincular ao estágio, fazemos um "scan" linear marcando o estágio corrente
      const linhas = text.split('\n');
      let estagioCorrente = null;
      const estLineRe = /Est[áa]gio:\s*(\d+)\s+([A-Za-zÁÉÍÓÚÂÊÔÃÕÇçáéíóúâêôãõ][^\n]+?)(?:\s+Opera|$)/;
      const linhaOpRe = /^\s*(\d{1,3})\s+([A-ZÁ-Ÿa-zà-ÿ][\w\sÁ-Ÿà-ÿ\.,\-\/]+?)\s+(\d{2}\/\d{2}\/\d{4})\s+(\d{2}:\d{2})\s+(\d{2}\/\d{2}\/\d{4})\s+(\d{2}:\d{2})\s+(\d+)\s+(\d+)\s+([A-ZÁ-Ÿ][A-ZÁ-Ÿa-zà-ÿ\s]+)$/;
      for (const linha of linhas) {
        const em2 = linha.match(estLineRe);
        if (em2) { estagioCorrente = { numero: parseInt(em2[1]), nome: em2[2].trim() }; continue; }
        const om = linha.match(linhaOpRe);
        if (om && estagioCorrente) {
          r.operacoes.push({
            estagio_numero: estagioCorrente.numero,
            estagio_nome: estagioCorrente.nome,
            operacao_numero: om[1],
            operacao_desc: om[2].trim(),
            inicio: `${om[3]} ${om[4]}`,
            fim: `${om[5]} ${om[6]}`,
            tempo_min: parseInt(om[7]),
            operador_id: om[8],
            operador_nome: om[9].trim(),
          });
        }
      }

      // === INSPEÇÕES DETALHADAS — calibração 01/07/2026 (v5):
      // Formato REAL do pdf.js UMD no browser (validado com log de debug — OP 7499):
      //   Estágio:  20  Preparação de Gabinete
      //   Inspeção: 125415  1  INS0002.2.02.01 Status: Conforme    Usuário Inspeção: William Soares
      //   Data / Hora Exec. Plano: 10/06/2026 15:47
      //
      // Cada bloco de inspeção tem essas 3 linhas seguidas. Regex de multi-linha
      // captura todos os campos de uma vez. Regra confirmada: mesma inspeção pode
      // aparecer 2× com planos diferentes (ex.: 118227/CM32F.001.03 + 118227/CINEMED.01)
      // — ambas ficam registradas.
      r.inspecoesDetalhe = [];
      r.inspecoes = [];
      const inspBloco = /Est[áa]gio:\s+(\d{1,3})\s+([^\n]+?)\s*\n\s*Inspe[çc][ãa]o:\s+(\d{4,7})\s+\d+\s+(\S+)\s+Status:\s+(Conforme|N[ãa]o\s*Conforme|Aprovado|Reprovado)\s+Usu[áa]rio\s+Inspe[çc][ãa]o:\s+([^\n]+?)\s*\n\s*Data\s*\/\s*Hora\s+Exec\.\s*Plano:\s+(\d{2}\/\d{2}\/\d{4})\s+(\d{2}:\d{2})/gi;
      let ibM;
      while ((ibM = inspBloco.exec(text)) !== null) {
        const estagio = parseInt(ibM[1]);
        const nomeEstagio = ibM[2].trim();
        const numero = ibM[3];
        const plano = ibM[4];
        const status = ibM[5].trim();
        const inspetor = ibM[6].trim();
        const data = ibM[7];
        const hora = ibM[8];
        r.inspecoesDetalhe.push({
          numero,
          plano,
          status,
          inspetor,
          data,
          hora,
          data_hora_iso: `${data.split('/').reverse().join('-')}T${hora}`,
          estagio,
          nomeEstagio,
        });
        r.inspecoes.push({ numero, status });
      }
      // Log discreto — ajuda a QG confirmar rapidamente no console quantas inspeções
      // foram capturadas. Se aparecer 0, cai no bloco de debug pra ajudar calibração.
      try {
        if (r.inspecoesDetalhe.length > 0) {
          console.log(`[parseOP] ${r.inspecoesDetalhe.length} inspeções extraídas.`);
        } else {
          const inspIdxs = [];
          let idx = 0;
          while ((idx = text.indexOf('Inspeção:', idx)) !== -1) { inspIdxs.push(idx); idx++; }
          if (inspIdxs.length > 0) {
            console.warn('[parseOP] 0 inspeções extraídas mas', inspIdxs.length, '"Inspeção:" no texto — possível mudança de formato.');
            const around = text.substring(Math.max(0, inspIdxs[0] - 100), inspIdxs[0] + 250);
            console.log('[parseOP] Amostra:', JSON.stringify(around));
          }
        }
      } catch (e) {}

      // === DATA DA CONCILIAÇÃO (vem da OP, inspeção do Estágio 60) ===
      // Estratégia 1: encontrar a inspeção que está associada ao Estágio 60
      let inspConcil = r.inspecoesDetalhe.find((i) => i.estagio === 60);
      // Estratégia 2: fallback — a inspeção mais recente cronologicamente
      if (!inspConcil && r.inspecoesDetalhe.length > 0) {
        const ordenadas = [...r.inspecoesDetalhe]
          .filter((i) => i.data_hora_iso)
          .sort((a, b) => b.data_hora_iso.localeCompare(a.data_hora_iso));
        if (ordenadas.length > 0) inspConcil = ordenadas[0];
      }
      if (inspConcil && inspConcil.data) {
        const [d, mo, y] = inspConcil.data.split('/');
        r.dataConciliacao = `${y}-${mo}-${d}`;
        r.horaConciliacao = inspConcil.hora;
        r.inspetorConciliacao = inspConcil.inspetor;
        r.inspecaoConciliacao = inspConcil.numero;
      }
      // Estratégia 2 (robusta e INDEPENDENTE da ordem de extração): a conciliação
      // (estágio 60) é o ÚLTIMO evento da OP. Todas as datas COM hora no documento são
      // execuções de estágios/inspeções — a MAIOR delas é a da conciliação. Não há
      // carimbo de emissão/impressão nessas OPs, então o máximo é confiável.
      if (!r.dataConciliacao) {
        const dts = [...text.matchAll(/(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2})/g)];
        let best = null, bestKey = '';
        for (const m of dts) {
          const key = `${m[3]}-${m[2]}-${m[1]} ${m[4]}:${m[5]}`; // yyyy-mm-dd HH:MM (ordenável)
          if (key > bestKey) { bestKey = key; best = m; }
        }
        if (best) {
          r.dataConciliacao = `${best[3]}-${best[2]}-${best[1]}`;
          r.horaConciliacao = `${best[4]}:${best[5]}`;
        }
      }
      // Estratégia 3: na extração do PDF, a data/hora da inspeção da conciliação
      // costuma aparecer IMEDIATAMENTE ANTES do cabeçalho "Estágio: 60 Conciliação da
      // Produção". Ancora nisso (hora opcional). Fallback caso não haja datas com hora.
      if (!r.dataConciliacao) {
        const mAntes = text.match(/(\d{2})\/(\d{2})\/(\d{4})(?:\s+(\d{2}):(\d{2}))?\s*Est[áa]gio:\s*60\s+Concilia[çc][ãa]o/i);
        if (mAntes) {
          r.dataConciliacao = `${mAntes[3]}-${mAntes[2]}-${mAntes[1]}`;
          if (mAntes[4] && mAntes[5]) r.horaConciliacao = `${mAntes[4]}:${mAntes[5]}`;
        }
      }
      // Estratégia 3 (robusta): a partir de "Estágio: 60" / "Conciliação da Produção",
      // pega a data do "Exec. Plano:". A HORA é OPCIONAL — a extração do PDF às vezes
      // separa data e hora, e o padrão antigo (data+hora juntas) não casava nesses casos.
      if (!r.dataConciliacao) {
        const m60 = text.match(/(?:Est[áa]gio[:\s]+60|Concilia[çc][ãa]o\s+da\s+Produ[çc][ãa]o)[\s\S]{0,800}?Exec\.?\s*Plano:?\s*(\d{2})\/(\d{2})\/(\d{4})(?:\s+(\d{2}):(\d{2}))?/i);
        if (m60) {
          r.dataConciliacao = `${m60[3]}-${m60[2]}-${m60[1]}`;
          if (m60[4] && m60[5]) r.horaConciliacao = `${m60[4]}:${m60[5]}`;
        }
      }
      // Estratégia 4: fallback amplo — primeira data (hora opcional) após "Estágio: 60".
      if (!r.dataConciliacao) {
        const concilBloco = text.match(/(?:Est[áa]gio[:\s]+60|Concilia[çc][ãa]o\s+da\s+Produ[çc][ãa]o)[\s\S]{0,600}?(\d{2})\/(\d{2})\/(\d{4})(?:\s+(\d{2}):(\d{2}))?/i);
        if (concilBloco) {
          r.dataConciliacao = `${concilBloco[3]}-${concilBloco[2]}-${concilBloco[1]}`;
          if (concilBloco[4] && concilBloco[5]) r.horaConciliacao = `${concilBloco[4]}:${concilBloco[5]}`;
        }
      }

      // === MEDIÇÕES — calibração 26/06/2026 ===
      // O PDF do Sapiens (testado contra OP 7436) traz as colunas reorganizadas:
      //   "Verificação | Tipo | Vlr Medido | Situação | Vlr Min | Vlr Max | Vlr Alvo | UM"
      // ou seja: Medido vem ANTES dos limites e da unidade. A regex antiga (que
      // assumia Min/Alvo/Max/Medido em ordem) nunca capturava nada nesse layout.
      // Esta versão usa a descrição começando com "Verificar/Medir/..." como
      // ponto de ancoragem (evita engolir a página inteira em [^\n]+?).
      r.medicoes = [];
      const medRe = /\b((?:Verificar|Medir|Confirmar|Conferir|Aferir|Calibrar)\s+[^.\n]{3,140}?)\s+Medi[çc][ãa]o\s+(<?\s*[\d,]+(?:\.\d+)?)\s+(Aprovado|Reprovado|N\/A)\s+([\d,]+(?:\.\d+)?)\s+([\d,]+(?:\.\d+)?)\s+([\d,]+(?:\.\d+)?)\s+(\w+)/g;
      let mm2;
      while ((mm2 = medRe.exec(text)) !== null) {
        r.medicoes.push({
          descricao: mm2[1].trim(),
          vlr_medido: mm2[2].replace(/\s+/g, ''),
          situacao: mm2[3],
          vlr_min: mm2[4],
          vlr_max: mm2[5],
          vlr_alvo: mm2[6],
          um: mm2[7],
        });
      }

      // === Vistos de Aprovação (assinatura RT/Qualidade) ===
      // Padrão: "Resp. Produção: 03/02/2026 ____" e "Resp. Qualidade: 03/02/2026 ____"
      r.vistos = {};
      const vpRe = /Resp\.?\s+Produ[çc][ãa]o:\s+(\d{2})[\s\/_]+(\d{2})[\s\/_]+(\d{4})/i;
      const vqRe = /Resp\.?\s+Qualidade:\s+(\d{2})[\s\/_]+(\d{2})[\s\/_]+(\d{4})/i;
      let vp = text.match(vpRe);
      let vq = text.match(vqRe);
      if (vp) r.vistos.producao_data = `${vp[3]}-${vp[2]}-${vp[1]}`;
      if (vq) r.vistos.qualidade_data = `${vq[3]}-${vq[2]}-${vq[1]}`;

      return r;
    }

    function parseEtiqueta(text) {
      if (!text) return null;
      // tOriginal preserva quebras de linha; t normalizado é mais fácil pra match.
      const tOriginal = text;
      const t = text.replace(/\*+/g, '').replace(/\s{2,}/g, ' ');
      const r = {};
      let m;
      // FAMÍLIA: na etiqueta, o nome do produto aparece em uma linha isolada
      // entre o bloco CNPJ e o "Modelo: …". Aceita CAIXA ALTA, Title Case ou
      // minúsculas — captura o texto como está pra confrontar com a Ficha
      // depois (com normalização tolerante: case-insensitive, sem acentos).
      let mFam = tOriginal.match(/CNPJ[^\n]*\n+\s*([A-Za-zÁÉÍÓÚÂÊÔÃÕÇáéíóúâêôãõç][A-Za-zÁÉÍÓÚÂÊÔÃÕÇáéíóúâêôãõç0-9 \-]{4,}?)\s*\n+\s*Modelo[\s:]/);
      if (mFam) r.familia = mFam[1].trim();
      // Fallback (caso a etiqueta tenha layout diferente): tenta match contra lista
      // tradicional de famílias conhecidas.
      if (!r.familia) {
        const fams = ['INSUFLADOR DE CO2 PARA ENDOSCOPIA', 'INSUFLADOR DE CO2', 'FONTE DE LUZ LED', 'MICROCÂMERA', 'MONITOR GRAU MÉDICO', 'MONITOR PROFISSIONAL', 'LITOTRITOR BALÍSTICO', 'UROVIEW', 'SISTEMA INTEGRADO', 'SISTEMA DE GRAVAÇÃO', 'ENDOSCÓPIO RÍGIDO', 'CABO DE FIBRA ÓPTICA'];
        for (const f of fams) {
          if (new RegExp(f, 'i').test(t)) { r.familia = f; break; }
        }
      }
      m = t.match(/Modelo[\s:*]+([A-Za-z][\w\d\-\.]+)/i);
      if (m) r.modelo = m[1].trim().replace(/\*/g, '');
      m = t.match(/N[º°o][\s*]*(?:de\s+)?S[ée]rie[\s:*]+([A-Z][A-Z0-9]{1,7}[-\s]?\d{4,6}[-\s]?\d+)/i);
      if (m) r.serie = m[1].toUpperCase().replace(/\s/g, '');
      m = t.match(/Anvisa[\s:*]+(\d{9,15})/i);
      if (m) r.registroAnvisa = m[1].replace(/\s/g, '');
      m = t.match(/Data\s+de\s+Fabrica[çc][ãa]o[\s:*]+(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/i);
      if (m) {
        const ano = m[3].length === 2 ? '20' + m[3] : m[3];
        r.dataFabricacao = `${ano}-${m[2].padStart(2, '0')}-${m[1].padStart(2, '0')}`;
      }
      m = t.match(/(?:Prazo\s+de\s+)?Validade[\s:*]+(INDETERMINAD[OA]|INDERTERMINAD[OA]|Indeterminada|Indeterminado|\d{1,2}[\/\-]\d{1,2}[\/\-]\d{2,4})/i);
      if (m) r.validade = m[1].toUpperCase().replace('INDETERMINADA', 'INDETERMINADO');

      // === Campos novos confrontados contra a Ficha (decisão 17/06/2026) ===
      // FABRICANTE (nome de razão social): linha que começa com "Fabricante:"
      m = t.match(/Fabricante[\s:*]+([^\n]+?)(?=\s+Rua\s|\s+CNPJ|\s+Modelo|\s+Fonte|\s+Insufl|\s+Anvisa|\s+Data|\s+N[º°o]|$)/i);
      if (m) r.fabricante = m[1].trim().replace(/[,;]\s*$/, '');
      // CNPJ (número completo)
      m = t.match(/CNPJ[\s:*]*(\d{2}[\.\s]?\d{3}[\.\s]?\d{3}[\.\s]?\/?\s?\d{4}[\s\-]?\d{2})/i);
      if (m) r.cnpj = m[1].replace(/\s+/g, '');
      // ENDEREÇO completo: começa em "Rua " e vai até CNPJ ou Modelo (o que vier antes).
      // Coleta multi-linha juntando com vírgula.
      m = tOriginal.match(/(Rua\s+[^\n]+(?:\n[^\n]*?(?:CEP|RJ|RJ\s*[-–]\s*CEP)[^\n]*)?)/i);
      if (m) r.endereco = m[1].replace(/\s+/g, ' ').trim();
      // TELEFONE (opcional na etiqueta principal — alguns templates não têm)
      m = t.match(/(?:Tel(?:efone)?|Fone)\.?[\s:*]*(\(?\d{2}\)?[\s\-\.]?\d{4,5}[\s\-\.]?\d{4})/i);
      if (m) r.telefone = m[1].trim();

      m = t.match(/Respons[áa]vel\s+T[ée]cnico[\s:*]+([A-ZÁÊÔa-záéíóúâêôãõç][A-ZÁÊÔa-záéíóúâêôãõç\s\.]+?)(?=\s+CREA|\s+Respons|\s+Instru|$)/i);
      if (m) r.rt = m[1].trim().replace(/\*/g, '');
      m = t.match(/CREA\s*(?:[A-Z]{2}[\s:]*)(\d{6,12})/i);
      if (m) r.crea = m[1];
      m = t.match(/Respons[áa]vel\s+Legal[\s:*]+([A-ZÁÊÔa-záéíóúâêôãõç][A-ZÁÊÔa-záéíóúâêôãõç\s\.]+?)(?=\s+Instru|\s+Para|\n|$)/i);
      if (m) r.rl = m[1].trim().replace(/\*/g, '');
      r.temEnderecoBela = /Rua\s+Bela\s*,?\s*852/i.test(t);
      r.temCEP = /20930[\s\-]?380/i.test(t);
      r.temCNPJ = /05[\.\s]?209[\.\s]?279[\.\s\/]?0001[\s\-]?31/i.test(t);
      return r;
    }

    function parseEtiquetaAcessorio(text) {
      if (!text) return null;
      const t = text.replace(/\*+/g, '').replace(/\s{2,}/g, ' ');
      const r = {};
      let m;
      m = t.match(/Acess[óo]rio\s+Exclusivo[\s:]+([^\n]+?)(?=\s+C[óo]digo|\s+Lote|\s+Data|$)/i);
      if (m) r.descricao = m[1].trim();
      m = t.match(/C[óo]digo[\s:]+([A-Z]{2,4}\d{4,5})/i);
      if (m) r.codigoSapiens = m[1].trim();
      m = t.match(/Lote\s*[\/|]\s*S[ée]rie[\s:]+([A-Za-z0-9\-\/]+)/i);
      if (m) r.loteOuSerie = m[1].trim();
      m = t.match(/Data\s+de\s+Fabrica[çc][ãa]o[\s:]+([^\n]+?)(?=\s+Validade|\s+Fabricante|\s+Fornecedor|$)/i);
      if (m) {
        const val = m[1].trim();
        r.dataFabricacao = val;
        r.dataFabNa = /^N\/A$/i.test(val.trim());
      }
      m = t.match(/Validade[\s:]+([^\n]+?)(?=\s+Fabricante|\s+Fornecedor|\s+Observa|$)/i);
      if (m) {
        r.validade = m[1].trim();
        // Considera "Indeterminada", "Indeterminado", "N/A" e "NA" como sem data válida.
        r.validadeIndeterminada = /indetermina|^N\s*\/?\s*A$/i.test(r.validade);
        // Tenta interpretar validade como data — usado para o check de validade
        // vs. data de conciliação (decisão 17/06/2026 — acessórios estéreis).
        const md = r.validade.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);
        if (md) {
          const ano = md[3].length === 2 ? '20' + md[3] : md[3];
          r.validadeISO = `${ano}-${md[2].padStart(2, '0')}-${md[1].padStart(2, '0')}`;
        }
      }
      if (/\bFabricante\s*:/i.test(t)) r.tipoFabForn = 'F';
      else if (/\bFornecedor\s*:/i.test(t)) r.tipoFabForn = 'Fo';
      m = t.match(/Observa[çc][ãa]o[\s:]+([^\n]+)/i);
      if (m) {
        r.observacao = m[1].trim();
        const av = r.observacao.match(/Anvisa\s+(\d{9,15})/i);
        if (av) r.registroAnvisaEquip = av[1];
      }
      r.temEnderecoBela = /Rua\s+Bela\s*,?\s*852/i.test(t);
      r.temCEP = /20930[\s\-]?380/i.test(t);
      return r;
    }

    function parseForm0047(text) {
      if (!text) return null;
      const t = text.replace(/\*/g, ' ').replace(/[ \t]{2,}/g, ' ');
      const r = {};
      let m;

      // FAMÍLIA: os placeholders "PRODUTO: ___" estão vazios, então busca por nomes conhecidos
      const familias = [
        'Fonte de Luz LED', 'FONTE DE LUZ LED',
        'Insuflador de CO2 para Endoscopia', 'INSUFLADOR DE CO2 PARA ENDOSCOPIA',
        'Insuflador de CO2', 'INSUFLADOR DE CO2',
        'Insuflador de L[íi]quido', 'INSUFLADOR DE L[ÍI]QUIDO',
        'Microc[âa]mera CM', 'MICROC[ÂA]MERA',
        'Monitor Profissional', 'MONITOR PROFISSIONAL',
        'Monitor Grau M[ée]dico', 'MONITOR GRAU M[ÉE]DICO',
        'Litotritor Bal[íi]stico', 'LITOTRITOR BAL[ÍI]STICO',
        'Cabo de Fibra [ÓO]ptica', 'CABO DE FIBRA',
        'Sistema Integrado para Endoscopia', 'SISTEMA INTEGRADO',
        'Sistema de V[íi]deo', 'SISTEMA DE V[ÍI]DEO',
        'Sistema de Grava[çc][ãa]o', 'SISTEMA DE GRAVA[ÇC][ÃA]O',
        'Acess[óo]rio para Escape', 'ACESS[ÓO]RIO PARA ESCAPE',
        'Endosc[óo]pio R[íi]gido', 'ENDOSC[ÓO]PIO R[ÍI]GIDO',
      ];
      for (const fam of familias) {
        const re = new RegExp(`\\b(${fam})\\b`, 'i');
        const fm = t.match(re);
        if (fm) { r.familia = fm[1].trim(); break; }
      }
      // Fallback: tenta o label PRODUTO mesmo (caso não esteja vazio)
      if (!r.familia) {
        m = t.match(/PRODUTO\s*:?\s*([A-Za-zÁ-Ÿà-ÿ][\w\sÁ-Ÿà-ÿ]+?)(?=\s+MODELO|\s+N[º°o]|\s*\n|$)/i);
        if (m && m[1].trim() && !m[1].includes('_')) r.familia = m[1].trim();
      }

      // MODELO: busca pelo padrão CM-XXX no texto
      m = t.match(/\b(CM-[A-Z0-9]+)\b/);
      if (!m) m = t.match(/MODELO\s*:?\s*([A-Z][\w\d\-.]+)/i);
      if (m) r.modelo = m[1].trim();

      // SÉRIE: padrão PREFIXO-AAAAMM-N. Prefixo alfanumérico começando com letra (REC3UHD, LEDT, CMSCM, etc.)
      m = t.match(/\b([A-Z][A-Z0-9]{2,7}-?\d{4,6}-\d+)\b/);
      if (m) r.serie = m[1].toUpperCase().replace(/\s/g, '');

      // Data revisão (vem do bloco VALIDADORES: "APROVADO POR - NOME - DD/MM/AAAA")
      m = t.match(/VALIDADORES[\s\S]*?APROVADO\s+POR[\s\S]*?(\d{1,2})\/(\d{1,2})\/(\d{4})/i);
      if (m) r.dataRevisaoForm = `${m[3]}-${m[2].padStart(2, '0')}-${m[1].padStart(2, '0')}`;

      // Data da conciliação: layout do FORM tem o valor lá embaixo (fora do label).
      // Estratégia: a ÚLTIMA data no texto que NÃO seja a revisão é a conciliação.
      const allDates = [...t.matchAll(/(\d{1,2})\/(\d{1,2})\/(\d{4})/g)];
      if (allDates.length > 0) {
        for (let i = allDates.length - 1; i >= 0; i--) {
          const d = allDates[i];
          const iso = `${d[3]}-${d[2].padStart(2, '0')}-${d[1].padStart(2, '0')}`;
          if (iso !== r.dataRevisaoForm) { r.dataConciliacao = iso; break; }
        }
      }
      // Fallback: label explícito (raramente preenchido)
      if (!r.dataConciliacao) {
        m = t.match(/Data\s+da\s+Concilia[çc][ãa]o\s*:?\s*(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/i);
        if (m) r.dataConciliacao = `${m[3]}-${m[2].padStart(2, '0')}-${m[1].padStart(2, '0')}`;
      }

      // Revisão do FORM ("FORM-GQ-0047  8  1 de 1")
      m = t.match(/FORM-GQ-0047\s+(\d{1,2})\b/i);
      if (m) r.revisao = m[1];

      // Liberado para comercialização — o "X" no checkbox é gráfico no PDF e não vem no texto.
      // Heurística: 1) procura X explícito; 2) se o FORM está preenchido (família/modelo/série detectados), assume SIM (será confirmado visualmente pelo RT).
      if (/Sim\s*:\s*[X✓☒☑█▪✗]/i.test(t)) r.liberado = 'SIM';
      else if (/N[ãa]o\s*:\s*[X✓☒☑█▪✗]/i.test(t)) r.liberado = 'NAO';
      else if (r.familia && r.modelo && r.serie) {
        // FORM aparentemente preenchido — não conseguimos detectar a marcação gráfica do X.
        // Não marca como SIM nem NAO aqui; o analyzer cuida disso.
        r.liberado = 'incerto';
      }

      // Cópia controlada (deve estar AUSENTE no FORM correto)
      r.copia = /c[óo]pia\s+controlada(?!\s+n)/i.test(t) ? 'controlada' : 'nao_controlada';

      return r;
    }

    function parseRC(text) {
      if (!text) return null;
      // _raw é necessário para o cruzamento Lote/Série acessório × Etiqueta acessório
      // (analisarConciliacao busca o código Sapiens na string original para extrair o
      // lote/série numa janela próxima — sem _raw, esse cruzamento é silenciosamente pulado).
      const r = { _raw: text };
      let m;
      // Origem: layout multi-coluna do Sapiens — valor pode vir antes ou depois do label.
      // CUIDADO: usar lookbehind (?<![\d.]) para evitar pegar "819" dentro de "6.819"
      const origemPatts = [
        /Origem\s*[:|\s]\s*(\d{3})\b/i,
        /(?<![\d.])\b(\d{3})\s+(?:Produto:|O\.?\s*P\.?|FNT|INS|MNT|CAM|REC|STB|GRA|CKP|ETQ|CON|FIL|DIS|GAB|INT|PCU|PDA|PMB|VEN|ACE)/,
        /(?<![\d.])\b(\d{3})\s+Origem/i,
        /Origem[^\d]{0,30}(?<![\d.])\b(\d{3})\b/i,
      ];
      for (const re of origemPatts) { m = text.match(re); if (m) { r.origem = m[1]; break; } }

      // Situação: aceita "Finalizada" em qualquer lugar (palavra alfabética distintiva)
      const sitPatts = [
        /Sit\.\s*:?\s+([A-ZÁ-Ÿ][a-zà-ÿ]{4,})\b/i,
        /\b(Finalizada|Em\s+Andamento|Cancelada|Aberta|Conclu[íi]da)\b/i,
      ];
      for (const re of sitPatts) { m = text.match(re); if (m) { r.situacao = m[1]; break; } }

      // OP relacionada
      const opPattsRC = [
        /\bO\.?\s*P\.?\s*[:.]?\s*(\d{1,3}(?:\.\d{3})+|\d{3,7})\b/i,
        /Origem[\s:]+\d{3}\s+(\d{1,3}(?:\.\d{3})+|\d{3,7})\b/i,
      ];
      for (const re of opPattsRC) { m = text.match(re); if (m) { r.opRelacionada = m[1].replace(/\./g, ''); break; } }
      m = text.match(/Produto[\s:]+([A-Z]{2,5}\d{4,5})\s+(.+?)(?=\s+Acess[óo]rio|\s+Sit\.|\s*$)/i);
      if (m) { r.produtoSapiens = m[1]; r.produtoNome = m[2].trim(); }
      r.codigos = [...new Set((text.match(/\b([A-Z]{2,5}\d{4,5})\b/g) || []))];
      r.divergenciasZero = (text.match(/\b0\s*\/\s*0\b/g) || []).length;
      r.lotesSeries = [...new Set((text.match(/\b\d{15}\b/g) || []))];
      r.seriesComPrefixo = [...new Set((text.match(/\b[A-Z][A-Z0-9]{1,7}-\d{4,6}-\d+\b/g) || []))];
      // "Não Conforme" na RC do Sapiens é uma COLUNA (quantidade não conforme), cujo
      // CABEÇALHO se repete em cada página ("... Utilizada Não Conforme"). Antes,
      // contávamos o texto do cabeçalho como se fossem componentes NC — falso positivo
      // (ex.: RC de 4 páginas acusava "4 não conformes" sem nenhum de verdade).
      // Correção: remove o cabeçalho antes de contar. Componente NC de verdade apareceria
      // como QUANTIDADE > 0 nessa coluna (numérica), não como o texto "Não Conforme".
      const _semCabecalhoRC = String(text || '').replace(/Utilizada\s+N[ãa]o\s+Conform\w*(\s+e\b)?/gi, ' ');
      r.naoConformes = (_semCabecalhoRC.match(/N[ãa]o\s+Conforme/gi) || []).length;
      return r;
    }

    /* ====================================================================
       DETECTAR PRODUTO E CARREGAR FICHA MESTRE DO SUPABASE
       ==================================================================== */

    async function loadProdutosComFichas() {
      // Decisão de 18/06/2026: a derivação agora vive na FICHA, não no produto.
      // Cada produto tem 1 entrada no catálogo (por modelo). Cada ficha define
      // sua própria derivação. Consultamos pelas fichas ativas, anexando o
      // produto correspondente em cada uma — assim cada "linha" de retorno
      // representa um par (produto, derivação) detectável na OP.
      // Inclui também produtos SEM ficha (pra cadastro de nova ficha), retornados
      // com ficha_id null + derivação vazia.
      const [fichasRes, produtosSemFichaRes] = await Promise.all([
        supabase.from('fichas_mestres')
          .select(`
            id, derivacao, derivacao_descricao,
            nome_comercial, convencao_nro_serie, exemplo_nro_serie,
            razao_social, cnpj, endereco_fabrica, telefone, responsavel_tecnico, crea_rt, responsavel_legal,
            ativa, apta_analise, estagios_aplicaveis, estagios_com_inspecao,
            produto:produtos!fichas_mestres_produto_id_fkey(id, equipamento, modelo, codigo_referencia, registro_anvisa, codigo_sapiens, ativo),
            acessorios:acessorios_aplicaveis(ordem, descricao, codigo_sapiens, obrigatorio, is_fabricante_confiance, esteril, pode_sair_apenas_na_nf, grupo_alternativo)
          `)
          .eq('ativa', true),
        // produtos ativos que não têm nenhuma ficha ativa (não vão ser detectados
        // por código nas OPs, mas listamos pra completude — análise vai bloquear
        // com mensagem "produto sem ficha")
        supabase.from('produtos').select('id, equipamento, modelo, codigo_referencia, registro_anvisa, codigo_sapiens').eq('ativo', true),
      ]);
      if (fichasRes.error) throw fichasRes.error;

      const produtosSemFicha = (produtosSemFichaRes.data || []).filter((p) => {
        return !(fichasRes.data || []).some((f) => f.produto?.id === p.id);
      });

      const fichasMapeadas = (fichasRes.data || [])
        .filter((f) => f.produto && f.produto.ativo !== false)
        .map((f) => ({
          id: f.produto.id,
          ficha_id: f.id,
          fichaApta: f.apta_analise === true,
          codigoSapiens: f.produto.codigo_sapiens,
          modelo: f.produto.modelo,
          familia: f.produto.equipamento,
          serialPrefix: f.produto.codigo_referencia,
          registroAnvisa: f.produto.registro_anvisa,
          derivacao: f.derivacao || '000',
          derivacaoDescricao: f.derivacao_descricao || 'Padrão',
          rt: f.responsavel_tecnico || 'Samara Campos',
          creaRt: f.crea_rt || '2019108911',
          razaoSocial:      f.razao_social      || 'Confiance Medical Produtos Médicos S.A.',
          cnpj:             f.cnpj              || '05.209.279/0001-31',
          enderecoFabrica:  f.endereco_fabrica  || '',
          telefone:         f.telefone          || '',
          responsavelLegal: f.responsavel_legal || '',
          estagiosAplicaveis: f.estagios_aplicaveis || [],
          // Números dos estágios variáveis com inspeção associada — nova config
          // adicionada 01/07/2026 (Maria Luiza). Vazio = usar regra padrão antiga.
          estagiosComInspecao: Array.isArray(f.estagios_com_inspecao)
            ? f.estagios_com_inspecao.map(Number).filter((n) => !isNaN(n))
            : [],
          acessorios: (f.acessorios || []).sort((a, b) => a.ordem - b.ordem).map((a) => ({
            descricao: a.descricao,
            codigoSapiens: a.codigo_sapiens,
            obrigatorio: a.obrigatorio ? 'Obr.' : 'Opc.',
            tipo: a.is_fabricante_confiance ? 'F' : 'Fo',
            esteril: a.esteril,
            podeSairApenasNaNf: a.pode_sair_apenas_na_nf === true,
            grupoAlternativo: (a.grupo_alternativo || '').trim() || null,
          })),
        }));

      const semFichaMapeados = produtosSemFicha.map((p) => ({
        id: p.id,
        ficha_id: null,
        codigoSapiens: p.codigo_sapiens,
        modelo: p.modelo,
        familia: p.equipamento,
        serialPrefix: p.codigo_referencia,
        registroAnvisa: p.registro_anvisa,
        derivacao: null, // sem ficha = sem derivação cadastrada
        derivacaoDescricao: null,
        estagiosAplicaveis: [],
        estagiosComInspecao: [],
        acessorios: [],
      }));

      return [...fichasMapeadas, ...semFichaMapeados];
    }

    function detectarProdutoNoTexto(corpus, produtos, opDerivacao) {
      const corpusLow = corpus.toLowerCase();
      const derivAlvo = opDerivacao ? String(opDerivacao).padStart(3, '0') : null;

      // Helper: dado um conjunto de candidatos com o mesmo código/modelo,
      // refina pela derivação extraída da OP. Se houver derivação na OP e
      // existir ficha para o par, retorna o match exato. Caso contrário,
      // retorna informação útil para o relatório acusar a derivação órfã.
      const refinarPorDerivacao = (candidatos, fonteBase) => {
        if (!candidatos || candidatos.length === 0) return null;
        // Se a OP traz derivação:
        if (derivAlvo) {
          const exato = candidatos.find((p) => (p.derivacao || '000') === derivAlvo);
          if (exato) {
            return {
              produto: exato,
              fonte: `${fonteBase} + Derivação "${derivAlvo}"`,
              derivacaoEsperada: derivAlvo,
              derivacaoEncontrada: derivAlvo,
              derivacaoStatus: 'match',
            };
          }
          // Há produtos com o mesmo código/modelo, mas nenhum bate a derivação:
          // retorna o primeiro candidato como referência (família) + status órfão
          return {
            produto: candidatos[0],
            fonte: `${fonteBase} — derivação "${derivAlvo}" NÃO CADASTRADA`,
            derivacaoEsperada: derivAlvo,
            derivacaoEncontrada: candidatos[0].derivacao || '000',
            derivacaoStatus: 'orfa',
            derivacoesCadastradas: candidatos.map((p) => p.derivacao || '000'),
          };
        }
        // OP não trouxe derivação explícita
        if (candidatos.length === 1) {
          return { produto: candidatos[0], fonte: fonteBase, derivacaoStatus: 'unica' };
        }
        // Múltiplas derivações cadastradas e OP omissa: usa "000" como fallback se existir
        const padrao = candidatos.find((p) => (p.derivacao || '000') === '000');
        if (padrao) {
          return {
            produto: padrao,
            fonte: `${fonteBase} (OP sem derivação — usando "000 — Padrão")`,
            derivacaoStatus: 'op_omissa_padrao',
          };
        }
        return {
          produto: candidatos[0],
          fonte: `${fonteBase} (OP sem derivação — múltiplas cadastradas)`,
          derivacaoStatus: 'op_omissa_ambigua',
          derivacoesCadastradas: candidatos.map((p) => p.derivacao || '000'),
        };
      };

      // 1) Match por prefixo de série (mais específico)
      for (const p of produtos) {
        if (!p.serialPrefix) continue;
        const re = new RegExp(`\\b${p.serialPrefix}[-\\s]?(\\d{4})(\\d{1,2})[-\\s]?(\\d+)\\b`, 'i');
        const mm = corpus.match(re);
        if (mm) {
          // Coleta TODOS os produtos com o mesmo serialPrefix (derivações da família)
          const candidatos = produtos.filter((q) => q.serialPrefix === p.serialPrefix);
          const res = refinarPorDerivacao(candidatos, `Prefixo de série "${p.serialPrefix}"`);
          if (res) return { ...res, serie: `${p.serialPrefix}-${mm[1]}${mm[2]}-${mm[3]}` };
        }
      }

      // 2) Match por código Sapiens
      for (const p of produtos) {
        if (p.codigoSapiens && corpus.includes(p.codigoSapiens)) {
          const candidatos = produtos.filter((q) => q.codigoSapiens === p.codigoSapiens);
          const res = refinarPorDerivacao(candidatos, `Código Sapiens "${p.codigoSapiens}"`);
          if (res) return res;
        }
      }

      // 3) Match por modelo
      for (const p of produtos) {
        if (p.modelo && corpusLow.includes(p.modelo.toLowerCase())) {
          const candidatos = produtos.filter((q) => q.modelo === p.modelo);
          const res = refinarPorDerivacao(candidatos, `Modelo "${p.modelo}"`);
          if (res) return res;
        }
      }

      // 4) Match por registro ANVISA
      for (const p of produtos) {
        if (p.registroAnvisa && corpus.includes(p.registroAnvisa)) {
          const candidatos = produtos.filter((q) => q.registroAnvisa === p.registroAnvisa);
          const res = refinarPorDerivacao(candidatos, `Registro ANVISA "${p.registroAnvisa}"`);
          if (res) return res;
        }
      }
      return null;
    }

    /* ====================================================================
       PRÉ-PREENCHIMENTO DE OP E FORM-GQ-0047 (ANOTAÇÃO NO PDF ORIGINAL)
       --------------------------------------------------------------------
       Em vez de re-renderizar o documento, mantém o PDF original intacto e
       desenha as marcações por cima usando pdf-lib + fontkit:
         • OP   → ✓ em cada [ ] + data da conciliação ao lado de cada label
                  "Data" na ÚLTIMA página
         • FORM → ✓ na coluna SIM ou N/A de cada item, conforme Ficha Mestre

       Estratégia:
         1) PDF.js extrai texto COM coordenadas (cada item tem transform [a,b,c,d,x,y]
            em PDF user space, mesma origem que o pdf-lib: bottom-left)
         2) Identifica os pontos de interesse (colchetes vazios, SIM/N/A, "Data")
         3) pdf-lib carrega o MESMO PDF e desenha as anotações nas coordenadas
            descobertas, preservando 100% do layout original.
       ==================================================================== */
    /**
     * Agrupa items do pdf.js em LINHAS (mesma Y aproximada), ordena por X,
     * e constrói uma string concatenada por linha COM um mapa que indica,
     * para cada caractere da string, a qual item original ele pertence e
     * em qual offset dentro daquele item.
     * Isso permite procurar "[ ]" na string da linha inteira (mesmo quando
     * o PDF fragmenta os caracteres em múltiplos items), e depois calcular
     * as coordenadas exatas X/Y de qualquer caractere via o item original.
     */
    function buildLinesWithMap(items, yTolerance = 3) {
      // Agrupar por linha (Y aproximada). Y do pdf.js cresce para CIMA.
      const sorted = [...items].sort((a, b) => {
        const ya = (a.transform && a.transform[5]) || 0;
        const yb = (b.transform && b.transform[5]) || 0;
        if (Math.abs(ya - yb) > yTolerance) return yb - ya; // top to bottom
        return ((a.transform && a.transform[4]) || 0) - ((b.transform && b.transform[4]) || 0);
      });
      const lines = [];
      for (const it of sorted) {
        const y = (it.transform && it.transform[5]) || 0;
        let line = lines.find((l) => Math.abs(l.y - y) <= yTolerance);
        if (!line) { line = { y, items: [], text: '', charMap: [] }; lines.push(line); }
        line.items.push(it);
      }
      // Reordena items de cada linha por X e monta text+charMap
      for (const line of lines) {
        line.items.sort((a, b) => ((a.transform && a.transform[4]) || 0) - ((b.transform && b.transform[4]) || 0));
        line.text = '';
        line.charMap = []; // para cada índice de char em line.text → { item, offsetInItem, isGap }
        let prevItem = null;
        for (const it of line.items) {
          const str = it.str || '';
          // Se há um "gap" significativo entre items, insere espaço sintético
          if (prevItem) {
            const prevX = (prevItem.transform[4] || 0) + (prevItem.width || 0);
            const thisX = (it.transform[4] || 0);
            const gap = thisX - prevX;
            const fs = Math.abs((it.transform && it.transform[0]) || 9);
            if (gap > fs * 0.25) {
              line.text += ' ';
              line.charMap.push({ item: it, offsetInItem: 0, isGap: true });
            }
          }
          for (let i = 0; i < str.length; i++) {
            line.text += str[i];
            line.charMap.push({ item: it, offsetInItem: i, isGap: false });
          }
          prevItem = it;
        }
      }
      return lines;
    }

    /**
     * Dado um item e um offsetInItem (índice de caractere dentro do str),
     * calcula a posição X aproximada desse caractere em PDF user space.
     */
    function charPositionInItem(item, offsetInItem) {
      const str = item.str || '';
      const itemWidth = item.width || 0;
      const charWidth = str.length > 0 ? itemWidth / str.length : 5;
      const x = (item.transform[4] || 0) + offsetInItem * charWidth;
      const y = (item.transform[5] || 0);
      const fontSize = Math.abs((item.transform && item.transform[0]) || 9);
      return { x, y, fontSize, charWidth };
    }

    /**
     * Desenha um ✓ (check vetorial) dentro de uma "caixa" definida por (x, y, size).
     * Usado no pré-preenchimento da OP (marcação dos [ ] de inspeção).
     */
    function drawCheckmark(page, { x, y, size, color, PDFLib }) {
      // Um ✓ é um V assimétrico: traço curto descendo até um pivô e traço maior subindo.
      const x1 = x + size * 0.10, y1 = y + size * 0.45;
      const x2 = x + size * 0.40, y2 = y + size * 0.10;
      const x3 = x + size * 0.95, y3 = y + size * 0.85;
      const thickness = Math.max(0.7, size * 0.10);
      page.drawLine({ start: { x: x1, y: y1 }, end: { x: x2, y: y2 }, thickness, color });
      page.drawLine({ start: { x: x2, y: y2 }, end: { x: x3, y: y3 }, thickness, color });
    }

    /**
     * Desenha um "X" vetorial dentro de uma "caixa" definida por (x, y, size).
     * Usado no pré-preenchimento do FORM-GQ-0047 (marcação dos checkboxes de SIM/NÃO/N/A).
     */
    function drawXmark(page, { x, y, size, color, PDFLib }) {
      const m = 0.15;
      const x1 = x + size * m,       y1 = y + size * m;
      const x2 = x + size * (1 - m), y2 = y + size * (1 - m);
      const x3 = x + size * m,       y3 = y + size * (1 - m);
      const x4 = x + size * (1 - m), y4 = y + size * m;
      const thickness = Math.max(0.7, size * 0.10);
      page.drawLine({ start: { x: x1, y: y1 }, end: { x: x2, y: y2 }, thickness, color });
      page.drawLine({ start: { x: x3, y: y3 }, end: { x: x4, y: y4 }, thickness, color });
    }

    function _b64ToBytes(b64) {
      const bin = atob(b64);
      const bytes = new Uint8Array(bin.length);
      for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
      return bytes;
    }

    // Helpers de matching (mesma lógica usada na detecção do PDF, reaproveitada para XLSX)
    function _xlsxNorm(s) {
      return (s || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/\s+/g, ' ').trim();
    }
    function _xlsxCleanRoteiro(itemText) {
      let p = _xlsxNorm(itemText);
      p = p.replace(/\([^)]*\)/g, '').trim();
      p = p.replace(/\s+do\s+produto\s+acabado\s*$/, '').trim();
      return p.replace(/\s+/g, ' ');
    }
    function _xlsxExtractPdfLineKey(lineText) {
      const tn = _xlsxNorm(lineText);
      let m = /contendo\s+(?:a\s+)?etapa\s+de\s+(.+)/.exec(tn);
      if (m) return m[1].replace(/\s+do\s+produto\s+acabado\s*$/, '').trim();
      m = /contendo\s+(.+)/.exec(tn);
      if (m) return m[1].replace(/\s+do\s+produto\s+acabado\s*$/, '').trim();
      return tn;
    }
    function _xlsxTokenize(s) {
      return (s || '').split(/\W+/).filter(t => t.length >= 3);
    }
    function _xlsxSmartMatch(roteiroKey, lineKey) {
      if (!roteiroKey || !lineKey) return 0;
      if (lineKey.includes(roteiroKey)) return 1.0;
      if (roteiroKey.includes(lineKey)) return 0.9;
      const rFlat = roteiroKey.replace(/\s+/g, '');
      const lFlat = lineKey.replace(/\s+/g, '');
      if (lFlat.includes(rFlat)) return 0.85;
      if (rFlat.includes(lFlat)) return 0.80;
      const tr = _xlsxTokenize(roteiroKey);
      const tl = new Set(_xlsxTokenize(lineKey));
      if (tr.length === 0 || tl.size === 0) return 0;
      let common = 0;
      for (const t of tr) if (tl.has(t)) common++;
      const required = tr.length === 1 ? 1 : 2;
      if (common < required) return 0;
      return 0.5 + (common / tr.length) * 0.3;
    }

    /**
     * Preenche o template XLSX do FORM-GQ-0047 com os dados do lote, PRESERVANDO
     * 100% da formatação original (bordas, fontes, mesclas, logo Confiance).
     *
     * Usa ExcelJS (não SheetJS Community, que perde estilos ao salvar).
     *
     * Retorna { xlsxBytes: Uint8Array, stats: object }.
     */
    /**
     * Carrega o template do FORM-GQ-0047 — primeiro tenta o bucket Supabase
     * (`form-templates/current.xlsx`), que é o template oficial gerenciado
     * pela QG via aba Cadastro. Se não existir ou der erro, faz fallback
     * para a versão embutida em base64 no HTML.
     * Retorna { bytes: Uint8Array, source: 'bucket' | 'embedded' }.
     */
    async function _loadFormTemplateBytes() {
      // 1) Tenta o Storage do Supabase
      try {
        const { data, error } = await supabase.storage.from('form-templates').download('current.xlsx');
        if (!error && data) {
          const buf = await data.arrayBuffer();
          if (buf && buf.byteLength > 1000) { // sanity check: tamanho mínimo razoável
            return { bytes: new Uint8Array(buf), source: 'bucket' };
          }
        }
      } catch (e) {
        console.warn('Falha ao carregar template do bucket, usando embutido:', e?.message || e);
      }
      // 2) Fallback: template embutido no HTML
      return { bytes: _b64ToBytes(FORM_GQ_0047_TEMPLATE_B64), source: 'embedded' };
    }

    /**
     * Extrai a DATA DE APROVAÇÃO do template ativo do FORM-GQ-0047.
     *
     * Lê a célula A35 do template (que tem o texto "Aprovado por: <nome> /
     * Garantia da Qualidade – DD/MM/AAAA"), aplica regex para pegar a data
     * e converte para o formato YYYY-MM-DD usado nas comparações.
     *
     * É TOLERANTE A FALHA: se algo der errado (Supabase trava, ExcelJS falha,
     * regex não casa), retorna { date: null } sem lançar erro. Tem timeout de
     * 8s no carregamento do template para nunca pendurar a análise.
     *
     * Retorna { date: 'YYYY-MM-DD' | null, source: 'bucket' | 'embedded' | 'none' | 'error', raw: string|null }.
     */
    async function _loadFormTemplateApprovalDate() {
      if (!window.ExcelJS) return { date: null, source: 'none', raw: null };
      try {
        // Timeout de 8s para o carregamento — evita pendurar análise se Supabase
        // pendurar ou o ExcelJS travar com template corrompido
        const loadPromise = _loadFormTemplateBytes();
        const timeoutPromise = new Promise((_, reject) =>
          setTimeout(() => reject(new Error('Timeout 8s ao carregar template para extrair data')), 8000)
        );
        const { bytes, source } = await Promise.race([loadPromise, timeoutPromise]);
        const wb = new window.ExcelJS.Workbook();
        await wb.xlsx.load(bytes.buffer);
        const ws = wb.getWorksheet('FORM-GQ-0047') || wb.worksheets[0];
        const cell = ws.getCell('A35');
        // Trata rich text — quando célula tem múltiplos runs (label bold + valor regular)
        let raw = '';
        if (cell.value && typeof cell.value === 'object' && Array.isArray(cell.value.richText)) {
          raw = cell.value.richText.map(r => r.text || '').join('');
        } else {
          raw = String(cell.value || '');
        }
        // Procura padrão DD/MM/AAAA no texto
        const m = raw.match(/(\d{2})\/(\d{2})\/(\d{4})/);
        if (!m) return { date: null, source, raw };
        const iso = `${m[3]}-${m[2]}-${m[1]}`;  // → YYYY-MM-DD
        return { date: iso, source, raw };
      } catch (e) {
        console.warn('Falha ao extrair data de aprovação do template:', e?.message || e);
        return { date: null, source: 'error', raw: null, error: e?.message };
      }
    }

    async function fillFormXlsxTemplate(opParsed, produto, opcoes = {}) {
      // opcoes:
      //   opReprocessoAnexado (bool, default false) — se true, marca SIM no item "OP de Reprocesso"
      //   rncAnexado (bool, default false) — se true, marca SIM no item "RNCs associados"
      if (!window.ExcelJS) throw new Error('ExcelJS não carregou. Recarregue a página (Ctrl+F5).');

      // 1) Decodifica template e carrega no ExcelJS (preserva todos os estilos)
      const { bytes, source: templateSource } = await _loadFormTemplateBytes();
      const wb = new window.ExcelJS.Workbook();
      await wb.xlsx.load(bytes.buffer);
      const ws = wb.getWorksheet('FORM-GQ-0047') || wb.worksheets[0];

      // Centralizar o conteúdo HORIZONTALMENTE na página impressa (margens iguais
      // esquerda/direita). Aplica tanto no PDF gerado pelo CloudConvert quanto
      // na impressão direta a partir do Excel.
      ws.pageSetup = {
        ...(ws.pageSetup || {}),
        horizontalCentered: true,
        // Mantém demais configurações do template (orientação, paper size, etc.)
      };

      const stats = { camposPreenchidos: 0, itensMatched: 0, totalItensRoteiro: 0, liberacaoMarcada: false, totalChecks: 0, templateSource };

      const familia = produto?.familia || '';
      const modelo  = produto?.modelo || '';
      const serie   = opParsed?.serie || '';
      const dataC   = opParsed?.dataConciliacao
        ? opParsed.dataConciliacao.split('-').reverse().join('/')
        : '';

      // 2) Campos do cabeçalho.
      //    Template oficial (ajustado pela QG em 03/06/2026 — versão atual):
      //      L6  = "Título:" | "CHECK-LIST..." | "Código" | "Revisão"
      //      L7  = "Depto:"  | "GARANTIA..."   | "FORM-GQ-0047" | "8"
      //      L9  = A9 "PRODUTO: ___" (h=left)  |  G9  "Nº série/Lote: ___"
      //      L10 = A10 "MODELO: ___"  (h=left)  |  G10 "Data da Conciliação: ___"
      //      L12-L13 = cabeçalho da tabela ("Itens a verificar" / "Conforme?" SIM NÃO N/A)
      //      L14..L29 = 16 linhas dos itens do roteiro (A:F mesclado por linha)
      //      L31 = "Liberado para comercialização? Sim:[    ] Não:[    ] N/A:[    ]" (B31:I31 mesclado)
      //      L33 = "Visto de Liberação..."
      //      L35 = "Aprovado por: Maria Luiza Brandão / Garantia da Qualidade – 02/04/2025"
      //            (A35:I35 mesclado, centralizado — JÁ embutido no template)
      //
      //    RICH TEXT: dentro da mesma célula, queremos:
      //      LABEL em NEGRITO  ("PRODUTO: ", "MODELO: ", "Nº série/Lote: ", "Data da Conciliação: ")
      //      VALOR SEM NEGRITO ("FONTE DE LUZ LED", "CM-LED", "LEDT-20261-6", "03/02/2026")
      //    O ExcelJS suporta isso via `cell.value = { richText: [...] }` — array de runs,
      //    cada um com sua própria fonte. Mais robusto que setar font da célula inteira.
      const fontLabel = { name: 'Times New Roman', size: 11, bold: true };
      const fontValor = { name: 'Times New Roman', size: 11, bold: false };
      const setLabelValor = (addr, label, valor) => {
        const c = ws.getCell(addr);
        c.value = { richText: [
          { font: fontLabel, text: label },
          { font: fontValor, text: valor },
        ]};
        stats.camposPreenchidos++;
      };
      if (familia) setLabelValor('A9',  'PRODUTO: ',            familia);
      if (modelo)  setLabelValor('A10', 'MODELO: ',             modelo);
      if (serie)   setLabelValor('G9',  'Nº série/Lote: ',      serie);
      if (dataC)   setLabelValor('G10', 'Data da Conciliação: ', dataC);

      // 3) Marcações na tabela de itens (linhas 14-29 do template real).
      //    Lógica nova:
      //    - VARIÁVEIS (Separação, Preparação Componentes, Montagem, Fechamento Tela,
      //      Preparação Gabinete, Fechamento e Acabamento Gabinete Plástico, Montagem
      //      Eletrônica, Programação, Gravação, Finalização):
      //        SIM se está em produto.estagiosAplicaveis, N/A senão.
      //    - FIXOS (CQ, Embalagem, Conciliação, Verificação Rotulagem): SIM sempre.
      //    - CONDICIONAIS (OP Reprocesso, RNC): SIM se anexado nos slots, N/A senão.
      //    Layout das colunas: SIM=G, NÃO=H, N/A=I (linha 13 do template tem esses headers).
      const estagiosSet = new Set(produto?.estagiosAplicaveis || []);
      // Mapa: texto-chave normalizado → marcação esperada (SIM/N/A)
      // Construímos a marcação esperada de cada um dos 16 itens conhecidos.
      const itensFORM = [
        ...ESTAGIOS_VARIAVEIS.map((est) => ({
          textoFORM: est.textoFORM,
          marcacao: estagiosSet.has(est.nome) ? 'SIM' : 'N/A',
        })),
        ...ESTAGIOS_FIXOS.map((est) => ({
          textoFORM: est.textoFORM,
          marcacao: 'SIM',
        })),
        ...ESTAGIOS_CONDICIONAIS.map((est) => ({
          textoFORM: est.textoFORM,
          marcacao: (est.slotKey === 'op_reprocesso' ? opcoes.opReprocessoAnexado
                   : est.slotKey === 'rnc'           ? opcoes.rncAnexado
                   : false) ? 'SIM' : 'N/A',
        })),
      ];
      const itemKeys = itensFORM.map((item) => ({ item, key: _xlsxCleanRoteiro(item.textoFORM) }));
      stats.totalItensRoteiro = itemKeys.length;
      const usados = new Set();

      for (let row = 14; row <= 29; row++) {
        const cell = ws.getCell('A' + row);
        const lineText = cell && cell.value ? String(cell.value) : '';
        if (!lineText) continue;
        const lineKey = _xlsxExtractPdfLineKey(lineText);

        // Best match contra os 16 itens conhecidos
        let best = null, bestScore = 0;
        for (const ik of itemKeys) {
          if (usados.has(ik.key) || !ik.key || ik.key.length < 3) continue;
          const score = _xlsxSmartMatch(ik.key, lineKey);
          if (score > bestScore || (score === bestScore && best && ik.key.length > best.key.length)) {
            best = ik;
            bestScore = score;
          }
        }
        if (!best || bestScore < 0.5) continue;
        usados.add(best.key);
        stats.itensMatched++;

        const mark = (best.item.marcacao || 'SIM').toUpperCase();
        const targetCol = mark === 'SIM' ? 'G' : (mark === 'N/A' || mark === 'NA' ? 'I' : 'H');
        const targetCell = ws.getCell(targetCol + row);
        targetCell.value = 'X';
        targetCell.alignment = { horizontal: 'center', vertical: 'middle' };
        stats.totalChecks++;
      }

      // 4) Liberado para comercialização -> X após "Sim:"
      //    No template está em B31 (mesclado B31:I31), texto contendo
      //    "Liberado para comercialização? Sim:[    ] Não:[    ] N/A:[    ]" (4 espaços por caixinha).
      //    Substitui o "Sim:[    ]" inteiro por "Sim:[ X  ]" para o X ficar dentro do colchete.
      const b31 = ws.getCell('B31');
      if (b31 && b31.value) {
        const orig = String(b31.value);
        const novo = orig.replace(/Sim:\s*\[\s+\]/, 'Sim: [ X  ]');
        if (novo !== orig) {
          b31.value = novo;
          stats.liberacaoMarcada = true;
          stats.totalChecks++;
        }
      }
      // Nota: o texto "Aprovado por: Maria Luiza Brandão / Garantia da Qualidade – 02/04/2025"
      // está EMBUTIDO no template oficial (A35:I35 mesclado, centralizado, Century Gothic 9pt).
      // Não precisamos mais inserir programaticamente.

      // 5) Exporta como ArrayBuffer
      const out = await wb.xlsx.writeBuffer();
      return { xlsxBytes: new Uint8Array(out), stats };
    }

    async function annotatePdfPreserveOriginal(file, { kind, opParsed, produto }) {
      const arrayBuffer = await file.arrayBuffer();

      // 1) Coletar texto+posições com pdf.js (clona o buffer porque pdf-lib vai consumir o outro)
      const pdfjsDoc = await pdfjsLib.getDocument({ data: arrayBuffer.slice(0) }).promise;
      const numPages = pdfjsDoc.numPages;
      const pagesData = [];
      for (let p = 1; p <= numPages; p++) {
        const page = await pdfjsDoc.getPage(p);
        const viewport = page.getViewport({ scale: 1.0 });
        const tc = await page.getTextContent();
        const lines = buildLinesWithMap(tc.items, 3);
        pagesData.push({ pageNum: p, width: viewport.width, height: viewport.height, items: tc.items, lines });
      }

      // 2) Calcular anotações conforme o tipo
      let annotations = [];
      let stats = { totalChecks: 0, datesAdded: 0 };
      if (kind === 'op') {
        const r = computeOPAnnotations(pagesData, opParsed);
        annotations = r.annotations;
        stats = r.stats;
      } else if (kind === 'form') {
        const r = computeFormAnnotations(pagesData, produto, opParsed);
        annotations = r.annotations;
        stats = r.stats;
      }
      console.log('[Pré-preencher] anotações computadas:', annotations.length, stats);

      // 3) Carregar PDF com pdf-lib, embed da Helvetica (built-in) e desenhar anotações
      const PDFLib = window.PDFLib;
      const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
      const helvetica = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
      const pages = pdfDoc.getPages();
      const checkColor = PDFLib.rgb(0.05, 0.40, 0.10); // verde institucional p/ ✓ (OP)
      const xmarkColor = PDFLib.rgb(0, 0, 0);          // preto p/ X (FORM-GQ-0047)
      const textColor  = PDFLib.rgb(0, 0, 0);          // preto p/ texto preenchido

      let drawn = 0;
      for (const ann of annotations) {
        const page = pages[ann.pageIdx];
        if (!page) continue;
        try {
          if (ann.type === 'check') {
            // ✓ verde (usado na OP, marcação dos colchetes de inspeção)
            drawCheckmark(page, { x: ann.x, y: ann.y, size: ann.size || 9, color: ann.color || checkColor, PDFLib });
          } else if (ann.type === 'x') {
            // X preto (usado no FORM-GQ-0047, marcação dos checkboxes SIM/NÃO/N/A e Liberado=Sim)
            drawXmark(page, { x: ann.x, y: ann.y, size: ann.size || 9, color: ann.color || xmarkColor, PDFLib });
          } else if (ann.type === 'text') {
            page.drawText(ann.text || '', {
              x: ann.x,
              y: ann.y,
              size: ann.fontSize || 9,
              font: helvetica,
              color: ann.color || textColor,
            });
          }
          drawn++;
        } catch (e) {
          console.warn('Falha ao desenhar anotação:', ann, e);
        }
      }
      console.log('[Pré-preencher] desenhadas:', drawn, 'de', annotations.length);

      const pdfBytes = await pdfDoc.save();
      return { pdfBytes, stats: { ...stats, drawn } };
    }

    // Helper genérico: localiza padrão de data em underscores _____/____/______
    // ou variantes (_____/_____/______, ___ / ___ / ___, etc.) em uma linha.
    // Retorna a posição do PRIMEIRO underscore do padrão.
    function findUnderscoreDateOnLine(line) {
      const results = [];
      const re = /_{2,}\s*\/\s*_{2,}\s*\/\s*_{2,}/g;
      let m;
      while ((m = re.exec(line.text)) !== null) {
        const map = line.charMap[m.index];
        if (!map) continue;
        const pos = charPositionInItem(map.item, map.offsetInItem);
        results.push({ pos, length: m[0].length });
      }
      return results;
    }

    // Helper: localiza sequência de N underscores (label de campo) em uma linha
    function findUnderscoreField(line, minLen = 3) {
      const results = [];
      const re = new RegExp(`_{${minLen},}`, 'g');
      let m;
      while ((m = re.exec(line.text)) !== null) {
        const map = line.charMap[m.index];
        if (!map) continue;
        const pos = charPositionInItem(map.item, map.offsetInItem);
        const labelBefore = line.text.substring(Math.max(0, m.index - 40), m.index).toLowerCase();
        results.push({ pos, length: m[0].length, labelBefore });
      }
      return results;
    }

    /* ====================================================================
       PASTA DE DESTINO DO PACOTE (File System Access API)
       Lembra, entre sessões, a pasta escolhida pela QG (ex.:
       ...\Origem 070\Pendente de Assinatura) via IndexedDB, para o
       diálogo "Salvar como" já abrir dentro dela.
       ==================================================================== */
    const _IDB_NAME = 'confiance-conciliacao';
    const _IDB_STORE = 'handles';
    function _idbOpen() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(_IDB_NAME, 1);
        req.onupgradeneeded = () => req.result.createObjectStore(_IDB_STORE);
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    async function idbGet(key) {
      const db = await _idbOpen();
      return new Promise((resolve, reject) => {
        const r = db.transaction(_IDB_STORE, 'readonly').objectStore(_IDB_STORE).get(key);
        r.onsuccess = () => resolve(r.result || null);
        r.onerror = () => reject(r.error);
      });
    }
    async function idbSet(key, val) {
      const db = await _idbOpen();
      return new Promise((resolve, reject) => {
        const tx = db.transaction(_IDB_STORE, 'readwrite');
        tx.objectStore(_IDB_STORE).put(val, key);
        tx.oncomplete = () => resolve();
        tx.onerror = () => reject(tx.error);
      });
    }
    // Retorna um FileSystemDirectoryHandle da pasta de destino (lembrada), ou null.
    // Na 1ª vez pede para a QG escolher a pasta "Pendente de Assinatura"; depois reusa.
    // 'forcarEscolha' = true faz reabrir o seletor para trocar a pasta.
    async function obterPastaDestinoPacote(forcarEscolha = false) {
      if (!window.showDirectoryPicker) return null; // navegador sem suporte → fallback normal
      try {
        if (!forcarEscolha) {
          const h = await idbGet('pastaPacote');
          if (h) {
            let perm = await h.queryPermission({ mode: 'readwrite' });
            if (perm !== 'granted') perm = await h.requestPermission({ mode: 'readwrite' });
            if (perm === 'granted') return h;
          }
        }
        const novo = await window.showDirectoryPicker({ id: 'pacotePendenteAssinatura', mode: 'readwrite' });
        await idbSet('pastaPacote', novo);
        return novo;
      } catch (e) {
        return null; // cancelou o seletor → segue sem startIn
      }
    }

    // Interpreta a data da conciliação (ISO "2026-07-01" ou "01/07/2026") em
    // { dd, mm, yyyy } para preencher o campo "___/___/___" da última página.
    function parseDataConcilAnnot(s) {
      if (!s || s === '—') return null;
      let m = String(s).match(/(\d{4})-(\d{2})-(\d{2})/);
      if (m) return { dd: m[3], mm: m[2], yyyy: m[1] };
      m = String(s).match(/(\d{1,2})[\/\-.](\d{1,2})[\/\-.](\d{2,4})/);
      if (m) return { dd: m[1].padStart(2, '0'), mm: m[2].padStart(2, '0'), yyyy: m[3].length === 2 ? '20' + m[3] : m[3] };
      return null;
    }

    // --- COMPUTAÇÃO DE ANOTAÇÕES PARA A OP ---
    // O agente marca com ✓ os colchetes [ ] das inspeções e, na última página
    // ("Vistos de Aprovação"), preenche a DATA DA CONCILIAÇÃO no campo "___/___/___",
    // com dia, mês e ano centralizados sobre cada grupo de underscores.
    function computeOPAnnotations(pagesData, opParsed) {
      const annotations = [];
      let totalChecks = 0;
      let valoresPreenchidos = 0;
      let dataConcil = parseDataConcilAnnot(opParsed?.dataConciliacao);
      // Rede de segurança: se a data não veio da análise (ex.: pacote re-baixado de uma
      // análise antiga), calcula direto do TEXTO da OP — a conciliação é o último evento,
      // então usa a MAIOR data/hora do documento. Garante o preenchimento p/ qualquer OP.
      if (!dataConcil) {
        const full = pagesData.map((pg) => pg.lines.map((l) => l.text).join('\n')).join('\n');
        const dts = [...full.matchAll(/(\d{2})\/(\d{2})\/(\d{4})\s+(\d{2}):(\d{2})/g)];
        let best = null, bestKey = '';
        for (const mm of dts) {
          const k = `${mm[3]}-${mm[2]}-${mm[1]} ${mm[4]}:${mm[5]}`;
          if (k > bestKey) { bestKey = k; best = mm; }
        }
        if (best) dataConcil = { dd: best[1], mm: best[2], yyyy: best[3] };
      }

      // Helper de normalização pra fazer matching tolerante entre nome do
      // critério na inspeção (página 7) e o texto da linha do operador (pág. 6).
      const norm = (s) => String(s || '')
        .toLowerCase()
        .normalize('NFD').replace(/[̀-ͯ]/g, '')
        .replace(/[^a-z0-9 ]+/g, ' ')
        .replace(/\s+/g, ' ').trim();
      // Score por palavras em comum (0..1, considerando o tamanho do menor lado)
      const scoreOverlap = (a, b) => {
        const sa = new Set(norm(a).split(' ').filter((w) => w.length > 2));
        const sb = new Set(norm(b).split(' ').filter((w) => w.length > 2));
        if (sa.size === 0 || sb.size === 0) return 0;
        let inter = 0;
        for (const w of sa) if (sb.has(w)) inter++;
        return inter / Math.min(sa.size, sb.size);
      };

      // Extrai medições direto das linhas do PDF. Importante: o
      // buildLinesWithMap ordena items por posição espacial (X), então a
      // ordem aqui é a do CABEÇALHO da tabela de inspeção do Sapiens:
      //   Verificação | Tipo | Vlr Min | Vlr Alvo | Vlr Max | Vlr Medido | UM | Situação
      // (Diferente da ordem do pdf-parse, que vem mais misturada.)
      let medicoes = opParsed?.medicoes || [];
      if (medicoes.length === 0) {
        const medRe = /\b((?:Verificar|Medir|Confirmar|Conferir|Aferir|Calibrar)\s+[^.\n]{3,140}?)\s+Medi[çc][ãa]o\s+([\d,]+(?:\.\d+)?)\s+([\d,]+(?:\.\d+)?)\s+([\d,]+(?:\.\d+)?)\s+(<?\s*[\d,]+(?:\.\d+)?)\s+(\w+)\s+(Aprovado|Reprovado|N\/A)/g;
        medicoes = [];
        for (const pageData of pagesData) {
          for (const line of pageData.lines) {
            let mmA;
            // Reset lastIndex pra cada linha (regex global mantém estado)
            medRe.lastIndex = 0;
            while ((mmA = medRe.exec(line.text)) !== null) {
              medicoes.push({
                descricao: mmA[1].trim(),
                vlr_min: mmA[2],
                vlr_alvo: mmA[3],
                vlr_max: mmA[4],
                vlr_medido: String(mmA[5]).replace(/\s+/g, ''),
                um: mmA[6],
                situacao: mmA[7],
              });
            }
          }
        }
        // Fallback: ordem antiga (pdf-parse) caso a regex acima não pegue
        if (medicoes.length === 0) {
          const allText = pagesData.map((p) => p.lines.map((l) => l.text).join(' ')).join(' ');
          const altRe = /\b((?:Verificar|Medir|Confirmar|Conferir|Aferir|Calibrar)\s+[^.\n]{3,140}?)\s+Medi[çc][ãa]o\s+(<?\s*[\d,]+(?:\.\d+)?)\s+(Aprovado|Reprovado|N\/A)\s+([\d,]+(?:\.\d+)?)\s+([\d,]+(?:\.\d+)?)\s+([\d,]+(?:\.\d+)?)\s+(\w+)/g;
          let mmB;
          while ((mmB = altRe.exec(allText)) !== null) {
            medicoes.push({
              descricao: mmB[1].trim(),
              vlr_medido: String(mmB[2]).replace(/\s+/g, ''),
              situacao: mmB[3],
              vlr_min: mmB[4],
              vlr_max: mmB[5],
              vlr_alvo: mmB[6],
              um: mmB[7],
            });
          }
        }
      }
      // Log de debug — facilita auditoria
      try { console.log('[OP-annot] medições detectadas:', medicoes.length, medicoes.map(m => `${m.descricao} = ${m.vlr_medido} ${m.um}`)); } catch (e) {}

      for (const pageData of pagesData) {
        const pageIdx = pageData.pageNum - 1;
        for (let __li = 0; __li < pageData.lines.length; __li++) {
          const line = pageData.lines[__li];
          // 1) Checkbox → ✓ logo APÓS o primeiro "[".
          // Regra única e robusta: qualquer "[" seguido só de espaços e então "]" OU o
          // fim da linha é um checkbox vazio. Cobre "[ ]", "[   ]", "[]", "[        ]"
          // (largo) e o caso em que o "]" quebrou para a linha seguinte (o "[" fica
          // sozinho no fim da linha). O ✓ vai sempre ao lado do primeiro colchete,
          // haja "]" depois ou não. Vale para a OP de qualquer equipamento.
          const re = /\[[ \t]*(?:\]|$)/g;
          let m;
          while ((m = re.exec(line.text)) !== null) {
            const startMap = line.charMap[m.index];
            if (!startMap) continue;
            const posStart = charPositionInItem(startMap.item, startMap.offsetInItem);
            const size = Math.max(4, posStart.fontSize) * 0.95;
            const cy = posStart.y - size * 0.05;
            annotations.push({ type: 'check', pageIdx, x: posStart.x + posStart.fontSize * 0.35, y: cy, size });
            totalChecks++;
            if (re.lastIndex === m.index) re.lastIndex++; // evita loop em match vazio ("[$")
          }

          // 2) "Valor Medido: ____" / "Valor Lido: ____" → preencher com o valor da
          // inspeção. Calibração 26/06/2026: a OP traz o campo em branco pro operador
          // anotar manualmente; a inspeção da QG tem o valor real. Cruzamos por
          // similaridade do nome do critério.
          // Correção 06/07/2026: alguns produtos (ex.: CM-STATION) usam o rótulo
          // "Valor Lido:" em vez de "Valor Medido:" — aceitamos ambos.
          // IMPORTANTE: NÃO usar "continue" aqui — isso pularia a linha inteira e
          // impediria o preenchimento da DATA (item 4) em OPs sem medição numérica
          // (ex.: conciliação só com itens "Visual/N/A"). Envolvemos só este bloco.
          if (medicoes.length > 0) {
          const valRe = /Valor\s+(?:Medido|Lido)\s*:\s*_+/gi;
          let mv;
          while ((mv = valRe.exec(line.text)) !== null) {
            let best = null, bestScore = 0;
            // (a) Sinal FORTE: casar pelo "Valor Alvo: X" declarado na linha do checklist
            //     com o Vlr Alvo da medição. Desambigua casos em que a descrição textual
            //     difere muito (ex.: linha "Verificar tensão da placa mãe para 5,1V" ×
            //     medição "Medir saída 5V da placa mãe" — pouco overlap, mas mesmo alvo 5,1).
            const alvoM = line.text.match(/Valor\s+Alvo\s*:?\s*([\d]+(?:[.,]\d+)?)/i);
            if (alvoM) {
              const nAlvo = alvoM[1].replace(',', '.');
              const porAlvo = medicoes.filter((m) => String(m.vlr_alvo || '').replace(',', '.') === nAlvo);
              if (porAlvo.length === 1) { best = porAlvo[0]; bestScore = 1; }
              else if (porAlvo.length > 1) {
                for (const med of porAlvo) { const s = scoreOverlap(med.descricao, line.text); if (s > bestScore) { best = med; bestScore = s; } }
              }
            }
            // (b) Fallback: melhor medição por similaridade textual com a linha.
            if (!best) {
              for (const med of medicoes) {
                const s = scoreOverlap(med.descricao, line.text);
                if (s > bestScore) { best = med; bestScore = s; }
              }
              if (!best || bestScore < 0.4) continue;
            }
            // Posição: logo após o ":" do "Valor Medido:"
            const colonIdx = line.text.indexOf(':', mv.index);
            const startMap = line.charMap[colonIdx + 1] || line.charMap[mv.index];
            if (!startMap) continue;
            const pos = charPositionInItem(startMap.item, startMap.offsetInItem);
            const txtFinal = best.um ? `${best.vlr_medido} ${best.um}` : String(best.vlr_medido);
            annotations.push({
              type: 'text',
              pageIdx,
              x: pos.x + pos.fontSize * 0.3,
              y: pos.y,
              fontSize: pos.fontSize * 0.95,
              text: txtFinal,
            });
            valoresPreenchidos++;
          }
          } // fim do if (medicoes.length > 0)

          // (o caso do colchete "quebrado" em duas linhas já é tratado pela regra única
          //  acima, via "[" no fim da linha)

          // 4) Data da conciliação (Vistos de Aprovação) → escreve DIA, MÊS e ANO cada um
          // CENTRALIZADO sobre seu grupo de underscores ("___/___/___"), sem sobrepor as
          // barras. Só atua nas linhas "Resp. Produção / Qualidade / Data da Conciliação".
          if (dataConcil) {
            const partes = [dataConcil.dd, dataConcil.mm, dataConcil.yyyy];
            const dataStr = `${dataConcil.dd}/${dataConcil.mm}/${dataConcil.yyyy}`;
            // desenha `txt` centralizado sobre os chars [iniIdx..fimIdx] de line.text
            const desenharGrupo = (iniIdx, fimIdx, txt) => {
              const mapIni = line.charMap[iniIdx], mapFim = line.charMap[fimIdx];
              if (!mapIni || !mapFim) return false;
              const pIni = charPositionInItem(mapIni.item, mapIni.offsetInItem);
              const pFim = charPositionInItem(mapFim.item, mapFim.offsetInItem);
              const fontSize = Math.max(7, Math.min(pIni.fontSize, 11)) * 0.95;
              const cx = (pIni.x + pFim.x) / 2;
              const largura = txt.length * fontSize * 0.5; // largura aprox. de dígitos Helvetica
              annotations.push({ type: 'text', pageIdx, x: cx - largura / 2, y: pIni.y + fontSize * 0.15, fontSize, text: txt });
              valoresPreenchidos++;
              return true;
            };
            const reLabel = /Resp\.?\s*(?:Produ[çc][ãa]o|Qualidade)|Data\s*da\s*Concilia[çc][ãa]o/i;
