  <div id="root">

  <style>
    @keyframes spin { to { transform: rotate(360deg); } }
    /* Defesa contra vazamento de texto cru no body (extensões/babel) — só renderiza
       o #root e elementos estruturais. Qualquer text node ou JSX que vaze fica oculto. */
    body { visibility: visible; }
    body > *:not(#root):not(style):not(script):not(noscript) { display: none !important; }
    /* Esconde literal text nodes diretamente no body (truque com pseudo-elemento) */
    script { display: none !important; }
  </style>
  <script>
    // Defesa proativa: remove text nodes que apareçam diretamente no body.
    // Roda continuamente via MutationObserver — pega vazamentos do babel ou extensões.
    (function() {
      const cleanBody = () => {
        if (!document.body) return;
        for (const n of [...document.body.childNodes]) {
          if (n.nodeType === 3 && n.textContent.trim().length > 0) n.remove();
        }
      };
      if (document.body) cleanBody();
      else document.addEventListener('DOMContentLoaded', cleanBody);
      const obs = new MutationObserver(cleanBody);
      const start = () => obs.observe(document.body, { childList: true });
      if (document.body) start();
      else document.addEventListener('DOMContentLoaded', start);
    })();
  </script>

  <script type="text/babel" data-presets="env,react">
    /* ====================================================================

       Encontre em: Supabase Dashboard → Settings → API
       ==================================================================== */
    const SUPABASE_URL = 'https://riqzwwbprdnjxodicxce.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJpcXp3d2JwcmRuanhvZGljeGNlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0MjQxMjgsImV4cCI6MjA5NDAwMDEyOH0.ioPneGvVOtJuNCtqBrCJiqC3EI3pydZuyYa5cug85Ok';

    /* ====================================================================
       CONVERSÃO PARA PDF — serviço LOCAL (LibreOffice/Ghostscript/Chromium)
       Substitui o CloudConvert. Ver pasta conversor-pdf-local/README.md.
       - Preencha com o endereço do serviço na rede interna, ex.:
           'http://192.168.0.10:3001/converter-pdf'
         ou, se a plataforma rodar no próprio servidor: 'http://localhost:3001/converter-pdf'
       - Deixe '' (vazio) para usar SOMENTE o CloudConvert (comportamento antigo).
       - Se o serviço local estiver fora do ar, a plataforma cai automaticamente
         no CloudConvert (fallback), para não travar o download do pacote.
       ==================================================================== */
    // Se a plataforma for servida por http/https (pelo próprio serviço), usa a MESMA
    // origem — funciona de qualquer máquina. Se aberta como arquivo (file://), cai no
    // localhost:3001. Deixe '' para usar só o CloudConvert.
    const CONVERSAO_PDF_LOCAL = (location.protocol === 'http:' || location.protocol === 'https:')
      ? (location.origin + '/converter-pdf')
      : 'http://localhost:3001/converter-pdf';

    /* ====================================================================
       INIT
       ==================================================================== */
    const { useState, useEffect, useCallback, useMemo, useRef, Fragment } = React;
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    /* ====================================================================
       USUÁRIOS · CARGOS · PERMISSÕES (interino — migra para o SCM depois)
       ==================================================================== */
    const ADMIN_EMAIL = 'qualidade@confiancemedical.com.br';
    const CARGOS = [
      { id: 'estagiario_gq',          label: 'Estagiário da Garantia da Qualidade' },
      { id: 'assistente_gq',          label: 'Assistente da Garantia da Qualidade' },
      { id: 'analista_gq',            label: 'Analista da Garantia da Qualidade' },
      { id: 'responsavel_qualidade',  label: 'Responsável pela Qualidade / Responsável Técnico' },
      { id: 'responsavel_producao',   label: 'Responsável pela Produção' },
    ];
    const CARGO_LABEL = Object.fromEntries(CARGOS.map((c) => [c.id, c.label]));
    // Funcionalidades controláveis do site
    const PERMISSOES_DEF = [
      { grupo: 'Dashboard', itens: [{ key: 'dashboard_ver', label: 'Ver dashboard' }] },
      { grupo: 'Análise', itens: [
        { key: 'analise_executar', label: 'Executar nova análise' },
        { key: 'analise_refazer', label: 'Refazer análise' },
        { key: 'analise_remover_etiqueta', label: 'Remover etiqueta anexada' },
      ] },
      { grupo: 'Histórico', itens: [
        { key: 'historico_ver', label: 'Ver histórico' },
        { key: 'historico_baixar', label: 'Baixar pacote' },
        { key: 'historico_justificar', label: 'Justificar ressalva' },
        { key: 'historico_correcao', label: 'Registrar correção manual' },
        { key: 'historico_importar', label: 'Importar análises manuais' },
        { key: 'historico_excluir', label: 'Excluir análise' },
      ] },
      { grupo: 'Cadastro', itens: [
        { key: 'cadastro_ver', label: 'Ver cadastro' },
        { key: 'cadastro_produtos', label: 'Criar/editar catálogo de produtos' },
        { key: 'cadastro_fichas', label: 'Criar/editar fichas mestres' },
        { key: 'cadastro_excluir_ficha', label: 'Excluir ficha mestre' },
      ] },
      { grupo: 'Configurações', itens: [
        { key: 'config_ver', label: 'Ver configurações' },
        { key: 'config_editar', label: 'Editar configurações (pasta de destino)' },
        { key: 'config_usuarios', label: 'Gerenciar usuários' },
      ] },
      { grupo: 'Logs', itens: [{ key: 'logs_ver', label: 'Ver histórico de alterações' }] },
    ];
    const TODAS_PERMISSOES = PERMISSOES_DEF.flatMap((g) => g.itens.map((i) => i.key));
    const PERM_POR_CARGO = {
      estagiario_gq: ['dashboard_ver', 'analise_executar', 'historico_ver', 'historico_baixar'],
      assistente_gq: ['dashboard_ver', 'analise_executar', 'analise_refazer', 'analise_remover_etiqueta', 'historico_ver', 'historico_baixar', 'historico_correcao', 'historico_importar'],
      analista_gq: ['dashboard_ver', 'analise_executar', 'analise_refazer', 'analise_remover_etiqueta', 'historico_ver', 'historico_baixar', 'historico_justificar', 'historico_correcao', 'historico_importar', 'cadastro_ver', 'cadastro_produtos', 'cadastro_fichas'],
      responsavel_qualidade: TODAS_PERMISSOES.filter((k) => k !== 'config_usuarios'),
      responsavel_producao: ['dashboard_ver', 'historico_ver', 'historico_baixar'],
    };
    function permsPadraoDoCargo(cargo) {
      const set = {};
      (PERM_POR_CARGO[cargo] || []).forEach((k) => { set[k] = true; });
      return set;
    }

    const PermContext = React.createContext({ perfil: null, isAdmin: false, can: () => true });
    const usePerm = () => React.useContext(PermContext);

    // Registra uma atividade no log (best-effort — nunca quebra a ação principal).
    async function registrarLog(perfil, acao, entidade, entidadeRef, descricao, metadata) {
      try {
        const nome = perfil?.nome_completo || perfil?.email || 'Desconhecido';
        await supabase.from('logs_atividade').insert({
          user_id: perfil?.id || null,
          user_nome: nome,
          user_email: perfil?.email || null,
          acao, entidade: entidade || null, entidade_ref: entidadeRef || null,
          descricao, metadata: metadata || null,
        });
      } catch (e) { console.warn('Falha ao registrar log:', e?.message || e); }
    }

    // === Atualização em tempo real (Supabase Realtime) ===================
    // Assina mudanças (insert/update/delete) de uma tabela e chama onChange.
    // Usado para refletir na tela de um usuário o que outro fez (sem F5).
    // Requer que a tabela esteja na publicação supabase_realtime (ver
    // migration-realtime.sql).
    function useRealtime(tabela, onChange) {
      const cb = useRef(onChange);
      cb.current = onChange;
      useEffect(() => {
        if (!tabela) return;
        const canal = supabase
          .channel('rt_' + tabela + '_' + Math.random().toString(36).slice(2))
          .on('postgres_changes', { event: '*', schema: 'public', table: tabela }, () => {
            try { cb.current && cb.current(); } catch (e) { /* ignora */ }
          })
          .subscribe();
        return () => { try { supabase.removeChannel(canal); } catch (e) { /* ignora */ } };
      }, [tabela]);
    }

    /* ====================================================================
       SOLICITAÇÕES DE APROVAÇÃO
       Ações que um usuário sem permissão pode solicitar a quem tem.
         modo 'executar'    → o sistema executa ao aprovar (ações discretas)
         modo 'desbloquear' → libera a ação para o solicitante (ações interativas)
       ==================================================================== */
    const ACOES_SOLIC = {
      excluir_analise:      { label: 'Excluir análise',           permKey: 'historico_excluir',       modo: 'executar' },
      excluir_ficha:        { label: 'Excluir ficha mestre',      permKey: 'cadastro_excluir_ficha',  modo: 'executar' },
      refazer_analise:      { label: 'Refazer análise',           permKey: 'analise_refazer',         modo: 'desbloquear' },
      justificar:           { label: 'Justificar ressalva',       permKey: 'historico_justificar',    modo: 'desbloquear' },
      remover_etiqueta:     { label: 'Remover etiqueta anexada',  permKey: 'analise_remover_etiqueta',modo: 'desbloquear' },
      correcao_manual:      { label: 'Registrar correção manual', permKey: 'historico_correcao',      modo: 'desbloquear' },
      importar:             { label: 'Importar análises manuais', permKey: 'historico_importar',      modo: 'desbloquear' },
      baixar_pacote:        { label: 'Baixar pacote',             permKey: 'historico_baixar',        modo: 'desbloquear' },
      criar_editar_ficha:   { label: 'Criar/editar ficha mestre', permKey: 'cadastro_fichas',         modo: 'desbloquear' },
      criar_editar_produto: { label: 'Criar/editar catálogo',     permKey: 'cadastro_produtos',       modo: 'desbloquear' },
    };

    // Permissão efetiva de um perfil (admin, cargo padrão, ou permissão marcada).
    function temPermEfetiva(perfilRow, permKey) {
      if (!perfilRow) return false;
      if ((perfilRow.email || '').toLowerCase() === ADMIN_EMAIL) return true;
      if (perfilRow.cargo === 'admin') return true;
      if (perfilRow.permissoes && perfilRow.permissoes[permKey]) return true;
      if ((PERM_POR_CARGO[perfilRow.cargo] || []).includes(permKey)) return true;
      return false;
    }
    async function usuariosComPermissao(permKey) {
      const { data } = await supabase.from('perfis').select('*').eq('ativo', true);
      return (data || []).filter((p) => temPermEfetiva(p, permKey));
    }
    // Executores das ações modo 'executar' (rodados pelo aprovador ao aprovar).
    async function executarAcaoSolicitada(acao, payload) {
      if (acao === 'excluir_analise') {
        const { error } = await supabase.from('analises').delete().eq('id', payload.analise_id);
        if (error) throw error; return true;
      }
      if (acao === 'excluir_ficha') {
        const { error } = await supabase.from('fichas_mestres').delete().eq('id', payload.ficha_id);
        if (error) throw error; return true;
      }
      throw new Error('Ação sem executor automático: ' + acao);
    }

    const SolicitacaoContext = React.createContext({ solicitar: () => {}, pedirOuExecutar: () => {} });
    const useSolic = () => React.useContext(SolicitacaoContext);

    function SolicitacaoProvider({ children }) {
      const { perfil, can } = usePerm();
      const toast = useToast();
      const [modal, setModal] = useState(null); // { acao, entidade, entidadeRef, payload }
      const [aprovadores, setAprovadores] = useState([]);
      const [aprovadorSel, setAprovadorSel] = useState('');
      const [motivo, setMotivo] = useState('');
      const [enviando, setEnviando] = useState(false);

      const abrirModal = async (info) => {
        setModal(info); setMotivo(''); setAprovadorSel(''); setAprovadores([]);
        const def = ACOES_SOLIC[info.acao];
        if (def) { const lista = await usuariosComPermissao(def.permKey); setAprovadores(lista.filter((u) => u.id !== perfil?.id)); }
      };

      const pedirOuExecutar = async (info, execFn) => {
        const def = ACOES_SOLIC[info.acao];
        if (!def) { execFn && execFn(null); return; }
        if (can(def.permKey)) { execFn && execFn(null); return; } // tem permissão própria
        if (def.modo === 'desbloquear') {
          // Já existe aprovação liberada e não usada para esta ação+alvo?
          const { data } = await supabase.from('solicitacoes').select('*')
            .eq('acao', info.acao).eq('entidade_ref', info.entidadeRef || '')
            .eq('solicitante_id', perfil?.id).eq('status', 'aprovada')
            .order('decided_at', { ascending: false }).limit(1);
          const grant = data && data[0];
          if (grant) {
            await supabase.from('solicitacoes').update({ status: 'usada', used_at: new Date().toISOString() }).eq('id', grant.id);
            execFn && execFn(grant.aprovador_nome);
            return;
          }
        }
        abrirModal(info); // sem permissão e sem liberação → abre solicitação
      };

      const enviarSolicitacao = async () => {
        const def = ACOES_SOLIC[modal.acao];
        setEnviando(true);
        try {
          const apSel = aprovadores.find((a) => a.id === aprovadorSel) || null;
          const { error } = await supabase.from('solicitacoes').insert({
            acao: modal.acao, perm_key: def.permKey, modo: def.modo,
            entidade: modal.entidade || null, entidade_ref: modal.entidadeRef || null,
            payload: modal.payload || {},
            solicitante_id: perfil?.id, solicitante_nome: perfil?.nome_completo || perfil?.email, solicitante_email: perfil?.email,
            aprovador_sugerido_id: apSel?.id || null, aprovador_sugerido_nome: apSel?.nome_completo || apSel?.email || null,
            motivo_solicitacao: motivo || null, status: 'pendente',
          });
          if (error) throw error;
          await registrarLog(perfil, 'solicitar_' + modal.acao, modal.entidade, modal.entidadeRef, `${perfil?.nome_completo || perfil?.email} solicitou "${def.label}"${modal.entidadeRef ? ' (' + modal.entidadeRef + ')' : ''}${apSel ? ' para ' + (apSel.nome_completo || apSel.email) : ''}`);
          toast.success('Solicitação enviada. Você será autorizado assim que alguém com a permissão aprovar.', { duration: 9000 });
          setModal(null);
        } catch (e) { toast.error('Erro ao enviar solicitação: ' + (e?.message || e)); }
        finally { setEnviando(false); }
      };

      return (
        <SolicitacaoContext.Provider value={{ solicitar: abrirModal, pedirOuExecutar }}>
          {children}
          {modal && (
            <Modal open onClose={() => !enviando && setModal(null)} title="Solicitar aprovação" description={`Você não tem permissão para "${ACOES_SOLIC[modal.acao]?.label}". Envie uma solicitação a quem pode autorizar.`}>
              <div className="space-y-3">
                {modal.entidadeRef && <div className="text-sm"><span className="text-muted-foreground">Referente a: </span><strong>{modal.entidadeRef}</strong></div>}
                <div>
                  <Label>Aprovador (quem tem a permissão)</Label>
                  <select value={aprovadorSel} onChange={(e) => setAprovadorSel(e.target.value)} className="flex h-10 w-full rounded-md border border-input bg-background px-3 text-sm">
                    <option value="">Qualquer um com a permissão</option>
                    {aprovadores.map((a) => <option key={a.id} value={a.id}>{a.nome_completo || a.email}</option>)}
                  </select>
                  {aprovadores.length === 0 && <p className="text-xs text-muted-foreground mt-1">Nenhum outro usuário com essa permissão foi encontrado.</p>}
                </div>
                <div><Label>Motivo</Label><Textarea rows={3} value={motivo} onChange={(e) => setMotivo(e.target.value)} placeholder="Explique por que precisa desta ação." /></div>
                <div className="flex justify-end gap-2">
                  <Button variant="outline" onClick={() => setModal(null)} disabled={enviando}>Cancelar</Button>
                  <Button onClick={enviarSolicitacao} disabled={enviando}>{enviando ? 'Enviando…' : 'Enviar solicitação'}</Button>
                </div>
              </div>
            </Modal>
          )}
        </SolicitacaoContext.Provider>
      );
    }

    /* Modal simples */
    const Modal = ({ open, onClose, title, description, children, size = 'md' }) => {
      useEffect(() => {
        if (!open) return;
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        window.addEventListener('keydown', onKey);
        document.body.style.overflow = 'hidden';
        return () => {
          window.removeEventListener('keydown', onKey);
          document.body.style.overflow = '';
        };
      }, [open]);
      if (!open) return null;
      const widths = { sm: 'max-w-md', md: 'max-w-lg', lg: 'max-w-2xl', xl: 'max-w-4xl' };
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/50 animate-fade-in" onClick={onClose}>

    /* Toast simples (sucesso/erro) */
    const ToastContext = React.createContext(null);
    function ToastProvider({ children }) {
      const [toasts, setToasts] = useState([]);
      const push = useCallback((message, type = 'info') => {
        const id = Math.random().toString(36).slice(2);
        setToasts((t) => [...t, { id, message, type }]);
        setTimeout(() => setToasts((t) => t.filter((x) => x.id !== id)), 4000);
      }, []);
      const value = { success: (m) => push(m, 'success'), error: (m) => push(m, 'error'), info: (m) => push(m, 'info') };
      return (
        <ToastContext.Provider value={value}>
          {children}
          <div className="fixed top-4 right-4 z-[60] space-y-2">
            {toasts.map((t) => (
              <div key={t.id} className={cn(
                'rounded-lg shadow-lg px-4 py-3 text-sm font-medium animate-fade-in border',
                t.type === 'success' && 'bg-status-conforme text-white border-transparent',
                t.type === 'error' && 'bg-destructive text-destructive-foreground border-transparent',
                t.type === 'info' && 'bg-card border-border'
              )} style={t.type === 'success' ? { backgroundColor: 'hsl(var(--status-conforme))', color: '#fff' } : t.type === 'error' ? { backgroundColor: 'hsl(var(--destructive))', color: '#fff' } : {}}>
                {t.message}
              </div>
            ))}
          </div>
        </ToastContext.Provider>
      );
    }
    const useToast = () => React.useContext(ToastContext);

    /* ====================================================================
       LOGIN
       ==================================================================== */
    function LoginPage({ onLogin }) {
      const [email, setEmail] = useState('qualidade@confiancemedical.com.br');
      const [password, setPassword] = useState('');
      const [showPwd, setShowPwd] = useState(false);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setLoading(true);
        setError(null);
        const { data, error } = await supabase.auth.signInWithPassword({ email, password });
        setLoading(false);
        if (error) { setError(error.message); return; }
        onLogin(data.session);
      };

      return (
        <div className="min-h-screen flex items-center justify-center p-6 bg-background">
          <Card className="w-full max-w-md animate-fade-in">
            <CardHeader>
              <div className="flex items-center gap-3 mb-2">
                <div className="flex h-10 w-10 items-center justify-center rounded-full bg-primary">
                  <span className="font-montserrat font-bold text-primary-foreground text-lg">C</span>
                </div>
                <div>
                  <div className="font-montserrat font-bold text-base">Confiance Medical</div>
                  <div className="text-xs text-muted-foreground">Conciliação da Produção</div>
                </div>
              </div>
              <CardTitle className="font-montserrat text-2xl">Entrar</CardTitle>
              <CardDescription>Use seu email e senha cadastrados no Supabase.</CardDescription>
            </CardHeader>
            <CardContent>
              <form onSubmit={handleSubmit} className="space-y-4">
                <div className="space-y-2">
                  <Label htmlFor="email">Email</Label>
                  <Input id="email" type="email" value={email} onChange={(e) => setEmail(e.target.value)} required />
                </div>
                <div className="space-y-2">
                  <Label htmlFor="password">Senha</Label>
                  <div className="relative">
                    <Input id="password" type={showPwd ? 'text' : 'password'} value={password} onChange={(e) => setPassword(e.target.value)} required />
                    <button type="button" onClick={() => setShowPwd(!showPwd)} className="absolute right-3 top-1/2 -translate-y-1/2 text-muted-foreground hover:text-foreground">
                      <Icon name="eye" className="h-4 w-4" />
                    </button>
                  </div>
                </div>
                {error && (
                  <div className="rounded-lg bg-destructive/10 border border-destructive/20 px-3 py-2 text-xs text-destructive">
                    {error === 'Invalid login credentials' ? 'Email ou senha incorretos.' : error}
                  </div>
                )}
                <Button type="submit" disabled={loading} className="w-full">
                  {loading ? <><Icon name="loader" className="h-4 w-4 animate-spin" /> Entrando...</> : 'Entrar'}
                </Button>
              </form>
            </CardContent>
          </Card>
        </div>
      );
    }

    async function excluirAnalise(id) {
      // Cascade configurado no schema apaga apontamentos automaticamente
      const { error } = await supabase.from('analises').delete().eq('id', id);
      if (error) throw error;
    }

    // Labels de slot usados em analise.doc_substituido — espelha o labelSlot do ParecerView
    const SLOT_LABELS = {
      op: 'OP',
      rc: 'RC',
      form_gq_0047: 'FORM-GQ-0047',
      etiqueta_externa: 'Etiqueta Externa',
      etiqueta_acessorio: 'Etiqueta Acessório',
      op_reprocesso: 'OP de Reprocesso',
      rnc: 'RNC',
    };

    /**
     * Conta quantas iterações uma análise teve até chegar no estado atual.
     * Recebe a análise corrente (a mais recente da chain) e a lista de todas.
     * Sobe pela chain via analise_origem_id e conta cada passo.
     * Retorna { iteracoes, docsCorrigidos, dataOriginal, motivos }
     */
    function getCorrecaoInfo(analise, todasAnalises) {
      if (!analise) return { iteracoes: 1, docsCorrigidos: [], dataOriginal: null, motivos: [] };
      const byId = new Map(todasAnalises.map((a) => [a.id, a]));
      let cursor = analise;
      let iteracoes = 1;
      let ajusteFicha = 0; // quantas re-análises foram por ficha desatualizada
      const docsSet = new Set();
      const motivos = [];
      // Sobe pela chain
      while (cursor?.analise_origem_id) {
        // Ajustes que NÃO contam como iteração/correção: ficha desatualizada e
        // atualização do cadastro de operadores (operador/inspetor novo).
        if (cursor.tipo_reanalise === 'atualizacao_ficha' || cursor.tipo_reanalise === 'atualizacao_cadastro') {
          ajusteFicha++;
        } else {
          iteracoes++;
          // doc_substituido pode ter múltiplos slots separados por vírgula.
          // Normaliza "etiqueta_acessorio(removida)" → "etiqueta_acessorio".
          const docs = String(cursor.doc_substituido || '').split(',').map((s) => s.trim().replace(/\s*\(removida\)\s*$/i, '')).filter(Boolean);
          for (const d of docs) docsSet.add(d);
          if (cursor.motivo_reanalise) motivos.push(cursor.motivo_reanalise);
        }
        cursor = byId.get(cursor.analise_origem_id);
        if (!cursor) break;
      }
      return {
        iteracoes,
        ajusteFicha,
        docsCorrigidos: [...docsSet],
        dataOriginal: cursor?.created_at || null,
        motivos,
      };
    }

    /**
     * Chip visual indicando que uma análise passou por correções.
     * Mostra "↻ Nx" e um tooltip com docs corrigidos + data da original.
     */
    function CorrecaoChip({ info }) {
      if (!info) return null;
      // Ajuste por ficha desatualizada (não é correção): chip próprio, cinza/azul.
      if (info.iteracoes <= 1) {
        if (info.ajusteFicha > 0) {
          return (
            <span
              className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-semibold ml-1.5 cursor-help"
              style={{ backgroundColor: 'hsl(var(--muted))', color: 'hsl(var(--muted-foreground))' }}
              title="Análise refeita após atualização da ficha mestre (ficha estava desatualizada). Não conta como correção — a documentação do lote estava conforme."
            >
              <span>✎</span>
              <span>ficha atualizada</span>
            </span>
          );
        }
        return null;
      }
      const docsTxt = info.docsCorrigidos.map((d) => SLOT_LABELS[d] || d).join(', ');
      const tooltip = `Análise passou por ${info.iteracoes - 1} correção(ões)${info.dataOriginal ? '. Original em ' + new Date(info.dataOriginal).toLocaleDateString('pt-BR') : ''}${docsTxt ? '. Documentos corrigidos: ' + docsTxt : ''}.`;
      return (
        <span
          className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[10px] font-semibold ml-1.5 cursor-help"
          style={{ backgroundColor: 'hsl(var(--accent) / 0.15)', color: 'hsl(var(--accent))' }}
          title={tooltip}
        >
          <span>↻</span>
          <span>{info.iteracoes}×</span>
        </span>
      );
    }

    function DashboardPage() {
      const toast = useToast();
      const { perfil } = usePerm();
      const { pedirOuExecutar } = useSolic();
      const [analises, setAnalises] = useState([]);
      const [loading, setLoading] = useState(true);
      const [viewing, setViewing] = useState(null);
      const [reloadKey, setReloadKey] = useState(0);
      const [catalogoProdutos, setCatalogoProdutos] = useState([]);
      // Atualização em tempo real: recarrega quando qualquer análise muda
      useRealtime('analises', () => setReloadKey((k) => k + 1));
      // Filtros temporais — padrão: ano corrente
      const today = new Date();
      const [filtroPeriodo, setFiltroPeriodo] = useState('ano'); // 'ano' | 'semestre' | 'trimestre' | 'mes' | 'tudo'
      const [filtroAno, setFiltroAno] = useState(today.getFullYear());
      const [filtroSubperiodo, setFiltroSubperiodo] = useState(null); // 1|2 (semestre), 1-4 (trimestre), 1-12 (mês)
      // Análise de tendência — período personalizado (independente do filtro acima).
      // Padrão: últimos 6 meses.
      const isoDia = (d) => d.toISOString().slice(0, 10);
      const [trendDe, setTrendDe] = useState(() => { const d = new Date(); d.setMonth(d.getMonth() - 5); d.setDate(1); return isoDia(d); });
      const [trendAte, setTrendAte] = useState(() => isoDia(new Date()));
      // Recorte do painel de tendência: presets fixos + personalizado (De/Até).
      const [trendPreset, setTrendPreset] = useState('semestre');
      const aplicarPresetTrend = (p) => {
        setTrendPreset(p);
        if (p === 'personalizado') return;
        const de = new Date(), ate = new Date();
        if (p === 'semana') de.setDate(de.getDate() - 6);
        else if (p === '30d') de.setDate(de.getDate() - 29);
        else if (p === 'trimestre') de.setMonth(de.getMonth() - 3);
        else if (p === 'semestre') de.setMonth(de.getMonth() - 6);
        else if (p === 'ano') de.setFullYear(de.getFullYear() - 1);
        setTrendDe(isoDia(de)); setTrendAte(isoDia(ate));
      };
      // Filtro do gráfico "Erros que motivaram correção" por documento.
      const [filtroDocErro, setFiltroDocErro] = useState('todos'); // 'todos'|'op'|'rc'|'etx'|'eac'
      // Visão do gráfico "Problemas na OP": por estágio ou por inspeção do estágio.
      const [viewOpChart, setViewOpChart] = useState('estagio'); // 'estagio'|'inspecao'
      // Limiares de reincidência (carregados de config_app; defaults calibrados).
      const [reincThr, setReincThr] = useState({ piso: 3, incidencia: 0.03, fator: 3 });
      // Aba interna do Dashboard: gráficos | correções | tendência.
      const [dashTab, setDashTab] = useState('graficos');

      useEffect(() => {
        const load = async () => {
          setLoading(true);
          const [aRes, pRes, cRes] = await Promise.all([
            supabase.from('analises')
              .select('id, status, modelo, numero_op, numero_serie, created_at, parecer_completo, analise_origem_id, doc_substituido, motivo_reanalise, tipo_reanalise')
              .order('created_at', { ascending: false }),
            supabase.from('produtos').select('id, modelo, codigo_sapiens, equipamento'),
            supabase.from('config_app').select('chave, valor').in('chave', ['reinc_piso', 'reinc_incidencia_pct', 'reinc_fator_salto']),
          ]);
          setAnalises(aRes.data || []);
          setCatalogoProdutos(pRes.data || []);
          const cm = Object.fromEntries((cRes.data || []).map((r) => [r.chave, r.valor]));
          setReincThr({
            piso: parseInt(cm.reinc_piso, 10) || 3,
            incidencia: (parseFloat(cm.reinc_incidencia_pct) || 3) / 100,
            fator: parseFloat(cm.reinc_fator_salto) || 3,
          });
          setLoading(false);
        };
        load();
      }, [reloadKey]);

      const handleDelete = async (id, label) => {
        const ref = String(label || '').replace(/^da\s+/i, '') || 'análise';
        // Sem permissão → abre solicitação. Com permissão → exclui e registra no log.
        pedirOuExecutar({ acao: 'excluir_analise', entidade: 'analise', entidadeRef: ref, payload: { analise_id: id } }, async (autorizadoPor) => {
          if (!confirm(`Excluir análise ${label}? Esta ação não pode ser desfeita.`)) return;
          try {
            await excluirAnalise(id);
            await registrarLog(perfil, 'excluir_analise', 'analise', ref, `${perfil?.nome_completo || perfil?.email} excluiu a análise ${label}${autorizadoPor ? ' com permissão de ' + autorizadoPor : ''}`);
            toast.success('Análise excluída.');
            setReloadKey((k) => k + 1);
          } catch (err) {
            toast.error('Erro ao excluir: ' + err.message);
          }
        });
      };

      // === Filtro temporal aplicado ===
      const analisesFiltradas = useMemo(() => {
        return analises.filter((a) => {
          const d = new Date(a.created_at);
          if (filtroPeriodo === 'tudo') return true;
          if (d.getFullYear() !== filtroAno) return false;
          const m = d.getMonth(); // 0-11
          if (filtroPeriodo === 'ano') return true;
          if (filtroPeriodo === 'semestre') return filtroSubperiodo == null || (filtroSubperiodo === 1 ? m < 6 : m >= 6);
          if (filtroPeriodo === 'trimestre') return filtroSubperiodo == null || Math.floor(m / 3) === (filtroSubperiodo - 1);
          if (filtroPeriodo === 'mes') return filtroSubperiodo == null || m === (filtroSubperiodo - 1);
          return true;
        });
      }, [analises, filtroPeriodo, filtroAno, filtroSubperiodo]);

      const anosDisponiveis = useMemo(() => {
        const s = new Set(analises.map((a) => new Date(a.created_at).getFullYear()));
        s.add(today.getFullYear());
        return [...s].sort((a, b) => b - a);
      }, [analises]);

      // === Métricas calculadas (decisão 18/06/2026) ===
      // Cada LOTE conta uma única vez no Dashboard, usando o ESTADO MAIS RECENTE
      // (= a análise mais nova daquele OP/série, seja ela original ou re-análise).
      // Análises substituídas por re-análises NÃO aparecem.
      const reanalises = analisesFiltradas.filter((a) => a.analise_origem_id);
      const idsSubstituidas = new Set(reanalises.map((a) => a.analise_origem_id));
      // --- Ajuste de ficha (não conta como correção) ---
      // Sobe a chain e diz se houve ALGUMA re-análise de correção de documento
      // (i.e., qualquer passo que NÃO seja 'atualizacao_ficha'). Se a única
      // re-análise foi por ficha desatualizada, o lote NÃO precisou correção.
      const byIdAll = new Map(analises.map((a) => [a.id, a]));
      const passosReanalise = (a) => {
        const passos = []; let c = a; let s = 20;
        while (c?.analise_origem_id && s-- > 0) { passos.push(c); c = byIdAll.get(c.analise_origem_id); if (!c) break; }
        return passos;
      };
      const temCorrecaoReal = (a) => passosReanalise(a).some((p) => p.tipo_reanalise !== 'atualizacao_ficha' && p.tipo_reanalise !== 'atualizacao_cadastro');
      const ehAjusteFichaSomente = (a) => !!a.analise_origem_id && !temCorrecaoReal(a);
      // Agrupa análises por OP/série, mantendo a mais recente de cada
      const porLoteMap = new Map();
      for (const a of analisesFiltradas) {
        if (idsSubstituidas.has(a.id)) continue; // pula análises que foram substituídas
        const chave = `${a.numero_op || '?'}|${a.numero_serie || '?'}`;
        const atual = porLoteMap.get(chave);
        if (!atual || new Date(a.created_at) > new Date(atual.created_at)) {
          porLoteMap.set(chave, a);
        }
      }
      const lotesFinais = [...porLoteMap.values()];
      const totalOriginais = lotesFinais.length; // total de lotes únicos no período
      const totalConformes = lotesFinais.filter((a) => a.status === 'conforme').length;
      // Conciliações corrigidas: lotes finais que passaram por correção REAL de documento
      // (ajuste por ficha desatualizada não conta).
      const totalCorrigidas = lotesFinais.filter((a) => temCorrecaoReal(a)).length;

      // Breakdown: tipo de documento corrigido (lê doc_substituido das re-análises).
      // Exclui re-análises de ajuste de ficha (não são correção de documento).
      const docTipoCount = {};
      const correcoesDetalhe = []; // para timeline / tabela
      for (const r of reanalises.filter((r) => r.tipo_reanalise !== 'atualizacao_ficha' && r.tipo_reanalise !== 'atualizacao_cadastro')) {
        // Normaliza chaves antigas "etiqueta_acessorio(removida)" → "etiqueta_acessorio"
        // para que remoções de etiqueta contem na categoria "Etiqueta Acessório"
        // (inclusive registros anteriores à padronização).
        const slots = String(r.doc_substituido || '').split(',').map((s) => s.trim().replace(/\s*\(removida\)\s*$/i, '')).filter(Boolean);
        for (const s of slots) {
          docTipoCount[s] = (docTipoCount[s] || 0) + 1;
        }
        correcoesDetalhe.push({
          id: r.id,
          data: r.created_at,
          docs: slots,
          motivo: r.motivo_reanalise || '',
          numero_op: r.numero_op,
          modelo: r.modelo,
          origem_id: r.analise_origem_id,
        });
      }
      const docTipoMaisCorrigido = Object.entries(docTipoCount).sort((a, b) => b[1] - a[1])[0];

      // Helper: encontra a análise ORIGINAL (raiz) de cada lote, subindo a chain
      // analise_origem_id. Usado para classificar "precisou correção?" e para o
      // gráfico de erros que motivaram correções.
      const byId = new Map(analises.map((a) => [a.id, a]));
      const findOriginal = (a) => {
        let cursor = a;
        let safety = 20;
        while (cursor?.analise_origem_id && safety-- > 0) {
          const parent = byId.get(cursor.analise_origem_id);
          if (!parent) break;
          cursor = parent;
        }
        return cursor;
      };

      // === Distribuição por categoria (decisão 18/06/2026): 3 grupos mutuamente exclusivos ===
      // 1. Conformes (não precisaram correção): status final = conforme E original = conforme
      // 2. Tiveram ressalvas: status final = ressalva
      // 3. Precisaram correção: original era NC (independente do estado final)
      const categoriasLote = { conformes: 0, ressalvas: 0, corrigidas: 0 };
      for (const a of lotesFinais) {
        const original = findOriginal(a);
        // Ajuste por ficha desatualizada: a documentação nunca esteve NC → classifica
        // pelo estado FINAL (conforme), não como "precisou correção".
        if (original?.status === 'nao_conforme' && !ehAjusteFichaSomente(a)) {
          // Original tinha NC → precisou correção (em curso ou completa)
          categoriasLote.corrigidas++;
        } else if (a.status === 'ressalva') {
          categoriasLote.ressalvas++;
        } else if (a.status === 'conforme') {
          categoriasLote.conformes++;
        } else {
          // Edge case: NC sem original NC (raro) — conta como precisou correção
          categoriasLote.corrigidas++;
        }
      }
      const totalStatus = categoriasLote.conformes + categoriasLote.ressalvas + categoriasLote.corrigidas;

      // === Principais tipos de erro encontrados (decisão 18/06/2026) ===
      // Categoriza apontamentos NC e ressalva pelo campo afetado, lendo a descricao
      // do apontamento. Útil pra ver quais erros aparecem mais nas conciliações
      // (registro ANVISA errado, modelo errado, nome do produto, CNPJ, etc.).
      const tiposErroCount = {};
      const categorias = [
        { nome: 'Registro ANVISA',     re: /anvisa/i },
        { nome: 'Modelo',              re: /\bmodelo\b/i },
        { nome: 'Nome do produto',     re: /\bnome do produto|fam[íi]lia\b/i },
        { nome: 'CNPJ',                re: /\bcnpj\b/i },
        { nome: 'Fabricante',          re: /\bfabricante\b/i },
        { nome: 'Endereço',            re: /\bendere[çc]o\b/i },
        { nome: 'Telefone',            re: /\btelefone\b/i },
        { nome: 'Responsável Técnico', re: /respons[áa]vel\s+t[ée]cnico|\brt\b/i },
        { nome: 'CREA',                re: /\bcrea\b/i },
        { nome: 'Responsável Legal',   re: /respons[áa]vel\s+legal/i },
        { nome: 'Nº de série',         re: /\bs[ée]rie\b/i },
        { nome: 'Cronologia incoerente', re: /cronologia|hor[áa]rio\s+incoerente|incoerente|sequ[êe]ncia\s+de\s+(est[áa]gios|etapas)/i },
        { nome: 'Data',                re: /\bdata\b/i },
        { nome: 'Validade',            re: /validade/i },
        { nome: 'Lote/Código',         re: /\b(lote|c[óo]digo)\b/i },
        { nome: 'Acessório',           re: /acess[óo]rio/i },
        { nome: 'Componente/RC',       re: /\bcomponente|rela[çc][ãa]o de componentes|\brc\b/i },
        { nome: 'Reprovação em inspeção', re: /reprova/i },
        { nome: 'Cópia/revisão do FORM', re: /c[óo]pia controlada|revis[ãa]o do form/i },
        { nome: 'Derivação/identificação do produto', re: /deriva[çc][ãa]o|identificar o produto|produto a partir dos documentos|cat[áa]logo de produtos/i },
        { nome: 'Documento ausente/ilegível', re: /ausente|n[ãa]o anexad|n[ãa]o p[ôo]de ser parse|n[ãa]o parse[áa]vel|n[ãa]o extra[íi]d/i },
        { nome: 'Inspeção/Medição',   re: /inspe[çc][ãa]o|medi[çc]/i },
      ];
      // Aptidão de operador/inspetor não é mais tratada como NC — excluída dos gráficos de erro.
      const ehErroOperador = (ap) => /aptid[ãa]o|n[ãa]o consta apto|operador n[ãa]o autorizado|inspetor n[ãa]o autorizado|quadro de operadores/i.test((ap?.descricao || '') + ' ' + (ap?.documento_afetado || ''));
      // Calibração 18/06/2026: o gráfico de "Principais erros" mostra o que MOTIVOU
      // a correção — ou seja, os apontamentos NC/ressalva da análise ORIGINAL de cada
      // lote (e não do estado final, que pode já estar limpo). Para lotes sem correção,
      // usa o estado final mesmo (são erros ainda pendentes).
      // Classifica um apontamento no documento que ele afeta (para o filtro do gráfico).
      const classificarDocApontamento = (ap) => {
        const d = String(ap?.documento_afetado || '').toLowerCase();
        if (d.includes('etiqueta') && d.includes('acess')) return 'eac';
        if (d.includes('etiqueta')) return 'etx';
        if (/\brc\b|rela[çc][ãa]o de componentes/.test(d)) return 'rc';
        if (/\bop\b|ordem de produ/.test(d)) return 'op';
        return 'outros';
      };
      const categoriaDoTexto = (descricao, documento) => {
        const txt = (descricao || '') + ' ' + (documento || '');
        for (const cat of categorias) { if (cat.re.test(txt)) return cat.nome; }
        // Sem palavra-chave: rotula pelo documento afetado (sempre descritivo aqui).
        const doc = String(documento || '').trim();
        return doc || 'Outros';
      };
      // Descrição genérica do problema típico de cada categoria (para o painel de reincidência).
      const descProblema = (cat) => ({
        'Nº de série': 'número de série incorreto/divergente',
        'Lote/Código': 'lote ou código divergente',
        'Registro ANVISA': 'registro ANVISA incorreto',
        'Modelo': 'modelo divergente',
        'Nome do produto': 'nome do produto divergente',
        'CNPJ': 'CNPJ do fabricante divergente',
        'Fabricante': 'dados do fabricante divergentes',
        'Endereço': 'endereço do fabricante divergente',
        'Telefone': 'telefone divergente',
        'Responsável Técnico': 'responsável técnico divergente',
        'CREA': 'CREA divergente',
        'Responsável Legal': 'responsável legal divergente',
        'Cronologia incoerente': 'cronologia de estágios incoerente',
        'Data': 'data divergente ou não identificada',
        'Validade': 'validade divergente',
        'Acessório': 'divergência de acessório',
        'Componente/RC': 'divergência de componente na RC',
        'Reprovação em inspeção': 'inspeção reprovada',
        'Cópia/revisão do FORM': 'cópia/revisão do FORM incorreta',
        'Derivação/identificação do produto': 'identificação/derivação do produto incorreta',
        'Documento ausente/ilegível': 'documento ausente ou ilegível',
        'Inspeção/Medição': 'inspeção/medição com divergência',
      }[cat] || `divergência em ${cat}`);
      // Contagem por documento: { todos:{cat:n}, op:{}, rc:{}, etx:{}, eac:{} }.
      // Dedupe por (documento, categoria) DENTRO da mesma análise (igual à lógica antiga).
      const tiposErroPorDoc = { todos: {}, op: {}, rc: {}, etx: {}, eac: {} };
      // Gráfico "Problemas na OP" — só apontamentos que afetam a OP.
      const opEstagioCount = {};   // { "60 — Conciliação": n }
      const opInspecaoCount = {};  // { "#125945 · Est. 60": n }
      for (const a of lotesFinais) {
        // Ajuste por ficha desatualizada: a NC original era falso positivo → usa o
        // estado FINAL (conforme, sem apontamentos), não a original.
        const origem = ehAjusteFichaSomente(a) ? a : (findOriginal(a) || a);
        const aps = origem.parecer_completo?.apontamentos || [];
        const vistos = new Set(); // dedupe `${bucket}|${cat}` na MESMA análise
        for (const ap of aps) {
          if (ap.severidade !== 'nao_conforme' && ap.severidade !== 'ressalva') continue;
          if (ehErroOperador(ap)) continue; // aptidão de operador não conta como erro
          const cat = categoriaDoTexto(ap.descricao, ap.documento_afetado);
          const bucket = classificarDocApontamento(ap); // op|rc|etx|eac|outros
          const alvos = tiposErroPorDoc[bucket] ? ['todos', bucket] : ['todos'];
          for (const b of alvos) {
            const key = b + '|' + cat;
            if (vistos.has(key)) continue;
            vistos.add(key);
            tiposErroPorDoc[b][cat] = (tiposErroPorDoc[b][cat] || 0) + 1;
          }
          // Problemas na OP por estágio/inspeção (só apontamentos da OP)
          if (bucket === 'op') {
            const ests = Array.isArray(ap.estagios) ? ap.estagios : [];
            const insps = Array.isArray(ap.inspecoes) ? ap.inspecoes : [];
            if (ests.length === 0) opEstagioCount['OP — sem estágio específico'] = (opEstagioCount['OP — sem estágio específico'] || 0) + 1;
            else for (const e of ests) opEstagioCount[e] = (opEstagioCount[e] || 0) + 1;
            if (insps.length === 0) opInspecaoCount['Sem inspeção identificada'] = (opInspecaoCount['Sem inspeção identificada'] || 0) + 1;
            else for (const i of insps) opInspecaoCount[i] = (opInspecaoCount[i] || 0) + 1;
          }
        }
      }
      const tiposErroLista = Object.entries(tiposErroPorDoc[filtroDocErro] || tiposErroPorDoc.todos).sort((a, b) => b[1] - a[1]);
      const opEstagioLista = Object.entries(opEstagioCount).sort((a, b) => b[1] - a[1]);
      const opInspecaoLista = Object.entries(opInspecaoCount).sort((a, b) => b[1] - a[1]);
      const opChartLista = viewOpChart === 'inspecao' ? opInspecaoLista : opEstagioLista;

      // === Erros por tipo de equipamento (decisão 23/06/2026) ===
      // Conta quantos apontamentos NC/ressalva foram registrados na análise ORIGINAL
      // de cada lote, agrupados pelo EQUIPAMENTO (família do produto). Identifica
      // quais famílias têm mais problemas recorrentes na produção.
      const errosPorEquipamentoCount = {};
      // Lookup catálogo: modelo / codigo_sapiens → equipamento (alimentado por estado)
      const equipByModelo = new Map();
      const equipBySapiens = new Map();
      for (const p of catalogoProdutos || []) {
        if (p.modelo && p.equipamento) equipByModelo.set(String(p.modelo).toLowerCase(), p.equipamento);
        if (p.codigo_sapiens && p.equipamento) equipBySapiens.set(String(p.codigo_sapiens).toLowerCase(), p.equipamento);
      }

      for (const a of lotesFinais) {
        // Ajuste por ficha desatualizada não representa erro do equipamento.
        const origem = ehAjusteFichaSomente(a) ? a : (findOriginal(a) || a);
        const aps = origem.parecer_completo?.apontamentos || [];
        const ncs = aps.filter((ap) => (ap.severidade === 'nao_conforme' || ap.severidade === 'ressalva') && !ehErroOperador(ap)).length;
        if (ncs === 0) continue;
        // O agente usa `familia`, o catálogo usa `equipamento` — aceita ambos.
        // Se nenhum vier no parecer, faz lookup no catálogo via modelo/sapiens.
        const prod = origem.parecer_completo?.produto || a.parecer_completo?.produto || {};
        let equip = (prod.equipamento || prod.familia || '').trim();
        if (!equip) {
          const m = String(prod.modelo || a.modelo || '').toLowerCase();
          const s = String(prod.codigo_sapiens || '').toLowerCase();
          equip = (equipBySapiens.get(s) || equipByModelo.get(m) || '').trim();
        }
        if (!equip) equip = 'Sem equipamento';
        errosPorEquipamentoCount[equip] = (errosPorEquipamentoCount[equip] || 0) + ncs;
      }
      const errosPorEquipamentoLista = Object.entries(errosPorEquipamentoCount).sort((a, b) => b[1] - a[1]);

      // Enriquece cada correção com EQUIPAMENTO e os ERROS que a motivaram (lidos dos
      // apontamentos NC/ressalva da análise ORIGINAL da chain).
      const categoriasErroPorTexto = (aps) => {
        const set = new Set();
        for (const ap of (aps || [])) {
          if (ap.severidade !== 'nao_conforme' && ap.severidade !== 'ressalva') continue;
          if (ehErroOperador(ap)) continue; // aptidão de operador não conta como erro
          set.add(categoriaDoTexto(ap.descricao, ap.documento_afetado));
        }
        return [...set];
      };
      for (const c of correcoesDetalhe) {
        const m = String(c.modelo || '').toLowerCase();
        c.equipamento = equipByModelo.get(m) || equipBySapiens.get(m) || '—';
        const orig = findOriginal(byId.get(c.id)) || byId.get(c.origem_id);
        c.erros = categoriasErroPorTexto(orig?.parecer_completo?.apontamentos);
      }

      // === Análise de tendência (período personalizado trendDe..trendAte) =========
      // Baseada em TODAS as correções (re-análises reais), independente do filtro do topo.
      const tendencia = (() => {
        const de = trendDe, ate = trendAte;
        const corr = analises
          .filter((a) => a.analise_origem_id && a.tipo_reanalise !== 'atualizacao_ficha' && a.tipo_reanalise !== 'atualizacao_cadastro')
          .filter((a) => { const d = (a.created_at || '').slice(0, 10); return d && d >= de && d <= ate; });
        // meses do intervalo (inclui meses sem correção como 0)
        const meses = [];
        try {
          const d0 = new Date(de + 'T00:00:00'), d1 = new Date(ate + 'T00:00:00');
          let cur = new Date(d0.getFullYear(), d0.getMonth(), 1);
          const fim = new Date(d1.getFullYear(), d1.getMonth(), 1);
          let guard = 0;
          while (cur <= fim && guard++ < 240) { meses.push(`${cur.getFullYear()}-${String(cur.getMonth() + 1).padStart(2, '0')}`); cur.setMonth(cur.getMonth() + 1); }
        } catch (e) { /* datas inválidas */ }
        const porMes = Object.fromEntries(meses.map((m) => [m, 0]));
        const errosCount = {}, equipCount = {};
        for (const r of corr) {
          const mk = (r.created_at || '').slice(0, 7);
          if (mk in porMes) porMes[mk]++;
          const orig = findOriginal(byId.get(r.id)) || r;
          for (const e of categoriasErroPorTexto(orig?.parecer_completo?.apontamentos)) errosCount[e] = (errosCount[e] || 0) + 1;
          const eq = equipByModelo.get(String(r.modelo || '').toLowerCase()) || 'Sem equipamento';
          equipCount[eq] = (equipCount[eq] || 0) + 1;
        }
        const barItems = meses.map((m) => ({ label: `${m.slice(5)}/${m.slice(2, 4)}`, value: porMes[m] }));
        const topErros = Object.entries(errosCount).sort((a, b) => b[1] - a[1]);
        const topEquip = Object.entries(equipCount).sort((a, b) => b[1] - a[1]);
        const total = corr.length;
        const media = meses.length ? total / meses.length : 0;
        // direção: soma da 1ª metade vs 2ª metade dos meses
        const meio = Math.floor(meses.length / 2);
        const soma1 = meses.slice(0, meio).reduce((s, m) => s + porMes[m], 0);
        const soma2 = meses.slice(meses.length - meio).reduce((s, m) => s + porMes[m], 0);
        let direcao = 'estável';
        if (meio > 0) { if (soma2 > soma1 * 1.15) direcao = 'em alta'; else if (soma2 < soma1 * 0.85) direcao = 'em queda'; }

        // === Reincidência por CHAVE (categoria + equipamento + alvo) no período ===
        // Conta a análise ORIGINAL de cada lote (erros que motivaram a NC), no período
        // escolhido, e compara com a base histórica (12 meses antes do início).
        const baseIni = (() => { try { const d = new Date(de + 'T00:00:00'); d.setFullYear(d.getFullYear() - 1); return isoDia(d); } catch (e) { return de; } })();
        const equipDe = (a) => {
          const prod = a.parecer_completo?.produto || {};
          const e = (prod.equipamento || prod.familia || '').trim();
          if (e) return e;
          const m = String(a.modelo || '').toLowerCase();
          return equipByModelo.get(m) || equipBySapiens.get(m) || a.modelo || '—';
        };
        const keyPer = new Map(), keyBase = new Map(); // chave -> Set(id do lote original)
        const lotesPer = new Set(), lotesBase = new Set();
        const chaveMeta = new Map();
        const chaveLotes = new Map(); // chave -> [{op, serie, data}] (lotes afetados no período)
        const inPer = (d) => d >= de && d <= ate;
        const inBase = (d) => d >= baseIni && d < de;
        // Denominador: todos os lotes (análises originais) analisados no período/base.
        for (const a of analises) {
          if (a.analise_origem_id) continue;
          const d = (a.created_at || '').slice(0, 10); if (!d) continue;
          if (inPer(d)) lotesPer.add(a.id); else if (inBase(d)) lotesBase.add(a.id);
        }
        // Numerador: SÓ erros de lotes que tiveram CORREÇÃO real (reanálise com documento
        // substituído — exclui ajuste de ficha/cadastro), pela DATA da correção. Dedup por lote.
        for (const r of analises) {
          if (!r.analise_origem_id) continue;
          if (r.tipo_reanalise === 'atualizacao_ficha' || r.tipo_reanalise === 'atualizacao_cadastro') continue;
          const d = (r.created_at || '').slice(0, 10); if (!d) continue;
          const keyMap = inPer(d) ? keyPer : inBase(d) ? keyBase : null;
          if (!keyMap) continue;
          const orig = findOriginal(byId.get(r.id)) || byId.get(r.id) || r;
          const aps = orig.parecer_completo?.apontamentos || [];
          const equip = equipDe(orig);
          const chavesA = new Set();
          for (const ap of aps) {
            if (ap.severidade !== 'nao_conforme' && ap.severidade !== 'ressalva') continue;
            const _txtAp = (ap.descricao || '') + ' ' + (ap.documento_afetado || '');
            // Aptidão de operador/inspetor não é mais tratada como NC — fora da reincidência.
            if (/aptid[ãa]o|n[ãa]o consta apto|operador n[ãa]o autorizado|inspetor n[ãa]o autorizado|quadro de operadores/i.test(_txtAp)) continue;
            const cat = categoriaDoTexto(ap.descricao, ap.documento_afetado);
            const alvo = extrairAlvoErro(ap.descricao, ap.documento_afetado);
            const chave = chaveReincidencia(cat, equip, alvo);
            chavesA.add(chave);
            if (!chaveMeta.has(chave)) chaveMeta.set(chave, { cat, equip, alvo });
          }
          for (const chave of chavesA) {
            if (!keyMap.has(chave)) keyMap.set(chave, new Set());
            const tinha = keyMap.get(chave).has(orig.id);
            keyMap.get(chave).add(orig.id); // dedup por lote (várias correções do mesmo lote = 1)
            // Guarda os lotes afetados no PERÍODO (para o relatório de causa raiz).
            if (keyMap === keyPer && !tinha) {
              if (!chaveLotes.has(chave)) chaveLotes.set(chave, []);
              chaveLotes.get(chave).push({ op: orig.numero_op || '—', serie: orig.numero_serie || '—', data: (r.created_at || '').slice(0, 10) });
            }
          }
        }
        const Lper = lotesPer.size || 1, Lbase = lotesBase.size || 1;
        const rank = { reincidente: 4, emergente: 3, possivel: 2, pontual: 1 };
        const reincLinhas = [...keyPer.keys()].map((chave) => {
          const ocorr = (keyPer.get(chave) || new Set()).size;
          const ocorrBase = (keyBase.get(chave) || new Set()).size;
          const incid = ocorr / Lper;
          const base = ocorrBase / Lbase;
          const nivel = classificarNivelReinc(ocorr, incid, base, reincThr);
          return { chave, meta: chaveMeta.get(chave) || {}, ocorr, ocorrBase, incid, base, nivel, lotes: chaveLotes.get(chave) || [] };
        }).sort((a, b) => (rank[b.nivel] - rank[a.nivel]) || (b.incid - a.incid) || (b.ocorr - a.ocorr));
        const reincResumo = {
          reincidentes: reincLinhas.filter((r) => r.nivel === 'reincidente').length,
          emergentes: reincLinhas.filter((r) => r.nivel === 'emergente').length,
          possiveis: reincLinhas.filter((r) => r.nivel === 'possivel').length,
          lotesPer: lotesPer.size,
        };

        return { barItems, topErros, topEquip, total, media, direcao, reincLinhas, reincResumo };
      })();

      // === Relatório de causa raiz e ação corretiva (Markdown) ===
      // Reúne as chaves em possível reincidente / reincidente / em alta e monta um
      // roteiro de tratativa (lotes afetados + 5 porquês + sugestão de ação corretiva).
      const gerarRelatorioReincidencia = () => {
        const linhas = (tendencia.reincLinhas || []).filter((r) => r.nivel !== 'pontual');
        if (linhas.length === 0) { toast.error('Nenhuma chave em possível reincidente, reincidente ou em alta no período selecionado.'); return; }
        const nivelTxt = { reincidente: 'REINCIDENTE', emergente: 'EM ALTA', possivel: 'POSSÍVEL REINCIDENTE' };
        const brDate = (d) => (d ? String(d).split('-').reverse().join('/') : '—');
        const sugAcao = (cat) => ({
          'Nº de série': 'Revisar a geração/gravação do número de série no processo (Sapiens) e a conferência; verificar os demais lotes.',
          'Lote/Código': 'Revisar o controle de lote/código e a baixa de componentes; conferir cadastro.',
          'Registro ANVISA': 'Corrigir o registro ANVISA na origem (cadastro/ficha/modelo de etiqueta) e revisar os demais produtos.',
          'Modelo': 'Revisar o modelo/template da etiqueta e o cadastro do produto.',
          'Nome do produto': 'Corrigir o nome do produto no modelo da etiqueta e no cadastro.',
          'CNPJ': 'Corrigir o CNPJ no cadastro do fabricante e nas etiquetas.',
          'Cronologia incoerente': 'Investigar o registro de datas/horas no Sapiens; revisar o sequenciamento de estágios e treinar a produção.',
          'Data': 'Revisar o registro de datas no processo e a legibilidade nos documentos.',
          'Acessório': 'Revisar a BOM/ficha mestre e a conferência de acessórios; verificar lotes correlatos.',
          'Componente/RC': 'Investigar com a produção o desvio de componente e revisar a RC.',
          'Reprovação em inspeção': 'Tratar com RNC/reprocesso e investigar a causa do defeito no processo.',
          'Inspeção/Medição': 'Revisar o plano de inspeção/medição e a calibração/identificação de instrumentos.',
          'Cópia/revisão do FORM': 'Padronizar o uso da revisão vigente do FORM e o controle de cópias.',
          'Derivação/identificação do produto': 'Revisar o cadastro de derivações/produtos e o cruzamento com a OP.',
        }[cat] || 'Avaliar a causa raiz e definir a ação corretiva para evitar recorrência.');
        let md = `# Relatório de reincidência e ação corretiva\n\n`;
        md += `**Período:** ${brDate(trendDe)} a ${brDate(trendAte)}  \n`;
        md += `**Gerado em:** ${new Date().toLocaleString('pt-BR')}  \n`;
        md += `**Base:** erros que motivaram correção · ${tendencia.reincResumo.lotesPer} lote(s) analisado(s) no período  \n`;
        md += `**Resumo:** ${tendencia.reincResumo.reincidentes} reincidente(s) · ${tendencia.reincResumo.emergentes} em alta · ${tendencia.reincResumo.possiveis} possível(is)\n\n---\n\n`;
        for (const r of linhas) {
          md += `## ${r.meta.cat} · ${r.meta.equip}${r.meta.alvo ? ' · ' + r.meta.alvo : ''}\n\n`;
          md += `- **Nível:** ${nivelTxt[r.nivel] || r.nivel}\n`;
          md += `- **Problema:** ${descProblema(r.meta.cat)}\n`;
          md += `- **Métricas:** ${r.ocorr} ocorrência(s) · ${(r.incid * 100).toFixed(1)}% dos lotes · base histórica ${(r.base * 100).toFixed(1)}%\n\n`;
          md += `**Lotes afetados:**\n`;
          if ((r.lotes || []).length === 0) md += `- (não identificados)\n`;
          for (const l of (r.lotes || [])) md += `- OP ${l.op} / série ${l.serie} (correção em ${brDate(l.data)})\n`;
          md += `\n**Análise de causa raiz (5 porquês):**\n1. Por quê? \n2. Por quê? \n3. Por quê? \n4. Por quê? \n5. Por quê? \n\n`;
          md += `**Eixos a investigar (Ishikawa):** Método · Máquina · Material · Mão de obra · Medição · Meio.\n\n`;
          md += `**Causa raiz identificada:** _______________________________________________\n\n`;
          md += `**Ação corretiva definida:** ${sugAcao(r.meta.cat)}\n\n`;
          md += `**Responsável:** ______________   **Prazo:** __________   **Status:** ( ) Aberta  ( ) Concluída\n\n---\n\n`;
        }
        const blob = new Blob([md], { type: 'text/markdown;charset=utf-8' });
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = `Relatorio_Reincidencia_${trendDe}_a_${trendAte}.md`;
        document.body.appendChild(a); a.click();
        setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 500);
        registrarLog(perfil, 'exportar_relatorio', 'reincidencia', `${trendDe}..${trendAte}`, `${perfil?.nome_completo || perfil?.email || 'Usuário'} gerou o relatório de reincidência/causa raiz (${linhas.length} chave(s))`);
        toast.success('Relatório gerado (Markdown).');
      };

      // Últimas 5 análises (filtradas) — só MAIS RECENTE por OP/série (mesma lógica do Histórico)
      const idsCorrigidasNoFiltro = new Set(
        analisesFiltradas.filter((a) => a.analise_origem_id).map((a) => a.analise_origem_id)
      );
      const recentMapa = new Map();
      for (const a of analisesFiltradas) {
        if (idsCorrigidasNoFiltro.has(a.id)) continue;
        const chave = `${a.numero_op || '?'}|${a.numero_serie || '?'}`;
        const atual = recentMapa.get(chave);
        if (!atual || new Date(a.created_at) > new Date(atual.created_at)) {
          recentMapa.set(chave, a);
        }
      }
      const recent = [...recentMapa.values()]
        .sort((a, b) => new Date(b.created_at) - new Date(a.created_at))
        .slice(0, 5);

      const periodoFilename = () => {
        return filtroPeriodo === 'tudo' ? 'Tudo'
          : filtroPeriodo === 'ano' ? `Ano${filtroAno}`
          : filtroPeriodo === 'semestre' ? `Sem${filtroSubperiodo || 'X'}_${filtroAno}`
          : filtroPeriodo === 'trimestre' ? `Tri${filtroSubperiodo || 'X'}_${filtroAno}`
          : `${(['','01','02','03','04','05','06','07','08','09','10','11','12'])[filtroSubperiodo || 0] || 'XX'}_${filtroAno}`;
      };
      const handleExportarPDF = () => {
        const filename = `Dashboard_${periodoFilename()}_${new Date().toISOString().slice(0,10)}`;
        const originalTitle = document.title;
        document.title = filename;
        setTimeout(() => {
          window.print();
          setTimeout(() => { document.title = originalTitle; }, 500);
        }, 50);
      };
      // Exporta APENAS o gráfico identificado pelo selector. Aplica classe no body
      // que isola o card alvo via @media print; remove a classe após o print.
      const exportarCorrecoesXlsx = () => {
        if (!correcoesDetalhe.length) { toast.error('Sem correções no período para exportar.'); return; }
        const linhas = correcoesDetalhe.map((c) => ({
          'Data': c.data ? new Date(c.data).toLocaleString('pt-BR') : '',
          'Equipamento': c.equipamento || '',
          'OP': c.numero_op || '',
          'Modelo': c.modelo || '',
          'Documento(s) corrigido(s)': (c.docs || []).map((d) => SLOT_LABELS[d] || d).join(', '),
          'Erros que motivaram': (c.erros || []).join(', '),
          'Motivo': c.motivo || '',
        }));
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.json_to_sheet(linhas);
        ws['!cols'] = [{ wch: 20 }, { wch: 26 }, { wch: 10 }, { wch: 22 }, { wch: 38 }, { wch: 40 }, { wch: 60 }];
        XLSX.utils.book_append_sheet(wb, ws, 'Correções');
        XLSX.writeFile(wb, `correcoes_${periodoFilename()}_${new Date().toISOString().slice(0, 10)}.xlsx`);
        registrarLog(perfil, 'exportar_correcoes', 'dashboard', null, `${perfil?.nome_completo || perfil?.email || 'Usuário'} exportou o histórico de correções (XLSX)`);
      };

      const handleExportarGrafico = (titulo, selector) => {

        const originalTitle = document.title;
        document.title = filename;
        setTimeout(() => {

    // === Gráfico de donut (SVG simples, sem dependências) ===
    function DonutChart({ segments, total }) {
      const radius = 70, stroke = 22, cx = 100, cy = 100;
      const circumference = 2 * Math.PI * radius;
      let offset = 0;
      return (
        <div className="flex items-center gap-6 flex-wrap justify-center">
          <svg width={200} height={200} viewBox="0 0 200 200">
            <circle cx={cx} cy={cy} r={radius} fill="none" stroke="hsl(var(--muted))" strokeWidth={stroke} />
            {segments.filter((s) => s.value > 0).map((s, i) => {
              const dash = (s.value / total) * circumference;
              const el = (
                <circle key={i} cx={cx} cy={cy} r={radius} fill="none"
                  stroke={s.color} strokeWidth={stroke}
                  strokeDasharray={`${dash} ${circumference}`}
                  strokeDashoffset={-offset}
                  transform={`rotate(-90 ${cx} ${cy})`}
                />
              );
              offset += dash;
              return el;
            })}
            <text x={cx} y={cy - 5} textAnchor="middle" className="font-montserrat font-bold" style={{ fontSize: 28, fill: 'hsl(var(--foreground))' }}>{total}</text>
            <text x={cx} y={cy + 18} textAnchor="middle" style={{ fontSize: 11, fill: 'hsl(var(--muted-foreground))' }}>análises</text>
          </svg>
          <div className="space-y-1.5 text-xs">
            {segments.map((s, i) => (
              <div key={i} className="flex items-center gap-2">
                <span className="inline-block w-3 h-3 rounded-sm" style={{ backgroundColor: s.color }} />
                <span className="font-medium">{s.label}</span>
                <span className="text-muted-foreground">— {s.value} ({total > 0 ? Math.round((s.value / total) * 100) : 0}%)</span>
              </div>
            ))}
          </div>
        </div>
      );
    }

    // === Gráfico de barras horizontais simples ===
    function BarChart({ items }) {
      const max = Math.max(...items.map((it) => it.value), 1);
      return (
        <div className="space-y-2.5">
          {items.map((it, i) => (
            <div key={i}>
              <div className="flex items-center justify-between text-xs mb-1">
                <span className="font-medium">{it.label}</span>
                <span className="text-muted-foreground">{it.value}</span>
              </div>
              <div className="h-2 rounded-full overflow-hidden" style={{ backgroundColor: 'hsl(var(--muted))' }}>
                <div className="h-full rounded-full" style={{ width: `${(it.value / max) * 100}%`, backgroundColor: 'hsl(var(--accent))' }} />
              </div>
            </div>
          ))}
        </div>
      );
    }

    // Desenha um gráfico de barras horizontais num canvas e baixa como PNG.
    function exportarBarChartPNG(titulo, items) {
      if (!items || items.length === 0) return;
      const W = 900, rowH = 34, padTop = 64, padBottom = 24, padLeft = 250, padRight = 70;
      const H = padTop + items.length * rowH + padBottom;
      const scale = 2;
      const canvas = document.createElement('canvas');
      canvas.width = W * scale; canvas.height = H * scale;
      const ctx = canvas.getContext('2d');
      ctx.scale(scale, scale);
      ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#0f172a'; ctx.font = 'bold 18px Arial'; ctx.textAlign = 'left';
      ctx.fillText(titulo, 20, 30);
      ctx.fillStyle = '#64748b'; ctx.font = '11px Arial';
      ctx.fillText('Confiance Medical · Conciliação da Produção · ' + new Date().toLocaleDateString('pt-BR'), 20, 48);
      const max = Math.max(...items.map((i) => i.value), 1);
      const barMaxW = W - padLeft - padRight;
      items.forEach((it, idx) => {
        const y = padTop + idx * rowH;
        ctx.fillStyle = '#334155'; ctx.font = '13px Arial'; ctx.textAlign = 'right';
        ctx.fillText(String(it.label).slice(0, 42), padLeft - 10, y + 16);
        ctx.textAlign = 'left';
        ctx.fillStyle = '#e2e8f0'; ctx.fillRect(padLeft, y + 5, barMaxW, 15);
        const w = barMaxW * (it.value / max);
        ctx.fillStyle = '#2563eb'; ctx.fillRect(padLeft, y + 5, w, 15);
        ctx.fillStyle = '#0f172a'; ctx.font = 'bold 12px Arial';
        ctx.fillText(String(it.value), padLeft + w + 6, y + 17);
      });
      canvas.toBlob((blob) => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = String(titulo).replace(/[^\w\dÀ-ÿ -]+/g, '_') + '.png';
        document.body.appendChild(a); a.click();
        setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 500);
      }, 'image/png');
    }

    // Exporta um gráfico de rosca (donut) em PNG. segments: [{ label, value, hex }].
    function exportarDonutPNG(titulo, segments) {
      const segs = (segments || []).filter((s) => s.value > 0);
      const total = segs.reduce((s, x) => s + x.value, 0);
      if (total === 0) return;
      const W = 760, H = 380, scale = 2;
      const canvas = document.createElement('canvas');
      canvas.width = W * scale; canvas.height = H * scale;
      const ctx = canvas.getContext('2d');
      ctx.scale(scale, scale);
      ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#0f172a'; ctx.font = 'bold 18px Arial'; ctx.textAlign = 'left';
      ctx.fillText(titulo, 20, 30);
      ctx.fillStyle = '#64748b'; ctx.font = '11px Arial';
      ctx.fillText('Confiance Medical · Conciliação da Produção · ' + new Date().toLocaleDateString('pt-BR'), 20, 48);
      // Donut
      const cx = 190, cy = 210, rOut = 120, rIn = 74;
      let ang = -Math.PI / 2;
      for (const s of segs) {
        const frac = s.value / total;
        const end = ang + frac * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.arc(cx, cy, rOut, ang, end);
        ctx.closePath();
        ctx.fillStyle = s.hex; ctx.fill();
        ang = end;
      }
      // Furo central
      ctx.beginPath(); ctx.arc(cx, cy, rIn, 0, Math.PI * 2); ctx.fillStyle = '#ffffff'; ctx.fill();
      ctx.fillStyle = '#0f172a'; ctx.font = 'bold 34px Arial'; ctx.textAlign = 'center';
      ctx.fillText(String(total), cx, cy + 6);
      ctx.fillStyle = '#64748b'; ctx.font = '13px Arial';
      ctx.fillText('análises', cx, cy + 28);
      // Legenda
      let ly = 150;
      ctx.textAlign = 'left';
      for (const s of segs) {
        const pct = Math.round((s.value / total) * 100);
        ctx.fillStyle = s.hex; ctx.fillRect(360, ly, 16, 16);
        ctx.fillStyle = '#0f172a'; ctx.font = '14px Arial';
        ctx.fillText(`${s.label} — ${s.value} (${pct}%)`, 384, ly + 13);
        ly += 34;
      }
      canvas.toBlob((blob) => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = String(titulo).replace(/[^\w\dÀ-ÿ -]+/g, '_') + '.png';
        document.body.appendChild(a); a.click();
        setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(a.href); }, 500);
      }, 'image/png');
    }

    const MetricCard = ({ icon, label, value, accent, hint }) => {
